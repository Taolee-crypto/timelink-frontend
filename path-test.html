<!DOCTYPE html>
<html>
<head>
    <title>경로 테스트</title>
    <script>
        // 두 경로 모두 테스트
        function testPaths() {
            const paths = [
                './scripts/common-components.js',
                './src/script/common-components.js',
                './src/script/common-components-simple.js'
            ];
            
            paths.forEach(path => {
                const script = document.createElement('script');
                script.src = path;
                script.onload = () => console.log('✅ 로드 성공:', path);
                script.onerror = () => console.log('❌ 로드 실패:', path);
                document.head.appendChild(script);
            });
        }
        
        setTimeout(testPaths, 1000);
    </script>
</head>
<body>
    <h1>스크립트 경로 테스트</h1>
    <p>콘솔(F12)을 확인하세요.</p>
</body>
</html>
