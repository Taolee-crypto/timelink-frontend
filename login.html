<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 로그인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="common-component.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0F2B, #1a1f37); 
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 공통 헤더 */
        .main-header {
            background: rgba(26, 31, 55, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 0;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-section a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .logo-section i {
            color: #3b82f6;
            font-size: 1.8rem;
        }
        
        .main-nav {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        
        .nav-link.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        
        .header-right {
            flex: 0 0 auto;
        }
        
        /* 로그인 콘텐츠 */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo i {
            font-size: 3rem;
            color: #3b82f6;
            margin-bottom: 0.5rem;
        }
        
        .login-logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .bonus-badge {
            background: linear-gradient(135deg, rgba(255, 209, 102, 0.2), rgba(255, 179, 71, 0.2));
            border: 1px solid rgba(255, 209, 102, 0.3);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .bonus-badge h3 {
            color: #FFD166;
            margin-bottom: 0.25rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: border 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #1E90FF, #4169E1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .login-btn:hover {
            opacity: 0.9;
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #94a3b8;
            position: relative;
        }
        
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        
        .divider::before {
            left: 0;
        }
        
        .divider::after {
            right: 0;
        }
        
        .signup-btn {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #3b82f6;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .signup-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .back-home {
            text-align: center;
            margin-top: 2rem;
        }
        
        .back-home a {
            color: #94a3b8;
            text-decoration: none;
        }
        
        .back-home a:hover {
            color: white;
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .header-container {
                padding: 0 1rem;
            }
            
            .main-nav {
                gap: 0.5rem;
            }
            
            .nav-link span {
                display: none;
            }
            
            .login-container {
                padding: 1rem;
            }
            
            .login-box {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 공통 헤더 -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html">
                    <i class="fas fa-infinity"></i>
                    <span>TIMELINK</span>
                </a>
            </div>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>홈</span>
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-palette"></i>
                    <span>스튜디오</span>
                </a>
                <a href="tlmusic.html" class="nav-link">
                    <i class="fas fa-music"></i>
                    <span>TL Music</span>
                </a>
                <a href="cafe-radio.html" class="nav-link">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>Cafe Radio</span>
                </a>
            </nav>
            
            <div class="header-right">
                <div id="authButtons"></div>
            </div>
        </div>
    </header>

    <!-- 로그인 콘텐츠 -->
    <main class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-infinity"></i>
                <h1>TIMELINK</h1>
            </div>
            
            <div class="bonus-badge">
                <h3>🎉 첫 회원가입 보너스!</h3>
                <p>회원가입 시 10,000 TL 무료 지급</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="이메일을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <button type="submit" class="login-btn">
                    로그인
                </button>
            </form>
            
            <div class="divider">
                또는
            </div>
            
            <button class="signup-btn" onclick="location.href='signup.html'">
                회원가입
            </button>
            
            <div class="back-home">
                <a href="index.html">홈페이지로 돌아가기</a>
            </div>
        </div>
    </main>

<script>
// 공통 헤더 버튼 이벤트 핸들러
document.addEventListener('DOMContentLoaded', function() {
    // authButtons 클릭 이벤트 핸들러
    const authButtons = document.getElementById('authButtons');
    if (authButtons) {
        // 이벤트 위임 사용
        authButtons.addEventListener('click', function(e) {
            // 회원가입 버튼 클릭
            if (e.target.closest('button') && e.target.closest('button').textContent.includes('회원가입')) {
                e.preventDefault();
                if (typeof window.timelinkAuth !== 'undefined' && window.timelinkAuth.showSignupModal) {
                    window.timelinkAuth.showSignupModal();
                } else {
                    window.location.href = 'signup.html';
                }
            }
            // 로그인 버튼 클릭
            else if (e.target.closest('button') && e.target.closest('button').textContent.includes('로그인')) {
                e.preventDefault();
                if (typeof window.timelinkAuth !== 'undefined' && window.timelinkAuth.showLoginModal) {
                    window.timelinkAuth.showLoginModal();
                } else {
                    window.location.href = 'login.html';
                }
            }
        });
    }
    
    // 모든 회원가입 버튼에 이벤트 추가
    document.querySelectorAll('.signup-button, .signup-btn').forEach(button => {
        button.addEventListener('click', function(e) {
            e.preventDefault();
            if (typeof window.timelinkAuth !== 'undefined' && window.timelinkAuth.showSignupModal) {
                window.timelinkAuth.showSignupModal();
            } else {
                window.location.href = 'signup.html';
            }
        });
    });
});
</script>
</body>
</html>
