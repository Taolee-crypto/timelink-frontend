<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { 
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            color: white; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 30, 46, 0.8);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(124, 77, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #7c4dff, #00e5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .logo p {
            color: #b0b0d0;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0d0;
            font-size: 14px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(22, 22, 50, 0.7);
            border: 2px solid rgba(124, 77, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #7c4dff;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
        }
        input::placeholder {
            color: #666;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c4dff, #536dfe);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert.show {
            display: block;
        }
        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }
        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        .alert-info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid rgba(33, 150, 243, 0.3);
            color: #2196f3;
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .link {
            color: #7c4dff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .link:hover {
            color: #00e5ff;
            text-decoration: underline;
        }
        .spinner {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>TimeLink</h1>
            <p>음원 크리에이터를 위한 플랫폼</p>
        </div>
        
        <div id="alert" class="alert"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="example@timelink.com" required value="당신이메일@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호" required value="yourpassword123">
            </div>
            
            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i> 로그인
            </button>
        </form>
        
        <div class="links">
            <a href="signup.html" class="link">회원가입</a>
            <a href="index.html" class="link">홈으로</a>
        </div>
    </div>

    <script>
        // API 설정
        const API_BASE_URL = 'https://timelink-backend.timelink-api.workers.dev';
        
        // DOM 요소
        const loginForm = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        
        // 이메일 검증
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // 알림 표시
        function showAlert(message, type = 'info') {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
            setTimeout(() => alertDiv.classList.remove('show'), 3000);
        }
        
        // 실제 로그인 함수
        async function performLogin(email, password) {
            try {
                const response = await fetch(API_BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                console.log('API 응답:', data);
                
                return { response, data };
                
            } catch (error) {
                console.error('네트워크 에러:', error);
                throw error;
            }
        }
        
        // 폼 제출 핸들러
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const submitBtn = this.querySelector('button[type="submit"]');
            
            // 검증
            if (!validateEmail(email)) {
                showAlert('유효한 이메일을 입력해주세요.', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('비밀번호는 6자 이상이어야 합니다.', 'error');
                return;
            }
            
            // 로딩 상태
            submitBtn.disabled = true;
            const originalHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="spinner">⟳</i> 로그인 중...';
            
            showAlert('로그인 중입니다...', 'info');
            
            try {
                const { response, data } = await performLogin(email, password);
                
                if (response.ok && data.success) {
                    showAlert('로그인 성공! 대시보드로 이동합니다.', 'success');
                    
                    // 토큰 저장
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_email', email);
                        localStorage.setItem('user_id', data.user?.id || '');
                        localStorage.setItem('user_nickname', data.user?.nickname || '');
                    }
                    
                    // 대시보드로 이동
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    showAlert(data.error || '로그인에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                showAlert('서버 연결에 실패했습니다.', 'error');
                console.error('로그인 에러:', error);
                
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalHTML;
            }
        });
        
        // 페이지 로드 시
        document.addEventListener('DOMContentLoaded', () => {
            emailInput.focus();
            
            // 테스트 모드
            if (window.location.search.includes('test=true')) {
                console.log('테스트 모드 활성화');
                emailInput.value = '당신이메일@example.com';
                passwordInput.value = 'yourpassword123';
                showAlert('테스트 계정이 자동 입력되었습니다.', 'info');
            }
        });
        
        // 엔터키 지원
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.activeElement === passwordInput) {
                loginForm.requestSubmit();
            }
        });
    </script>
</body>
</html>
