<script type="module">
  import { TimeLinkAPI } from './api.js';

  document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    
    if (loginForm) {
      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        
        try {
          const result = await TimeLinkAPI.login(email, password);
          
          if (result.success) {
            TimeLinkAPI.setToken(result.token);
            // 프로필 정보 저장
            localStorage.setItem('timelink_user', JSON.stringify(result.user));
            alert('로그인 성공!');
            window.location.href = 'index.html';
          } else {
            errorDiv.textContent = result.message;
            errorDiv.style.display = 'block';
          }
        } catch (error) {
          errorDiv.textContent = '로그인 중 오류가 발생했습니다.';
          errorDiv.style.display = 'block';
          console.error(error);
        }
      });
    }
  });
</script>
