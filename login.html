<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 로그인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary-blue: #0066FF;
            --primary-dark: #0052CC;
            --secondary-teal: #00D4AA;
            --dark-bg: #0A0F2B;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
            --white: #FFFFFF;
            --error: #f44336;
            --success: #00D4AA;
        }

        body {
            background: var(--dark-bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(0, 212, 170, 0.05) 0%, transparent 50%);
        }

        /* 헤더 */
        .main-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            height: 70px;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        /* 로그인 컨테이너 */
        .login-container {
            margin-top: 100px;
            width: 100%;
            max-width: 450px;
        }

        .login-box {
            background: var(--dark-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--white);
        }

        .login-subtitle {
            color: var(--gray-text);
            font-size: 1rem;
        }

        /* 입력 그룹 */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--gray-text);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 45px 14px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 102, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-text);
        }

        /* 비밀번호 토글 */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-text);
            cursor: pointer;
            padding: 5px;
            z-index: 2;
        }

        .toggle-password:hover {
            color: var(--white);
        }

        /* 옵션 */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-text);
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-blue);
        }

        .forgot-password {
            color: var(--secondary-teal);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--primary-blue);
        }

        /* 버튼 */
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 메시지 */
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: rgba(0, 212, 170, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid rgba(244, 67, 54, 0.3);
            display: block;
        }

        /* 소셜 로그인 */
        .social-login {
            margin: 30px 0;
            text-align: center;
        }

        .social-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--gray-text);
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .social-divider span {
            padding: 0 15px;
            font-size: 0.9rem;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* 링크 */
        .links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .links a {
            color: var(--secondary-teal);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .links a:hover {
            color: var(--primary-blue);
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .main-header {
                padding: 0.5rem 0;
            }
            
            .login-box {
                padding: 30px 20px;
                margin: 0 15px;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
            
            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>
        </div>
    </header>

    <!-- 로그인 컨테이너 -->
    <div class="login-container">
        <div class="login-box">
            <!-- 헤더 -->
            <div class="login-header">
                <h1 class="login-title"><i class="fas fa-sign-in-alt"></i> 로그인</h1>
                <p class="login-subtitle">TIMELINK에 오신 것을 환영합니다</p>
            </div>
            
            <!-- 메시지 표시 영역 -->
            <div id="message" class="message"></div>
            
            <!-- 로그인 폼 -->
            <form id="loginForm">
                <!-- 이메일 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-envelope"></i> 이메일
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="이메일 주소를 입력하세요" required>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 비밀번호 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-lock"></i> 비밀번호
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <!-- 옵션 -->
                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>로그인 상태 유지</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-password">
                        비밀번호를 잊으셨나요?
                    </a>
                </div>
                
                <!-- 로그인 버튼 -->
                <button type="submit" class="btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
            </form>
            
            <!-- 소셜 로그인 -->
            <div class="social-login">
                <div class="social-divider">
                    <span>또는 소셜 계정으로 로그인</span>
                </div>
                <div class="social-buttons">
                    <button class="social-btn" id="googleLogin">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn" id="githubLogin">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
            </div>
            
            <!-- 링크 -->
            <div class="links">
                <a href="signup.html"><i class="fas fa-user-plus"></i> 회원가입</a>
                <a href="index.html"><i class="fas fa-home"></i> 홈으로 돌아가기</a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // API 기본 URL
        const API_BASE_URL = 'https://timelink-api.timelink-api.workers.dev';
        
        // DOM 요소
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        const rememberMe = document.getElementById('rememberMe');
        const googleLoginBtn = document.getElementById('googleLogin');
        const githubLoginBtn = document.getElementById('githubLogin');
        
        // 비밀번호 표시/숨기기
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
        
        // 로그인 폼 검증
        function validateForm() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            const emailValid = email.length > 0 && email.includes('@');
            const passwordValid = password.length >= 6;
            
            loginBtn.disabled = !(emailValid && passwordValid);
            
            return emailValid && passwordValid;
        }
        
        // 입력 시마다 검증
        emailInput.addEventListener('input', validateForm);
        passwordInput.addEventListener('input', validateForm);
        
        // 메시지 표시 함수
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            if (type === 'error') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        // 로그인 처리
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                showMessage('이메일과 비밀번호를 올바르게 입력해주세요.', 'error');
                return;
            }
            
            const loginData = {
                email: emailInput.value.trim(),
                password: passwordInput.value,
                remember: rememberMe.checked
            };
            
            // 버튼 상태 변경
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 로그인 중...';
            loginBtn.disabled = true;
            
            try {
                // API 호출 (실제 구현시 주석 해제)
                /*
                const response = await fetch(API_BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // 로그인 성공
                    localStorage.setItem('timelink_token', data.token);
                    localStorage.setItem('timelink_user', JSON.stringify(data.user));
                    
                    showMessage('✅ 로그인 성공!', 'success');
                    
                    // 1.5초 후 프로필 페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1500);
                    
                } else {
                    showMessage(data.message || '로그인에 실패했습니다.', 'error');
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
                */
                
                // 임시 성공 처리 (API 구현 전)
                showMessage('✅ 로그인 성공!', 'success');
                
                // 가상 사용자 데이터 생성
                const mockUserData = {
                    id: 'user_001',
                    email: loginData.email,
                    name: '타임링크 사용자',
                    nickname: loginData.email.split('@')[0],
                    balance: 10000,
                    isVerified: true,
                    joinedAt: '2024-01-15T00:00:00Z',
                    stats: {
                        uploads: 5,
                        views: 1250,
                        likes: 85,
                        comments: 23
                    }
                };
                
                // 로컬스토리지에 저장 (로그인 상태)
                localStorage.setItem('timelink_token', 'mock_jwt_token_' + Date.now());
                localStorage.setItem('timelink_user', JSON.stringify(mockUserData));
                
                // 1.5초 후 프로필 페이지로 이동
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);
                
            } catch (error) {
                console.error('로그인 오류:', error);
                showMessage('서버 연결에 실패했습니다. 다시 시도해주세요.', 'error');
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        });
        
        // 소셜 로그인 (임시)
        googleLoginBtn.addEventListener('click', () => {
            showMessage('Google 로그인 기능은 준비 중입니다.', 'error');
        });
        
        githubLoginBtn.addEventListener('click', () => {
            showMessage('GitHub 로그인 기능은 준비 중입니다.', 'error');
        });
        
        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', () => {
            // 저장된 이메일 불러오기
            const savedEmail = localStorage.getItem('timelink_saved_email');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberMe.checked = true;
            }
            
            emailInput.focus();
            validateForm();
            
            // 로그인 상태가 있으면 프로필 페이지로 리다이렉트
            const token = localStorage.getItem('timelink_token');
            if (token) {
                window.location.href = 'profile.html';
            }
        });
        
        // 스핀 애니메이션
        const style = document.createElement('style');
        style.textContent = `
            .fa-spinner.fa-spin {
                animation: spin 1s linear infinite;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
