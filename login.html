<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 로그인</title>
    <link rel="stylesheet" href="src/styles/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="bi bi-clock"></i>
                    <span>TimeLink</span>
                </div>
                <p class="tagline">음원 크리에이터를 위한 플랫폼</p>
            </div>
            
            <div class="login-content">
                <div id="alert" class="alert"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">이메일</label>
                        <input type="email" id="email" class="form-input" placeholder="example@timelink.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" id="password" class="form-input" placeholder="비밀번호" required>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right"></i> 로그인
                    </button>
                </form>
                
                <div class="divider">
                    <span>또는</span>
                </div>
                
                <div class="links">
                    <a href="signup.html" class="link">회원가입</a>
                    <a href="#" class="link">비밀번호 찾기</a>
                    <a href="index.html" class="link">홈으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 전역 변수 제거 - 완전 독립
        const loginForm = document.getElementById('loginForm');
        const alertDiv = document.getElementById('alert');
        
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // 유효성 검사
            if (!validateEmail(email)) {
                showAlert('유효한 이메일 주소를 입력해주세요.', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('비밀번호는 6자 이상이어야 합니다.', 'error');
                return;
            }
            
            // 로그인 처리
            showAlert('로그인 중입니다...', 'success');
            
            try {
                // 실제 API 호출 (테스트용 가짜)
                await fakeLoginAPI(email, password);
                
                showAlert('로그인 성공! 대시보드로 이동합니다.', 'success');
                
                // 1초 후 대시보드로 이동
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } catch (error) {
                showAlert(error.message, 'error');
            }
        });
        
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type} show`;
            
            // 3초 후 알림 제거
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 3000);
        }
        
        async function fakeLoginAPI(email, password) {
            // 가짜 API 응답 (테스트용)
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // 테스트용 - 특정 이메일/비밀번호 허용
                    if (email === 'test@timelink.com' && password === 'password123') {
                        resolve({ success: true, token: 'fake-jwt-token' });
                    } else {
                        reject(new Error('이메일 또는 비밀번호가 잘못되었습니다.'));
                    }
                }, 500);
            });
        }
        
        // 페이지 로드 시 포커스
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
