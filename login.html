<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 로그인</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #121212; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: #1E1E1E; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; }
        h1 { text-align: center; margin-bottom: 30px; color: #29C4A8; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #BBB; }
        input { width: 100%; padding: 12px; background: #2A2A2A; border: 2px solid #3A3A3A; border-radius: 8px; color: white; font-size: 16px; }
        input:focus { outline: none; border-color: #29C4A8; }
        button { width: 100%; padding: 14px; background: #29C4A8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #20a78b; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: rgba(41, 196, 168, 0.2); color: #29C4A8; display: block; }
        .error { background: rgba(244, 67, 54, 0.2); color: #f44336; display: block; }
        .links { margin-top: 20px; text-align: center; }
        .links a { color: #29C4A8; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>TimeLink 로그인</h1>
        
        <div id="message" class="message"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="이메일" value="realuser@test.com">
            </div>
            
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호" value="realpass123">
            </div>
            
            <button type="submit">로그인</button>
        </form>
        
        <div class="links">
            <a href="signup.html">회원가입</a>
            <a href="index.html">홈으로</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://timelink-backend.timelink-api.workers.dev/api/login';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            // 로딩 상태
            const btn = this.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '로그인 중...';
            messageDiv.textContent = '';
            messageDiv.className = 'message';
            
            try {
                // 실제 API 호출
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    messageDiv.textContent = '로그인 성공! 대시보드로 이동합니다.';
                    messageDiv.className = 'message success';
                    
                    // 토큰 저장
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_email', email);
                    }
                    
                    // 2초 후 대시보드로 이동
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                    
                } else {
                    messageDiv.textContent = data.error || '로그인에 실패했습니다.';
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                messageDiv.textContent = '서버 연결에 실패했습니다.';
                messageDiv.className = 'message error';
                console.error('로그인 에러:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
        
        // 페이지 로드 시 포커스
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
