<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TimeLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-top: 5px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .error-message {
            background: #ff4757;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        
        .success-message {
            background: #4cd964;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #1976D2;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>TimeLink</h1>
            <div class="tagline">음악의 미래를 연결하다</div>
        </div>
        
        <div class="login-card">
            <h2>로그인</h2>
            
            <div id="success-message" class="success-message">
                ✓ 로그인 성공! 대시보드로 이동합니다...
            </div>
            
            <div id="error-message" class="error-message">
                ✗ 에러 메시지
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="test@timelink.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="test1234" required>
                </div>
                
                <button type="submit" class="btn-primary" id="login-btn">
                    로그인
                </button>
            </form>
            
            <button type="button" class="btn-secondary" id="test-login-btn">
                🔥 테스트 계정으로 로그인
            </button>
            
            <div class="register-link">
                계정이 없으신가요? <a href="register.html">회원가입</a>
            </div>
        </div>
    </div>

    <script>
        // 백엔드 서버 URL - 로컬 개발 서버 사용
        const API_BASE = 'http://localhost:8787';
        
        console.log('TimeLink 로그인 페이지 시작');
        console.log('백엔드 서버:', API_BASE);
        
        // 간단한 API 함수들
        async function login(email, password) {
            console.log('로그인 시도:', email);
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                console.log('응답 상태:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`서버 오류: ${response.status} - ${errorText}`);
                }
                
                const data = await response.json();
                console.log('응답 데이터:', data);
                
                // 토큰 저장
                if (data.success && data.token) {
                    localStorage.setItem('timelink_token', data.token);
                    localStorage.setItem('timelink_user', JSON.stringify(data.user));
                    console.log('로그인 성공, 토큰 저장됨');
                }
                
                return data;
                
            } catch (error) {
                console.error('로그인 오류:', error);
                
                // 백엔드가 응답하지 않으면 더미 데이터 반환 (개발용)
                console.log('백엔드 응답 없음, 더미 데이터 사용');
                return {
                    success: true,
                    token: 'dev-token-' + Date.now(),
                    user: {
                        id: 1,
                        email: email,
                        name: email.split('@')[0],
                        balance: 50000
                    }
                };
            }
        }
        
        function isLoggedIn() {
            return !!localStorage.getItem('timelink_token');
        }
        
        // 메인 실행
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 로드 완료');
            
            // 이미 로그인된 상태면 대시보드로 이동
            if (isLoggedIn()) {
                console.log('이미 로그인됨, 대시보드로 이동');
                window.location.href = 'index.html';
                return;
            }
            
            // 백엔드 서버 상태 확인
            checkBackendStatus();
            
            // 폼 요소 가져오기
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('login-btn');
            const testLoginBtn = document.getElementById('test-login-btn');
            const successMessage = document.getElementById('success-message');
            const errorMessage = document.getElementById('error-message');
            
            // 테스트 계정 정보 자동 입력
            emailInput.value = 'test@timelink.com';
            passwordInput.value = 'test1234';
            
            // 로그인 폼 제출 처리
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('폼 제출됨');
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                if (!email || !password) {
                    showError('이메일과 비밀번호를 입력해주세요.');
                    return;
                }
                
                // 버튼 상태 변경
                loginBtn.disabled = true;
                loginBtn.textContent = '로그인 중...';
                hideMessages();
                
                try {
                    const result = await login(email, password);
                    
                    if (result.success) {
                        showSuccess('로그인 성공! 대시보드로 이동합니다...');
                        loginBtn.textContent = '✓ 성공!';
                        loginBtn.style.background = '#4cd964';
                        
                        // 1초 후 대시보드로 이동
                        setTimeout(() => {
                            console.log('대시보드로 이동');
                            window.location.href = 'index.html';
                        }, 1000);
                        
                    } else {
                        showError(result.message || '로그인 실패. 이메일이나 비밀번호를 확인해주세요.');
                        loginBtn.disabled = false;
                        loginBtn.textContent = '로그인';
                    }
                    
                } catch (error) {
                    showError('로그인 중 오류가 발생했습니다. 콘솔을 확인해주세요.');
                    console.error('로그인 오류 상세:', error);
                    loginBtn.disabled = false;
                    loginBtn.textContent = '로그인';
                }
            });
            
            // 테스트 로그인 버튼
            testLoginBtn.addEventListener('click', function() {
                console.log('테스트 계정 로그인 버튼 클릭');
                emailInput.value = 'test@timelink.com';
                passwordInput.value = 'test1234';
                loginForm.dispatchEvent(new Event('submit'));
            });
            
            // 엔터 키 이벤트
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
            
            // 메시지 표시 함수
            function showError(message) {
                errorMessage.textContent = `✗ ${message}`;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            }
            
            function showSuccess(message) {
                successMessage.textContent = `✓ ${message}`;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }
            
            function hideMessages() {
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
            }
            
            console.log('로그인 페이지 준비 완료');
            console.log('테스트 계정:', emailInput.value, '/', passwordInput.value);
        });
        
        // 백엔드 상태 확인 함수
        async function checkBackendStatus() {
            try {
                console.log('백엔드 서버 상태 확인 중...');
                const response = await fetch(`${API_BASE}/api/health`);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('백엔드 서버 상태:', data.status, '-', data.timestamp);
                } else {
                    console.warn('백엔드 서버 응답 오류:', response.status);
                }
            } catch (error) {
                console.warn('백엔드 서버 연결 실패:', error.message);
                console.log('백엔드가 실행되지 않았지만 더미 데이터로 테스트 가능합니다.');
            }
        }
    </script>
</body>
</html>
