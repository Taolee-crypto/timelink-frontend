<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 기존 디자인 유지 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.95);
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a237e, #311b92, #4a148c, #311b92);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            line-height: 1.6;
        }
        
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* 네비게이션 바 */
        nav {
            background: rgba(26, 35, 126, 0.15);
            padding: 0.8rem 2rem;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            color: rgba(255, 255, 255, 0.98);
            font-size: 1.4rem;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .logo:hover {
            color: #bb86fc;
            transform: translateY(-1px);
        }
        
        .nav-menu {
            display: flex;
            gap: 1.2rem;
        }
        
        .nav-menu a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            letter-spacing: -0.3px;
        }
        
        .nav-menu a:hover {
            background: rgba(187, 134, 252, 0.15);
            color: #bb86fc;
            transform: translateY(-2px);
        }
        
        .nav-auth {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        
        .nav-auth a {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
        }
        
        .btn-login {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(187, 134, 252, 0.2);
            border: 1px solid rgba(187, 134, 252, 0.4);
        }
        
        .btn-login:hover {
            background: rgba(187, 134, 252, 0.3);
            transform: translateY(-2px);
        }
        
        .btn-signup {
            color: white;
            background: linear-gradient(135deg, #7c4dff, #651fff);
            border: none;
            font-weight: 500;
        }
        
        .btn-signup:hover {
            background: linear-gradient(135deg, #651fff, #6200ea);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(101, 31, 255, 0.4);
        }
        
        /* 로그인 폼 스타일 */
        .login-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
        }
        
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-title {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #bb86fc, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
        }
        
        /* 폼 스타일 */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .form-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #bb86fc;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
        }
        
        /* 로그인 옵션 */
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .remember-me input[type="checkbox"] {
            accent-color: #bb86fc;
        }
        
        .forgot-password {
            color: #bb86fc;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        /* 로그인 버튼 */
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #7c4dff, #651fff);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        
        .login-btn:hover {
            background: linear-gradient(135deg, #651fff, #6200ea);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(101, 31, 255, 0.3);
        }
        
        /* 소셜 로그인 */
        .social-login {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .social-login-title {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }
        
        .social-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        
        .social-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        /* 회원가입 링크 */
        .signup-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
        }
        
        .signup-link a {
            color: #bb86fc;
            text-decoration: none;
            font-weight: 500;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
        
        /* 푸터 */
        footer {
            text-align: center;
            padding: 1.5rem;
            background: rgba(26, 35, 126, 0.1);
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⏳ TIMELINK</a>
            <div class="nav-menu">
                <a href="p2p.html">🔗 P2P</a>
                <a href="studio.html">🎬 TL STUDIO</a>
                <a href="music.html">🎵 TL MUSIC PLACE</a>
                <a href="tube.html">▶️ TLTUBE</a>
                <a href="charge.html">⚡ TL CHARGE</a>
                <a href="guide.html">📘 이용방법</a>
            </div>
            <div class="nav-auth">
                <a href="login.html" class="btn-login" style="background: rgba(187, 134, 252, 0.2); border: 1px solid rgba(187, 134, 252, 0.4);">로그인</a>
                <a href="signup.html" class="btn-signup">회원가입</a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1 class="login-title">로그인</h1>
                <p class="login-subtitle">TIMELINK에 오신 것을 환영합니다</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" id="email" class="form-input" placeholder="이메일을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>로그인 상태 유지</span>
                    </label>
                    <a href="#" class="forgot-password">비밀번호 찾기</a>
                </div>
                
                <button type="submit" class="login-btn">로그인</button>
            </form>
            
            <div class="social-login">
                <p class="social-login-title">소셜 계정으로 로그인</p>
                <div class="social-buttons">
                    <button class="social-btn" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn" onclick="socialLogin('github')">
                        <i class="fab fa-github"></i>
                        GitHub
                    </button>
                </div>
            </div>
            
            <div class="signup-link">
                <p>아직 계정이 없으신가요? <a href="signup.html">회원가입하기</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 TIMELINK. 시간을 가치로 연결하는 새로운 경제</p>
    </footer>

    <script>
        // 비밀번호 보기/숨기기
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.className = 'far fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleBtn.className = 'far fa-eye';
            }
        }
        
        // 로그인 폼 제출
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // 간단한 유효성 검사
            if (!email || !password) {
                alert('이메일과 비밀번호를 입력해주세요.');
                return;
            }
            
            // 로그인 시뮬레이션
            console.log('로그인 시도:', { email, password, remember });
            
            // 로딩 효과
            const submitBtn = document.querySelector('.login-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '로그인 중...';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                alert('로그인이 완료되었습니다! (시뮬레이션)');
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                
                // 로그인 성공 시 홈으로 리디렉션
                // window.location.href = 'index.html';
            }, 1500);
        });
        
        // 소셜 로그인
        function socialLogin(provider) {
            alert(provider + ' 로그인을 시작합니다. (시뮬레이션)');
            
            // 소셜 로그인 시뮬레이션
            const socialBtn = event.currentTarget;
            const originalText = socialBtn.innerHTML;
            socialBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 연결 중...';
            socialBtn.disabled = true;
            
            setTimeout(() => {
                socialBtn.innerHTML = originalText;
                socialBtn.disabled = false;
                alert(provider + ' 로그인 완료!');
            }, 2000);
        }
    </script>
</body>
</html>
