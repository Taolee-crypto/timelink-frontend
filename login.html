<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Platform - 로그인</title>
    <script src="js/config.js?v=1764863667"></script>
    <script src="js/language.js?v=1764863667"></script>
    <style>
        :root {
            --primary-color: #1a237e;
            --secondary-color: #303f9f;
            --accent-color: #536dfe;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
            --light-bg: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .login-header {
            background: var(--primary-color);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(83, 109, 254, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #3d5afe;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .login-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .demo-notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: #856404;
        }

        .demo-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
        }

        .demo-btn:hover {
            background: #388e3c;
            transform: translateY(-2px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h2 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .logo span {
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h2>TL<span>Platform</span></h2>
            <p>시간 기반 콘텐츠 경제 시스템</p>
        </div>
        
        <div class="login-box">
            <div class="login-header">
                <h1>로그인</h1>
                <p>TL Platform에 오신 것을 환영합니다</p>
            </div>
            
            <div class="login-body">
                <div class="demo-notice">
                    <strong>데모 버전</strong><br>
                    로그인 없이 데모를 체험할 수 있습니다.
                </div>
                
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="email" placeholder="이메일을 입력하세요" value="demo@tlplatform.com">
                </div>
                
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" value="demopassword">
                </div>
                
                <button class="login-btn" onclick="login()">로그인</button>
                
                <a href="app.html" class="demo-btn">
                    데모 체험하기 (로그인 없음)
                </a>
                
                <div class="login-footer">
                    <p>계정이 없으신가요? <a href="register.html">회원가입</a></p>
                    <p><a href="index.html">홈페이지로 돌아가기</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('이메일과 비밀번호를 입력해주세요.');
                return;
            }
            
            // 간단한 로그인 처리 (데모용)
            localStorage.setItem('tl_user_logged_in', 'true');
            localStorage.setItem('tl_user_email', email);
            
            // 로그인 성공 메시지
            alert('로그인 성공! 데모 모드로 진행됩니다.');
            
            // 앱 페이지로 이동
            window.location.href = 'app.html';
        }

        // 데모 체험 버튼 클릭 시
        document.querySelector('.demo-btn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.setItem('tl_user_logged_in', 'true');
            localStorage.setItem('tl_user_email', 'demo@tlplatform.com');
            window.location.href = 'app.html';
        });

        // 엔터 키로 로그인
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
