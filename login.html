<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TimeLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-top: 5px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .error-message {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #1976D2;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #4cd964;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- 디버그 패널 -->
    <div id="debugPanel" class="debug-panel" style="display: none;">
        <strong>디버그 정보</strong>
        <div id="debugContent"></div>
    </div>
    
    <div class="container">
        <div class="logo">
            <h1>TimeLink</h1>
            <div class="tagline">음악의 미래를 연결하다</div>
        </div>
        
        <div class="login-card">
            <h2>로그인</h2>
            
            <div id="success-message" class="success-message">
                로그인 성공! 이동 중...
            </div>
            
            <div id="error-message" class="error-message" style="display: none;">
                에러 메시지
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="이메일을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <button type="submit" class="btn-primary" id="login-btn">
                    로그인
                </button>
            </form>
            
            <button type="button" class="btn-secondary" id="test-login-btn">
                테스트 계정으로 로그인
            </button>
            
            <div class="register-link">
                계정이 없으신가요? <a href="register.html">회원가입</a>
            </div>
        </div>
    </div>

    <script>
        // API 모듈 (인라인으로 포함)
        class TimeLinkAPI {
            constructor() {
                this.baseUrl = 'http://localhost:8787'; // 로컬 백엔드
                this.token = localStorage.getItem('timelink_token');
                this.user = JSON.parse(localStorage.getItem('timelink_user') || '{}');
            }

            async request(endpoint, options = {}) {
                const url = `${this.baseUrl}${endpoint}`;
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };

                if (this.token) {
                    headers['Authorization'] = `Bearer ${this.token}`;
                }

                try {
                    const fetchOptions = {
                        ...options,
                        headers,
                        mode: 'cors'
                    };

                    if (options.body && typeof options.body === 'object') {
                        fetchOptions.body = JSON.stringify(options.body);
                    }

                    logDebug(`API 요청: ${endpoint}`);
                    const response = await fetch(url, fetchOptions);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    logDebug(`API 응답: ${JSON.stringify(data).substring(0, 100)}...`);
                    return data;
                    
                } catch (error) {
                    logDebug(`API 오류: ${error.message}`);
                    
                    // 로컬 개발 중이면 더미 데이터 반환
                    if (this.baseUrl.includes('localhost') || this.baseUrl.includes('127.0.0.1')) {
                        logDebug('로컬 개발 모드: 더미 데이터 반환');
                        return this.getMockData(endpoint, options);
                    }
                    
                    throw error;
                }
            }

            getMockData(endpoint, options) {
                const mockData = {
                    '/api/auth/login': {
                        success: true,
                        token: 'mock-jwt-token-' + Date.now(),
                        user: {
                            id: 1,
                            email: 'test@timelink.com',
                            name: '테스트 사용자',
                            balance: 50000
                        }
                    },
                    '/api/auth/register': {
                        success: true,
                        message: '회원가입 성공'
                    },
                    '/api/health': {
                        status: 'ok',
                        timestamp: new Date().toISOString()
                    }
                };
                
                return mockData[endpoint] || { success: true, message: '더미 데이터' };
            }

            async login(email, password) {
                const result = await this.request('/api/auth/login', {
                    method: 'POST',
                    body: { email, password }
                });
                
                if (result.success) {
                    this.setToken(result.token);
                    this.setUser(result.user);
                }
                
                return result;
            }

            async register(userData) {
                return this.request('/api/auth/register', {
                    method: 'POST',
                    body: userData
                });
            }

            setToken(token) {
                this.token = token;
                localStorage.setItem('timelink_token', token);
            }

            setUser(user) {
                this.user = user;
                localStorage.setItem('timelink_user', JSON.stringify(user));
            }

            getCurrentUser() {
                return this.user;
            }

            isAuthenticated() {
                return !!this.token && !!this.user?.id;
            }

            logout() {
                this.token = null;
                this.user = {};
                localStorage.removeItem('timelink_token');
                localStorage.removeItem('timelink_user');
            }
        }

        // 글로벌 API 인스턴스
        const api = new TimeLinkAPI();
        
        // 디버그 로그 함수
        function logDebug(message) {
            console.log(`[DEBUG] ${message}`);
            
            const debugPanel = document.getElementById('debugPanel');
            const debugContent = document.getElementById('debugContent');
            
            if (debugPanel && debugContent) {
                debugPanel.style.display = 'block';
                const timestamp = new Date().toLocaleTimeString();
                debugContent.innerHTML += `<div>${timestamp}: ${message}</div>`;
                debugContent.scrollTop = debugContent.scrollHeight;
            }
        }
        
        // 메인 실행
        document.addEventListener('DOMContentLoaded', function() {
            logDebug('페이지 로드 완료');
            
            // 이미 로그인된 상태면 대시보드로 이동
            if (api.isAuthenticated()) {
                logDebug('이미 로그인됨, 대시보드로 이동');
                window.location.href = 'index.html';
                return;
            }
            
            // 백엔드 연결 테스트
            testBackendConnection();
            
            // 폼 요소 가져오기
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('login-btn');
            const testLoginBtn = document.getElementById('test-login-btn');
            const successMessage = document.getElementById('success-message');
            const errorMessage = document.getElementById('error-message');
            
            // 로그인 폼 제출 처리
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                logDebug('폼 제출 시작');
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                if (!email || !password) {
                    showError('이메일과 비밀번호를 입력해주세요.');
                    return;
                }
                
                // 버튼 상태 변경
                const originalText = loginBtn.textContent;
                loginBtn.disabled = true;
                loginBtn.textContent = '로그인 중...';
                hideError();
                
                try {
                    logDebug(`로그인 시도: ${email}`);
                    const result = await api.login(email, password);
                    
                    if (result.success) {
                        logDebug('로그인 성공');
                        showSuccess('로그인 성공!');
                        loginBtn.textContent = '성공!';
                        loginBtn.style.background = '#4cd964';
                        
                        // 1초 후 대시보드로 이동
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                        
                    } else {
                        logDebug(`로그인 실패: ${result.message}`);
                        showError(result.message || '로그인 실패');
                        loginBtn.disabled = false;
                        loginBtn.textContent = originalText;
                    }
                    
                } catch (error) {
                    logDebug(`로그인 오류: ${error.message}`);
                    showError('서버 연결 오류. 콘솔을 확인해주세요.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = originalText;
                }
            });
            
            // 테스트 로그인 버튼
            testLoginBtn.addEventListener('click', function() {
                logDebug('테스트 계정 로그인');
                emailInput.value = 'test@timelink.com';
                passwordInput.value = 'test1234';
                loginForm.dispatchEvent(new Event('submit'));
            });
            
            // 엔터 키로 로그인
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && (e.target === emailInput || e.target === passwordInput)) {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
            
            // 에러/성공 메시지 함수
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
            }
            
            function hideError() {
                errorMessage.style.display = 'none';
            }
            
            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
            }
            
            logDebug('로그인 페이지 초기화 완료');
        });
        
        // 백엔드 연결 테스트
        async function testBackendConnection() {
            try {
                logDebug('백엔드 연결 테스트 시작...');
                const response = await fetch('http://localhost:8787/api/health');
                
                if (response.ok) {
                    const data = await response.json();
                    logDebug(`백엔드 연결 성공: ${data.status}`);
                } else {
                    logDebug(`백엔드 연결 실패: HTTP ${response.status}`);
                }
            } catch (error) {
                logDebug(`백엔드 연결 오류: ${error.message}`);
                logDebug('백엔드 서버가 실행 중인지 확인해주세요: npx wrangler dev');
            }
        }
        
        // 페이지 언로드 시 정리
        window.addEventListener('beforeunload', function() {
            logDebug('페이지 언로드');
        });
    </script>
</body>
</html>
