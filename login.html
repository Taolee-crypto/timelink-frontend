<!-- login.html 파일에 아래 스크립트를 </body> 태그 바로 앞에 추가하세요 -->

<script type="module">
// api.js 임포트
import api from './api.js';

document.addEventListener('DOMContentLoaded', function() {
    console.log('로그인 페이지 로드됨');
    
    // 이미 로그인된 상태면 대시보드로 이동
    if (api.isAuthenticated()) {
        window.location.href = 'index.html';
        return;
    }
    
    // 로그인 폼 찾기 - 여러 방법으로 시도
    let loginForm = document.querySelector('form');
    
    if (!loginForm) {
        // 폼이 없으면 생성
        console.log('폼이 없어서 생성합니다');
        
        // 기존 컨테이너 찾기
        const container = document.querySelector('.container') || 
                         document.querySelector('.login-card') || 
                         document.body;
        
        // 이메일과 비밀번호 입력창 찾기
        const emailInput = document.querySelector('input[type="email"]') || 
                          document.querySelector('input[name="email"]') ||
                          document.querySelector('#email');
        
        const passwordInput = document.querySelector('input[type="password"]') || 
                             document.querySelector('input[name="password"]') ||
                             document.querySelector('#password');
        
        // 버튼 찾기
        const submitButton = document.querySelector('button[type="submit"]') || 
                            document.querySelector('.btn-primary') ||
                            document.querySelector('button');
        
        if (emailInput && passwordInput && submitButton) {
            // 기존 요소들로 폼 생성
            loginForm = document.createElement('form');
            loginForm.id = 'loginForm';
            loginForm.appendChild(emailInput.parentNode || emailInput);
            loginForm.appendChild(passwordInput.parentNode || passwordInput);
            loginForm.appendChild(submitButton.parentNode || submitButton);
        }
    }
    
    if (loginForm) {
        console.log('로그인 폼 찾음:', loginForm);
        
        // 폼 제출 이벤트 리스너 추가
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('폼 제출됨');
            
            // 입력값 가져오기
            const emailInput = this.querySelector('input[type="email"]') || 
                             this.querySelector('input[name="email"]') ||
                             document.querySelector('input[type="email"]');
            
            const passwordInput = this.querySelector('input[type="password"]') || 
                                this.querySelector('input[name="password"]') ||
                                document.querySelector('input[type="password"]');
            
            if (!emailInput || !passwordInput) {
                console.error('이메일 또는 비밀번호 입력창을 찾을 수 없음');
                alert('입력창을 찾을 수 없습니다. 페이지를 새로고침해주세요.');
                return;
            }
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                alert('이메일과 비밀번호를 입력해주세요.');
                return;
            }
            
            // 버튼 상태 변경
            const submitButton = this.querySelector('button[type="submit"]') || 
                               this.querySelector('.btn-primary') ||
                               this.querySelector('button');
            
            let originalText = '로그인';
            if (submitButton) {
                originalText = submitButton.textContent;
                submitButton.disabled = true;
                submitButton.textContent = '로그인 중...';
            }
            
            // 로그인 시도
            try {
                console.log('로그인 시도:', email);
                const result = await api.login(email, password);
                console.log('로그인 결과:', result);
                
                if (result.success) {
                    console.log('로그인 성공, 토큰:', result.token);
                    
                    // 로그인 성공 메시지
                    if (submitButton) {
                        submitButton.textContent = '로그인 성공!';
                        submitButton.style.background = '#4CAF50';
                    }
                    
                    // 1초 후 대시보드로 이동
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                    
                } else {
                    alert(result.message || '로그인 실패. 이메일 또는 비밀번호를 확인해주세요.');
                    if (submitButton) {
                        submitButton.disabled = false;
                        submitButton.textContent = originalText;
                    }
                }
                
            } catch (error) {
                console.error('로그인 오류:', error);
                alert('로그인 중 오류가 발생했습니다: ' + error.message);
                if (submitButton) {
                    submitButton.disabled = false;
                    submitButton.textContent = originalText;
                }
            }
        });
        
        // 개발용 테스트 버튼 추가
        const testButton = document.createElement('button');
        testButton.textContent = '테스트 계정으로 로그인';
        testButton.type = 'button';
        testButton.style.cssText = `
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        `;
        
        testButton.onmouseover = function() {
            this.style.background = '#1976D2';
        };
        
        testButton.onmouseout = function() {
            this.style.background = '#2196F3';
        };
        
        testButton.onclick = async function() {
            // 테스트 계정 정보 자동 입력
            const emailInput = document.querySelector('input[type="email"]') || 
                             document.querySelector('input[name="email"]');
            const passwordInput = document.querySelector('input[type="password"]') || 
                                document.querySelector('input[name="password"]');
            
            if (emailInput) emailInput.value = 'test@timelink.com';
            if (passwordInput) passwordInput.value = 'test1234';
            
            // 폼 제출
            if (loginForm) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        };
        
        // 테스트 버튼을 폼이나 컨테이너에 추가
        if (loginForm.parentNode) {
            loginForm.parentNode.insertBefore(testButton, loginForm.nextSibling);
        } else {
            document.body.appendChild(testButton);
        }
        
        // 로그인 상태 체크를 위한 주기적 검사
        setInterval(() => {
            if (api.isAuthenticated() && window.location.pathname.includes('login.html')) {
                window.location.href = 'index.html';
            }
        }, 5000);
        
    } else {
        console.error('로그인 폼을 찾을 수 없습니다. HTML 구조를 확인해주세요.');
        
        // 폼이 아예 없으면 간단한 로그인 폼 생성
        const container = document.querySelector('.container') || 
                         document.querySelector('.login-card') || 
                         document.body;
        
        const simpleForm = document.createElement('div');
        simpleForm.innerHTML = `
            <div style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto;">
                <h2 style="text-align: center; margin-bottom: 20px; color: #333;">로그인</h2>
                <form id="simpleLoginForm">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; color: #555;">이메일</label>
                        <input type="email" id="simpleEmail" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="이메일을 입력하세요">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 5px; color: #555;">비밀번호</label>
                        <input type="password" id="simplePassword" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="비밀번호를 입력하세요">
                    </div>
                    <button type="submit" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer;">
                        로그인
                    </button>
                </form>
                <button id="simpleTestBtn" style="width: 100%; padding: 12px; margin-top: 10px; background: #2196F3; color: white; border: none; border-radius: 5px; font-size: 14px; cursor: pointer;">
                    테스트 계정으로 로그인
                </button>
            </div>
        `;
        
        container.appendChild(simpleForm);
        
        // 간단 폼 이벤트 처리
        document.getElementById('simpleLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('simpleEmail').value;
            const password = document.getElementById('simplePassword').value;
            
            const btn = this.querySelector('button');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '로그인 중...';
            
            try {
                const result = await api.login(email, password);
                if (result.success) {
                    btn.textContent = '로그인 성공!';
                    btn.style.background = '#4CAF50';
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    alert(result.message);
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            } catch (error) {
                alert('로그인 오류: ' + error.message);
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
        
        document.getElementById('simpleTestBtn').addEventListener('click', function() {
            document.getElementById('simpleEmail').value = 'test@timelink.com';
            document.getElementById('simplePassword').value = 'test1234';
            document.getElementById('simpleLoginForm').dispatchEvent(new Event('submit'));
        });
    }
    
    // 페이지 로드 완료 메시지
    console.log('로그인 페이지 초기화 완료');
});
</script>
