<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 로그인</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary-blue: #0066FF;
            --primary-dark: #0052CC;
            --secondary-teal: #00D4AA;
            --dark-bg: #0A0F2B;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
            --white: #FFFFFF;
            --error: #f44336;
            --success: #00D4AA;
        }

        body {
            background: var(--dark-bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box {
            background: var(--dark-card);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--white);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 102, 255, 0.05);
        }

        input::placeholder {
            color: var(--gray-text);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .result.success {
            background: rgba(0, 212, 170, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 212, 170, 0.3);
        }

        .result.error {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .result.info {
            background: rgba(0, 102, 255, 0.1);
            color: var(--primary-blue);
            border: 1px solid rgba(0, 102, 255, 0.3);
        }

        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .links a {
            color: var(--secondary-teal);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-block;
        }

        .links a:hover {
            color: var(--primary-blue);
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: var(--gray-text);
            font-size: 0.9rem;
        }

        .remember-me input {
            width: auto;
            margin-right: 10px;
            margin-bottom: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .login-box {
                padding: 30px 20px;
            }
            
            .logo-text {
                font-size: 1.8rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 로고 -->
    <div class="logo">
        <div class="logo-icon">TL</div>
        <div class="logo-text">TIMELINK</div>
    </div>

    <!-- 로그인 박스 -->
    <div class="login-box">
        <h2><i class="fas fa-sign-in-alt"></i> TIMELINK 로그인</h2>
        
        <!-- 로그인 폼 -->
        <div id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="이메일 주소" value="">
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호" value="">
            </div>
            
            <!-- 자동 로그인 체크박스 -->
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">로그인 상태 유지</label>
            </div>
            
            <button onclick="login()" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> 로그인
            </button>
        </div>
        
        <!-- 결과 표시 영역 -->
        <div id="result" class="result"></div>
        
        <!-- 링크 -->
        <div class="links">
            <a href="signup.html"><i class="fas fa-user-plus"></i> 회원가입</a>
            <a href="index.html"><i class="fas fa-home"></i> 홈으로</a>
            <a href="#" onclick="showPasswordReset()"><i class="fas fa-key"></i> 비밀번호 찾기</a>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // API 기본 URL
        const API_BASE_URL = 'https://timelink-api.timelink-api.workers.dev';
        
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', function() {
            console.log('로그인 페이지 로드됨');
            
            // URL 파라미터 확인
            const urlParams = new URLSearchParams(window.location.search);
            const logoutParam = urlParams.get('logout');
            const forceLogout = urlParams.get('force_logout');
            const registered = urlParams.get('registered');
            
            // 로그아웃 처리
            if (logoutParam === 'true' || forceLogout === 'true') {
                console.log('로그아웃 처리 시작');
                clearAllAuthData();
                showResult('로그아웃 되었습니다.', 'info');
            }
            
            // 회원가입 후 로그인 페이지로 리다이렉트된 경우
            if (registered === 'true') {
                showResult('회원가입이 완료되었습니다. 로그인해주세요.', 'success');
                setTimeout(() => {
                    document.getElementById('result').className = 'result';
                    document.getElementById('result').textContent = '';
                }, 3000);
            }
            
            // 저장된 이메일 가져오기 (자동 로그인 기능용)
            const savedEmail = localStorage.getItem('remembered_email');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
            
            // 엔터키로 로그인
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });
        
        // 로그인 함수
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const resultDiv = document.getElementById('result');
            const loginBtn = document.getElementById('loginBtn');
            
            // 입력 검증
            if (!email || !password) {
                showResult('이메일과 비밀번호를 입력해주세요.', 'error');
                return;
            }
            
            // 이메일 형식 검증
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showResult('올바른 이메일 형식이 아닙니다.', 'error');
                return;
            }
            
            // 버튼 상태 변경
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 로그인 중...';
            loginBtn.disabled = true;
            
            try {
                // 로그인 API 호출
                const response = await fetch(API_BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // 로그인 성공
                    showResult('✅ 로그인 성공! 잠시 후 대시보드로 이동합니다.', 'success');
                    
                    // 인증 토큰 저장
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('user_data', JSON.stringify(data.user || {}));
                        
                        // 이메일 기억하기
                        if (rememberMe) {
                            localStorage.setItem('remembered_email', email);
                        } else {
                            localStorage.removeItem('remembered_email');
                        }
                    }
                    
                    // 1.5초 후 대시보드로 이동
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    // 로그인 실패
                    showResult(data.error || '로그인에 실패했습니다. 이메일과 비밀번호를 확인해주세요.', 'error');
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
                
            } catch (error) {
                // 네트워크 오류
                showResult('서버 연결에 실패했습니다. 네트워크 상태를 확인해주세요.', 'error');
                console.error('로그인 에러:', error);
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }
        
        // 결과 표시 함수
        function showResult(text, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = text;
            resultDiv.className = 'result ' + type;
            
            // 에러 메시지는 5초 후 사라짐
            if (type === 'error') {
                setTimeout(() => {
                    resultDiv.className = 'result';
                    resultDiv.textContent = '';
                }, 5000);
            }
        }
        
        // 모든 인증 데이터 삭제
        function clearAllAuthData() {
            console.log('모든 인증 데이터 삭제');
            
            // localStorage 삭제
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_data');
            localStorage.removeItem('remembered_email');
            localStorage.removeItem('tl_token');
            localStorage.removeItem('tl_user');
            localStorage.removeItem('tl_balance');
            
            // sessionStorage 삭제
            sessionStorage.clear();
            
            // 쿠키 삭제
            document.cookie.split(";").forEach(function(c) {
                document.cookie = c
                    .replace(/^ +/, "")
                    .replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            
            // 폼 리셋
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('rememberMe').checked = false;
        }
        
        // 비밀번호 찾기 (간단한 알림)
        function showPasswordReset() {
            const email = document.getElementById('email').value.trim();
            if (email) {
                showResult(`'${email}' 주소로 비밀번호 재설정 링크를 전송했습니다.`, 'info');
                setTimeout(() => {
                    document.getElementById('result').className = 'result';
                    document.getElementById('result').textContent = '';
                }, 5000);
            } else {
                showResult('이메일 주소를 입력해주세요.', 'error');
                document.getElementById('email').focus();
            }
        }
        
        // 자동 로그인 체크
        function checkAutoLogin() {
            const authToken = localStorage.getItem('auth_token');
            if (authToken) {
                // 이미 로그인된 상태이면 대시보드로 이동
                const urlParams = new URLSearchParams(window.location.search);
                const fromLogout = urlParams.get('logout');
                if (!fromLogout) {
                    console.log('이미 로그인된 상태 - 대시보드로 이동');
                    window.location.href = 'dashboard.html';
                }
            }
        }
        
        // 페이지 로드 후 자동 로그인 체크
        setTimeout(checkAutoLogin, 100);
    </script>
</body>
</html>
