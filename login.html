<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | TimeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4a1e8a 0%, #1a237e 100%);
            --secondary-gradient: linear-gradient(135deg, #7b1fa2 0%, #311b92 100%);
            --dark-bg: #0a0a1a;
            --darker-bg: #050510;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-bg-hover: rgba(255, 255, 255, 0.08);
            --text-light: #ffffff;
            --text-lighter: #f0f0ff;
            --text-gray: #b8b8d1;
            --text-dark: #8a8aaa;
            --accent-purple: #7c4dff;
            --accent-blue: #536dfe;
            --accent-pink: #ff4081;
            --accent-cyan: #00e5ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(124, 77, 255, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(74, 30, 138, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, rgba(26, 35, 126, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 40% 90%, rgba(123, 31, 162, 0.1) 0%, transparent 30%);
        }
        
        .login-container {
            max-width: 440px;
            width: 100%;
            margin: 0 auto;
        }
        
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--primary-gradient);
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 8px 20px rgba(74, 30, 138, 0.3);
        }
        
        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .welcome-text {
            color: var(--text-gray);
            font-size: 1.1rem;
            line-height: 1.6;
        }
        
        .welcome-text strong {
            color: var(--text-light);
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-label i {
            color: var(--accent-purple);
        }
        
        .input-group {
            position: relative;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            border-radius: 12px;
            padding: 15px 45px 15px 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-purple);
            color: var(--text-light);
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
            outline: none;
        }
        
        .input-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            pointer-events: none;
        }
        
        .password-toggle {
            position: absolute;
            right: 45px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
            z-index: 2;
        }
        
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 30px;
        }
        
        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-check-input {
            width: 18px;
            height: 18px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            cursor: pointer;
        }
        
        .form-check-input:checked {
            background-color: var(--accent-purple);
            border-color: var(--accent-purple);
        }
        
        .form-check-label {
            color: var(--text-gray);
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .forgot-link {
            color: var(--accent-purple);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .forgot-link:hover {
            color: var(--accent-cyan);
            text-decoration: underline;
        }
        
        .login-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(74, 30, 138, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .divider {
            position: relative;
            text-align: center;
            margin: 25px 0;
            color: var(--text-gray);
            font-size: 0.9rem;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .social-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-light);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .social-btn.google {
            color: #4285f4;
        }
        
        .social-btn.google:hover {
            background: rgba(66, 133, 244, 0.1);
            border-color: rgba(66, 133, 244, 0.3);
        }
        
        .social-btn.github {
            color: white;
        }
        
        .social-btn.github:hover {
            background: rgba(24, 23, 23, 0.1);
            border-color: rgba(24, 23, 23, 0.3);
        }
        
        .signup-section {
            text-align: center;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .signup-text {
            color: var(--text-gray);
            margin-bottom: 15px;
            font-size: 0.95rem;
        }
        
        .signup-btn {
            background: transparent;
            border: 2px solid var(--accent-purple);
            color: var(--accent-purple);
            border-radius: 12px;
            padding: 14px 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .signup-btn:hover {
            background: rgba(124, 77, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .alert-success {
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.3);
            color: #00c853;
        }
        
        .alert-error {
            background: rgba(255, 64, 129, 0.1);
            border: 1px solid rgba(255, 64, 129, 0.3);
            color: #ff4081;
        }
        
        .alert-info {
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid rgba(33, 150, 243, 0.3);
            color: #2196f3;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s ease;
        }
        
        /* 반응형 */
        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }
            
            .logo-text {
                font-size: 2rem;
            }
            
            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
            }
            
            .social-login {
                flex-direction: column;
            }
            
            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
        
        /* 로딩 스피너 */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 패스워드 힌트 */
        .password-hint {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 5px;
            padding-left: 25px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- 로고 섹션 -->
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="bi bi-infinity"></i>
                    </div>
                    <div class="logo-text">TimeLink</div>
                </div>
                <p class="welcome-text">
                    <strong>TL 지갑으로 로그인</strong>하고<br>
                    음원을 재생하세요
                </p>
            </div>
            
            <!-- 알림 메시지 -->
            <div class="alert" id="messageAlert"></div>
            
            <!-- 로그인 폼 -->
            <form id="loginForm">
                <!-- 이메일 입력 -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-envelope"></i>
                        이메일 주소
                    </label>
                    <div class="input-group">
                        <input type="email" 
                               class="form-control" 
                               id="email" 
                               placeholder="가입한 이메일을 입력하세요"
                               required
                               autocomplete="email">
                        <span class="input-icon">
                            <i class="bi bi-envelope-check"></i>
                        </span>
                    </div>
                </div>
                
                <!-- 비밀번호 입력 -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="bi bi-lock"></i>
                        비밀번호
                    </label>
                    <div class="input-group">
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               placeholder="비밀번호를 입력하세요"
                               required
                               autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye"></i>
                        </button>
                        <span class="input-icon">
                            <i class="bi bi-key"></i>
                        </span>
                    </div>
                    <div class="password-hint">
                        <i class="bi bi-info-circle me-1"></i>
                        이메일 인증으로 가입한 비밀번호입니다
                    </div>
                </div>
                
                <!-- 기억하기 & 비밀번호 찾기 -->
                <div class="remember-forgot">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            로그인 상태 유지
                        </label>
                    </div>
                    <a href="#" class="forgot-link" onclick="showForgotPassword()">
                        비밀번호를 잊으셨나요?
                    </a>
                </div>
                
                <!-- 로그인 버튼 -->
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i>
                    TL 지갑으로 로그인
                </button>
            </form>
            
            <!-- 소셜 로그인 -->
            <div class="divider">또는 소셜 계정으로 로그인</div>
            
            <div class="social-login">
                <button class="social-btn google" onclick="socialLogin('google')">
                    <i class="bi bi-google"></i>
                    Google
                </button>
                <button class="social-btn github" onclick="socialLogin('github')">
                    <i class="bi bi-github"></i>
                    GitHub
                </button>
            </div>
            
            <!-- 회원가입 섹션 -->
            <div class="signup-section">
                <p class="signup-text">아직 TimeLink 계정이 없으신가요?</p>
                <a href="/signup.html" class="signup-btn">
                    <i class="bi bi-person-plus"></i>
                    무료로 회원가입
                </a>
            </div>
        </div>
    </div>

  <script>
// 1. 현재 URL 확인 (오타 수정)
async function testConnection() {
    try {
        const response = await fetch('https://timelink-backend.timelink-api.workers.dev/health');
        console.log('Connection test:', await response.text());
        return 'https://timelink-backend.timelink-api.workers.dev';
    } catch (error) {
        console.error('Connection failed:', error);
        // 로컬 개발 시 localhost로 폴백
        return 'http://localhost:8787';
    }
}

// 2. 동적 API URL 설정
async function init() {
    const isLocalhost = window.location.hostname === 'localhost' || 
                        window.location.hostname === '127.0.0.1';
    
    if (isLocalhost) {
        window.API_BASE_URL = 'http://localhost:8787';
    } else {
        // 연결 테스트 후 URL 결정
        const testResult = await testConnection();
        window.API_BASE_URL = testResult;
    }
    
    console.log('Using API:', window.API_BASE_URL);
}

// 3. 페이지 로드 시 초기화
document.addEventListener('DOMContentLoaded', async function() {
    await init();
    
    // 폼 이벤트 리스너 연결
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
});

// 4. 수정된 로그인 함수
async function handleLogin(event) {
    event.preventDefault();
    
    const loginBtn = document.getElementById('loginBtn');
    const originalText = loginBtn.innerHTML;
    
    // 로딩 상태 표시
    loginBtn.innerHTML = '<span class="spinner"></span> 로그인 중...';
    loginBtn.disabled = true;
    
    const formData = {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
    };
    
    try {
        // API_BASE_URL 사용
        const response = await fetch(`${window.API_BASE_URL}/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(data.message || `로그인 실패 (${response.status})`);
        }
        
        // 로그인 성공 처리
        showMessage('로그인 성공! TL 지갑으로 이동합니다...', 'success');
        console.log('Login success:', data);
        
        // 토큰 저장 (예시)
        if (data.token) {
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('user_email', formData.email);
            
            // "로그인 상태 유지" 체크박스 확인
            if (document.getElementById('rememberMe').checked) {
                localStorage.setItem('remember_me', 'true');
            }
        }
        
        // 대시보드로 리다이렉트 (예시)
        setTimeout(() => {
            window.location.href = '/dashboard.html';
        }, 1500);
        
    } catch (error) {
        console.error('Login error:', error);
        showMessage(`로그인 실패: ${error.message}`, 'error');
        
        // 폼 흔들기 애니메이션
        document.getElementById('loginForm').classList.add('shake');
        setTimeout(() => {
            document.getElementById('loginForm').classList.remove('shake');
        }, 500);
    } finally {
        // 버튼 상태 복원
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
    }
}

// 5. 메시지 표시 함수
function showMessage(message, type = 'info') {
    const alertDiv = document.getElementById('messageAlert');
    alertDiv.textContent = message;
    alertDiv.className = `alert alert-${type}`;
    alertDiv.style.display = 'block';
    
    // 5초 후 메시지 숨기기
    setTimeout(() => {
        alertDiv.style.display = 'none';
    }, 5000);
}

// 6. 비밀번호 표시/숨기기 토글
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const toggleButton = document.querySelector('.password-toggle i');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleButton.className = 'bi bi-eye-slash';
    } else {
        passwordInput.type = 'password';
        toggleButton.className = 'bi bi-eye';
    }
}

// 7. 비밀번호 찾기
function showForgotPassword() {
    const email = document.getElementById('email').value;
    if (email) {
        showMessage(`비밀번호 재설정 링크를 ${email}로 보냈습니다.`, 'info');
    } else {
        showMessage('이메일 주소를 입력해주세요.', 'error');
    }
}

// 8. 소셜 로그인 (예시)
function socialLogin(provider) {
    showMessage(`${provider} 로그인은 현재 준비 중입니다.`, 'info');
    // 실제 구현 시 OAuth 리다이렉트
    // window.location.href = `${window.API_BASE_URL}/auth/${provider}`;
}
</script>
</body>
</html>
