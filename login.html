<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TimeLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-top: 5px;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #1976D2;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .status-message {
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            font-weight: 500;
        }
        
        .status-success {
            background: #4cd964;
            color: white;
        }
        
        .status-error {
            background: #ff4757;
            color: white;
        }
        
        .status-info {
            background: #3498db;
            color: white;
        }
        
        .debug-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.9);
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-width: 400px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
            border: 1px solid #00ff00;
        }
        
        .debug-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .debug-toggle {
            background: #00ff00;
            color: black;
            border: none;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }
    </style>
    <link rel="stylesheet" href="css/api-styles.css">
</head>
<body>
    <!-- 디버그 패널 -->
    <div class="debug-panel" id="debugPanel">
        <div class="debug-header">
            <strong>TimeLink 디버그</strong>
            <button class="debug-toggle" onclick="toggleDebug()">숨기기</button>
        </div>
        <div id="debugLog"></div>
    </div>
    
    <div class="container">
        <div class="logo">
            <h1>TimeLink</h1>
            <div class="tagline">음악의 미래를 연결하다</div>
        </div>
        
        <div class="login-card">
            <h2>로그인</h2>
            
            <div id="status-message" class="status-message">
                메시지
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="test@timelink.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="test1234" required>
                </div>
                
                <button type="submit" class="btn-primary" id="login-btn">
                    로그인
                </button>
            </form>
            
            <button type="button" class="btn-secondary" id="test-login-btn">
                🔥 테스트 계정으로 로그인 (오프라인 모드)
            </button>
            
            <div class="register-link">
                계정이 없으신가요? <a href="register.html">회원가입</a>
            </div>
        </div>
    </div>

    <script>
        // 디버그 기능
        function logDebug(message, type = 'info') {
            const now = new Date();
            const timestamp = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            const logEntry = `<div style="color: ${type === 'error' ? '#ff4757' : type === 'success' ? '#4cd964' : '#3498db'}; margin-bottom: 3px;">[${timestamp}] ${message}</div>`;
            
            const debugLog = document.getElementById('debugLog');
            if (debugLog) {
                debugLog.innerHTML += logEntry;
                debugLog.scrollTop = debugLog.scrollHeight;
            }
            
            console.log(`[${timestamp}] ${message}`);
        }
        
        function toggleDebug() {
            const panel = document.getElementById('debugPanel');
            const button = panel.querySelector('.debug-toggle');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                button.textContent = '숨기기';
            } else {
                panel.style.display = 'none';
                button.textContent = '보이기';
            }
        }
        
        // 백엔드 서버 URL
        const API_BASE = 'http://localhost:8787';
        
        // 상태 표시 함수
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = `status-message status-${type}`;
            statusEl.style.display = 'block';
        }
        
        function hideStatus() {
            document.getElementById('status-message').style.display = 'none';
        }
        
        // 타임아웃이 있는 fetch 함수
        async function fetchWithTimeout(url, options = {}, timeout = 5000) {
            logDebug(`API 요청: ${url}`);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort();
                logDebug(`요청 타임아웃: ${timeout}ms`, 'error');
            }, timeout);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                logDebug(`응답 상태: ${response.status}`);
                
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }
        
        // 로그인 함수
        async function loginUser(email, password) {
            logDebug(`로그인 시도: ${email}`);
            
            try {
                // 백엔드 서버 상태 먼저 확인
                logDebug('백엔드 서버 상태 확인 중...');
                const healthResponse = await fetchWithTimeout(`${API_BASE}/api/health`, {}, 3000);
                
                if (!healthResponse.ok) {
                    throw new Error(`백엔드 서버 상태 이상: ${healthResponse.status}`);
                }
                
                const healthData = await healthResponse.json();
                logDebug(`백엔드 상태: ${healthData.status}`);
                
                // 로그인 요청
                const response = await fetchWithTimeout(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                }, 5000);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`로그인 실패: ${response.status} - ${errorText}`);
                }
                
                const data = await response.json();
                logDebug(`로그인 응답: ${JSON.stringify(data)}`, 'success');
                
                return data;
                
            } catch (error) {
                if (error.name === 'AbortError') {
                    logDebug('백엔드 서버 응답 시간 초과', 'error');
                    throw new Error('서버 응답 시간이 초과되었습니다. 인터넷 연결을 확인해주세요.');
                } else {
                    logDebug(`로그인 오류: ${error.message}`, 'error');
                    throw error;
                }
            }
        }
        
        // 오프라인 모드 로그인 (백엔드 없이)
        function offlineLogin(email, password) {
            logDebug('오프라인 모드 로그인', 'info');
            
            // 더미 데이터 생성
            const dummyData = {
                success: true,
                token: 'offline-token-' + Date.now(),
                user: {
                    id: Math.floor(Math.random() * 1000),
                    email: email,
                    name: email.split('@')[0] || '사용자',
                    balance: 10000 + Math.floor(Math.random() * 90000)
                }
            };
            
            logDebug(`오프라인 로그인 성공: ${dummyData.user.name}`, 'success');
            
            // 로컬 스토리지에 저장
            localStorage.setItem('timelink_token', dummyData.token);
            localStorage.setItem('timelink_user', JSON.stringify(dummyData.user));
            
            return dummyData;
        }
        
        // 메인 실행
        document.addEventListener('DOMContentLoaded', function() {
            logDebug('=== TimeLink 로그인 페이지 시작 ===');
            logDebug(`백엔드 서버: ${API_BASE}`);
            
            // 이미 로그인된 상태면 대시보드로 이동
            if (localStorage.getItem('timelink_token')) {
                logDebug('이미 로그인된 상태, 대시보드로 이동', 'info');
                showStatus('이미 로그인되었습니다. 대시보드로 이동합니다...', 'info');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
                return;
            }
            
            // 폼 요소
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('login-btn');
            const testLoginBtn = document.getElementById('test-login-btn');
            
            // 테스트 데이터 자동 입력
            emailInput.value = 'test@timelink.com';
            passwordInput.value = 'test1234';
            
            // 로그인 폼 제출 처리
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                if (!email || !password) {
                    showStatus('이메일과 비밀번호를 입력해주세요.', 'error');
                    return;
                }
                
                // 버튼 상태 변경
                const originalText = loginBtn.textContent;
                loginBtn.disabled = true;
                loginBtn.textContent = '로그인 중...';
                hideStatus();
                
                try {
                    // 온라인 로그인 시도
                    const result = await loginUser(email, password);
                    
                    if (result.success) {
                        // 토큰 저장
                        localStorage.setItem('timelink_token', result.token);
                        localStorage.setItem('timelink_user', JSON.stringify(result.user));
                        
                        showStatus('로그인 성공! 대시보드로 이동합니다...', 'success');
                        loginBtn.textContent = '✓ 성공!';
                        loginBtn.style.background = '#4cd964';
                        
                        // 1.5초 후 이동
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);
                        
                    } else {
                        showStatus(result.message || '로그인 실패', 'error');
                        loginBtn.disabled = false;
                        loginBtn.textContent = originalText;
                    }
                    
                } catch (error) {
                    logDebug(`로그인 실패: ${error.message}`, 'error');
                    
                    // 온라인 로그인 실패 시 오프라인 모드 사용자에게 안내
                    showStatus('서버 연결 실패. 오프라인 모드로 로그인합니다...', 'info');
                    
                    // 2초 후 오프라인 로그인
                    setTimeout(() => {
                        const offlineResult = offlineLogin(email, password);
                        
                        if (offlineResult.success) {
                            showStatus('오프라인 모드 로그인 성공!', 'success');
                            loginBtn.textContent = '✓ 오프라인 모드';
                            loginBtn.style.background = '#ffa502';
                            
                            // 2초 후 대시보드로 이동
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 2000);
                        }
                    }, 2000);
                }
            });
            
            // 테스트 로그인 버튼 (바로 오프라인 모드)
            testLoginBtn.addEventListener('click', function() {
                logDebug('테스트 로그인 버튼 클릭', 'info');
                
                const email = emailInput.value.trim() || 'test@timelink.com';
                const password = passwordInput.value || 'test1234';
                
                // 버튼 상태 변경
                loginBtn.disabled = true;
                loginBtn.textContent = '오프라인 로그인 중...';
                showStatus('오프라인 모드로 로그인합니다...', 'info');
                
                // 즉시 오프라인 로그인
                setTimeout(() => {
                    const result = offlineLogin(email, password);
                    
                    if (result.success) {
                        showStatus('오프라인 모드 로그인 성공!', 'success');
                        loginBtn.textContent = '✓ 오프라인 성공!';
                        loginBtn.style.background = '#ffa502';
                        
                        // 1초 후 이동
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    }
                }, 500);
            });
            
            // 엔터 키 지원
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
            
            logDebug('로그인 페이지 초기화 완료', 'success');
            logDebug('테스트 계정이 자동으로 입력되었습니다', 'info');
            logDebug('백엔드 연결 실패 시 "오프라인 모드" 버튼을 사용하세요', 'info');
        });
    </script>
</body>
</html>
