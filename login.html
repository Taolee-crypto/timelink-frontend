<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 로그인</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --light-gray: #F8FAFC;
            --gray: #E2E8F0;
            --dark-gray: #64748B;
            --text: #1E293B;
            --white: #FFFFFF;
            --border-radius: 12px;
            --box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            --transition: all 0.2s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background: linear-gradient(135deg, #F1F5F9 0%, #E2E8F0 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 16px;
        }
        
        .auth-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
        }
        
        /* 헤더 스타일 */
        .auth-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 28px 30px;
            text-align: center;
            position: relative;
        }
        
        .back-button {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 15px;
            opacity: 0.95;
            font-weight: 500;
        }
        
        .back-button i {
            margin-right: 8px;
            font-size: 14px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .logo-icon {
            background-color: rgba(255, 255, 255, 0.2);
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        
        /* 탭 스타일 */
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--gray);
            background-color: var(--white);
        }
        
        .tab-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 17px;
            font-weight: 500;
            color: var(--dark-gray);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        
        .tab-btn.active {
            color: var(--primary);
            font-weight: 600;
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--primary);
            border-radius: 3px 3px 0 0;
        }
        
        /* 폼 컨테이너 */
        .form-container {
            padding: 32px;
            display: none;
        }
        
        .form-container.active {
            display: block;
        }
        
        .form-header {
            margin-bottom: 28px;
        }
        
        .form-header h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        
        .form-subtitle {
            color: var(--dark-gray);
            font-size: 16px;
            line-height: 1.5;
        }
        
        /* 폼 스타일 */
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        .input-with-icon {
            position: relative;
        }
        
        .input-with-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dark-gray);
            font-size: 18px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 2px solid var(--gray);
            border-radius: 10px;
            font-size: 16px;
            transition: var(--transition);
            background-color: var(--white);
            color: var(--text);
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--dark-gray);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
        }
        
        /* 폼 옵션 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 15px;
        }
        
        .checkbox {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .checkbox input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        
        /* 버튼 스타일 */
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-block {
            width: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text);
            border: 2px solid var(--gray);
            font-weight: 500;
        }
        
        /* 로딩 스피너 */
        .btn-loading {
            position: relative;
            color: transparent !important;
        }
        
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--white);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 메시지 스타일 */
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border-left: 4px solid var(--error);
            display: block;
        }
        
        .message.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
            display: block;
        }
        
        /* 구분선 */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--dark-gray);
            font-size: 15px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--gray);
        }
        
        .divider span {
            padding: 0 16px;
        }
        
        /* 하단 링크 */
        .auth-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--gray);
            font-size: 16px;
            color: var(--dark-gray);
        }
        
        .text-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            margin-left: 6px;
            font-size: 16px;
        }
        
        /* 성공 화면 */
        .success-icon {
            text-align: center;
            font-size: 64px;
            color: var(--success);
            margin-bottom: 20px;
        }
        
        .success-text {
            text-align: center;
            margin-bottom: 30px;
            font-size: 17px;
            line-height: 1.6;
        }
        
        .bonus-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 24px 0;
        }
        
        .bonus-item {
            background: var(--light-gray);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }
        
        .bonus-icon {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        /* 반응형 */
        @media (max-width: 480px) {
            .auth-header {
                padding: 24px 20px;
            }
            
            .form-container {
                padding: 24px;
            }
            
            .bonus-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- 헤더 -->
        <div class="auth-header">
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i>
                홈으로
            </a>
            
            <div class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </div>
        </div>
        
        <!-- 탭 전환 버튼 -->
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="showLogin()">로그인</button>
            <button class="tab-btn" onclick="showSignup()">회원가입</button>
        </div>
        
        <!-- 로그인 폼 -->
        <div class="form-container active" id="loginContainer">
            <div class="form-header">
                <h2>로그인</h2>
                <p class="form-subtitle">TIMELINK 계정으로 로그인하세요</p>
            </div>
            
            <!-- 로그인 메시지 -->
            <div class="message" id="loginMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="example@timelink.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span>로그인 상태 유지</span>
                    </label>
                    <a href="#" class="text-btn" onclick="showForgotPassword()">비밀번호 찾기</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
            </form>
            
            <div class="auth-footer">
                <span>계정이 없으신가요?</span>
                <button class="text-btn" onclick="showSignup()">회원가입</button>
            </div>
        </div>
        
        <!-- 회원가입 폼 -->
        <div class="form-container" id="signupContainer">
            <div class="form-header">
                <h2>회원가입</h2>
                <p class="form-subtitle">10,000 TL 보너스를 받으세요!</p>
            </div>
            
            <!-- 회원가입 메시지 -->
            <div class="message" id="signupMessage"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">이름</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="이름을 입력하세요" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="signupEmail">이메일 주소</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="example@timelink.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="signupPassword">비밀번호</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="8자 이상, 영문+숫자+특수문자" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="비밀번호를 다시 입력하세요" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="agreeTerms" required>
                        <span>이용약관 및 개인정보처리방침에 동의합니다</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
                    <i class="fas fa-user-plus"></i> 회원가입
                </button>
            </form>
            
            <div class="auth-footer">
                <span>이미 계정이 있으신가요?</span>
                <button class="text-btn" onclick="showLogin()">로그인</button>
            </div>
        </div>
        
        <!-- 비밀번호 찾기 폼 -->
        <div class="form-container" id="forgotContainer">
            <div class="form-header">
                <h2>비밀번호 찾기</h2>
                <p class="form-subtitle">가입한 이메일을 입력해주세요</p>
            </div>
            
            <!-- 비밀번호 찾기 메시지 -->
            <div class="message" id="forgotMessage"></div>
            
            <form id="forgotForm">
                <div class="form-group">
                    <label for="forgotEmail">이메일 주소</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="forgotEmail" placeholder="가입한 이메일 주소" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">
                    <i class="fas fa-paper-plane"></i> 재설정 링크 보내기
                </button>
            </form>
            
            <div class="auth-footer">
                <button class="text-btn" onclick="showLogin()">
                    <i class="fas fa-arrow-left"></i> 로그인으로 돌아가기
                </button>
            </div>
        </div>
        
        <!-- 회원가입 성공 메시지 -->
        <div class="form-container" id="successContainer">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2 style="text-align: center; margin-bottom: 16px;">회원가입 완료!</h2>
            <p class="success-text">
                <strong>10,000 TL 보너스</strong>가 지급되었습니다.<br>
                TIMELINK의 모든 기능을 이용해보세요.
            </p>
            
            <div class="bonus-grid">
                <div class="bonus-item">
                    <div class="bonus-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <span>TLMUSIC</span>
                </div>
                <div class="bonus-item">
                    <div class="bonus-icon">
                        <i class="fas fa-video"></i>
                    </div>
                    <span>TLTUBE</span>
                </div>
                <div class="bonus-item">
                    <div class="bonus-icon">
                        <i class="fas fa-store"></i>
                    </div>
                    <span>SHAREPLACE</span>
                </div>
                <div class="bonus-item">
                    <div class="bonus-icon">
                        <i class="fas fa-microphone"></i>
                    </div>
                    <span>CAFE RADIO</span>
                </div>
            </div>
            
            <button type="button" class="btn btn-primary btn-block" onclick="redirectToHome()">
                <i class="fas fa-rocket"></i> TIMELINK 시작하기
            </button>
        </div>
    </div>

    <script>
        // API 기본 URL
        const API_BASE_URL = 'https://timelink-api.timelink-api.workers.dev';
        
        // 현재 활성화된 탭 추적
        let currentActiveTab = 'login';
        
        // 탭 전환 함수
        function showLogin() {
            document.querySelectorAll('.form-container').forEach(container => {
                container.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById('loginContainer').classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            currentActiveTab = 'login';
            clearMessages();
        }
        
        function showSignup() {
            document.querySelectorAll('.form-container').forEach(container => {
                container.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById('signupContainer').classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            currentActiveTab = 'signup';
            clearMessages();
        }
        
        function showForgotPassword() {
            document.querySelectorAll('.form-container').forEach(container => {
                container.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById('forgotContainer').classList.add('active');
            currentActiveTab = 'forgot';
            clearMessages();
        }
        
        // 비밀번호 표시/숨기기
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const button = input.parentNode.querySelector('.toggle-password');
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // 메시지 표시 함수
        function showMessage(elementId, message, type = 'error') {
            const messageElement = document.getElementById(elementId);
            messageElement.textContent = message;
            messageElement.className = `message ${type}`;
            messageElement.style.display = 'block';
            
            // 성공 메시지는 5초 후 사라짐
            if (type === 'success') {
                setTimeout(() => {
                    messageElement.style.display = 'none';
                }, 5000);
            }
        }
        
        // 모든 메시지 지우기
        function clearMessages() {
            document.querySelectorAll('.message').forEach(msg => {
                msg.style.display = 'none';
            });
        }
        
        // 로딩 상태 표시
        function setLoading(buttonId, isLoading) {
            const button = document.getElementById(buttonId);
            if (isLoading) {
                button.disabled = true;
                button.classList.add('btn-loading');
            } else {
                button.disabled = false;
                button.classList.remove('btn-loading');
            }
        }
        
        // API 호출 함수
        async function callApi(endpoint, method = 'GET', data = null) {
            const url = `${API_BASE_URL}${endpoint}`;
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                }
            };
            
            if (data && (method === 'POST' || method === 'PUT')) {
                options.body = JSON.stringify(data);
            }
            
            try {
                const response = await fetch(url, options);
                
                if (!response.ok) {
                    throw new Error(`API 호출 실패: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('API 호출 오류:', error);
                throw error;
            }
        }
        
        // 로그인 처리
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage('loginMessage', '이메일과 비밀번호를 입력해주세요.', 'error');
                return;
            }
            
            setLoading('loginBtn', true);
            
            try {
                // 로그인 API 호출
                const response = await callApi('/auth/login', 'POST', {
                    email,
                    password
                });
                
                // 성공 처리
                showMessage('loginMessage', '로그인 성공! 홈페이지로 이동합니다.', 'success');
                
                // 토큰 저장 (실제 구현에서는 보안 고려 필요)
                if (response.token) {
                    localStorage.setItem('timelink_token', response.token);
                    localStorage.setItem('timelink_user', JSON.stringify(response.user));
                }
                
                // 2초 후 홈페이지로 이동
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                showMessage('loginMessage', '로그인 실패: 이메일 또는 비밀번호를 확인해주세요.', 'error');
            } finally {
                setLoading('loginBtn', false);
            }
        });
        
        // 회원가입 처리
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 유효성 검사
            if (!name || !email || !password || !confirmPassword) {
                showMessage('signupMessage', '모든 필드를 입력해주세요.', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('signupMessage', '비밀번호가 일치하지 않습니다.', 'error');
                return;
            }
            
            if (!document.getElementById('agreeTerms').checked) {
                showMessage('signupMessage', '이용약관에 동의해주세요.', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('signupMessage', '비밀번호는 8자 이상이어야 합니다.', 'error');
                return;
            }
            
            setLoading('signupBtn', true);
            
            try {
                // 회원가입 API 호출
                const response = await callApi('/auth/register', 'POST', {
                    name,
                    email,
                    password,
                    agreeTerms: true,
                    agreeMarketing: false
                });
                
                // 성공 화면 표시
                document.querySelectorAll('.form-container').forEach(container => {
                    container.classList.remove('active');
                });
                document.getElementById('successContainer').classList.add('active');
                
                // 사용자 정보 저장
                if (response.token) {
                    localStorage.setItem('timelink_token', response.token);
                    localStorage.setItem('timelink_user', JSON.stringify(response.user));
                }
                
            } catch (error) {
                if (error.message.includes('409')) {
                    showMessage('signupMessage', '이미 가입된 이메일입니다.', 'error');
                } else {
                    showMessage('signupMessage', '회원가입 중 오류가 발생했습니다. 다시 시도해주세요.', 'error');
                }
            } finally {
                setLoading('signupBtn', false);
            }
        });
        
        // 비밀번호 찾기 처리
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('forgotEmail').value.trim();
            
            if (!email) {
                showMessage('forgotMessage', '이메일을 입력해주세요.', 'error');
                return;
            }
            
            setLoading('forgotBtn', true);
            
            try {
                // 비밀번호 재설정 API 호출
                await callApi('/auth/reset-password', 'POST', {
                    email
                });
                
                // 성공 메시지 표시
                showMessage('forgotMessage', '비밀번호 재설정 링크가 이메일로 전송되었습니다.', 'success');
                
                // 폼 초기화
                document.getElementById('forgotEmail').value = '';
                
                // 3초 후 로그인 화면으로 돌아가기
                setTimeout(() => {
                    showLogin();
                }, 3000);
                
            } catch (error) {
                if (error.message.includes('404')) {
                    showMessage('forgotMessage', '가입되지 않은 이메일입니다.', 'error');
                } else {
                    showMessage('forgotMessage', '요청 처리 중 오류가 발생했습니다. 다시 시도해주세요.', 'error');
                }
            } finally {
                setLoading('forgotBtn', false);
            }
        });
        
        // 홈으로 리다이렉트
        function redirectToHome() {
            window.location.href = 'index.html';
        }
        
        // 엔터 키로 폼 제출
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (currentActiveTab === 'login') {
                    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
                } else if (currentActiveTab === 'signup') {
                    document.getElementById('signupForm').dispatchEvent(new Event('submit'));
                } else if (currentActiveTab === 'forgot') {
                    document.getElementById('forgotForm').dispatchEvent(new Event('submit'));
                }
            }
        });
        
        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            // 로컬 스토리지에 토큰이 있으면 홈페이지로 리다이렉트
            const token = localStorage.getItem('timelink_token');
            if (token) {
                // 실제 구현에서는 토큰 유효성 검사 후 리다이렉트
                // window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
