<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TimeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="api-config.js"></script>
    <script src="common-components.js"></script>
    <style>
        /* 공통 스타일 포함 */
        :root { /* ... */ }
        .login-container { max-width: 400px; margin: 100px auto; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="header-container"></div>
    
    <main class="main-content">
        <div class="container">
            <div class="login-container">
                <div class="login-card">
                    <h2 class="text-center mb-4">TimeLink 로그인</h2>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">이메일</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">비밀번호</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">로그인</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="signup.html" class="text-decoration-none">회원가입</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div id="footer-container"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 컴포넌트 로드
            document.getElementById('header-container').innerHTML = TimeLinkComponents.renderHeader('login');
            document.getElementById('footer-container').innerHTML = TimeLinkComponents.renderFooter();
            
            // 로그인 폼 처리
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await TimeLinkConfig.apiRequest(
                        TimeLinkConfig.ENDPOINTS.AUTH.LOGIN,
                        {
                            method: 'POST',
                            body: JSON.stringify({ email, password })
                        }
                    );
                    
                    TimeLinkConfig.setToken(response.token);
                    window.location.href = 'dashboard.html';
                    
                } catch (error) {
                    alert('로그인 실패: ' + error.message);
                }
            });
        });
    </script>
</body>
</html>
