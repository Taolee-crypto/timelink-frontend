<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 로그인</title>
    <style>
        body { background: #121212; color: white; padding: 50px; font-family: Arial; }
        .login-box { background: #1E1E1E; padding: 30px; border-radius: 10px; max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2A2A2A; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 12px; background: #29C4A8; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #222; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>TimeLink 로그인</h2>
        <input id="email" value="realuser@test.com" placeholder="이메일">
        <input id="password" type="password" value="realpass123" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
        <div id="result"></div>
    </div>

    <script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const result = document.getElementById('result');
        
        result.innerHTML = '<p>로그인 중...</p>';
        
        try {
            console.log('로그인 시도:', email);
            
            const response = await fetch('https://timelink-backend.timelink-api.workers.dev/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });
            
            console.log('응답 상태:', response.status);
            
            const data = await response.json();
            console.log('응답 데이터:', data);
            
            result.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            
            if (data.success) {
                result.innerHTML += '<h3 style="color:#29C4A8">✅ 로그인 성공!</h3>';
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('user_email', email);
                
                // 대시보드로 이동
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                result.innerHTML += '<h3 style="color:#f44336">❌ 로그인 실패: ' + (data.error || '알 수 없는 오류') + '</h3>';
            }
            
        } catch (error) {
            console.error('로그인 에러:', error);
            result.innerHTML = '<p style="color:#f44336">에러: ' + error.message + '</p>';
        }
    }
    
    // 페이지 로드 시 자동 테스트
    document.addEventListener('DOMContentLoaded', () => {
        console.log('페이지 로드 완료');
        // 1초 후 자동 로그인 시도 (테스트용)
        setTimeout(() => {
            console.log('자동 로그인 테스트 시작');
            login();
        }, 1000);
    });
    </script>
</body>
</html>
