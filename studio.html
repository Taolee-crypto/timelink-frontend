<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | TIMELINK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange: #FF6B00;
            --purple: #9D4EDD;
            --teal: #00D4AA;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0F172A;
            color: white;
            padding-top: 70px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 헤더 */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            background: rgba(157, 78, 221, 0.1);
            color: var(--purple);
        }

        /* 레이아웃 */
        .studio-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 2rem 0;
        }

        /* 업로드 섹션 */
        .upload-section {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover {
            border-color: var(--purple);
            background: rgba(157, 78, 221, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--purple);
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--purple);
        }

        .slider-group {
            margin-bottom: 1.5rem;
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--purple);
            cursor: pointer;
        }

        .tl-display {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: var(--teal);
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--purple), #8B5CF6);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.3);
        }

        /* 플레이어 섹션 */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .player-card {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .player-display {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .album-art {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--purple), #8B5CF6);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .track-info {
            flex: 1;
        }

        .track-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .track-artist {
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .track-meta {
            display: flex;
            gap: 2rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: var(--purple);
        }

        .control-btn.play {
            width: 60px;
            height: 60px;
            background: var(--purple);
            font-size: 1.2rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--purple);
            border-radius: 3px;
            width: 0%;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* 라이브러리 */
        .library-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .library-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .library-item:hover {
            background: rgba(157, 78, 221, 0.1);
        }

        .library-item.active {
            background: rgba(157, 78, 221, 0.2);
            border: 1px solid var(--purple);
        }

        .item-info h4 {
            margin-bottom: 0.25rem;
        }

        .item-info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .item-tl {
            color: var(--teal);
            font-weight: 600;
        }

        @media (max-width: 992px) {
            .studio-layout {
                grid-template-columns: 1fr;
            }
            .main-nav { display: none; }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>

            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i> HOME
                </a>
                <a href="studio.html" class="nav-link active">
                    <i class="fas fa-sliders-h"></i> STUDIO
                </a>
                <a href="tlmusic.html" class="nav-link">
                    <i class="fas fa-music"></i> TLMUSIC
                </a>
                <a href="cafe-radio.html" class="nav-link">
                    <i class="fas fa-broadcast-tower"></i> CAFE RADIO
                </a>
            </nav>

            <div id="authButtons"></div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="container">
        <div class="studio-layout">
            <!-- 업로드 섹션 -->
            <div class="upload-section">
                <h2 class="section-title">
                    <i class="fas fa-upload"></i>
                    음악 업로드
                </h2>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <p>클릭하거나 파일을 드래그하세요</p>
                    <small style="color: #94a3b8;">MP3, WAV, FLAC 지원</small>
                    <input type="file" id="fileInput" accept="audio/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label class="form-label">음악 제목</label>
                    <input type="text" class="form-input" id="musicTitle" placeholder="제목을 입력하세요">
                </div>

                <div class="form-group">
                    <label class="form-label">아티스트</label>
                    <input type="text" class="form-input" id="artistName" placeholder="아티스트명">
                </div>

                <div class="form-group">
                    <label class="form-label">장르</label>
                    <input type="text" class="form-input" id="musicGenre" placeholder="예: 인디, 재즈, 일렉트로닉">
                </div>

                <div class="slider-group">
                    <label class="form-label">TL 충전량</label>
                    <input type="range" class="slider" id="tlSlider" min="60" max="7200" value="3600">
                    <div class="tl-display">
                        <span id="tlAmount">3600 TL</span>
                        <span id="tlTime">1시간</span>
                    </div>
                </div>

                <button class="btn" id="createBtn">
                    <i class="fas fa-magic"></i> TL3 파일 생성
                </button>
            </div>

            <!-- 플레이어 & 라이브러리 -->
            <div class="player-section">
                <!-- 플레이어 -->
                <div class="player-card">
                    <h2 class="section-title">
                        <i class="fas fa-play-circle"></i>
                        플레이어
                    </h2>

                    <div class="player-display">
                        <div class="album-art">
                            <i class="fas fa-music"></i>
                        </div>
                        <div class="track-info">
                            <div class="track-title" id="playerTitle">음악을 선택하세요</div>
                            <div class="track-artist" id="playerArtist">-</div>
                            <div class="track-meta">
                                <span><i class="fas fa-coins"></i> <span id="playerTL">0</span> TL</span>
                                <span><i class="fas fa-clock"></i> <span id="playerDuration">0:00</span></span>
                            </div>
                        </div>
                    </div>

                    <div class="player-controls">
                        <button class="control-btn">
                            <i class="fas fa-step-backward"></i>
                        </button>
                        <button class="control-btn play" id="playBtn">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="control-btn">
                            <i class="fas fa-step-forward"></i>
                        </button>
                    </div>

                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <!-- 라이브러리 -->
                <div class="player-card">
                    <h2 class="section-title">
                        <i class="fas fa-folder-open"></i>
                        내 라이브러리
                    </h2>

                    <div class="library-list" id="libraryList">
                        <div style="text-align: center; padding: 2rem; color: #94a3b8;">
                            <i class="fas fa-music" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                            <p>아직 음악이 없습니다.<br>왼쪽에서 음악을 업로드하세요.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="./src/script/timelink-auth.js"></script>
   <script>
    let library = [];
    let currentTrack = null;
    let isPlaying = false;
    let audioContext = null;
    let audioBuffer = null;
    let sourceNode = null;
    let startTime = 0;
    let pausedTime = 0;
    let currentAudioFile = null;

    // Web Audio API 초기화
    function initAudioContext() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // 업로드 영역 클릭
    document.getElementById('uploadArea').addEventListener('click', function() {
        document.getElementById('fileInput').click();
    });

    // 파일 선택
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            document.getElementById('uploadArea').innerHTML = `
                <div class="upload-icon"><i class="fas fa-check-circle"></i></div>
                <p>${file.name}</p>
                <small style="color: var(--teal);">파일이 선택되었습니다</small>
            `;
            
            // 오디오 파일 미리 로드
            loadAudioFile(file);
        }
    });

    // 오디오 파일 로드
    function loadAudioFile(file) {
        if (!file) return;
        
        currentAudioFile = file;
        
        // 파일 정보 표시
        const fileName = file.name.replace(/\.[^/.]+$/, ""); // 확장자 제거
        document.getElementById('musicTitle').value = fileName;
        document.getElementById('artistName').value = '업로드한 사용자';
        
        // 미리보기용 라이브러리 항목 추가
        addToLibraryPreview(file);
    }

    // 미리보기 라이브러리에 추가
    function addToLibraryPreview(file) {
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const arrayBuffer = e.target.result;
            
            initAudioContext();
            
            // 오디오 파일 디코딩
            audioContext.decodeAudioData(arrayBuffer, function(buffer) {
                const duration = buffer.duration;
                const track = {
                    id: Date.now(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    artist: '업로드한 사용자',
                    genre: '업로드',
                    tl: 3600,
                    duration: duration,
                    audioBuffer: buffer,
                    file: file
                };
                
                library.unshift(track);
                renderLibrary();
                loadTrack(track.id);
            }, function(e) {
                console.error("오디오 디코딩 오류:", e);
                alert("오디오 파일을 로드할 수 없습니다.");
            });
        };
        
        reader.readAsArrayBuffer(file);
    }

    // TL 슬라이더
    document.getElementById('tlSlider').addEventListener('input', function() {
        const value = parseInt(this.value);
        document.getElementById('tlAmount').textContent = value + ' TL';
        
        const hours = Math.floor(value / 3600);
        const minutes = Math.floor((value % 3600) / 60);
        const seconds = value % 60;
        
        let timeStr = '';
        if (hours > 0) timeStr += hours + '시간 ';
        if (minutes > 0) timeStr += minutes + '분 ';
        if (seconds > 0 || (!hours && !minutes)) timeStr += seconds + '초';
        
        document.getElementById('tlTime').textContent = timeStr;
    });

    // TL3 생성
    document.getElementById('createBtn').addEventListener('click', function() {
        const title = document.getElementById('musicTitle').value;
        const artist = document.getElementById('artistName').value;
        const genre = document.getElementById('musicGenre').value;
        const tl = parseInt(document.getElementById('tlSlider').value);
        
        if (!title || !artist) {
            alert('제목과 아티스트를 입력하세요.');
            return;
        }

        // 현재 로드된 오디오 파일이 있는지 확인
        if (!currentAudioFile && library.length === 0) {
            alert('먼저 오디오 파일을 업로드하세요.');
            return;
        }

        let track;
        
        if (currentAudioFile && library.length === 0) {
            // 파일이 업로드되었지만 라이브러리에 추가되지 않은 경우
            alert('파일을 먼저 로드해주세요.');
            return;
        } else if (library.length > 0) {
            // 이미 라이브러리에 있는 트랙 업데이트
            track = library[0];
            track.title = title;
            track.artist = artist;
            track.genre = genre;
            track.tl = tl;
        } else {
            // 새 트랙 생성 (시뮬레이션용)
            track = {
                id: Date.now(),
                title,
                artist,
                genre,
                tl,
                duration: Math.floor(Math.random() * 300) + 180
            };
            
            library.unshift(track);
        }
        
        renderLibrary();
        alert('TL3 파일이 생성되었습니다!');

        // 폼 초기화
        document.getElementById('musicTitle').value = '';
        document.getElementById('artistName').value = '';
        document.getElementById('musicGenre').value = '';
        document.getElementById('uploadArea').innerHTML = `
            <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <p>클릭하거나 파일을 드래그하세요</p>
            <small style="color: #94a3b8;">MP3, WAV, FLAC 지원</small>
        `;
        currentAudioFile = null;
    });

    // 라이브러리 렌더링
    function renderLibrary() {
        const list = document.getElementById('libraryList');
        
        if (library.length === 0) {
            list.innerHTML = `
                <div style="text-align: center; padding: 2rem; color: #94a3b8;">
                    <i class="fas fa-music" style="font-size: 2rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <p>아직 음악이 없습니다.<br>왼쪽에서 음악을 업로드하세요.</p>
                </div>
            `;
            return;
        }

        list.innerHTML = library.map(track => `
            <div class="library-item" data-id="${track.id}">
                <div class="item-info">
                    <h4>${track.title}</h4>
                    <p>${track.artist} • ${track.genre || '장르 미지정'}</p>
                </div>
                <div class="item-tl">${track.tl} TL</div>
                <div class="item-duration">${formatTime(track.duration)}</div>
            </div>
        `).join('');

        // CSS 추가
        const style = document.createElement('style');
        style.textContent = `
            .library-item { display: flex; justify-content: space-between; align-items: center; }
            .item-info { flex: 1; }
            .item-tl { margin: 0 1rem; color: var(--teal); font-weight: 600; }
            .item-duration { color: #94a3b8; font-size: 0.9rem; }
        `;
        document.head.appendChild(style);

        // 클릭 이벤트
        document.querySelectorAll('.library-item').forEach(item => {
            item.addEventListener('click', function() {
                const id = parseInt(this.dataset.id);
                loadTrack(id);
            });
        });
    }

    // 트랙 로드
    function loadTrack(id) {
        // 현재 재생 중인 오디오 정지
        stopAudio();
        
        currentTrack = library.find(t => t.id === id);
        if (!currentTrack) return;

        document.getElementById('playerTitle').textContent = currentTrack.title;
        document.getElementById('playerArtist').textContent = currentTrack.artist;
        document.getElementById('playerTL').textContent = currentTrack.tl;
        document.getElementById('playerDuration').textContent = formatTime(currentTrack.duration);
        document.getElementById('totalTime').textContent = formatTime(currentTrack.duration);
        
        // 진행바 초기화
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('currentTime').textContent = '0:00';
        
        // 재생 버튼 상태 초기화
        document.querySelector('#playBtn i').className = 'fas fa-play';
        isPlaying = false;

        // 활성 표시
        document.querySelectorAll('.library-item').forEach(item => {
            item.classList.remove('active');
            if (parseInt(item.dataset.id) === id) {
                item.classList.add('active');
            }
        });
        
        // 오디오 버퍼가 있으면 미리 로드
        if (currentTrack.audioBuffer) {
            audioBuffer = currentTrack.audioBuffer;
        }
    }

    // 오디오 재생
    function playAudio() {
        if (!currentTrack) {
            alert('먼저 음악을 선택하세요.');
            return;
        }

        initAudioContext();
        
        // 오디오 버퍼가 없으면 시뮬레이션
        if (!audioBuffer && !currentTrack.audioBuffer) {
            simulatePlayback();
            return;
        }
        
        // 실제 오디오 재생
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        
        sourceNode = audioContext.createBufferSource();
        sourceNode.buffer = audioBuffer || currentTrack.audioBuffer;
        sourceNode.connect(audioContext.destination);
        
        // 오디오 재생 시작
        if (pausedTime > 0) {
            sourceNode.start(0, pausedTime);
            startTime = audioContext.currentTime - pausedTime;
        } else {
            sourceNode.start(0);
            startTime = audioContext.currentTime;
        }
        
        // 재생 종료 이벤트
        sourceNode.onended = function() {
            isPlaying = false;
            document.querySelector('#playBtn i').className = 'fas fa-play';
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('currentTime').textContent = formatTime(currentTrack.duration);
            pausedTime = 0;
        };
        
        // 재생 진행 상태 업데이트
        updatePlaybackProgress();
    }

    // 오디오 정지
    function stopAudio() {
        if (sourceNode) {
            sourceNode.stop();
            sourceNode.disconnect();
            sourceNode = null;
        }
        pausedTime = 0;
        isPlaying = false;
    }

    // 오디오 일시정지
    function pauseAudio() {
        if (sourceNode) {
            sourceNode.stop();
            pausedTime = audioContext.currentTime - startTime;
            sourceNode.disconnect();
            sourceNode = null;
        }
        isPlaying = false;
    }

    // 재생 진행 상태 업데이트
    function updatePlaybackProgress() {
        if (!isPlaying) return;
        
        function update() {
            if (!isPlaying || !currentTrack) return;
            
            let currentTime;
            if (pausedTime > 0) {
                currentTime = pausedTime;
            } else if (startTime > 0) {
                currentTime = audioContext.currentTime - startTime;
            } else {
                currentTime = 0;
            }
            
            // 진행률 계산
            const progress = Math.min(100, (currentTime / currentTrack.duration) * 100);
            
            // UI 업데이트
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('currentTime').textContent = formatTime(currentTime);
            
            // 재생이 끝나지 않았으면 계속 업데이트
            if (currentTime < currentTrack.duration) {
                requestAnimationFrame(update);
            }
        }
        
        requestAnimationFrame(update);
    }

    // 재생/일시정지
    document.getElementById('playBtn').addEventListener('click', function() {
        if (!currentTrack) {
            alert('먼저 음악을 선택하세요.');
            return;
        }

        if (isPlaying) {
            // 일시정지
            pauseAudio();
            this.querySelector('i').className = 'fas fa-play';
        } else {
            // 재생
            playAudio();
            this.querySelector('i').className = 'fas fa-pause';
            isPlaying = true;
        }
    });

    // 진행바 클릭으로 재생 위치 변경
    document.getElementById('progressBar').addEventListener('click', function(e) {
        if (!currentTrack || !isPlaying) return;
        
        const rect = this.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const percentage = clickX / width;
        
        // 재생 위치 변경
        if (sourceNode) {
            sourceNode.stop();
            sourceNode.disconnect();
        }
        
        pausedTime = percentage * currentTrack.duration;
        playAudio();
        document.querySelector('#playBtn i').className = 'fas fa-pause';
        isPlaying = true;
    });

    // 이전 트랙
    document.querySelector('.control-btn:nth-child(1)').addEventListener('click', function() {
        if (!currentTrack || library.length === 0) return;
        
        const currentIndex = library.findIndex(t => t.id === currentTrack.id);
        const prevIndex = (currentIndex - 1 + library.length) % library.length;
        loadTrack(library[prevIndex].id);
        
        // 자동 재생
        setTimeout(() => {
            if (!isPlaying) {
                document.getElementById('playBtn').click();
            }
        }, 100);
    });

    // 다음 트랙
    document.querySelector('.control-btn:nth-child(3)').addEventListener('click', function() {
        if (!currentTrack || library.length === 0) return;
        
        const currentIndex = library.findIndex(t => t.id === currentTrack.id);
        const nextIndex = (currentIndex + 1) % library.length;
        loadTrack(library[nextIndex].id);
        
        // 자동 재생
        setTimeout(() => {
            if (!isPlaying) {
                document.getElementById('playBtn').click();
            }
        }, 100);
    });

    // 시뮬레이션 재생 (오디오 파일 없을 때)
    function simulatePlayback() {
        let progress = 0;
        const interval = setInterval(() => {
            if (!isPlaying) {
                clearInterval(interval);
                return;
            }
            
            progress += 0.5;
            if (progress >= 100) {
                progress = 0;
                isPlaying = false;
                document.querySelector('#playBtn i').className = 'fas fa-play';
                clearInterval(interval);
            }
            
            document.getElementById('progressFill').style.width = progress + '%';
            const currentSec = Math.floor((progress / 100) * currentTrack.duration);
            document.getElementById('currentTime').textContent = formatTime(currentSec);
        }, 100);
    }

    // 시간 포맷
    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // 초기화
    renderLibrary();
</script>
</body>
</html>
