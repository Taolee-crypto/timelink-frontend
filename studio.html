<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - TL STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .studio-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        .studio-editor {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }
        
        .editor-title {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #00d4aa, #00b894);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .editor-tools {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .tool-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tool-btn:hover {
            background: rgba(0, 212, 170, 0.2);
            transform: translateY(-2px);
        }
        
        .editor-preview {
            background: rgba(0, 0, 0, 0.2);
            height: 300px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 1.5rem;
        }
        
        .export-btn {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.3);
        }
    </style>
</head>
<body>
    <nav>
        <!-- 네비게이션 바 (기존과 동일) -->
    </nav>

    <div class="studio-container">
        <div class="studio-editor">
            <h2 class="editor-title">TL STUDIO 편집기</h2>
            
            <div class="editor-tools">
                <button class="tool-btn" onclick="useTool('cut')">✂️ 자르기</button>
                <button class="tool-btn" onclick="useTool('effect')">🎨 효과</button>
                <button class="tool-btn" onclick="useTool('text')">🔤 텍스트</button>
                <button class="tool-btn" onclick="useTool('audio')">🔊 오디오</button>
            </div>
            
            <div class="editor-preview" id="previewArea">
                <p>편집 영역 미리보기</p>
            </div>
            
            <div style="text-align: center;">
                <button class="export-btn" onclick="exportProject()">📤 프로젝트 내보내기</button>
            </div>
        </div>
        
        <p style="text-align: center; opacity: 0.7; font-size: 0.9rem;">
            TL STUDIO 편집 기능이 추가되었습니다.
        </p>
    </div>

    <footer>
        <p>&copy; 2024 TIMELINK. 시간을 가치로 연결하는 새로운 경제</p>
    </footer>

    <script>
        function useTool(tool) {
            const preview = document.getElementById('previewArea');
            const messages = {
                'cut': '자르기 도구 선택됨',
                'effect': '효과 도구 선택됨',
                'text': '텍스트 추가 도구 선택됨',
                'audio': '오디오 편집 도구 선택됨'
            };
            
            preview.innerHTML = `<p>${messages[tool]} - 작업 중...</p>`;
            alert(tool + ' 도구가 활성화되었습니다.');
        }
        
        function exportProject() {
            alert('프로젝트가 성공적으로 내보내졌습니다!');
            document.getElementById('previewArea').innerHTML = 
                '<p>✅ 내보내기 완료! 다운로드 준비 중...</p>';
        }
    </script>
</body>
</html>
