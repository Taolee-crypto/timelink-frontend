<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | TL 파일 변환 & 마켓플레이스 등록 - Deconomic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        :root {
            --tl-primary: #6C63FF;
            --tl-secondary: #36D1DC;
            --tl-accent: #FF6B9D;
            --tl-success: #00D4AA;
            --tl-warning: #FFB74D;
            --tl-error: #FF4757;
            --tl-dark: #1A1A2E;
            --tl-light: #F8F9FF;
            --tl-gray: #8E8E93;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8F9FF 0%, #E6F7FF 100%);
            color: #333;
            padding-top: 90px;
            min-height: 100vh;
        }
        .studio-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .studio-header {
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.9), rgba(54, 209, 220, 0.8));
            padding: 80px 0 40px;
            margin: -90px -20px 40px;
            border-radius: 0 0 30px 30px;
            text-align: center;
            color: white;
        }
        .upload-zone {
            border: 3px dashed var(--tl-primary);
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            margin-bottom: 30px;
        }
        .upload-zone:hover {
            background: rgba(108, 99, 255, 0.05);
            border-color: var(--tl-accent);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <div class="studio-container">
        <header class="studio-header">
            <h1 class="hero-title">📁 STUDIO</h1>
            <p class="hero-subtitle">다중 파일 TL 변환 → 저작권 인증 → 마켓플레이스 등록</p>
            <button class="btn btn-primary" onclick="startBulkUpload()">
                <i class="bi bi-cloud-arrow-up me-2"></i>대량 파일 업로드 시작
            </button>
        </header>
        
        <section class="upload-section">
            <div class="upload-zone" onclick="triggerFileInput()">
                <i class="bi bi-cloud-arrow-up" style="font-size: 4rem;"></i>
                <h3>여러 파일을 드래그 앤 드롭</h3>
                <p>최대 100개 파일, 총 2GB까지 업로드 가능</p>
                <input type="file" multiple id="bulkFileInput" style="display: none;">
            </div>
        </section>
    </div>
    
    <script>
        function triggerFileInput() {
            document.getElementById('bulkFileInput').click();
        }
        function startBulkUpload() {
            triggerFileInput();
        }
        console.log("✅ studio.html 원본 복구 완료!");
    </script>
</body>
</html>
