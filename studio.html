<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO | Deconomic - 완전한 파일 업로드, 변환, 재생 시스템</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #36D1DC;
            --success: #00D4AA;
            --warning: #FFB74D;
            --danger: #FF4757;
            --platform: #FF6B9D;
            --copyright: #00D4AA;
            --uploader: #36D1DC;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8f9ff 0%, #e6f7ff 100%);
            color: #333;
            padding-top: 80px;
            min-height: 100vh;
        }
        
        /* 헤더 */
        .studio-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 4rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 30px 30px;
            text-align: center;
        }
        
        /* 업로드 영역 */
        .upload-zone {
            border: 3px dashed var(--primary);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }
        
        .upload-zone:hover {
            background: rgba(255, 255, 255, 0.95);
            border-color: var(--secondary);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(108, 99, 255, 0.2);
        }
        
        /* 파일 목록 */
        .file-list-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .file-item {
            display: flex;
            align-items: center;
            padding: 1.2rem;
            background: rgba(248, 249, 255, 0.5);
            border-radius: 15px;
            margin-bottom: 1rem;
            border: 1px solid rgba(108, 99, 255, 0.1);
            transition: all 0.2s ease;
        }
        
        .file-item:hover {
            background: rgba(108, 99, 255, 0.05);
        }
        
        /* 미디어 플레이어 */
        .media-player {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        .audio-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 1rem;
        }
        
        .waveform {
            height: 60px;
            background: #1a1a2e;
            border-radius: 10px;
            margin: 1rem 0;
            position: relative;
            overflow: hidden;
        }
        
        .wave-bar {
            position: absolute;
            bottom: 0;
            width: 3px;
            background: var(--success);
            border-radius: 1.5px;
            animation: wave 1.5s infinite ease-in-out;
        }
        
        @keyframes wave {
            0%, 100% { height: 20%; }
            50% { height: 80%; }
        }
        
        /* 수익 배분 */
        .revenue-bars {
            display: flex;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            margin: 2rem 0;
        }
        
        .platform-bar {
            background: var(--platform);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            width: 30%;
        }
        
        .copyright-bar {
            background: var(--copyright);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            width: 50%;
        }
        
        .uploader-bar {
            background: var(--uploader);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            width: 20%;
        }
        
        /* 변환 진행 */
        .conversion-progress {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        
        /* 버튼 */
        .btn-studio {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .btn-studio:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="navbar navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-stack me-2"></i> Deconomic Studio
            </a>
        </div>
    </nav>

    <div class="container">
        <!-- 헤더 -->
        <header class="studio-header">
            <h1 class="display-4 fw-bold mb-3">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                완전한 파일 관리 시스템
            </h1>
            <p class="lead mb-4">업로드 → 변환 → 재생 → 수익 창출까지 한 번에</p>
        </header>

        <!-- 섹션 1: 파일 업로드 -->
        <section class="upload-section">
            <h2 class="mb-4"><i class="bi bi-cloud-arrow-up me-2"></i>대량 파일 업로드</h2>
            
            <div class="upload-zone" id="uploadZone">
                <i class="bi bi-cloud-arrow-up" style="font-size: 4rem;"></i>
                <h3>파일을 드래그 앤 드롭하거나 클릭</h3>
                <p class="text-muted">MP3, WAV, MP4, AVI, JPG, PNG, PDF 지원</p>
                <input type="file" multiple id="fileInput" class="d-none" accept="*/*">
                <button class="btn btn-studio mt-3" onclick="document.getElementById('fileInput').click()">
                    <i class="bi bi-folder-plus me-2"></i>파일 선택
                </button>
            </div>

            <div class="file-list-container" id="fileListContainer" style="display: none;">
                <h4 class="mb-3">선택된 파일 (<span id="fileCount">0</span>개)</h4>
                <div id="fileList"></div>
            </div>
        </section>

        <!-- 섹션 2: 미디어 플레이어 -->
        <section class="media-section" id="mediaSection" style="display: none;">
            <h2 class="mb-4"><i class="bi bi-play-circle me-2"></i>미디어 재생기</h2>
            
            <div class="media-player">
                <h4 id="currentFile">파일을 선택하세요</h4>
                
                <div class="waveform" id="waveform"></div>
                
                <div class="audio-controls">
                    <button class="btn btn-primary" onclick="playAudio()" id="playBtn">
                        <i class="bi bi-play-fill"></i> 재생
                    </button>
                    <button class="btn btn-warning" onclick="pauseAudio()">
                        <i class="bi bi-pause-fill"></i> 일시정지
                    </button>
                    <button class="btn btn-danger" onclick="stopAudio()">
                        <i class="bi bi-stop-fill"></i> 정지
                    </button>
                    
                    <input type="range" class="form-range flex-grow-1" id="volume" min="0" max="100" value="80">
                    <span class="text-muted" id="currentTime">0:00</span>
                </div>
            </div>
        </section>

        <!-- 섹션 3: 파일 변환기 -->
        <section class="conversion-section mt-4" id="conversionSection" style="display: none;">
            <h2 class="mb-4"><i class="bi bi-arrow-repeat me-2"></i>파일 변환기</h2>
            
            <div class="conversion-progress">
                <div class="mb-3">
                    <label class="form-label">변환 포맷 선택</label>
                    <select class="form-select" id="formatSelect">
                        <option value="mp3">MP3 오디오</option>
                        <option value="wav">WAV 오디오</option>
                        <option value="mp4">MP4 비디오</option>
                        <option value="tl">TL 암호화 형식</option>
                    </select>
                </div>
                
                <div class="progress mb-3" style="height: 20px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" 
                         id="progressBar" style="width: 0%"></div>
                </div>
                
                <button class="btn btn-success w-100" onclick="startConversion()" id="convertBtn">
                    <i class="bi bi-arrow-clockwise me-2"></i>변환 시작
                </button>
            </div>
        </section>

        <!-- 섹션 4: 수익 배분 -->
        <section class="revenue-section mt-4" id="revenueSection" style="display: none;">
            <h2 class="mb-4"><i class="bi bi-cash-coin me-2"></i>수익 배분 시스템</h2>
            
            <div class="revenue-bars">
                <div class="platform-bar">플랫폼 30%</div>
                <div class="copyright-bar">저작권자 50%</div>
                <div class="uploader-bar">업로더 20%</div>
            </div>
            
            <div class="card mt-4">
                <div class="card-body">
                    <h5><i class="bi bi-person-badge me-2"></i>저작권자 정보</h5>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="저작권자 이름" id="copyrightName">
                    </div>
                    <div class="mb-3">
                        <input type="text" class="form-control" value="0x742d35Cc6634C0532925a3b844Bc454e4438f44e" readonly>
                    </div>
                    <button class="btn btn-success w-100" onclick="registerFile()">
                        <i class="bi bi-check-circle me-2"></i>마켓플레이스 등록
                    </button>
                </div>
            </div>
        </section>
    </div>

    <!-- 성공 알림 -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="successToast" class="toast" role="alert">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">성공</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script>
        // 전역 변수
        let uploadedFiles = [];
        let currentAudio = null;
        let isPlaying = false;
        
        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎵 Studio 초기화 완료');
            
            // 파일 입력 이벤트
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);
            
            // 드래그 앤 드롭
            const uploadZone = document.getElementById('uploadZone');
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '#36D1DC';
            });
            
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '#6C63FF';
                handleFileSelect({ target: { files: e.dataTransfer.files } });
            });
            
            // 웨이브폼 생성
            createWaveform();
        });
        
        // 파일 선택 처리
        function handleFileSelect(event) {
            const files = event.target.files;
            if (!files.length) return;
            
            const fileListContainer = document.getElementById('fileListContainer');
            const fileList = document.getElementById('fileList');
            
            fileList.innerHTML = '';
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const fileObj = {
                    id: Date.now() + i,
                    name: file.name,
                    size: file.size,
                    type: file.type,
                    file: file,
                    url: URL.createObjectURL(file)
                };
                
                uploadedFiles.push(fileObj);
                
                const fileElement = document.createElement('div');
                fileElement.className = 'file-item';
                fileElement.innerHTML = `
                    <div style="flex: 1;">
                        <strong>${file.name}</strong>
                        <div class="text-muted">
                            ${formatSize(file.size)} • ${file.type || '파일'}
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-primary me-2" onclick="playFile(${uploadedFiles.length - 1})">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteFile(${uploadedFiles.length - 1})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                `;
                fileList.appendChild(fileElement);
            }
            
            fileListContainer.style.display = 'block';
            document.getElementById('fileCount').textContent = uploadedFiles.length;
            
            // 다른 섹션들 표시
            document.getElementById('mediaSection').style.display = 'block';
            document.getElementById('conversionSection').style.display = 'block';
            document.getElementById('revenueSection').style.display = 'block';
            
            showToast(`${files.length}개 파일이 선택되었습니다`);
        }
        
        // 파일 재생
        function playFile(index) {
            if (index >= uploadedFiles.length) return;
            
            const file = uploadedFiles[index];
            document.getElementById('currentFile').textContent = file.name;
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            if (file.type.startsWith('audio/')) {
                currentAudio = new Audio(file.url);
                currentAudio.play();
                isPlaying = true;
                document.getElementById('playBtn').innerHTML = '<i class="bi bi-pause-fill"></i> 일시정지';
                
                currentAudio.onended = function() {
                    isPlaying = false;
                    document.getElementById('playBtn').innerHTML = '<i class="bi bi-play-fill"></i> 재생';
                };
                
                // 시간 업데이트
                setInterval(updateTime, 1000);
            }
        }
        
        // 오디오 컨트롤
        function playAudio() {
            if (!currentAudio) return;
            
            if (currentAudio.paused) {
                currentAudio.play();
                isPlaying = true;
                document.getElementById('playBtn').innerHTML = '<i class="bi bi-pause-fill"></i> 일시정지';
            } else {
                currentAudio.pause();
                isPlaying = false;
                document.getElementById('playBtn').innerHTML = '<i class="bi bi-play-fill"></i> 재생';
            }
        }
        
        function pauseAudio() {
            if (currentAudio) {
                currentAudio.pause();
                isPlaying = false;
                document.getElementById('playBtn').innerHTML = '<i class="bi bi-play-fill"></i> 재생';
            }
        }
        
        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                isPlaying = false;
                document.getElementById('playBtn').innerHTML = '<i class="bi bi-play-fill"></i> 재생';
                document.getElementById('currentTime').textContent = '0:00';
            }
        }
        
        // 시간 업데이트
        function updateTime() {
            if (currentAudio && !isNaN(currentAudio.duration)) {
                const current = Math.floor(currentAudio.currentTime);
                const duration = Math.floor(currentAudio.duration);
                document.getElementById('currentTime').textContent = 
                    `${formatTime(current)} / ${formatTime(duration)}`;
            }
        }
        
        // 파일 변환
        function startConversion() {
            const format = document.getElementById('formatSelect').value;
            const btn = document.getElementById('convertBtn');
            const progressBar = document.getElementById('progressBar');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>변환 중...';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                progressBar.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>변환 완료';
                    showToast(`파일이 ${format.toUpperCase()} 형식으로 변환되었습니다!`);
                    
                    setTimeout(() => {
                        progressBar.style.width = '0%';
                        btn.innerHTML = '<i class="bi bi-arrow-clockwise me-2"></i>변환 시작';
                    }, 3000);
                }
            }, 200);
        }
        
        // 마켓플레이스 등록
        function registerFile() {
            const name = document.getElementById('copyrightName').value;
            if (!name) {
                showToast('저작권자 이름을 입력해주세요', 'warning');
                return;
            }
            
            showToast('파일이 마켓플레이스에 등록되었습니다! 수익이 실시간으로 적립됩니다.');
        }
        
        // 파일 삭제
        function deleteFile(index) {
            if (index >= uploadedFiles.length) return;
            
            if (uploadedFiles[index].url) {
                URL.revokeObjectURL(uploadedFiles[index].url);
            }
            
            uploadedFiles.splice(index, 1);
            updateFileList();
            
            if (uploadedFiles.length === 0) {
                document.getElementById('fileListContainer').style.display = 'none';
                document.getElementById('mediaSection').style.display = 'none';
                document.getElementById('conversionSection').style.display = 'none';
                document.getElementById('revenueSection').style.display = 'none';
            }
        }
        
        // 파일 목록 업데이트
        function updateFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            uploadedFiles.forEach((file, index) => {
                const fileElement = document.createElement('div');
                fileElement.className = 'file-item';
                fileElement.innerHTML = `
                    <div style="flex: 1;">
                        <strong>${file.name}</strong>
                        <div class="text-muted">
                            ${formatSize(file.size)} • ${file.type || '파일'}
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-primary me-2" onclick="playFile(${index})">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteFile(${index})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                `;
                fileList.appendChild(fileElement);
            });
            
            document.getElementById('fileCount').textContent = uploadedFiles.length;
        }
        
        // 웨이브폼 생성
        function createWaveform() {
            const waveform = document.getElementById('waveform');
            waveform.innerHTML = '';
            
            for (let i = 0; i < 40; i++) {
                const bar = document.createElement('div');
                bar.className = 'wave-bar';
                bar.style.left = `${i * 8}px`;
                bar.style.height = `${20 + Math.random() * 60}%`;
                bar.style.animationDelay = `${i * 0.05}s`;
                waveform.appendChild(bar);
            }
        }
        
        // 유틸리티 함수
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' Bytes';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('successToast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            
            if (type === 'warning') {
                toastEl.querySelector('.toast-header').className = 'toast-header bg-warning text-dark';
            } else {
                toastEl.querySelector('.toast-header').className = 'toast-header bg-success text-white';
            }
            
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }
        
        // Bootstrap Toast 초기화
        const toastElList = [].slice.call(document.querySelectorAll('.toast'));
        const toastList = toastElList.map(function(toastEl) {
            return new bootstrap.Toast(toastEl);
        });
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
