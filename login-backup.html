<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 로그인</title>
    <link rel="stylesheet" href="src/styles/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="bi bi-clock"></i>
                    <span>TimeLink</span>
                </div>
                <p class="tagline">음원 크리에이터를 위한 플랫폼</p>
            </div>
            
            <div class="login-content">
                <div id="alert" class="alert"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">이메일</label>
                        <input type="email" id="email" class="form-input" placeholder="example@timelink.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" id="password" class="form-input" placeholder="비밀번호" required>
                    </div>
                    
                    <button type="submit" class="btn-login">
                        <i class="bi bi-box-arrow-in-right"></i> 로그인
                    </button>
                </form>
                
                <div class="divider">
                    <span>또는</span>
                </div>
                
                <div class="links">
                    <a href="signup.html" class="link">회원가입</a>
                    <a href="#" class="link">비밀번호 찾기</a>
                    <a href="index.html" class="link">홈으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>

    <script>
    // API 설정
    const API_BASE_URL = 'https://timelink-backend.timelink-api.workers.dev';
    
    // DOM 요소
    const loginForm = document.getElementById('loginForm');
    const alertDiv = document.getElementById('alert');
    
    // 페이지 로드 시
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('email').focus();
    });
    
    // 로그인 폼 제출
    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = this.querySelector('button[type="submit"]');
        
        // 유효성 검사
        if (!validateEmail(email)) {
            showAlert('유효한 이메일을 입력해주세요.', 'error');
            return;
        }
        
        if (password.length < 6) {
            showAlert('비밀번호는 6자 이상이어야 합니다.', 'error');
            return;
        }
        
        // 로딩 상태
        submitBtn.disabled = true;
        const originalHTML = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="bi bi-arrow-repeat spinner"></i> 로그인 중...';
        
        showAlert('로그인 중입니다...', 'info');
        
        try {
            // 진짜 API 호출
            const response = await fetch(API_BASE_URL + '/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                showAlert('로그인 성공!', 'success');
                
                // 사용자 정보 저장
                if (data.token) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_email', email);
                    localStorage.setItem('user_nickname', data.user?.nickname || '');
                }
                
                // 1초 후 대시보드로 이동
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
                
            } else {
                showAlert(data.error || '로그인에 실패했습니다.', 'error');
            }
            
        } catch (error) {
            console.error('로그인 오류:', error);
            showAlert('서버 연결에 실패했습니다.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalHTML;
        }
    });
    
    // 유효성 검사 함수
    function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
    }
    
    // 알림 표시 함수
    function showAlert(message, type) {
        alertDiv.textContent = message;
        alertDiv.className = `alert alert-${type} show`;
        
        setTimeout(() => {
            alertDiv.classList.remove('show');
        }, 3000);
    }
    
    // 엔터키 지원
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && document.activeElement.id === 'password') {
            loginForm.requestSubmit();
        }
    });
</script>
</body>
</html>
