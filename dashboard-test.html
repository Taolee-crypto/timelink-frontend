<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>대시보드 테스트 | TimeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="./scripts/common-components.js"></script>
    <style>
        body { padding: 20px; }
    </style>
</head>
<body>
    <h1>대시보드 테스트</h1>
    <div id="userInfo">
        <p>사용자 정보를 불러오는 중...</p>
    </div>
    
    <script>
        const user = checkAuth();
        if (user) {
            document.getElementById('userInfo').innerHTML = \
                <h3>\님 환영합니다!</h3>
                <p>이메일: \</p>
                <p>가상 사용자: \</p>
                <button onclick="logout()" class="btn btn-danger">로그아웃</button>
            \;
        } else {
            document.getElementById('userInfo').innerHTML = \
                <p class="text-danger">로그인이 필요합니다.</p>
                <a href="./index.html" class="btn btn-primary">메인으로 이동</a>
            \;
        }
    </script>
</body>
</html>
