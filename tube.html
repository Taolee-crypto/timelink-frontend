<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TL 튜브 - TL Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
            text-decoration: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .tube-header {
            text-align: center;
            padding: 3rem 0;
        }
        
        .tube-header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #f97316, #ea580c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }
        
        .video-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .video-card:hover {
            transform: translateY(-5px);
            border-color: #f97316;
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.1);
        }
        
        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        
        .video-info {
            padding: 1.5rem;
        }
        
        .video-stats {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
        
        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            text-decoration: none;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(249, 115, 22, 0.3);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #94a3b8;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border: 1px solid #475569;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            color: #60a5fa;
            border-color: #60a5fa;
        }
        
        .trending-section {
            background: rgba(15, 23, 42, 0.8);
            padding: 2rem;
            border-radius: 15px;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fas fa-infinity"></i>
            TL Platform
        </a>
        <div>
            <a href="index.html" class="btn" style="background: transparent; border: 2px solid #f97316;">
                <i class="fas fa-home"></i> 메인으로
            </a>
        </div>
    </nav>
    
    <div class="container">
        <div class="tube-header">
            <h1><i class="fas fa-film"></i> TL 튜브</h1>
            <p>수익 공유형 영상 플랫폼</p>
        </div>
        
        <div class="trending-section">
            <h2><i class="fas fa-fire"></i> 인기 영상</h2>
            <div class="videos-grid" style="margin: 2rem 0;">
                <div class="video-card">
                    <div class="video-thumbnail">
                        <i class="fas fa-play-circle"></i>
                    </div>
                    <div class="video-info">
                        <h3>TL Platform 완전 가이드</h3>
                        <p>모든 기능을 한 번에 살펴보세요</p>
                        <div class="video-stats">
                            <span><i class="fas fa-eye"></i> 12,540회</span>
                            <span><i class="fas fa-coins"></i> 2,500 TLT</span>
                        </div>
                        <button class="btn">
                            <i class="fas fa-play"></i> 시청하기
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="videos-grid">
            <div class="video-card">
                <div class="video-thumbnail">
                    <i class="fas fa-video"></i>
                </div>
                <div class="video-info">
                    <h3>블록체인 음원 제작하기</h3>
                    <p>Music Maker</p>
                    <div class="video-stats">
                        <span><i class="fas fa-eye"></i> 8,500회</span>
                        <span><i class="fas fa-coins"></i> 1,800 TLT</span>
                    </div>
                    <button class="btn">
                        <i class="fas fa-play"></i> 시청하기
                    </button>
                </div>
            </div>
            
            <div class="video-card">
                <div class="video-thumbnail">
                    <i class="fas fa-broadcast-tower"></i>
                </div>
                <div class="video-info">
                    <h3>실시간 스트리밍 시작하기</h3>
                    <p>Stream Pro</p>
                    <div class="video-stats">
                        <span><i class="fas fa-eye"></i> 21,000회</span>
                        <span><i class="fas fa-coins"></i> 4,200 TLT</span>
                    </div>
                    <button class="btn">
                        <i class="fas fa-play"></i> 시청하기
                    </button>
                </div>
            </div>
            
            <div class="video-card">
                <div class="video-thumbnail">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="video-info">
                    <h3>수익 창출 전략</h3>
                    <p>Business Insights</p>
                    <div class="video-stats">
                        <span><i class="fas fa-eye"></i> 15,300회</span>
                        <span><i class="fas fa-coins"></i> 3,100 TLT</span>
                    </div>
                    <button class="btn">
                        <i class="fas fa-play"></i> 시청하기
                    </button>
                </div>
            </div>
            
            <div class="video-card">
                <div class="video-thumbnail">
                    <i class="fas fa-users"></i>
                </div>
                <div class="video-info">
                    <h3>커뮤니티 빌딩</h3>
                    <p>Community Guide</p>
                    <div class="video-stats">
                        <span><i class="fas fa-eye"></i> 9,800회</span>
                        <span><i class="fas fa-coins"></i> 1,900 TLT</span>
                    </div>
                    <button class="btn">
                        <i class="fas fa-play"></i> 시청하기
                    </button>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin: 3rem 0;">
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> 메인 페이지로 돌아가기
            </a>
        </div>
    </div>
    
    <script type="module">
    import { checkAuth, updateUserInfo } from './auth.js';
    
    document.addEventListener('DOMContentLoaded', function() {
        // 인증 체크
        if (!checkAuth()) return;
        
        // 사용자 정보 업데이트
        updateUserInfo();
        
        // 페이지별 데이터 로딩
        loadPageData();
    });
    
    async function loadPageData() {
        // 페이지별 데이터 로딩 로직
        const currentPage = window.location.pathname.split('/').pop();
        
        switch(currentPage) {
            case 'index.html':
                await loadDashboardData();
                break;
            case 'studio.html':
                await loadStudioData();
                break;
            case 'music-market.html':
                await loadMarketData();
                break;
            case 'tube.html':
                await loadTubeData();
                break;
            case 'advertiser-dashboard.html':
                await loadAdData();
                break;
        }
    }
    
    async function loadDashboardData() {
        try {
            // 대시보드 데이터 로드
            const [profile, content, stats] = await Promise.all([
                api.getUserProfile(),
                api.getContentList(1, 4),
                api.getAdStats()
            ]);
            
            // DOM 업데이트
            updateDashboardUI(profile, content, stats);
        } catch (error) {
            console.error('대시보드 데이터 로드 실패:', error);
        }
    }
    
    function updateDashboardUI(profile, content, stats) {
        // 실제 데이터로 UI 업데이트
        document.getElementById('total-tracks').textContent = stats?.totalTracks || 0;
        document.getElementById('total-views').textContent = stats?.totalViews || 0;
        document.getElementById('total-earnings').textContent = `₩ ${(stats?.totalEarnings || 0).toLocaleString()}`;
        document.getElementById('avg-rating').textContent = stats?.avgRating?.toFixed(1) || '0.0';
        
        // 최신 트랙 목록 업데이트
        updateRecentTracks(content?.data || []);
    }
    
    function updateRecentTracks(tracks) {
        const container = document.getElementById('recent-tracks');
        if (!container) return;
        
        if (!tracks || tracks.length === 0) {
            container.innerHTML = '<div class="no-content">아직 업로드한 트랙이 없습니다.</div>';
            return;
        }
        
        container.innerHTML = tracks.map(track => `
            <div class="content-card">
                <div class="content-thumbnail" style="background: linear-gradient(135deg, #${Math.floor(Math.random()*16777215).toString(16)}, #${Math.floor(Math.random()*16777215).toString(16)})">
                    <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem;">
                        ${track.duration ? formatDuration(track.duration) : '--:--'}
                    </div>
                </div>
                <div class="content-info">
                    <div class="content-title">${track.title || '무제'}</div>
                    <div class="content-author">${track.author || '알 수 없음'}</div>
                    <div class="content-meta">
                        <span>👁️ ${track.views || 0}</span>
                        <span>${new Date(track.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function formatDuration(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
</script>
</body>
</html>
