<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="welcome">TL Platform - 통합 웹3.0 플랫폼</title>
    <!-- 나머지 head 내용은 유지 -->
</head>
<body>
    <!-- 네비게이션 바 -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-infinity"></i>
            <span data-i18n="welcome">TL Platform</span>
        </div>
        <div class="nav-links">
            <a href="#home" data-i18n="home"><i class="fas fa-home"></i> 홈</a>
            <a href="#platforms" data-i18n="platforms"><i class="fas fa-th-large"></i> 플랫폼</a>
            <a href="#features" data-i18n="features"><i class="fas fa-star"></i> 기능</a>
            <a href="auth.html" data-i18n="mypage"><i class="fas fa-user"></i> 마이페이지</a>
            <a href="advertiser-dashboard.html" data-i18n="ads"><i class="fas fa-chart-line"></i> 광고관리</a>
        </div>
        <div class="auth-buttons">
            <button class="btn btn-primary" onclick="window.location.href='login.html'" data-i18n="login">
                <i class="fas fa-sign-in-alt"></i> 로그인
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='register.html'" data-i18n="register">
                <i class="fas fa-user-plus"></i> 회원가입
            </button>
        </div>
    </nav>
    <!-- 나머지 body 내용 -->
    <footer class="footer">
        <p data-i18n="copyright">© 2024 TL Platform. 모든 권리 보유.</p>
    </footer>
    
    <!-- 스크립트 -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 TL Platform 초기화 시작...');
        
        // 언어 설정
        const savedLang = localStorage.getItem('tl_language') || 'ko';
        if (typeof applyLanguage === 'function') {
            applyLanguage(savedLang);
        }
        
        // API 초기화
        if (typeof TLAPI !== 'undefined') {
            TLAPI.init().then(api => {
                if (api.healthy) {
                    console.log('✅ 시스템 정상');
                }
            });
        }
    });
    </script>
    <script src="js/language.js"></script>
    <script src="js/config.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        console.log("🚀 TL Platform 초기화 시작");
        
        // 언어 설정
        const savedLang = localStorage.getItem("tl_language") || "ko";
        if (typeof applyLanguage === "function") {
            applyLanguage(savedLang);
        }
        
        // API 초기화
        if (typeof TLAPI !== "undefined") {
            TLAPI.init().then(function(api) {
                console.log("API 초기화 완료:", api.healthy ? "성공" : "실패");
                
                // 상태 표시 업데이트
                const statusEl = document.getElementById("connection-status");
                if (statusEl) {
                    statusEl.textContent = api.healthy ? "✅ 연결됨" : "⚠️ 오프라인";
                    statusEl.className = api.healthy ? "status-connected" : "status-offline";
                }
            }).catch(function(error) {
                console.error("API 초기화 실패:", error);
            });
        }
    });
    </script>
</body>
</html>
