<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TIMELINK</title>
</head>
<body>
<div id="app"></div>

<script>
// API 주소
const AUTH_API = 'https://timelink-api.timelink-api.workers.dev';
const ECONOMIC_API = 'https://deconomic-api.timelink-api.workers.dev';

// 앱 상태
let token = localStorage.getItem('token');
let user = JSON.parse(localStorage.getItem('user') || 'null');

// 앱 초기화
function init() {
    if (token && user) {
        showDashboard();
    } else {
        showLogin();
    }
}

// 로그인 화면
function showLogin() {
    document.getElementById('app').innerHTML = `
        <div style="max-width: 400px; margin: 50px auto; padding: 20px;">
            <h2>TIMELINK 로그인</h2>
            <input type="email" id="email" placeholder="이메일" style="width:100%; padding:10px; margin:5px 0;"><br>
            <input type="password" id="password" placeholder="비밀번호" style="width:100%; padding:10px; margin:5px 0;"><br>
            <button onclick="login()" style="width:100%; padding:10px; margin:10px 0;">로그인</button>
            <button onclick="showSignup()" style="width:100%; padding:10px; margin:5px 0;">회원가입</button>
        </div>
    `;
}

// 회원가입 화면
function showSignup() {
    document.getElementById('app').innerHTML = `
        <div style="max-width: 400px; margin: 50px auto; padding: 20px;">
            <h2>TIMELINK 회원가입</h2>
            <input type="text" id="name" placeholder="이름" style="width:100%; padding:10px; margin:5px 0;"><br>
            <input type="email" id="email" placeholder="이메일" style="width:100%; padding:10px; margin:5px 0;"><br>
            <input type="password" id="password" placeholder="비밀번호" style="width:100%; padding:10px; margin:5px 0;"><br>
            <select id="type" style="width:100%; padding:10px; margin:5px 0;">
                <option value="creator">크리에이터</option>
                <option value="listener">청취자</option>
            </select><br>
            <button onclick="signup()" style="width:100%; padding:10px; margin:10px 0;">가입하기</button>
            <button onclick="showLogin()" style="width:100%; padding:10px; margin:5px 0;">로그인으로</button>
        </div>
    `;
}

// 대시보드
function showDashboard() {
    document.getElementById('app').innerHTML = `
        <div style="padding: 20px;">
            <h2>대시보드</h2>
            <p>환영합니다, ${user?.name || '사용자'}님!</p>
            <div id="balance">잔액: 로딩중...</div>
            <button onclick="logout()" style="padding:10px; margin-top:20px;">로그아웃</button>
        </div>
    `;
    loadBalance();
}

// API 호출
async function apiCall(url, method = 'GET', body = null) {
    const headers = {
        'Content-Type': 'application/json',
        'Authorization': token ? `Bearer ${token}` : ''
    };
    
    const options = {
        method,
        headers
    };
    
    if (body) options.body = JSON.stringify(body);
    
    try {
        const res = await fetch(url, options);
        return await res.json();
    } catch (error) {
        alert('API 오류: ' + error.message);
        return null;
    }
}

// 로그인
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const data = await apiCall(AUTH_API + '/auth/login', 'POST', { email, password });
    
    if (data && data.token) {
        token = data.token;
        user = data.user;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(user));
        showDashboard();
        alert('로그인 성공');
    } else {
        alert('로그인 실패');
    }
}

// 회원가입
async function signup() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const type = document.getElementById('type').value;
    
    const data = await apiCall(AUTH_API + '/auth/register', 'POST', {
        name, email, password, type
    });
    
    if (data && data.token) {
        token = data.token;
        user = data.user;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(user));
        showDashboard();
        alert('회원가입 성공');
    } else {
        alert('회원가입 실패');
    }
}

// 잔액 조회
async function loadBalance() {
    const data = await apiCall(ECONOMIC_API + '/wallet/balance');
    if (data && data.balance !== undefined) {
        document.getElementById('balance').innerHTML = `잔액: ${data.balance} TL`;
    }
}

// 로그아웃
function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    token = null;
    user = null;
    showLogin();
}

// 시작
init();
</script>
</body>
</html>
