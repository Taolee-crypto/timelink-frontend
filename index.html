<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deconomic | TL 기반 디지털 파일 경제 플랫폼</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #36D1DC;
            --accent: #FF6B9D;
            --success: #00D4AA;
            --warning: #FFB74D;
            --tl-blue: #4A90E2;
            --tl-purple: #9B5DE5;
            --tl-green: #00BBF9;
            --dark: #1A1A2E;
            --light: #F8F9FF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F8F9FF 0%, #E6F7FF 100%);
            color: #333;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, .display-font {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        /* 이미지 스타일 */
        .story-image {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            height: 400px;
            position: relative;
        }

        .story-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .story-image:hover img {
            transform: scale(1.05);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            padding: 2rem;
        }

        /* TL 토큰 배지 */
        .tl-badge {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, var(--tl-blue), var(--tl-purple));
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 2px;
        }

        /* 히어로 섹션 */
        .hero-section {
            min-height: 100vh;
            background: 
                linear-gradient(135deg, rgba(108, 99, 255, 0.1) 0%, rgba(54, 209, 220, 0.1) 100%),
                url('https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead?ixlib=rb-4.0.3&auto=format&fit=crop&w=2074&q=80');
            background-size: cover;
            background-position: center;
            background-blend-mode: overlay;
            position: relative;
            overflow: hidden;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            text-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 스토리 섹션 */
        .story-section {
            padding: 6rem 0;
            position: relative;
        }

        .story-section:nth-child(even) {
            background: linear-gradient(135deg, #F8F9FF 0%, #FFFFFF 100%);
        }

        /* 사용자 스토리 카드 */
        .user-story-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(108, 99, 255, 0.1);
            height: 100%;
            transition: transform 0.3s ease;
        }

        .user-story-card:hover {
            transform: translateY(-10px);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1.5rem;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 파일 갤러리 */
        .file-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .file-item {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .file-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        /* 영상 콘텐츠 특별 컨테이너 */
        .video-story-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            height: 500px;
            margin: 3rem 0;
        }

        .video-story-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7));
            z-index: 1;
        }

        .video-story-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-story-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            color: white;
            padding: 3rem;
            z-index: 2;
        }

        /* 수익 스토리 */
        .revenue-story {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 24px;
            padding: 3rem;
            margin: 3rem 0;
            position: relative;
            overflow: hidden;
        }

        .revenue-story::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            opacity: 0.1;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            
            .story-image {
                height: 300px;
            }
            
            .video-story-container {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="navbar navbar-expand-lg py-4" style="background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);">
        <div class="container">
            <a class="navbar-brand" href="#">
                <div class="d-flex align-items-center gap-2">
                    <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-currency-exchange text-white"></i>
                    </div>
                    <span class="fw-bold fs-3" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                        Deconomic
                    </span>
                </div>
            </a>
            <div class="d-flex gap-3">
                <a href="#stories" class="btn btn-outline-primary">성공 스토리</a>
                <a href="./studio.html" class="btn btn-primary">STUDIO 시작</a>
            </div>
        </div>
    </nav>

    <!-- 히어로 섹션 - 스토리 중심 -->
    <section class="hero-section d-flex align-items-center">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6">
                    <h1 class="hero-title">
                        당신의 스토리가<br>
                        <span style="background: linear-gradient(135deg, #FF6B9D, #FFB74D); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                            돈이 되는 순간
                        </span>
                    </h1>
                    <p class="lead mb-4" style="font-size: 1.3rem; color: #444; line-height: 1.6;">
                        음악가, 작가, 크리에이터...<br>
                        <strong>디지털 창작물이 TL로 변환되어</strong><br>
                        지속적인 수익을 창출합니다
                    </p>
                    
                    <div class="d-flex flex-wrap gap-3 mt-4">
                        <a href="#stories" class="btn btn-primary btn-lg">
                            <i class="bi bi-play-circle me-2"></i>성공 스토리 보기
                        </a>
                        <a href="./studio.html" class="btn btn-outline-light btn-lg">
                            <i class="bi bi-magic me-2"></i>STUDIO 시작하기
                        </a>
                    </div>
                </div>
                
                <div class="col-lg-6 mt-5 mt-lg-0">
                    <div class="story-image">
                        <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" 
                             alt="음악가의 스토리" loading="lazy">
                        <div class="image-overlay">
                            <h4 class="text-white mb-2">지민이의 음악 여정</h4>
                            <p class="text-white-50 mb-0">데모 음원 5개가 월 50만원 수익 창출</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 사용자 성공 스토리 -->
    <section id="stories" class="story-section">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="display-font mb-3">실제 사용자들의 성공 스토리</h2>
                <p class="text-muted lead">디지털 파일이 TL로 변환되어 지속적인 수익을 창출하고 있습니다</p>
            </div>
