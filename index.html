<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 캐시 완전 방지 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- 추가 캐시 방지 -->
    <meta name="robots" content="noarchive">
    <meta name="googlebot" content="noarchive">
    
    <title>TL Platform - 캐시 방지 버전</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #60a5fa;
        }
        .status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            background: #1e293b;
        }
        .connected { border-left: 5px solid #10b981; }
        .disconnected { border-left: 5px solid #ef4444; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            font-family: monospace;
        }
    </style>
    
    <!-- 중요한 부분: 여기에 직접 JavaScript 작성 -->
    <script>
    // TL Platform 백엔드 설정 - 인라인으로 작성하여 파일 로드 문제 해결
    const TL_BACKEND = 'https://timelink-backend.timelink-api.workers.dev';
    
    console.log('✅ TL Platform 로드됨');
    console.log('🔗 백엔드:', TL_BACKEND);
    console.log('🕒 시간:', new Date().toISOString());
    
    // API 호출 함수
    async function callAPI(endpoint) {
        const url = TL_BACKEND + endpoint;
        console.log('📡 요청:', url);
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            return {
                ok: response.ok,
                status: response.status,
                text: text,
                url: url
            };
        } catch (error) {
            return {
                ok: false,
                error: error.message,
                url: url
            };
        }
    }
    
    // 페이지 로드 시 실행
    window.onload = async function() {
        console.log('🚀 페이지 로드 완료');
        
        // 상태 표시
        const statusEl = document.getElementById('status');
        statusEl.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> 백엔드 연결 확인 중...</p>';
        
        // 백엔드 테스트
        const result = await callAPI('/');
        
        if (result.ok) {
            statusEl.innerHTML = `
                <p><i class="fas fa-check-circle" style="color:#10b981"></i> ✅ 백엔드 연결 성공!</p>
                <p><strong>URL:</strong> ${TL_BACKEND}</p>
                <p><strong>응답:</strong> ${result.text.substring(0, 100)}...</p>
            `;
            statusEl.className = 'status connected';
        } else {
            statusEl.innerHTML = `
                <p><i class="fas fa-times-circle" style="color:#ef4444"></i> ❌ 백엔드 연결 실패</p>
                <p><strong>오류:</strong> ${result.error || '연결 실패'}</p>
            `;
            statusEl.className = 'status disconnected';
        }
        
        document.getElementById('result').innerHTML = `
            <h3>테스트 결과:</h3>
            <p><strong>백엔드 URL:</strong> ${TL_BACKEND}</p>
            <p><strong>상태:</strong> ${result.ok ? '연결됨 ✅' : '연결 실패 ❌'}</p>
            <p><strong>응답:</strong> ${JSON.stringify(result, null, 2)}</p>
        `;
    };
    </script>
</head>
<body>
    <div class="container">
        <h1>🔧 TL Platform - 캐시 문제 해결 버전</h1>
        <p>이 페이지는 모든 캐시를 무시하고 새로 로드됩니다.</p>
        
        <div id="status" class="status">
            초기화 중...
        </div>
        
        <div>
            <button onclick="location.reload(true)">🔄 강제 새로고침 (Ctrl+F5)</button>
            <button onclick="testAllEndpoints()">🧪 전체 엔드포인트 테스트</button>
        </div>
        
        <div id="result">
            결과가 여기에 표시됩니다...
        </div>
        
        <div style="margin-top: 40px; padding: 20px; background: #1e293b; border-radius: 10px;">
            <h3>문제 해결 방법:</h3>
            <ol>
                <li><strong>브라우저 캐시 삭제:</strong> Ctrl+Shift+Delete</li>
                <li><strong>하드 리로드:</strong> Ctrl+F5 또는 Ctrl+Shift+R</li>
                <li><strong>시크릿 모드에서 열기:</strong> Ctrl+Shift+N</li>
                <li><strong>다른 브라우저로 시도</strong></li>
            </ol>
        </div>
    </div>
    
    <script>
    // 추가 테스트 함수
    async function testAllEndpoints() {
        const resultEl = document.getElementById('result');
        resultEl.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> 테스트 중...</p>';
        
        const endpoints = ['/', '/health', '/api', '/api/health', '/api/auth/login'];
        let results = [];
        
        for (const endpoint of endpoints) {
            const result = await callAPI(endpoint);
            results.push({
                endpoint: endpoint,
                status: result.status || 'N/A',
                ok: result.ok,
                preview: result.text ? result.text.substring(0, 100) : 'No response'
            });
        }
        
        let html = '<h3>전체 엔드포인트 테스트 결과:</h3>';
        results.forEach(r => {
            html += `
                <div style="margin: 10px 0; padding: 10px; background: ${r.ok ? '#064e3b' : '#7f1d1d'}; border-radius: 5px;">
                    <strong>${r.endpoint}</strong>: 
                    <span style="color: ${r.ok ? '#10b981' : '#ef4444'}">
                        ${r.ok ? '✅ 성공' : '❌ 실패'} (${r.status})
                    </span>
                    <br>
                    <small>${r.preview}</small>
                </div>
            `;
        });
        
        resultEl.innerHTML = html;
    }
    </script>
</body>
</html>
