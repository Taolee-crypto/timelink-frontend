<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TIMELINK API 디버그</title>
</head>
<body>
    <h1>🔍 TIMELINK API 디버그</h1>
    
    <div>
        <h3>1. API 직접 호출 테스트</h3>
        <button onclick="testRawApi()">📡 API 직접 호출</button>
        <div id="raw-result" style="margin:10px; padding:10px; border:1px solid #ccc;"></div>
    </div>
    
    <div>
        <h3>2. 요청/응답 확인</h3>
        <button onclick="inspectRequest()">🔍 요청 상세보기</button>
        <div id="inspect-result" style="margin:10px; padding:10px; border:1px solid #ccc;"></div>
    </div>

<script>
const API_BASE = 'https://timelink-api.timelink-api.workers.dev';

// 1. API 직접 호출 테스트
async function testRawApi() {
    console.clear();
    console.log('=== API 직접 호출 테스트 시작 ===');
    
    // 1. OPTIONS 요청 (CORS 확인)
    try {
        console.log('1. OPTIONS 요청 (CORS 확인)');
        const optionsRes = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'OPTIONS'
        });
        console.log('OPTIONS 응답:', optionsRes.status, optionsRes.headers);
    } catch (e) {
        console.log('OPTIONS 실패:', e);
    }
    
    // 2. POST 요청 시도 (빈 데이터)
    try {
        console.log('2. POST 요청 (빈 데이터)');
        const postRes = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({})
        });
        console.log('POST 응답 상태:', postRes.status);
        const postData = await postRes.text();
        console.log('POST 응답 본문:', postData);
        
        document.getElementById('raw-result').innerHTML = `
            <strong>응답 상태:</strong> ${postRes.status}<br>
            <strong>응답 본문:</strong> ${postData}<br>
            <strong>헤더:</strong> ${JSON.stringify([...postRes.headers.entries()])}
        `;
    } catch (e) {
        console.log('POST 실패:', e);
        document.getElementById('raw-result').innerHTML = `에러: ${e.message}`;
    }
    
    // 3. GET 요청 (존재하는 엔드포인트 확인)
    try {
        console.log('3. GET /api/health 체크');
        const healthRes = await fetch(`${API_BASE}/api/health`);
        console.log('Health 응답:', healthRes.status);
    } catch (e) {
        console.log('Health 체크 실패:', e);
    }
}

// 2. 요청 상세보기
async function inspectRequest() {
    const testData = {
        email: 'debug@test.com',
        password: 'debug123'
    };
    
    console.log('=== 요청 상세정보 ===');
    console.log('URL:', `${API_BASE}/api/auth/login`);
    console.log('메소드: POST');
    console.log('헤더:', {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
    });
    console.log('본문:', testData);
    
    // fetch 사용
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(testData),
            signal: controller.signal,
            mode: 'cors',
            credentials: 'omit'
        });
        
        clearTimeout(timeoutId);
        
        console.log('=== 응답 정보 ===');
        console.log('상태:', response.status, response.statusText);
        console.log('헤더:', Object.fromEntries([...response.headers.entries()]));
        
        const text = await response.text();
        console.log('본문(텍스트):', text);
        
        // JSON 파싱 시도
        try {
            const json = JSON.parse(text);
            console.log('본문(JSON):', json);
        } catch (e) {
            console.log('본문이 JSON이 아님');
        }
        
        document.getElementById('inspect-result').innerHTML = `
            <strong>상태:</strong> ${response.status} ${response.statusText}<br>
            <strong>헤더:</strong> <pre>${JSON.stringify(Object.fromEntries([...response.headers.entries()]), null, 2)}</pre><br>
            <strong>본문:</strong> <pre>${text}</pre>
        `;
        
    } catch (error) {
        console.log('=== 요청 실패 ===');
        console.log('에러:', error);
        
        if (error.name === 'AbortError') {
            console.log('타임아웃: 서버 응답이 없음');
            document.getElementById('inspect-result').innerHTML = '⏰ 타임아웃: 서버가 응답하지 않습니다';
        } else {
            document.getElementById('inspect-result').innerHTML = `❌ 에러: ${error.message}`;
        }
    }
}

// 콘솔에 모든 로그 출력
console.log('🎯 디버그 페이지 로드됨');
console.log('API 주소:', API_BASE);
console.log('F12를 눌러 콘솔을 확인하세요');
console.log('1. "API 직접 호출" 버튼 클릭');
console.log('2. 네트워크 탭에서 요청 확인');
</script>
</body>
</html>
