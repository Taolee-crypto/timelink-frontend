<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - Quantum-Safe Digital Content Platform</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0066FF;
            --secondary-teal: #00D4AA;
            --accent-purple: #9D4EDD;
            --dark-bg: #0A0F2B;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--white);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-nav {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 0 1rem;
        }

        .nav-link {
            color: var(--gray-text);
            text-decoration: none;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            background: rgba(157, 78, 221, 0.1);
            color: var(--accent-purple);
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .auth-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .auth-button {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: #0066FF;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .auth-button.signup {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border-color: transparent;
            color: white;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--gray-text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            padding: 180px 0 120px;
            background: linear-gradient(135deg, #0A0F2B, #1E293B);
            position: relative;
            margin-top: 70px;
        }

        .hero-content {
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #FFFFFF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: var(--gray-text);
            margin-bottom: 2.5rem;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 3rem 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--gray-text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }
            
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .stats {
                flex-direction: column;
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-content">
            <!-- Logo -->
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>

            <!-- Navigation -->
            <nav class="main-nav">
                <a href="index.html" class="nav-link active">
                    <i class="fas fa-home"></i> HOME
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-sliders-h"></i> STUDIO
                </a>
                <a href="shareplace.html" class="nav-link">
                    <i class="fas fa-store"></i> SHAREPLACE
                </a>
                <a href="tltube.html" class="nav-link">
                    <i class="fas fa-play-circle"></i> TLTUBE
                </a>
                <a href="tlmusic.html" class="nav-link">
                    <i class="fas fa-music"></i> TLMUSIC
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user"></i> PROFILE
                </a>
            </nav>

            <!-- User Section -->
            <div class="user-section">
                <div class="auth-buttons">
                    <a href="login.html" class="auth-button">
                        <i class="fas fa-sign-in-alt"></i> 로그인
                    </a>
                    <a href="signup.html" class="auth-button signup">
                        <i class="fas fa-user-plus"></i> 회원가입
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title">모든 콘텐츠에<br>시간을 담다</h1>
                <p class="hero-subtitle">
                    음악, 영상, 이미지, 문서, 전자책을 양자내성 암호화로 보호하고<br>
                    시간 단위로 거래하는 혁신적인 디지털 콘텐츠 플랫폼
                </p>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-number">5</span>
                        <span class="stat-label">콘텐츠 형식</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">∞</span>
                        <span class="stat-label">보안 레벨</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">5:5</span>
                        <span class="stat-label">수익 분배</span>
                    </div>
                </div>

                <div class="cta-buttons">
                    <a href="signup.html" class="btn btn-primary">
                        <i class="fas fa-gift"></i> 무료로 시작하기 (10,000TL 보너스)
                    </a>
                    <a href="studio.html" class="btn btn-secondary">
                        <i class="fas fa-play"></i> 체험해보기
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 간단한 헤더 상태 관리
        document.addEventListener('DOMContentLoaded', function() {
            console.log('TIMELINK 메인 페이지 로드됨');
            
            // localStorage에서 로그인 상태 확인
            const userData = localStorage.getItem('tl_user');
            const authButtons = document.querySelector('.auth-buttons');
            const userSection = document.querySelector('.user-section');
            
            if (userData) {
                // 로그인 상태
                const user = JSON.parse(userData);
                authButtons.style.display = 'none';
                
                // 사용자 아바타 추가
                const userAvatar = document.createElement('div');
                userAvatar.className = 'user-avatar';
                userAvatar.innerHTML = `<i class="fas fa-user"></i>`;
                userAvatar.title = user.name || user.email;
                userAvatar.onclick = function() {
                    window.location.href = 'profile.html';
                };
                userSection.appendChild(userAvatar);
            }
        });
    </script>
</body>
</html>
