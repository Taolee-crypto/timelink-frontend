<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TL Platform - 통합 웹3.0 플랫폼</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        /* ... 기존 스타일 유지 ... */
    </style>
</head>
<body>
    <!-- ... 기존 HTML 내용 유지 ... -->
    
    <!-- 언어 스크립트 -->
    <script src="js/language.js?v=20251204"></script>
    
    <!-- Config.js를 인라인으로 포함 -->
    <script>
    console.log('🚀 Config.js 인라인 로드 시작');
    
    // ============================================
    // TL Platform API 설정 - 인라인 버전
    // ============================================
    
    // 🔥 중요한 설정: 백엔드 URL
    const BACKEND_URL = 'https://timelink-backend.timelink-api.workers.dev';
    const CONFIG_VERSION = '20251204-INLINE';
    
    console.log('=====================================');
    console.log('🚀 TL Platform API 설정 로드됨 (인라인)');
    console.log('📅 버전:', CONFIG_VERSION);
    console.log('🔗 백엔드 URL:', BACKEND_URL);
    console.log('🌐 현재 페이지:', window.location.href);
    console.log('=====================================');
    
    // API 요청 함수
    async function apiRequest(endpoint, options = {}) {
        let url;
        if (endpoint.startsWith('http')) {
            url = endpoint;
        } else {
            url = BACKEND_URL + endpoint;
        }
        
        console.log(`📡 API 요청: ${endpoint} → ${url}`);
        
        try {
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers,
                },
            });
            
            console.log(`📥 응답: ${response.status} ${response.statusText}`);
            
            const text = await response.text();
            
            if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
                try {
                    return JSON.parse(text);
                } catch (e) {
                    console.warn('JSON 파싱 실패:', e.message);
                    return { 
                        text: text.substring(0, 200), 
                        error: 'Invalid JSON',
                        status: response.status 
                    };
                }
            } else {
                return { text: text, status: response.status };
            }
        } catch (error) {
            console.error('❌ 네트워크 오류:', error.message);
            return { 
                error: error.message, 
                status: 0,
                url: url
            };
        }
    }
    
    // 건강 상태 확인
    async function checkSystemHealth() {
        console.log('🩺 건강 상태 확인 시작');
        
        const endpoints = ['/', '/health', '/api/health', '/api'];
        
        for (const endpoint of endpoints) {
            console.log(`테스트: ${endpoint}`);
            const result = await apiRequest(endpoint);
            
            if (result && !result.error && result.status === 200) {
                console.log(`✅ 성공: ${endpoint}`);
                return {
                    healthy: true,
                    endpoint: endpoint,
                    data: result,
                    backend: BACKEND_URL
                };
            }
        }
        
        console.error('❌ 모든 경로 실패');
        return {
            healthy: false,
            backend: BACKEND_URL,
            error: 'Connection failed'
        };
    }
    
    // API 초기화
    async function initAPI() {
        console.log('🚀 API 초기화 시작');
        
        const health = await checkSystemHealth();
        
        if (health.healthy) {
            console.log('✅ 백엔드 연결 성공');
            return {
                healthy: true,
                url: BACKEND_URL,
                health: health
            };
        } else {
            console.error('❌ 백엔드 연결 실패');
            return {
                healthy: false,
                url: BACKEND_URL,
                error: health.error
            };
        }
    }
    
    // 글로벌 TLAPI 객체
    window.TLAPI = {
        init: initAPI,
        request: apiRequest,
        checkHealth: checkSystemHealth,
        url: BACKEND_URL,
        version: CONFIG_VERSION
    };
    
    console.log('📱 TLAPI 설정 완료 (인라인)');
    </script>
    
    <!-- 메인 초기화 스크립트 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
    // TL Platform 메인 초기화
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🌟 TL Platform 메인 초기화 시작');
        
        // 언어 설정
        const savedLang = localStorage.getItem('tl_language') || 'ko';
        console.log('🌐 언어 설정:', savedLang);
        
        if (typeof applyLanguage === 'function') {
            applyLanguage(savedLang);
        }
        
        // API 초기화
        console.log('🔌 API 초기화 시작...');
        
        if (typeof TLAPI !== 'undefined') {
            TLAPI.init().then(function(apiResult) {
                console.log('💡 API 초기화 결과:', apiResult.healthy ? '성공' : '실패');
                
                if (apiResult.healthy) {
                    console.log('🎉 시스템 정상 작동!');
                    toastr.success('시스템 연결 성공!');
                } else {
                    console.warn('⚠️ 오프라인 모드');
                    toastr.warning('오프라인 모드로 전환됨');
                }
            }).catch(function(error) {
                console.error('💥 API 초기화 실패:', error);
                toastr.error('시스템 연결 실패');
            });
        } else {
            console.error('❌ TLAPI 객체 없음');
            toastr.error('API 시스템 오류');
        }
    });
    </script>
</body>
</html>
