<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>TL Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .connected { background: green; }
        .disconnected { background: red; }
    </style>
    
    <!-- 새로운 API 설정 파일 로드 -->
    <script src="js/api-config.js?v=20251204-final"></script>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-infinity"></i> TL Platform</h1>
        
        <div id="status" class="status">
            <i class="fas fa-spinner fa-spin"></i> 시스템 초기화 중...
        </div>
        
        <div id="content" style="display:none;">
            <h2>주요 기능</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
                <div style="background: #1e293b; padding: 20px; border-radius: 10px;">
                    <h3><i class="fas fa-video"></i> TL STUDIO</h3>
                    <p>프로페셔널 콘텐츠 제작</p>
                </div>
                <div style="background: #1e293b; padding: 20px; border-radius: 10px;">
                    <h3><i class="fas fa-music"></i> TL 뮤직마켓</h3>
                    <p>블록체인 음원 거래</p>
                </div>
                <div style="background: #1e293b; padding: 20px; border-radius: 10px;">
                    <h3><i class="fas fa-film"></i> TL 튜브</h3>
                    <p>수익 공유형 영상 플랫폼</p>
                </div>
            </div>
            
            <div style="margin-top: 40px;">
                <button onclick="testBackend()" style="padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    <i class="fas fa-plug"></i> 백엔드 연결 테스트
                </button>
                <button onclick="location.href='auth.html'" style="padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">
                    <i class="fas fa-user"></i> 로그인/회원가입
                </button>
            </div>
        </div>
        
        <div id="result" style="margin-top: 20px; padding: 20px; background: #1e293b; border-radius: 10px; display: none;"></div>
    </div>
    
    <script>
    // 메인 초기화
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('=== TL Platform 시작 ===');
        
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('content');
        const resultEl = document.getElementById('result');
        
        // TL_PLATFORM 객체 확인
        if (typeof TL_PLATFORM === 'undefined') {
            statusEl.innerHTML = '<i class="fas fa-times-circle"></i> API 설정 파일 로드 실패';
            statusEl.className = 'status disconnected';
            return;
        }
        
        console.log('TL_PLATFORM 객체:', TL_PLATFORM.config.url);
        
        // API 초기화
        try {
            const api = await TL_PLATFORM.api.init();
            
            if (api.ready) {
                statusEl.innerHTML = '<i class="fas fa-check-circle"></i> 시스템 정상 작동 중';
                statusEl.className = 'status connected';
                contentEl.style.display = 'block';
                
                console.log('✅ 초기화 성공:', api);
                resultEl.innerHTML = `<p>백엔드 연결 성공: ${api.backend}</p>`;
                resultEl.style.display = 'block';
            } else {
                statusEl.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 오프라인 모드';
                statusEl.className = 'status disconnected';
                contentEl.style.display = 'block';
                
                console.log('⚠️ 오프라인 모드:', api.error);
                resultEl.innerHTML = `<p>오프라인 모드: ${api.error || '연결 실패'}</p>`;
                resultEl.style.display = 'block';
            }
        } catch (error) {
            statusEl.innerHTML = '<i class="fas fa-times-circle"></i> 초기화 오류';
            statusEl.className = 'status disconnected';
            console.error('초기화 오류:', error);
        }
    });
    
    // 백엔드 테스트 함수
    async function testBackend() {
        const resultEl = document.getElementById('result');
        resultEl.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> 테스트 중...</p>';
        
        if (typeof TL_PLATFORM !== 'undefined') {
            const test = await TL_PLATFORM.api.request('/');
            resultEl.innerHTML = `
                <h3>백엔드 테스트 결과</h3>
                <p>URL: ${TL_PLATFORM.config.url}</p>
                <p>응답: ${JSON.stringify(test).substring(0, 200)}</p>
            `;
        } else {
            resultEl.innerHTML = '<p>API 설정 파일이 로드되지 않았습니다.</p>';
        }
    }
    </script>
</body>
</html>
