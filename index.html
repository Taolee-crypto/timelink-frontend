<!DOCTYPE html>
<!-- 
  TL Platform - 캐시 문제 완전 해결 버전
  이 파일에는 외부 JavaScript 파일이 전혀 없습니다.
  모든 코드가 인라인으로 작성되었습니다.
-->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 캐시 완전 차단 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    
    <title>TL Platform :: 통합 웹3.0 플랫폼</title>
    
    <style>
        /* 모든 스타일 인라인 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #334155;
            margin-bottom: 40px;
        }
        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .tagline {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .status-box {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            border-left: 5px solid #3b82f6;
        }
        .status-box h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #f1f5f9;
        }
        .btn {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #3b82f6;
        }
        .test-results {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
            display: none;
        }
        .result-item {
            padding: 15px;
            margin: 10px 0;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }
        .success { border-left-color: #10b981; }
        .error { border-left-color: #ef4444; }
        .endpoint-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        .endpoint-card {
            background: rgba(30, 41, 59, 0.7);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s;
        }
        .endpoint-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .endpoint-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #60a5fa;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #334155;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        #debug {
            margin-top: 30px;
            padding: 20px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
        }
    </style>
    
    <!-- Font Awesome (유일한 외부 리소스) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-infinity"></i> TL Platform
            </div>
            <p class="tagline">TL STUDIO, TL 뮤직마켓, TL 튜브를 하나의 플랫폼에서 경험하세요</p>
            
            <div class="status-box" id="statusBox">
                <h3><i class="fas fa-satellite-dish"></i> 시스템 상태</h3>
                <div id="statusText">
                    <p><i class="fas fa-spinner fa-spin"></i> 초기화 중...</p>
                </div>
            </div>
        </header>
        
        <main>
            <div style="text-align: center; margin: 30px 0;">
                <button class="btn" onclick="runConnectionTest()">
                    <i class="fas fa-bolt"></i> 백엔드 연결 테스트
                </button>
                <button class="btn btn-secondary" onclick="clearCacheAndReload()">
                    <i class="fas fa-sync-alt"></i> 캐시 삭제 & 새로고침
                </button>
            </div>
            
            <div class="endpoint-list">
                <div class="endpoint-card">
                    <div class="endpoint-icon">
                        <i class="fas fa-video"></i>
                    </div>
                    <h3>TL STUDIO</h3>
                    <p>프로페셔널 콘텐츠 제작 스튜디오</p>
                </div>
                <div class="endpoint-card">
                    <div class="endpoint-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <h3>TL 뮤직마켓</h3>
                    <p>블록체인 기반 음원 거래 플랫폼</p>
                </div>
                <div class="endpoint-card">
                    <div class="endpoint-icon">
                        <i class="fas fa-film"></i>
                    </div>
                    <h3>TL 튜브</h3>
                    <p>수익 공유형 영상 플랫폼</p>
                </div>
            </div>
            
            <div class="test-results" id="testResults">
                <h3><i class="fas fa-clipboard-check"></i> 테스트 결과</h3>
                <div id="resultsContainer"></div>
            </div>
            
            <div id="debug">
                <h3><i class="fas fa-bug"></i> 디버그 정보</h3>
                <p id="debugInfo"></p>
            </div>
        </main>
        
        <footer>
            <p>© 2024 TL Platform. 모든 권리 보유.</p>
            <p style="margin-top: 10px;">블록체인 기반 통합 웹3.0 플랫폼</p>
            <p style="margin-top: 5px; font-size: 0.8rem; opacity: 0.7;">
                페이지 버전: <span id="pageVersion">20251204-final</span>
                | 로드 시간: <span id="loadTime"></span>
            </p>
        </footer>
    </div>
    
    <!-- 모든 JavaScript 코드 인라인 -->
    <script>
    // ============================================
    // TL Platform - 모든 코드 인라인 버전
    // ============================================
    
    // 백엔드 URL 설정
    const BACKEND_URL = 'https://timelink-backend.timelink-api.workers.dev';
    const PAGE_VERSION = '20251204-INLINE-ONLY';
    
    // 로드 시간 기록
    const loadTime = new Date();
    document.getElementById('loadTime').textContent = loadTime.toLocaleTimeString();
    document.getElementById('pageVersion').textContent = PAGE_VERSION;
    
    console.log('==========================================');
    console.log('🚀 TL Platform 시작');
    console.log('📅 버전:', PAGE_VERSION);
    console.log('🔗 백엔드:', BACKEND_URL);
    console.log('🕒 로드 시간:', loadTime.toISOString());
    console.log('🌐 페이지 URL:', window.location.href);
    console.log('==========================================');
    
    // 상태 업데이트 함수
    function updateStatus(message, type = 'info') {
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        
        const icons = {
            info: 'fa-info-circle',
            success: 'fa-check-circle',
            error: 'fa-times-circle',
            warning: 'fa-exclamation-triangle'
        };
        
        const colors = {
            info: '#3b82f6',
            success: '#10b981',
            error: '#ef4444',
            warning: '#f59e0b'
        };
        
        statusBox.style.borderLeftColor = colors[type];
        statusText.innerHTML = `
            <p><i class="fas ${icons[type]}" style="color: ${colors[type]}"></i> ${message}</p>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-top: 10px;">
                백엔드: ${BACKEND_URL}<br>
                버전: ${PAGE_VERSION}
            </p>
        `;
    }
    
    // API 호출 함수
    async function callEndpoint(endpoint) {
        const url = BACKEND_URL + endpoint;
        const startTime = Date.now();
        
        console.log(`📡 호출: ${endpoint}`);
        console.log(`🔗 URL: ${url}`);
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            const response = await fetch(url, {
                signal: controller.signal,
                headers: {
                    'Accept': 'application/json',
                    'Cache-Control': 'no-cache'
                }
            });
            
            clearTimeout(timeoutId);
            const duration = Date.now() - startTime;
            const text = await response.text();
            
            console.log(`📥 응답: ${response.status} (${duration}ms)`);
            
            return {
                endpoint: endpoint,
                url: url,
                status: response.status,
                ok: response.ok,
                duration: duration,
                text: text,
                isJson: text.trim().startsWith('{') || text.trim().startsWith('['),
                timestamp: new Date().toISOString()
            };
        } catch (error) {
            console.error(`❌ 오류: ${error.message}`);
            return {
                endpoint: endpoint,
                url: url,
                status: 0,
                ok: false,
                error: error.message,
                timestamp: new Date().toISOString()
            };
        }
    }
    
    // 연결 테스트 실행
    async function runConnectionTest() {
        updateStatus('백엔드 연결 테스트 중...', 'info');
        
        const testResults = document.getElementById('testResults');
        const resultsContainer = document.getElementById('resultsContainer');
        testResults.style.display = 'block';
        
        resultsContainer.innerHTML = `
            <div class="result-item">
                <p><i class="fas fa-spinner fa-spin"></i> 테스트 진행 중...</p>
                <p style="font-size: 0.9rem; color: #94a3b8;">
                    백엔드: ${BACKEND_URL}<br>
                    시작 시간: ${new Date().toLocaleTimeString()}
                </p>
            </div>
        `;
        
        // 테스트할 엔드포인트들
        const endpoints = [
            '/',
            '/health',
            '/api/health',
            '/api',
            '/api/auth/login'
        ];
        
        let results = [];
        let anySuccess = false;
        
        for (const endpoint of endpoints) {
            const result = await callEndpoint(endpoint);
            results.push(result);
            
            if (result.ok) anySuccess = true;
            
            // 결과 실시간 표시
            updateResultsDisplay(results);
        }
        
        // 최종 상태 업데이트
        if (anySuccess) {
            updateStatus('✅ 백엔드 연결 성공!', 'success');
        } else {
            updateStatus('❌ 백엔드 연결 실패', 'error');
            showDebugInfo(results);
        }
        
        console.log('테스트 완료:', results);
    }
    
    // 결과 표시 업데이트
    function updateResultsDisplay(results) {
        const container = document.getElementById('resultsContainer');
        
        let html = '<h4>개별 테스트 결과:</h4>';
        
        results.forEach(result => {
            const isSuccess = result.ok;
            const icon = isSuccess ? 'fa-check-circle' : 'fa-times-circle';
            const color = isSuccess ? '#10b981' : '#ef4444';
            const statusText = isSuccess ? '성공' : '실패';
            
            html += `
                <div class="result-item ${isSuccess ? 'success' : 'error'}">
                    <p>
                        <i class="fas ${icon}" style="color: ${color}"></i>
                        <strong>${result.endpoint}</strong> - ${statusText} (${result.status})
                        ${result.duration ? `<span style="float:right;font-size:0.8rem;">${result.duration}ms</span>` : ''}
                    </p>
                    <p style="font-size: 0.85rem; color: #94a3b8; margin-top: 5px;">
                        URL: ${result.url}<br>
                        ${result.isJson ? 'JSON 응답' : '텍스트 응답'}: ${result.text ? result.text.substring(0, 100) + '...' : '없음'}
                    </p>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }
    
    // 디버그 정보 표시
    function showDebugInfo(results) {
        const debugDiv = document.getElementById('debug');
        const debugInfo = document.getElementById('debugInfo');
        
        debugDiv.style.display = 'block';
        
        let info = `
            <p><strong>문제 진단:</strong></p>
            <ul style="margin-left: 20px;">
                <li>백엔드 URL: ${BACKEND_URL}</li>
                <li>페이지 URL: ${window.location.href}</li>
                <li>테스트 시간: ${new Date().toLocaleString()}</li>
                <li>총 테스트 수: ${results.length}</li>
                <li>성공 수: ${results.filter(r => r.ok).length}</li>
            </ul>
            <p style="margin-top: 10px;">
                <strong>권장 조치:</strong><br>
                1. 브라우저 캐시 삭제 (Ctrl+Shift+Delete)<br>
                2. 시크릿 모드에서 테스트<br>
                3. 다른 브�라우저 사용<br>
                4. 네트워크 연결 확인
            </p>
        `;
        
        debugInfo.innerHTML = info;
    }
    
    // 캐시 삭제 및 새로고침
    function clearCacheAndReload() {
        updateStatus('캐시 삭제 및 새로고침 중...', 'warning');
        
        // 로컬 스토리지 클리어
        localStorage.clear();
        sessionStorage.clear();
        
        // 강제 새로고침
        setTimeout(() => {
            window.location.href = window.location.href.split('?')[0] + '?v=' + Date.now();
        }, 1000);
    }
    
    // 페이지 로드 시 자동 테스트
    window.addEventListener('load', function() {
        console.log('페이지 로드 완료, 자동 테스트 시작...');
        updateStatus('시스템 준비 완료', 'info');
        
        // 2초 후 자동 테스트
        setTimeout(runConnectionTest, 2000);
    });
    
    // 페이지 언로드 시 로그
    window.addEventListener('beforeunload', function() {
        console.log('페이지 종료 시간:', new Date().toISOString());
    });
    
    // 에러 핸들링
    window.addEventListener('error', function(event) {
        console.error('전역 오류:', event.error);
        updateStatus('JavaScript 오류 발생', 'error');
    });
    
    </script>
</body>
</html>
