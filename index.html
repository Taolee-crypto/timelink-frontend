<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 시간을 연결하다</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        nav {
            background: rgba(0,0,0,0.3);
            padding: 1rem 2rem;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-menu {
            display: flex;
            gap: 1.5rem;
        }
        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .nav-menu a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .nav-auth a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-login {
            background: transparent;
            border: 2px solid white;
        }
        .btn-login:hover {
            background: white;
            color: #667eea;
        }
        .btn-signup {
            background: #00d4aa;
            border: 2px solid #00d4aa;
        }
        .btn-signup:hover {
            background: #00b894;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 170, 0.4);
        }
        .hero {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 2rem;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        .highlight {
            color: #00d4aa;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .btn-primary, .btn-secondary {
            padding: 1rem 2rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #00d4aa;
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #00b894;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.3);
        }
        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }
        footer {
            text-align: center;
            padding: 2rem;
            background: rgba(0,0,0,0.2);
            margin-top: 5rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⏳ TIMELINK</a>
            <div class="nav-menu">
                <a href="p2p.html">🔗 P2P</a>
                <a href="studio.html">🎬 TL STUDIO</a>
                <a href="music.html">🎵 TL MUSIC PLACE</a>
                <a href="tube.html">▶️ TLTUBE</a>
                <a href="charge.html">⚡ TL CHARGE</a>
                <a href="guide.html">📘 이용방법</a>
            </div>
            <div class="nav-auth">
                <a href="login.html" class="btn-login">로그인</a>
                <a href="signup.html" class="btn-signup">회원가입</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>시간을 연결하다, <span class="highlight">가치를 창출하다</span></h1>
            <p>블록체인 기반 P2P 시간 거래 플랫폼</p>
            <div class="hero-buttons">
                <a href="signup.html" class="btn-primary">무료로 시작하기</a>
                <a href="guide.html" class="btn-secondary">이용방법 보기</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 TIMELINK. 시간을 가치로 연결하는 새로운 경제</p>
    </footer>
</body>
</html>
