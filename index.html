<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - Quantum-Safe Digital Content Platform</title>
    
    <!-- Google Translate -->
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TimeLink 공통 CSS -->
    <link rel="stylesheet" href="styles/common.css">
    
    <!-- 헤더 관리자 (필수) -->
    <script src="header-manager.js"></script>
    
    <style>
        /* 기본 스타일만 남기기 */
        body {
            background-color: #0A0F2B;
            color: white;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .hero {
            padding-top: 120px;
            text-align: center;
            min-height: 100vh;
        }
        
        h1 {
            font-size: 3rem;
            color: #00D4AA;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.2rem;
            color: #94a3b8;
            max-width: 600px;
            margin: 0 auto 2rem;
        }
    </style>
</head>
<body>
    <!-- 헤더는 header-manager.js에서 자동 생성 -->
    
    <section class="hero">
        <div class="container">
            <h1>TIMELINK</h1>
            <p>화면이 하얗게 보인다면 JavaScript 에러가 발생한 것입니다.<br>
            브라우저 콘솔(F12)을 확인해주세요.</p>
            
            <div style="margin-top: 2rem;">
                <a href="login.html" style="background: #0066FF; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin: 0 10px;">
                    로그인 페이지 테스트
                </a>
                <a href="test-simple.html" style="background: #00D4AA; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin: 0 10px;">
                    기본 테스트 페이지
                </a>
            </div>
            
            <div style="margin-top: 3rem; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; max-width: 800px; margin-left: auto; margin-right: auto;">
                <h3>문제 해결 단계:</h3>
                <ol style="text-align: left; display: inline-block;">
                    <li>브라우저에서 F12 키 누르기</li>
                    <li>Console 탭에서 에러 메시지 확인</li>
                    <li>Network 탭에서 header-manager.js 로드 확인</li>
                    <li>Ctrl+F5로 강력 새로고침</li>
                </ol>
            </div>
        </div>
    </section>
    
    <script>
    // 최소한의 JavaScript
    console.log('TIMELINK 인덱스 페이지 로드됨');
    
    // Google 번역 초기화
    function googleTranslateElementInit() {
        if (typeof google !== 'undefined' && google.translate) {
            new google.translate.TranslateElement({
                pageLanguage: 'ko',
                includedLanguages: 'en,ko,ja,zh-CN',
                autoDisplay: false
            }, 'google_translate_element');
        }
    }
    
    // 헤더 관리자 상태 확인
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM 로드 완료');
        if (typeof window.TimeLinkState !== 'undefined') {
            console.log('헤더 관리자 상태:', window.TimeLinkState);
        } else {
            console.warn('헤더 관리자가 로드되지 않음');
        }
    });
    </script>
</body>
</html>
