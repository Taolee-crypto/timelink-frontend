<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - Quantum-Safe Digital Content Platform</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 여기에 원본 스타일 코드 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #0066FF;
            --secondary-teal: #00D4AA;
            --dark-bg: #0A0F2B;
        }
        body { font-family: "Inter", sans-serif; background: var(--dark-bg); color: white; }
    </style>
</head>
<body>
    <!-- 헤더 -->
<header class="main-header">
    <div class="header-content">
        <a href="index.html" class="logo">
            <div class="logo-icon">TL</div>
            <div class="logo-text">TIMELINK</div>
        </a>

        <!-- 모바일 메뉴 버튼 -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>

        <!-- Navigation 메뉴 -->
        <nav class="main-nav" id="mainNav">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i> HOME
            </a>
            <a href="studio.html" class="nav-link">
                <i class="fas fa-sliders-h"></i> STUDIO
            </a>
            <a href="shareplace.html" class="nav-link">
                <i class="fas fa-store"></i> SHAREPLACE
            </a>
            <a href="tltube.html" class="nav-link">
                <i class="fas fa-play-circle"></i> TLTUBE
            </a>
            <a href="tlmusic.html" class="nav-link">
                <i class="fas fa-music"></i> TLMUSIC
            </a>
            <a href="cafe-radio.html" class="nav-link">
                <i class="fas fa-broadcast-tower"></i> CAFE RADIO
            </a>
            <a href="ad-plaza.html" class="nav-link">
                <i class="fas fa-ad"></i> AD PLAZA
            </a>
            <a href="profile.html" class="nav-link">
                <i class="fas fa-user"></i> PROFILE
            </a>
        </nav>

        <div class="user-section">
            <div class="tl-balance" id="walletBtn">
                <div class="tl-icon">TL</div>
                <span id="headerBalanceAmount">0</span>
            </div>
            <div class="user-avatar" id="userMenuBtn">
                <i class="fas fa-user"></i>
            </div>
            
            <!-- 사용자 드롭다운 메뉴 -->
            <div class="user-dropdown" id="userDropdown">
                <!-- 드롭다운 내용은 JavaScript로 동적 생성 -->
            </div>
        </div>
    </div>
</header>
    
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">모든 콘텐츠에<br>시간을 담다</h1>
            <p class="hero-subtitle">음악, 영상, 이미지, 문서, 전자책을 양자내성 암호화로 보호</p>
        </div>
    </section>
</body>
</html>
