<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>순환형 상거래 플랫폼</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel (JSX 변환용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 아이콘 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// 아이콘 직접 정의 (CDN 로딩 문제 방지)
const Icon = ({ name, size = 24, className = "" }) => {
  const icons = {
    TrendingUp: "📈",
    Wallet: "💰",
    Home: "🏠",
    Store: "🏪",
    Briefcase: "💼",
    Mail: "📧",
    Lock: "🔒",
    Eye: "👁️",
    EyeOff: "👁️‍🗨️",
    User: "👤",
    Award: "🏆",
    Calendar: "📅",
    Users: "👥",
    Filter: "⚙️",
    PieChart: "📊",
    ChevronRight: "➡️"
  };
  
  return (
    <span className={`inline-block ${className}`} style={{ fontSize: size }}>
      {icons[name] || "□"}
    </span>
  );
};

// 샘플 사업체 데이터
const SAMPLE_BUSINESSES = [
  {
    id: 'biz001',
    name: '더블샷 커피 강남점',
    type: '카페',
    category: '푸드&베버리지',
    monthlyRevenue: 20000000,
    targetAmount: 150000000,
    currentAmount: 45000000,
    revenueShareRate: 5,
    termBonuses: { 3:0,6:0.5,9:1.0,12:1.5 },
    description: '강남역 1번 출구 인근 프리미엄 커피 전문점',
    location: '서울 강남구',
    investors: 45,
    progress: 30,
    riskLevel: '중',
    expectedAnnualReturn: '15-25%'
  },
  {
    id: 'biz002',
    name: '헬스앤요가 피트니스',
    type: '헬스장',
    category: '헬스&웰니스',
    monthlyRevenue: 30000000,
    targetAmount: 200000000,
    currentAmount: 80000000,
    revenueShareRate: 6,
    termBonuses: {3:0,6:0.5,9:1.0,12:1.5},
    description: '최신 피트니스 장비와 전문 트레이너 보유',
    location: '서울 서초구',
    investors: 78,
    progress: 40,
    riskLevel: '중',
    expectedAnnualReturn: '18-30%'
  }
];

function App() {
  const [appState, setAppState] = useState('splash');
  const [loginForm, setLoginForm] = useState({email:'test@test.com',password:'1234'});
  const [currentUser, setCurrentUser] = useState(null);
  const [myInvestments, setMyInvestments] = useState([]);
  const [activeTab, setActiveTab] = useState('home');

  // Splash 2초
  useEffect(() => {
    const t = setTimeout(() => setAppState('auth'), 2000);
    return () => clearTimeout(t);
  }, []);

  // 로그인
  const handleLogin = () => {
    const user = {
      id: 'user_demo', 
      name: '홍길동', 
      userType: 'investor',
      email: loginForm.email,
      joinDate: '2023-05-10'
    };
    setCurrentUser(user);
    setAppState('main');
    
    // 샘플 투자 데이터
    const investments = [{
      id: 'inv001', 
      businessId: 'biz001', 
      amount: 30000000, 
      percentage: 20, 
      term: 6,
      date: '2023-10-15',
      nextPayout: '2023-11-15',
      status: 'active'
    }];
    setMyInvestments(investments);
  };

  // 투자 월 수익 계산
  const calculateMonthlyReturn = (inv) => {
    const biz = SAMPLE_BUSINESSES.find(b => b.id === inv.businessId);
    if(!biz) return 0;
    const baseRate = biz.revenueShareRate / 100;
    const bonusRate = biz.termBonuses[inv.term] / 100;
    return Math.floor(biz.monthlyRevenue * (baseRate + bonusRate) * (inv.percentage / 100));
  };

  // 총 투자 금액 계산
  const totalInvested = myInvestments.reduce((sum, inv) => sum + inv.amount, 0);
  // 총 월 수익 계산
  const totalMonthlyReturns = myInvestments.reduce((sum, inv) => sum + calculateMonthlyReturn(inv), 0);

  if(appState === 'splash'){
    return (
      <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-blue-600 to-purple-600 text-white">
        <div className="text-center animate-bounce mb-6">
          <Icon name="TrendingUp" size={80} className="mx-auto mb-4"/>
          <h1 className="text-5xl font-bold mb-2">순환형 상거래</h1>
          <p className="text-xl opacity-90">함께 성장하는 투자 플랫폼</p>
        </div>
      </div>
    );
  }

  if(appState === 'auth'){
    return (
      <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-purple-50 p-6">
        <div className="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
          <div className="text-center mb-8">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-r from-blue-500 to-purple-600 mb-4">
              <Icon name="TrendingUp" size={32} className="text-white"/>
            </div>
            <h1 className="text-3xl font-bold text-gray-800 mb-2">순환형 상거래</h1>
            <p className="text-gray-600">로그인하여 투자를 시작하세요</p>
          </div>
          
          <div className="mb-6">
            <label className="block text-sm font-medium text-gray-700 mb-1">이메일</label>
            <div className="relative">
              <Icon name="Mail" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
              <input 
                type="email" 
                value={loginForm.email} 
                onChange={e => setLoginForm({...loginForm, email: e.target.value})}
                className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" 
                placeholder="example@email.com"
              />
            </div>
          </div>
          
          <div className="mb-6">
            <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
            <div className="relative">
              <Icon name="Lock" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"/>
              <input 
                type="password" 
                value={loginForm.password} 
                onChange={e => setLoginForm({...loginForm, password: e.target.value})}
                className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" 
                placeholder="비밀번호"
              />
            </div>
          </div>
          
          <button 
            onClick={handleLogin} 
            className="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition shadow-md mb-4"
          >
            로그인
          </button>
          
          <div className="text-center text-sm text-gray-600">
            <p>계정이 없으신가요? <button className="text-blue-600 font-medium">회원가입</button></p>
          </div>
        </div>
      </div>
    );
  }

  if(appState === 'main'){
    return (
      <div className="min-h-screen bg-gray-50">
        {/* 상단 헤더 */}
        <header className="bg-white shadow-sm p-4">
          <div className="flex justify-between items-center">
            <div className="flex items-center">
              <Icon name="TrendingUp" size={28} className="text-blue-600 mr-2"/>
              <h1 className="text-xl font-bold text-gray-800">순환형 상거래</h1>
            </div>
            <div className="flex items-center space-x-4">
              <Icon name="Wallet" size={22} className="text-gray-600"/>
              <Icon name="User" size={22} className="text-gray-600"/>
            </div>
          </div>
        </header>

        {/* 사용자 정보 섹션 */}
        <div className="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-6">
          <div className="flex justify-between items-start">
            <div>
              <h1 className="text-2xl font-bold">{currentUser.name}님, 환영합니다!</h1>
              <p className="opacity-90 mt-1">투자로 함께 성장하는 순환 경제</p>
            </div>
            <div className="bg-white/20 rounded-full p-2">
              <Icon name="User" size={24}/>
            </div>
          </div>
          
          <div className="grid grid-cols-2 gap-4 mt-6">
            <div className="bg-white/20 backdrop-blur-sm rounded-xl p-4">
              <div className="flex items-center mb-2">
                <Icon name="Wallet" size={18} className="mr-2"/>
                <div className="text-sm">총 투자금</div>
              </div>
              <div className="text-xl font-bold">{(totalInvested/10000).toLocaleString()} 만원</div>
            </div>
            
            <div className="bg-white/20 backdrop-blur-sm rounded-xl p-4">
              <div className="flex items-center mb-2">
                <Icon name="TrendingUp" size={18} className="mr-2"/>
                <div className="text-sm">월 예상 수익</div>
              </div>
              <div className="text-xl font-bold">{(totalMonthlyReturns/10000).toLocaleString()} 만원</div>
            </div>
          </div>
        </div>

        {/* 네비게이션 탭 */}
        <div className="flex bg-white border-b">
          <button 
            className={`flex-1 py-4 text-center font-medium ${activeTab === 'home' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
            onClick={() => setActiveTab('home')}
          >
            <Icon name="Home" className="inline mr-2" size={18}/>
            홈
          </button>
          <button 
            className={`flex-1 py-4 text-center font-medium ${activeTab === 'invest' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
            onClick={() => setActiveTab('invest')}
          >
            <Icon name="Store" className="inline mr-2" size={18}/>
            투자하기
          </button>
          <button 
            className={`flex-1 py-4 text-center font-medium ${activeTab === 'my' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500'}`}
            onClick={() => setActiveTab('my')}
          >
            <Icon name="Briefcase" className="inline mr-2" size={18}/>
            내 투자
          </button>
        </div>

        {/* 메인 컨텐츠 */}
        <main className="p-4">
          {activeTab === 'home' && (
            <div className="space-y-6">
              <div className="bg-white rounded-xl shadow p-5">
                <h2 className="text-xl font-bold mb-4">내 투자 현황</h2>
                {myInvestments.length > 0 ? (
                  <div className="space-y-4">
                    {myInvestments.map(inv => {
                      const biz = SAMPLE_BUSINESSES.find(b => b.id === inv.businessId);
                      const monthlyReturn = calculateMonthlyReturn(inv);
                      return (
                        <div key={inv.id} className="border border-gray-200 rounded-lg p-4 hover:shadow-md transition">
                          <div className="flex justify-between items-start">
                            <div>
                              <div className="font-bold text-lg">{biz.name}</div>
                              <div className="text-sm text-gray-600 mt-1">{biz.type}</div>
                            </div>
                            <div className="text-right">
                              <div className="font-bold text-blue-600">{(monthlyReturn/10000).toLocaleString()}만원/월</div>
                              <div className="text-sm text-gray-600">{(inv.amount/10000).toLocaleString()}만원 투자</div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="text-center py-8 text-gray-500">
                    <Icon name="Wallet" size={48} className="mx-auto mb-4 text-gray-300"/>
                    <p>아직 투자한 프로젝트가 없습니다.</p>
                    <button 
                      onClick={() => setActiveTab('invest')}
                      className="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg"
                    >
                      투자하기
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {activeTab === 'invest' && (
            <div>
              <h2 className="text-xl font-bold mb-6">투자 가능한 프로젝트</h2>
              
              <div className="grid grid-cols-1 gap-6">
                {SAMPLE_BUSINESSES.map(biz => (
                  <div key={biz.id} className="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-xl transition">
                    <div className="p-5">
                      <div className="flex justify-between items-start mb-4">
                        <div>
                          <h3 className="font-bold text-lg">{biz.name}</h3>
                          <div className="text-sm text-gray-600">{biz.type} • {biz.location}</div>
                        </div>
                        <div className={`px-2 py-1 rounded text-xs font-medium ${
                          biz.riskLevel === '중' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'
                        }`}>
                          {biz.riskLevel}위험
                        </div>
                      </div>
                      
                      <div className="mb-4">
                        <div className="flex justify-between text-sm mb-1">
                          <span className="text-gray-600">모집 금액</span>
                          <span className="font-bold">{(biz.targetAmount/10000).toLocaleString()}만원</span>
                        </div>
                        <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                          <div className="h-full bg-gradient-to-r from-blue-500 to-purple-600 rounded-full" style={{width: `${biz.progress}%`}}></div>
                        </div>
                        <div className="flex justify-between text-xs text-gray-500 mt-1">
                          <span>{(biz.currentAmount/10000).toLocaleString()}만원 모집</span>
                          <span>{biz.progress}%</span>
                        </div>
                      </div>
                      
                      <div className="flex justify-between items-center">
                        <div className="flex items-center text-sm text-gray-600">
                          <Icon name="Users" size={14} className="mr-1"/>
                          <span>{biz.investors}명 투자중</span>
                        </div>
                        <button className="px-5 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-medium rounded-lg hover:opacity-90 transition">
                          투자하기
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {activeTab === 'my' && (
            <div className="space-y-6">
              <div className="bg-white rounded-xl shadow p-5">
                <h2 className="text-xl font-bold mb-4">내 투자 내역</h2>
                {myInvestments.length > 0 ? (
                  <div className="space-y-4">
                    {myInvestments.map(inv => {
                      const biz = SAMPLE_BUSINESSES.find(b => b.id === inv.businessId);
                      const monthlyReturn = calculateMonthlyReturn(inv);
                      
                      return (
                        <div key={inv.id} className="border border-gray-200 rounded-lg p-5 hover:shadow-md transition">
                          <div className="flex flex-col md:flex-row md:items-center justify-between">
                            <div className="mb-4 md:mb-0">
                              <div className="flex items-center">
                                <Icon name="Store" size={20} className="text-blue-600 mr-2"/>
                                <div className="font-bold text-lg">{biz.name}</div>
                              </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                              <div className="text-center">
                                <div className="text-sm text-gray-600">투자금</div>
                                <div className="font-bold">{(inv.amount/10000).toLocaleString()}만원</div>
                              </div>
                              <div className="text-center">
                                <div className="text-sm text-gray-600">월 수익</div>
                                <div className="font-bold text-green-600">{(monthlyReturn/10000).toLocaleString()}만원</div>
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="text-center py-10 text-gray-500">
                    <Icon name="Briefcase" size={64} className="mx-auto mb-4 text-gray-300"/>
                    <p className="text-lg">아직 투자한 프로젝트가 없습니다.</p>
                    <button 
                      onClick={() => setActiveTab('invest')}
                      className="mt-6 px-5 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-medium"
                    >
                      투자하기
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}
        </main>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
