<!DOCTYPE html>
<html>
<body>
    <h2>TimeLink Login Debug</h2>
    <div id="result" style="background:black;color:white;padding:20px;"></div>
    
    <script>
    const log = (msg) => {
        document.getElementById('result').innerHTML += msg + '<br>';
        console.log(msg);
    };
    
    log('Starting debug...');
    
    // Test 1: Health check
    fetch('https://timelink-backend.timelink-api.workers.dev/api/health')
        .then(r => {
            log('✓ Health check status: ' + r.status);
            return r.json();
        })
        .then(data => {
            log('✓ Health data: ' + JSON.stringify(data));
        })
        .catch(e => log('✗ Health error: ' + e));
    
    // Test 2: Login
    setTimeout(() => {
        log('\n--- Testing login ---');
        fetch('https://timelink-backend.timelink-api.workers.dev/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: '당신이메일@example.com',
                password: 'yourpassword123'
            })
        })
        .then(r => {
            log('Login status: ' + r.status);
            return r.json();
        })
        .then(data => {
            log('Login response: ' + JSON.stringify(data));
            if (data.success) {
                log('🎉 LOGIN SUCCESS!');
            } else {
                log('❌ LOGIN FAILED: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(e => log('Network error: ' + e));
    }, 2000);
    </script>
</body>
</html>
