<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - Cafe Radio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="common-component.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0F2B, #1a1f37); 
            color: white; 
            min-height: 100vh;
        }
        
        /* 공통 헤더 */
        .main-header {
            background: rgba(26, 31, 55, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-section a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .logo-section i {
            color: #3b82f6;
            font-size: 1.8rem;
        }
        
        .main-nav {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        
        .nav-link.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        
        .header-right {
            flex: 0 0 auto;
        }
        
        /* 카페 콘텐츠 */
        .cafe-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .cafe-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .cafe-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        /* 카페 대시보드 */
        .cafe-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .dashboard-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .card-value {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        
        .tl-revenue {
            color: #FFD166;
        }
        
        .create-cafe-btn {
            grid-column: 1 / -1;
            padding: 1.5rem;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1));
            border: 2px dashed #8b5cf6;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .create-cafe-btn:hover {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.2));
        }
        
        /* 카페 목록 */
        .cafe-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }
        
        .cafe-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        .cafe-card:hover {
            transform: translateY(-5px);
            border-color: #8b5cf6;
        }
        
        .cafe-banner {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            position: relative;
        }
        
        .cafe-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #10b981;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .cafe-offline {
            background: #6b7280;
        }
        
        .cafe-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            position: absolute;
            bottom: -40px;
            left: 1.5rem;
            border: 4px solid #1a1f37;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .cafe-info {
            padding: 3rem 1.5rem 1.5rem;
        }
        
        .cafe-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .cafe-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .cafe-meta {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        
        .cafe-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .cafe-btn {
            flex: 1;
            padding: 0.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .cafe-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }
        
        .primary-btn {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
        }
        
        /* 라디오 플레이어 */
        .radio-player {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 2rem;
            margin: 3rem 0;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .now-playing {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .album-art {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .track-info h3 {
            margin-bottom: 0.25rem;
        }
        
        .track-info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .control-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            font-size: 1.5rem;
        }
        
        .volume-control {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* 채팅창 */
        .chat-section {
            margin-top: 3rem;
        }
        
        .chat-box {
            height: 300px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 1rem;
            overflow-y: auto;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .chat-message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .chat-input {
            display: flex;
            gap: 0.5rem;
        }
        
        .chat-input input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
        }
        
        @media (max-width: 768px) {
            .header-container {
                padding: 0 1rem;
            }
            
            .main-nav {
                gap: 0.5rem;
            }
            
            .nav-link span {
                display: none;
            }
            
            .cafe-container {
                padding: 1rem;
            }
            
            .cafe-list {
                grid-template-columns: 1fr;
            }
            
            .cafe-dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 공통 헤더 -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html">
                    <i class="fas fa-infinity"></i>
                    <span>TIMELINK</span>
                </a>
            </div>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>홈</span>
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-palette"></i>
                    <span>스튜디오</span>
                </a>
                <a href="tlmusic.html" class="nav-link">
                    <i class="fas fa-music"></i>
                    <span>TL Music</span>
                </a>
                <a href="cafe-radio.html" class="nav-link active">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>Cafe Radio</span>
                </a>
            </nav>
            
            <div class="header-right">
                <div id="authButtons"></div>
            </div>
        </div>
    </header>

    <!-- 카페 콘텐츠 -->
    <main class="cafe-container">
        <div class="cafe-header">
            <h1 class="cafe-title">Cafe Radio</h1>
            <p>나만의 음악 카페를 열고 TL로 수익을 창출하세요</p>
        </div>

        <!-- 카페 대시보드 -->
        <div class="cafe-dashboard">
            <div class="dashboard-card">
                <div class="card-title">
                    <i class="fas fa-coins"></i>
                    보유 TL
                </div>
                <div class="card-value" id="cafeBalance">0 TL</div>
            </div>
            
            <div class="dashboard-card">
                <div class="card-title">
                    <i class="fas fa-store"></i>
                    운영중인 카페
                </div>
                <div class="card-value" id="cafeCount">0개</div>
            </div>
            
            <div class="dashboard-card">
                <div class="card-title">
                    <i class="fas fa-chart-line"></i>
                    총 수익
                </div>
                <div class="card-value tl-revenue" id="totalRevenue">0 TL</div>
            </div>
            
            <div class="dashboard-card">
                <div class="card-title">
                    <i class="fas fa-users"></i>
                    방문자
                </div>
                <div class="card-value" id="totalVisitors">0명</div>
            </div>
            
            <div class="create-cafe-btn" onclick="createNewCafe()" id="createCafeBtn">
                <i class="fas fa-plus-circle" style="font-size: 2rem; color: #8b5cf6; margin-bottom: 0.5rem;"></i>
                <h3>새 카페 만들기</h3>
                <p style="color: #94a3b8;">5,000 TL로 나만의 음악 카페를 오픈하세요</p>
            </div>
        </div>

        <!-- 내 카페 목록 -->
        <h2 style="margin-bottom: 1.5rem;">내 카페 목록</h2>
        <div class="cafe-list" id="myCafeList">
            <!-- JavaScript로 동적 생성 -->
        </div>

        <!-- 추천 카페 -->
        <h2 style="margin: 3rem 0 1.5rem;">인기 카페</h2>
        <div class="cafe-list" id="popularCafeList">
            <!-- JavaScript로 동적 생성 -->
        </div>

        <!-- 라디오 플레이어 -->
        <div class="radio-player" id="radioPlayer">
            <div class="player-header">
                <h3>현재 재생중</h3>
                <button onclick="closePlayer()" style="background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="now-playing">
                <div class="album-art" id="currentAlbumArt">🎵</div>
                <div class="track-info">
                    <h3 id="currentTrack">음원 제목</h3>
                    <p id="currentArtist">아티스트</p>
                    <p id="currentCafe">카페 이름</p>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" onclick="skipPrevious()">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-btn" onclick="togglePlay()" id="playBtn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn" onclick="skipNext()">
                    <i class="fas fa-step-forward"></i>
                </button>
                <div class="volume-control">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" min="0" max="100" value="50" id="volumeSlider" style="flex: 1;">
                </div>
            </div>
        </div>

        <!-- 채팅창 -->
        <div class="chat-section" id="chatSection" style="display: none;">
            <h3 style="margin-bottom: 1rem;">실시간 채팅</h3>
            <div class="chat-box" id="chatBox">
                <div class="chat-message">
                    <strong>시스템:</strong> 채팅에 참여해주세요!
                </div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
                <button class="cafe-btn" onclick="sendChatMessage()">전송</button>
            </div>
        </div>
    </main>

    <!-- 카페 생성 모달 -->
    <div id="createCafeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: #1a1f37; padding: 2rem; border-radius: 16px; width: 90%; max-width: 500px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="color: white; margin: 0;">새 카페 만들기</h3>
                <button onclick="closeCreateModal()" style="background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <p style="color: #94a3b8; margin-bottom: 1rem; background: rgba(139, 92, 246, 0.1); padding: 1rem; border-radius: 8px;">
                    <i class="fas fa-info-circle"></i> 카페 생성 비용: 5,000 TL
                </p>
                
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; color: #cbd5e1; margin-bottom: 0.5rem;">카페 이름</label>
                    <input type="text" id="cafeName" placeholder="카페 이름을 입력하세요" style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white;">
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; color: #cbd5e1; margin-bottom: 0.5rem;">카페 설명</label>
                    <textarea id="cafeDescription" placeholder="카페를 소개해주세요" style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; min-height: 100px; resize: vertical;"></textarea>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; color: #cbd5e1; margin-bottom: 0.5rem;">장르</label>
                    <select id="cafeGenre" style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; cursor: pointer;">
                        <option value="pop">팝</option>
                        <option value="electronic">일렉트로닉</option>
                        <option value="hiphop">힙합</option>
                        <option value="rock">락</option>
                        <option value="jazz">재즈</option>
                        <option value="classical">클래식</option>
                        <option value="mixed">믹스</option>
                    </select>
                </div>
            </div>
            <button onclick="confirmCreateCafe()" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, #8b5cf6, #ec4899); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                카페 생성하기 (5,000 TL)
            </button>
        </div>
    </div>

    <script>
        // 카페 데이터
        const sampleCafes = [
            { id: 1, name: "Chill Vibes Cafe", owner: "DJ Luna", genre: "electronic", description: "편안한 일렉트로닉 음악과 함께하는 카페", listeners: 42, revenue: 12500, status: "online" },
            { id: 2, name: "Jazz Lounge", owner: "Miles Davis", genre: "jazz", description: "클래식 재즈와 함께하는 고급스러운 공간", listeners: 28, revenue: 8900, status: "online" },
            { id: 3, name: "Rock Arena", owner: "Guitar King", genre: "rock", description: "에너지 넘치는 락 음악의 성지", listeners: 65, revenue: 21000, status: "offline" },
            { id: 4, name: "Hiphop Base", owner: "MC Flow", genre: "hiphop", description: "최신 힙합과 함께하는 도시적인 분위기", listeners: 38, revenue: 15400, status: "online" }
        ];

        // 페이지 로드 시
        document.addEventListener('DOMContentLoaded', function() {
            updateCafeDashboard();
            loadMyCafes();
            loadPopularCafes();
            
            // 음량 조절
            document.getElementById('volumeSlider').addEventListener('input', function(e) {
                updateVolume(e.target.value);
            });
        });

        function updateCafeDashboard() {
            const user = getCurrentUser();
            const balance = getTLBalance();
            
            document.getElementById('cafeBalance').textContent = balance.toLocaleString() + ' TL';
            
            if (user) {
                const myCafes = JSON.parse(localStorage.getItem('timelink_my_cafes') || '[]');
                document.getElementById('cafeCount').textContent = myCafes.length + '개';
                
                // 수익 계산
                let totalRevenue = 0;
                let totalVisitors = 0;
                
                myCafes.forEach(cafe => {
                    totalRevenue += cafe.revenue || 0;
                    totalVisitors += cafe.visitors || 0;
                });
                
                document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString() + ' TL';
                document.getElementById('totalVisitors').textContent = totalVisitors.toLocaleString() + '명';
            }
        }

        function loadMyCafes() {
            const container = document.getElementById('myCafeList');
            const myCafes = JSON.parse(localStorage.getItem('timelink_my_cafes') || '[]');
            
            if (myCafes.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #94a3b8;">
                        <i class="fas fa-store" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>아직 운영중인 카페가 없습니다.</p>
                        <p>새 카페를 만들어보세요!</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            myCafes.forEach(cafe => {
                html += createCafeCard(cafe, true);
            });
            
            container.innerHTML = html;
        }

        function loadPopularCafes() {
            const container = document.getElementById('popularCafeList');
            let html = '';
            
            sampleCafes.forEach(cafe => {
                html += createCafeCard(cafe, false);
            });
            
            container.innerHTML = html;
        }

        function createCafeCard(cafe, isMine) {
            return `
                <div class="cafe-card">
                    <div class="cafe-banner">
                        <div class="cafe-status ${cafe.status === 'offline' ? 'cafe-offline' : ''}">
                            ${cafe.status === 'online' ? 'ON AIR' : 'OFFLINE'}
                        </div>
                        <div class="cafe-avatar">
                            ${cafe.name.charAt(0)}
                        </div>
                    </div>
                    <div class="cafe-info">
                        <h3 class="cafe-name">${cafe.name}</h3>
                        <p class="cafe-desc">${cafe.description}</p>
                        <div class="cafe-meta">
                            <span><i class="fas fa-user"></i> ${cafe.owner}</span>
                            <span><i class="fas fa-headphones"></i> ${cafe.listeners}명</span>
                        </div>
                        <div class="cafe-actions">
                            <button class="cafe-btn" onclick="enterCafe(${cafe.id})">
                                <i class="fas fa-door-open"></i>
                                입장하기
                            </button>
                            ${isMine ? `
                                <button class="cafe-btn primary-btn" onclick="manageCafe(${cafe.id})">
                                    <i class="fas fa-cog"></i>
                                    관리
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function getGenreName(code) {
            const genres = {
                pop: '팝', rock: '락', hiphop: '힙합',
                electronic: '일렉트로닉', jazz: '재즈', classical: '클래식',
                mixed: '믹스'
            };
            return genres[code] || code;
        }

        // 카페 생성 함수
        function createNewCafe() {
            if (!isLoggedIn()) {
                alert('로그인이 필요합니다!');
                showLoginModal();
                return;
            }
            
            const balance = getTLBalance();
            if (balance < 5000) {
                alert(`카페 생성에는 5,000 TL이 필요합니다.\n현재 잔액: ${balance.toLocaleString()} TL`);
                return;
            }
            
            document.getElementById('createCafeModal').style.display = 'flex';
        }

        function closeCreateModal() {
            document.getElementById('createCafeModal').style.display = 'none';
            document.getElementById('cafeName').value = '';
            document.getElementById('cafeDescription').value = '';
        }

        function confirmCreateCafe() {
            const name = document.getElementById('cafeName').value.trim();
            const description = document.getElementById('cafeDescription').value.trim();
            const genre = document.getElementById('cafeGenre').value;
            
            if (!name) {
                alert('카페 이름을 입력해주세요.');
                return;
            }
            
            if (!description) {
                alert('카페 설명을 입력해주세요.');
                return;
            }
            
            if (buyWithTL(5000, `카페 생성: ${name}`)) {
                const user = getCurrentUser();
                const newCafe = {
                    id: Date.now(),
                    name: name,
                    owner: user.name,
                    genre: genre,
                    description: description,
                    created: new Date().toLocaleDateString('ko-KR'),
                    status: 'online',
                    listeners: 0,
                    revenue: 0,
                    visitors: 0,
                    musicList: []
                };
                
                // 저장
                let myCafes = JSON.parse(localStorage.getItem('timelink_my_cafes') || '[]');
                myCafes.push(newCafe);
                localStorage.setItem('timelink_my_cafes', JSON.stringify(myCafes));
                
                // UI 업데이트
                updateCafeDashboard();
                loadMyCafes();
                closeCreateModal();
                
                alert(`🎉 "${name}" 카페가 오픈되었습니다!\n이제 음악을 추가하고 방송을 시작해보세요.`);
            }
        }

        // 카페 입장 함수
        function enterCafe(cafeId) {
            if (!isLoggedIn()) {
                alert('로그인이 필요합니다!');
                showLoginModal();
                return;
            }
            
            // 카페 정보 찾기
            let cafes = JSON.parse(localStorage.getItem('timelink_my_cafes') || '[]');
            let cafe = cafes.find(c => c.id === cafeId);
            
            if (!cafe) {
                cafe = sampleCafes.find(c => c.id === cafeId);
            }
            
            if (!cafe) {
                alert('카페를 찾을 수 없습니다.');
                return;
            }
            
            if (cafe.status === 'offline') {
                alert('현재 방송중이 아닙니다.');
                return;
            }
            
            // 플레이어 표시
            document.getElementById('radioPlayer').style.display = 'block';
            document.getElementById('chatSection').style.display = 'block';
            
            // 현재 재생 정보 설정
            document.getElementById('currentTrack').textContent = 'Chill Vibes Mix';
            document.getElementById('currentArtist').textContent = 'Various Artists';
            document.getElementById('currentCafe').textContent = cafe.name;
            
            // 카페 방문자 증가
            if (cafes.some(c => c.id === cafeId)) {
                cafes = cafes.map(c => {
                    if (c.id === cafeId) {
                        return { ...c, visitors: (c.visitors || 0) + 1 };
                    }
                    return c;
                });
                localStorage.setItem('timelink_my_cafes', JSON.stringify(cafes));
                updateCafeDashboard();
            }
            
            // 채팅 메시지 추가
            addChatMessage('시스템', `${cafe.name}에 입장하셨습니다!`);
        }

        function closePlayer() {
            document.getElementById('radioPlayer').style.display = 'none';
            document.getElementById('chatSection').style.display = 'none';
        }

        // 카페 관리
        function manageCafe(cafeId) {
            alert('카페 관리 페이지로 이동합니다! (실제 구현에서는 별도 관리 페이지)');
            // 실제 구현: 카페 관리 페이지로 이동
        }

        // 라디오 플레이어 컨트롤
        let isPlaying = false;
        let currentVolume = 50;

        function togglePlay() {
            const playBtn = document.getElementById('playBtn');
            isPlaying = !isPlaying;
            
            if (isPlaying) {
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                alert('방송이 시작되었습니다! (실제 구현에서는 Web Audio API 사용)');
            } else {
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                alert('방송이 중지되었습니다.');
            }
        }

        function skipPrevious() {
            alert('이전 트랙으로 이동합니다.');
        }

        function skipNext() {
            alert('다음 트랙으로 이동합니다.');
        }

        function updateVolume(volume) {
            currentVolume = volume;
            // 실제 구현: 오디오 볼륨 조절
        }

        // 채팅 기능
        function addChatMessage(sender, message) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            messageDiv.innerHTML = `<strong>${sender}:</strong> ${message}`;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const user = getCurrentUser();
            const sender = user ? user.name : '손님';
            
            addChatMessage(sender, message);
            input.value = '';
            
            // 간단한 AI 응답 (시뮬레이션)
            setTimeout(() => {
                const responses = [
                    '좋은 음악이네요!',
                    '이 카페 분위기 좋아요',
                    '다음 곡은 무엇일까요?',
                    'TL로 음원 구매할 생각이에요'
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addChatMessage('다른 방문자', randomResponse);
            }, 1000);
        }

        // 카페 수익 창출 시뮬레이션
        function simulateCafeRevenue() {
            const myCafes = JSON.parse(localStorage.getItem('timelink_my_cafes') || '[]');
            
            myCafes.forEach((cafe, index) => {
                if (cafe.status === 'online') {
                    // 랜덤한 수익 생성
                    const revenue = Math.floor(Math.random() * 100) + 10;
                    const newRevenue = (cafe.revenue || 0) + revenue;
                    
                    // 업데이트
                    myCafes[index].revenue = newRevenue;
                    
                    // TL 잔액에 추가
                    updateTLBalance(revenue);
                    
                    console.log(`${cafe.name}: +${revenue} TL 수익`);
                }
            });
            
            localStorage.setItem('timelink_my_cafes', JSON.stringify(myCafes));
            updateCafeDashboard();
        }

        // 5분마다 수익 시뮬레이션
        if (isLoggedIn()) {
            setInterval(simulateCafeRevenue, 300000); // 5분마다
        }
    </script>
</body>
</html>
