<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFE RADIO | TIMELINK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --radio-blue: #1E90FF;
            --cafe-brown: #8B4513;
            --orange: #FF6B00;
            --teal: #00D4AA;
            --purple: #9D4EDD;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0F2B, #1a1f37);
            color: white;
            padding-top: 70px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 헤더 */
        .main-header {
            background: rgba(26, 31, 55, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            background: rgba(30, 144, 255, 0.1);
            color: var(--radio-blue);
        }

        /* 히어로 */
        .hero {
            background: linear-gradient(135deg, #1E90FF, #4169E1);
            padding: 3rem 0;
            text-align: center;
            margin-bottom: 3rem;
            border-radius: 20px;
            margin-top: 2rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* 대시보드 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--radio-blue);
        }

        .stat-icon {
            font-size: 2rem;
            color: var(--radio-blue);
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* 라디오 플레이어 */
        .radio-player {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            border: 1px solid rgba(30, 144, 255, 0.3);
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .player-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--radio-blue);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(30, 144, 255, 0.5);
        }

        .player-btn.play {
            width: 70px;
            height: 70px;
            font-size: 2rem;
        }

        .player-info {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .current-track {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .current-artist {
            color: #94a3b8;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1rem;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: var(--radio-blue);
            width: 30%;
            transition: width 0.3s ease;
        }

        /* 카페 목록 */
        .cafe-section {
            margin: 3rem 0;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .create-btn {
            background: linear-gradient(135deg, var(--purple), #8B5CF6);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.3);
        }

        .cafe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .cafe-card {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cafe-card:hover {
            transform: translateY(-5px);
            border-color: var(--cafe-brown);
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.2);
        }

        .cafe-banner {
            height: 150px;
            background: linear-gradient(135deg, var(--purple), var(--radio-blue));
            position: relative;
        }

        .cafe-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #10b981;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .cafe-offline {
            background: #6b7280;
        }

        .cafe-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 50%;
            position: absolute;
            bottom: -40px;
            left: 1.5rem;
            border: 4px solid #0A0F2B;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .cafe-info {
            padding: 3rem 1.5rem 1.5rem;
        }

        .cafe-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .cafe-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .cafe-meta {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .cafe-actions {
            display: flex;
            gap: 0.5rem;
        }

        .cafe-btn {
            flex: 1;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cafe-btn:hover {
            background: rgba(30, 144, 255, 0.2);
            border-color: var(--radio-blue);
        }

        .cafe-btn.primary {
            background: var(--radio-blue);
            border: none;
        }

        /* 모달 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1A2342;
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--radio-blue);
        }

        textarea.form-input {
            min-height: 100px;
            resize: vertical;
        }

        .info-box {
            background: rgba(30, 144, 255, 0.1);
            border: 1px solid rgba(30, 144, 255, 0.3);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .dashboard { grid-template-columns: 1fr; }
            .cafe-grid { grid-template-columns: 1fr; }
            .main-nav { display: none; }
            .logo-text { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>

            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i> HOME
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-sliders-h"></i> STUDIO
                </a>
                <a href="tlmusic.html" class="nav-link">
                    <i class="fas fa-music"></i> TLMUSIC
                </a>
                <a href="cafe-radio.html" class="nav-link active">
                    <i class="fas fa-broadcast-tower"></i> CAFE RADIO
                </a>
            </nav>

            <div id="authButtons"></div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="container">
        <!-- 히어로 -->
        <section class="hero">
            <h1>CAFE RADIO</h1>
            <p>나만의 음악 카페를 열고 TL로 수익을 창출하세요</p>
        </section>

        <!-- 대시보드 -->
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-coins"></i></div>
                <div class="stat-value" id="userBalance">0</div>
                <div class="stat-label">보유 TL</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-store"></i></div>
                <div class="stat-value" id="cafeCount">0</div>
                <div class="stat-label">운영중인 카페</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-value" id="totalRevenue">0</div>
                <div class="stat-label">총 수익 (TL)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-value" id="totalVisitors">0</div>
                <div class="stat-label">방문자</div>
            </div>
        </div>

        <!-- 라디오 플레이어 -->
        <div class="radio-player">
            <h2 class="section-title">
                <i class="fas fa-broadcast-tower"></i> 실시간 방송
            </h2>
            
            <div class="player-controls">
                <button class="player-btn" onclick="previousTrack()">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="player-btn play" id="playBtn" onclick="togglePlay()">
                    <i class="fas fa-play"></i>
                </button>
                <button class="player-btn" onclick="nextTrack()">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>
            
            <div class="player-info">
                <div class="current-track" id="currentTrack">Sunset Dreams</div>
                <div class="current-artist" id="currentArtist">Indie Artist</div>
            </div>
            
            <div class="progress-bar" onclick="seekTrack(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <div style="text-align: center; color: #94a3b8; margin-top: 1rem;">
                <i class="fas fa-info-circle"></i>
                현재 <span id="listenerCount">12</span>개 카페에서 재생 중
            </div>
        </div>

        <!-- 내 카페 -->
        <section class="cafe-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 class="section-title" style="margin: 0;">
                    <i class="fas fa-store"></i> 내 카페
                </h2>
                <button class="create-btn" onclick="openCreateModal()">
                    <i class="fas fa-plus-circle"></i> 새 카페 만들기
                </button>
            </div>
            
            <div class="cafe-grid" id="myCafes">
                <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #94a3b8;">
                    <i class="fas fa-store" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                    <p>아직 카페가 없습니다.</p>
                    <p>새 카페를 만들어보세요!</p>
                </div>
            </div>
        </section>

        <!-- 인기 카페 -->
        <section class="cafe-section">
            <h2 class="section-title">
                <i class="fas fa-fire"></i> 인기 카페
            </h2>
            <div class="cafe-grid" id="popularCafes">
                <!-- 샘플 카페 카드 -->
            </div>
        </section>
    </main>

    <!-- 카페 생성 모달 -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 카페 만들기</h3>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            
            <div class="info-box">
                <i class="fas fa-info-circle"></i> 카페 생성 비용: 5,000 TL
            </div>
            
            <div class="form-group">
                <label class="form-label">카페 이름</label>
                <input type="text" class="form-input" id="cafeName" placeholder="카페 이름을 입력하세요">
            </div>
            
            <div class="form-group">
                <label class="form-label">카페 설명</label>
                <textarea class="form-input" id="cafeDesc" placeholder="카페를 소개해주세요"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">장르</label>
                <select class="form-input" id="cafeGenre">
                    <option value="pop">팝</option>
                    <option value="electronic">일렉트로닉</option>
                    <option value="hiphop">힙합</option>
                    <option value="rock">락</option>
                    <option value="jazz">재즈</option>
                    <option value="classical">클래식</option>
                    <option value="mixed">믹스</option>
                </select>
            </div>
            
            <button class="create-btn" style="width: 100%;" onclick="createCafe()">
                카페 생성하기 (5,000 TL)
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="./src/script/timelink-auth.js"></script>
    <script>
        // 상태
        let isPlaying = false;
        let myCafes = [];
        let popularCafes = [
            {
                id: 1,
                name: 'Sunset Lounge',
                desc: '감성적인 재즈와 인디 음악',
                genre: 'jazz',
                online: true,
                listeners: 45,
                revenue: 2340
            },
            {
                id: 2,
                name: 'Electric Dreams',
                desc: 'EDM과 일렉트로닉 음악',
                genre: 'electronic',
                online: true,
                listeners: 78,
                revenue: 4590
            },
            {
                id: 3,
                name: 'Classic Corner',
                desc: '클래식 음악 전문',
                genre: 'classical',
                online: false,
                listeners: 23,
                revenue: 1280
            }
        ];

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            renderPopularCafes();
        });

        // 데이터 로드
        function loadData() {
            if (window.AuthManager && window.AuthManager.isAuthenticated()) {
                const balance = window.AuthManager.getBalance();
                document.getElementById('userBalance').textContent = balance.toLocaleString();
                
                // 로컬스토리지에서 카페 데이터 로드
                const saved = localStorage.getItem('my_cafes');
                if (saved) {
                    myCafes = JSON.parse(saved);
                    renderMyCafes();
                }
                
                updateStats();
            }
        }

        // 통계 업데이트
        function updateStats() {
            document.getElementById('cafeCount').textContent = myCafes.length;
            const totalRev = myCafes.reduce((sum, cafe) => sum + (cafe.revenue || 0), 0);
            document.getElementById('totalRevenue').textContent = totalRev.toLocaleString();
            const totalVis = myCafes.reduce((sum, cafe) => sum + (cafe.visitors || 0), 0);
            document.getElementById('totalVisitors').textContent = totalVis;
        }

        // 내 카페 렌더링
        function renderMyCafes() {
            const container = document.getElementById('myCafes');
            
            if (myCafes.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #94a3b8;">
                        <i class="fas fa-store" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>아직 카페가 없습니다.</p>
                        <p>새 카페를 만들어보세요!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = myCafes.map(cafe => createCafeCard(cafe, true)).join('');
        }

        // 인기 카페 렌더링
        function renderPopularCafes() {
            const container = document.getElementById('popularCafes');
            container.innerHTML = popularCafes.map(cafe => createCafeCard(cafe, false)).join('');
        }

        // 카페 카드 생성
        function createCafeCard(cafe, isMine) {
            return `
                <div class="cafe-card">
                    <div class="cafe-banner">
                        <div class="cafe-status ${cafe.online ? '' : 'cafe-offline'}">
                            ${cafe.online ? '🔴 방송 중' : '⚫ 오프라인'}
                        </div>
                        <div class="cafe-avatar">
                            ${cafe.name.charAt(0)}
                        </div>
                    </div>
                    <div class="cafe-info">
                        <div class="cafe-name">${cafe.name}</div>
                        <div class="cafe-desc">${cafe.desc}</div>
                        <div class="cafe-meta">
                            <span><i class="fas fa-users"></i> ${cafe.listeners || 0}명</span>
                            <span><i class="fas fa-coins"></i> ${(cafe.revenue || 0).toLocaleString()} TL</span>
                        </div>
                        <div class="cafe-actions">
                            ${isMine ? 
                                `<button class="cafe-btn" onclick="manageCafe(${cafe.id})">
                                    <i class="fas fa-cog"></i> 관리
                                </button>` :
                                `<button class="cafe-btn primary" onclick="visitCafe(${cafe.id})">
                                    <i class="fas fa-door-open"></i> 입장
                                </button>`
                            }
                            <button class="cafe-btn" onclick="playCafe(${cafe.id})">
                                <i class="fas fa-play"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // 플레이어 제어
        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');
            btn.querySelector('i').className = isPlaying ? 'fas fa-pause' : 'fas fa-play';
            
            if (isPlaying) {
                startPlayback();
            }
        }

        function startPlayback() {
            let progress = 30;
            const interval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(interval);
                    return;
                }
                progress += 0.5;
                if (progress >= 100) progress = 0;
