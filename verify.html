<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증번호 확인 | TimeLink</title>
    
    <!-- Bootstrap / Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    
    <!-- 공통 스타일 -->
    
    <style>
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .verify-container {
            max-width: 500px;
            width: 100%;
            background: rgba(22, 22, 50, 0.8);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(124, 77, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        
        .verify-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #7c4dff, #00e5ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 2rem;
        }
        
        .code-inputs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 30px 0;
        }
        
        .code-input {
            width: 60px;
            height: 70px;
            font-size: 2rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(124, 77, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }
        
        .code-input:focus {
            border-color: #7c4dff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.2);
        }
        
        .timer {
            font-size: 1.2rem;
            color: #ff4081;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .dev-note {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            color: #ffc107;
        }
    </style>
    <link rel="stylesheet" href="src/styles/common.css">
</head>
<body>
    <div class="verify-container">
        <div class="verify-icon">
            <i class="bi bi-shield-check"></i>
        </div>
        
        <h2 class="text-white text-center mb-3">인증번호 확인</h2>
        <p class="text-center text-gray mb-4" id="emailText">
            <!-- 이메일이 여기에 표시됩니다 -->
        </p>
        
        <form id="verifyForm">
            <div class="code-inputs" id="codeInputs">
                <!-- 코드 입력 필드들이 여기에 생성됩니다 -->
            </div>
            
            <div class="text-center timer" id="timer">
                05:00
            </div>
            
            <div class="mb-4">
                <button type="submit" class="btn btn-primary w-100 py-3">
                    <i class="bi bi-check-circle me-2"></i>인증 완료
                </button>
            </div>
            
            <div class="dev-note">
                <i class="bi bi-info-circle me-2"></i>
                <strong>개발 모드:</strong> 테스트를 위해 <code>123456</code>을 입력하세요
            </div>
            
            <div class="text-center">
                <a href="#" class="text-primary" id="resendLink">
                    <i class="bi bi-arrow-clockwise me-2"></i>인증번호 다시 보내기
                </a>
            </div>
        </form>
    </div>

    <!-- 스크립트 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./src/script/auth.js"></script>
    
    <script>
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', function() {
            // 이메일 표시
            const email = localStorage.getItem('pending_email');
            const emailText = document.getElementById('emailText');
            if (email) {
                emailText.textContent = `${email}로 발송된 6자리 인증번호를 입력해주세요.`;
            } else {
                emailText.textContent = '이메일 정보를 찾을 수 없습니다.';
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
            
            // 코드 입력 필드 생성
            createCodeInputs();
            
            // 타이머 시작
            startTimer(5 * 60); // 5분
            
            // 인증번호 재전송
            document.getElementById('resendLink').addEventListener('click', function(e) {
                e.preventDefault();
                if (window.auth) {
                    // TODO: 실제로는 서버에 재전송 요청
                    alert('인증번호가 재전송되었습니다. (개발 모드)');
                    resetTimer();
                }
            });
            
            // 폼 제출 방지 (auth.js가 처리)
            document.getElementById('verifyForm').addEventListener('submit', function(e) {
                e.preventDefault();
                // auth.js가 처리합니다
            });
        });
        
        // 코드 입력 필드 생성
        function createCodeInputs() {
            const container = document.getElementById('codeInputs');
            const codeInput = document.createElement('input');
            codeInput.type = 'text';
            codeInput.id = 'authCode';
            codeInput.name = 'authCode';
            codeInput.className = 'form-control text-center';
            codeInput.placeholder = '123456';
            codeInput.maxLength = 6;
            codeInput.pattern = '[0-9]{6}';
            codeInput.required = true;
            
            container.innerHTML = '';
            container.appendChild(codeInput);
        }
        
        // 타이머
        let timerInterval;
        function startTimer(seconds) {
            let remaining = seconds;
            const timerEl = document.getElementById('timer');
            
            clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                remaining--;
                
                const minutes = Math.floor(remaining / 60);
                const secs = remaining % 60;
                
                timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    timerEl.innerHTML = '<span class="text-danger">인증시간이 만료되었습니다</span>';
                    
                    // TODO: 페이지 리다이렉트 또는 재전송 안내
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            }, 1000);
        }
        
        function resetTimer() {
            startTimer(5 * 60);
        }
    </script>
    <script src="src/script/common-components.js"></script>
</body>
</html>
