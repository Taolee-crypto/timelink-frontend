<!DOCTYPE html>
<html>
<head>
    <title>Auth 통합 테스트</title>
    <style>
        [data-auth-status] { 
            padding: 10px 20px; 
            background: #f5f5f5; 
            border-radius: 8px; 
            display: inline-block; 
            margin: 20px; 
        }
    </style>
    <!-- auth.js를 먼저 로드 -->
    <script src="src/script/auth.js"></script>
</head>
<body>
    <div id="nav-container"></div>
    
    <h1>인증 통합 테스트</h1>
    <div data-auth-status>로딩 중...</div>
    
    <hr>
    <div>
        <button onclick="testLogin()">테스트 로그인 설정</button>
        <button onclick="testLogout()">테스트 로그아웃</button>
        <button onclick="location.reload()">새로고침</button>
    </div>
    
    <script>
        function testLogin() {
            // common-components.js 형식으로 저장
            localStorage.setItem('timelink_token', 'test-token-12345');
            localStorage.setItem('timelink_userEmail', 'test@example.com');
            localStorage.setItem('timelink_nickname', '테스터');
            localStorage.setItem('timelink_tlBalance', '15000');
            
            // auth.js 형식으로도 저장
            localStorage.setItem('token', 'test-token-12345');
            localStorage.setItem('user', JSON.stringify({
                name: '테스터',
                email: 'test@example.com',
                balance: 15000
            }));
            
            alert('테스트 로그인 설정 완료! 새로고침하세요.');
        }
        
        function testLogout() {
            localStorage.clear();
            alert('모든 저장소 삭제 완료! 새로고침하세요.');
        }
    </script>
    
    <!-- common-components.js는 나중에 로드 -->
    <script src="common-components.js"></script>
</body>
</html>
