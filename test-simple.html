<!DOCTYPE html>
<html>
<head>
    <title>TimeLink 테스트</title>
    <style>body { background: #1a1a2e; color: white; padding: 20px; }</style>
</head>
<body>
    <h1>기본 페이지 작동 테스트</h1>
    <p>이 글이 보이면 HTML은 정상입니다.</p>
    
    <h2>스크립트 테스트:</h2>
    <button onclick="testJS()">JavaScript 테스트</button>
    <div id="result"></div>
    
    <script>
    function testJS() {
        document.getElementById('result').innerHTML = 
            '<p style="color:green">✅ JavaScript 작동正常</p>';
        console.log('JavaScript 테스트 성공');
    }
    
    // 헤더 관리자 로드 테스트
    console.log('페이지 로드 완료');
    </script>
</body>
</html>
