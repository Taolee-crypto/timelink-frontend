<!-- index.html에 추가할 API 섹션 -->
<div id="apiData" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <div id="userInfo" style="margin-bottom: 30px;"></div>
    <h2>콘텐츠 목록</h2>
    <div id="contentList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;"></div>
    
    <h2>마켓 아이템</h2>
    <div id="marketItems" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;"></div>
    
    <h2>통계</h2>
    <div id="stats" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;"></div>
</div>

<script src="js/api-config.js"></script>
<script src="js/main-api.js"></script>
