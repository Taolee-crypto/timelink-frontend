<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TimeLink — SHAREPLACE</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-root:#08080F;--bg-deep:#0D0D1A;
  --bg-card:rgba(255,255,255,.05);
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.13);
  --purple:#8B5CF6;--purple-dim:#6D28D9;--mint:#00E5A0;
  --amber:#FBBF24;--rose:#FB7185;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.35);
  --grad:linear-gradient(135deg,#8B5CF6 0%,#00E5A0 100%);
  --fn:'Noto Sans KR',sans-serif;--fm:'JetBrains Mono',monospace
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);background:var(--bg-root);color:var(--t1);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;position:relative;z-index:2}
.sidebar{border-right:1px solid var(--bd);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;text-decoration:none}
.sb-logo-icon{width:30px;height:30px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-logo-text{font-size:12px;font-weight:700;letter-spacing:.1em}
.sb-nav{padding:10px 0;flex:1}
.sb-section{padding:8px 16px 3px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:var(--fm)}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 16px;text-decoration:none;color:var(--t2);font-size:12px;font-weight:500;transition:all .2s;position:relative}
.sb-link:hover{color:var(--t1);background:rgba(255,255,255,.03)}
.sb-link.active{color:var(--t1);background:rgba(129,140,248,.08)}
.sb-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--purple);border-radius:0 2px 2px 0}
.sb-icon{font-size:14px;width:20px;text-align:center}
.type-section{padding:12px 0}
.type-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:12px;color:var(--t2);transition:all .2s;cursor:pointer}
.type-item:hover,.type-item.active{color:var(--t1);background:rgba(255,255,255,.03)}
.type-item.active{color:var(--purple)}
.type-count{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--t3)}
.main{overflow-y:auto}
.topbar{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--bd);background:rgba(3,5,7,.6);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.tb-back{color:var(--t3);font-size:13px;text-decoration:none;transition:all .2s}
.tb-back:hover{color:var(--t2)}
.tb-title{font-size:15px;font-weight:700;letter-spacing:.08em}
.tb-search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--bd2);border-radius:10px;padding:8px 16px;flex:1;min-width:200px}
.tb-search input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;font-family:var(--fn);width:100%}
.tb-search input::placeholder{color:var(--t3)}
.tb-upload{padding:9px 18px;border-radius:9px;border:none;background:var(--grad);color:#fff;font-size:13px;font-family:var(--fn);font-weight:700;white-space:nowrap;cursor:pointer;transition:all .2s}
.tb-upload:hover{box-shadow:0 0 20px rgba(99,102,241,.4);transform:translateY(-1px)}
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:12px}
.sort-tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--bd);border-radius:8px;padding:3px}
.sort-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t3);background:none;border:none;font-family:var(--fn);transition:all .2s}
.sort-tab.active{background:var(--purple-dim);color:#fff}
.sort-tab:hover:not(.active){color:var(--t2)}
.sort-count{font-size:12px;color:var(--t3);font-family:var(--fm)}
.page-content{padding:24px 28px;padding-bottom:160px}
.file-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.file-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:all .3s;position:relative}
.file-card:hover{border-color:var(--bd2);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.file-thumb{height:150px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
.thumb-overlay{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(129,140,248,.12) 0%,transparent 60%)}
.fc-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .2s,box-shadow .2s;cursor:pointer;border:none;color:#fff}
.fc-play.playable{background:rgba(99,102,241,.95);box-shadow:0 0 24px rgba(99,102,241,.6)}
.fc-play.playable:hover{transform:translate(-50%,-50%) scale(1.12);box-shadow:0 0 36px rgba(99,102,241,.9)}
.fc-play.need-charge{background:rgba(99,102,241,.4);box-shadow:none}
.fc-play.no-file{background:rgba(60,60,60,.8);box-shadow:none;font-size:16px}
.fc-play.playing{background:rgba(16,185,129,.95);box-shadow:0 0 24px rgba(16,185,129,.6)}
.fc-body{padding:14px}
.fc-type{font-size:10px;color:var(--t3);font-family:var(--fm);letter-spacing:.08em;margin-bottom:5px}
.fc-title{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-artist{font-size:12px;color:var(--t2);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fc-price{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--purple)}
.fc-stats{display:flex;gap:8px;font-size:11px;color:var(--t3)}
.fc-tags{display:flex;gap:4px;flex-wrap:wrap}
.fc-tag{font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--t3)}
.fc-actions{display:flex;gap:6px;margin-top:10px}
.fc-btn{flex:1;padding:7px 0;border-radius:7px;border:none;font-size:11px;font-family:var(--fn);font-weight:700;cursor:pointer;transition:all .2s;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center}
.fc-btn-primary{background:rgba(99,102,241,.15);color:var(--purple);border:1px solid rgba(99,102,241,.2)}
.fc-btn-primary:hover{background:rgba(99,102,241,.25)}
.fc-btn-ghost{background:transparent;color:var(--t3);border:1px solid var(--bd)}
.fc-btn-ghost:hover{color:var(--t2)}
.fc-btn-charge{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none}
.fc-btn-charge:hover{opacity:.85}

/* ── TL PLAYER BAR ── */
#tlPlayerBar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(135deg,rgba(8,5,20,.98),rgba(4,2,12,.98));
  border-top:1px solid rgba(99,102,241,.35);backdrop-filter:blur(24px);
  padding:14px 24px 14px;box-shadow:0 -8px 40px rgba(0,0,0,.7)}
.player-inner{display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto}
#tlCover{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.player-info{min-width:0;flex:1}
#tlTitle{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--fm)}
#tlArtist{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;font-family:var(--fm)}
.player-tl{flex:2;min-width:120px}
.player-tl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.player-tl-label{font-size:10px;color:rgba(255,255,255,.4);font-family:var(--fm)}
#tlRemain{font-size:12px;font-weight:700;color:#a78bfa;font-family:var(--fm)}
.tl-bar-bg{height:5px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
#tlBar{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:5px;transition:width .8s ease;width:100%}
.player-time{display:flex;justify-content:space-between;margin-top:4px}
#tlTimer,#tlDur{font-size:10px;color:rgba(255,255,255,.3);font-family:var(--fm)}
.player-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
#tlPlayBtn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(99,102,241,.4);transition:all .2s}
#tlPlayBtn:hover{transform:scale(1.08)}
.btn-stop{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-stop:hover{background:rgba(255,255,255,.1)}
.player-rate{text-align:center;min-width:70px}
.player-rate-label{font-size:9px;color:rgba(255,255,255,.3);font-family:var(--fm)}
.player-rate-val{font-size:13px;font-weight:700;color:#f59e0b;font-family:var(--fm)}
.progress-wrap{max-width:1400px;margin:8px auto 0;cursor:pointer}
#tlProgressBg{height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;transition:height .2s}
#tlProgressBg:hover{height:5px}
#tlProgress{height:100%;background:linear-gradient(90deg,#4f46e5,#a855f7);border-radius:3px;width:0%;transition:width .8s linear}
#tlWarning{display:none;max-width:1400px;margin:6px auto 0;text-align:center;font-size:12px;color:#fbbf24;font-family:var(--fm)}
#tlError{display:none;max-width:1400px;margin:6px auto 0;text-align:center;font-size:12px;color:var(--rose);font-family:var(--fm)}

/* ── 비디오 오버레이 ── */
#videoOverlay{display:none;position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
#videoOverlay.show{display:flex}
#videoOverlay video{max-width:90vw;max-height:75vh;border-radius:12px;box-shadow:0 0 60px rgba(0,0,0,.8);outline:none}
.vo-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:12px;font-family:var(--fm)}
.vo-close{margin-top:14px;padding:8px 24px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;font-family:var(--fm);font-size:13px}

/* ── 이미지 오버레이 ── */
#imageOverlay{display:none;position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.92);flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
#imageOverlay.show{display:flex}
#imageOverlay img{max-width:90vw;max-height:78vh;border-radius:12px;box-shadow:0 0 60px rgba(99,102,241,.4)}
.io-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:12px;font-family:var(--fm)}
.io-sub{color:rgba(255,255,255,.4);font-size:11px;margin-top:10px;font-family:var(--fm)}
.io-close{margin-top:10px;padding:8px 24px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;font-family:var(--fm);font-size:13px}

/* ── 문서 오버레이 ── */
#docOverlay{display:none;position:fixed;inset:0;z-index:9990;background:rgba(0,0,0,.96);flex-direction:column}
#docOverlay.show{display:flex}
.do-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.do-title{font-size:14px;font-weight:700;color:#fff;font-family:var(--fm)}
.do-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;font-family:var(--fm)}
.do-close{padding:8px 20px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;font-family:var(--fm);font-size:13px}
#docFrame{flex:1;border:none;background:#fff}
.do-footer{padding:10px 24px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#docRemain{font-size:12px;color:#a78bfa;font-family:var(--fm)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(129,140,248,.15);border-radius:3px}
@media(max-width:1200px){.file-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.file-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.file-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 비디오 오버레이 -->
<div id="videoOverlay">
  <div class="vo-title" id="voTitle"></div>
  <video id="voVideo" controls playsinline></video>
  <button class="vo-close" onclick="tlStop()">✕ 닫기 (재생 중단)</button>
</div>

<!-- 이미지 오버레이 -->
<div id="imageOverlay">
  <div class="io-title" id="ioTitle"></div>
  <img id="ioImg" src="" alt="">
  <div class="io-sub">⚡ TL 소모 중 · ESC로 닫기</div>
  <button class="io-close" onclick="tlStop()">✕ 닫기</button>
</div>

<!-- 문서 오버레이 -->
<div id="docOverlay">
  <div class="do-header">
    <div>
      <div class="do-title" id="doTitle">📄 문서</div>
      <div class="do-sub">⚡ TL 소모 중 — 열람 시간만큼 차감됩니다</div>
    </div>
    <button class="do-close" onclick="tlStop()">✕ 닫기</button>
  </div>
  <iframe id="docFrame" src=""></iframe>
  <div class="do-footer">
    <span id="docRemain">⚡ 0 TL 남음</span>
    <a id="docExtLink" href="#" target="_blank" style="font-size:12px;color:rgba(255,255,255,.4);font-family:var(--fm);text-decoration:none">↗ 새탭으로 열기</a>
  </div>
</div>

<div class="app">
  <aside class="sidebar">
    <a href="/" class="sb-logo">
      <div class="sb-logo-icon">TL</div>
      <span class="sb-logo-text">TIMELINK</span>
    </a>
    <nav class="sb-nav">
      <div class="sb-section">메뉴</div>
      <a href="dashboard.html" class="sb-link"><span class="sb-icon">📊</span>대시보드</a>
      <a href="shareplace.html" class="sb-link active"><span class="sb-icon">📁</span>SHAREPLACE</a>
      <a href="radio.html" class="sb-link"><span class="sb-icon">📻</span>Moving Radio</a>
      <a href="creator.html" class="sb-link"><span class="sb-icon">🎨</span>창작자 센터</a>
      <a href="cafe-owner.html" class="sb-link"><span class="sb-icon">☕</span>카페 주인</a>
      <a href="wallet.html" class="sb-link"><span class="sb-icon">💰</span>지갑 & 채굴</a>
    </nav>
    <div class="type-section">
      <div class="sb-section">파일 형식</div>
      <div class="type-item active" onclick="filterType(this,'all')"><span>📂</span>전체<span class="type-count" id="cnt-all">-</span></div>
      <div class="type-item" onclick="filterType(this,'music')"><span>🎵</span>음악<span class="type-count" id="cnt-music">-</span></div>
      <div class="type-item" onclick="filterType(this,'video')"><span>🎬</span>영상<span class="type-count" id="cnt-video">-</span></div>
      <div class="type-item" onclick="filterType(this,'image')"><span>🖼️</span>이미지<span class="type-count" id="cnt-image">-</span></div>
      <div class="type-item" onclick="filterType(this,'doc')"><span>📄</span>문서<span class="type-count" id="cnt-doc">-</span></div>
    </div>
    <div style="padding:14px 16px;border-top:1px solid var(--bd)">
      <div class="sb-section" style="padding:0 0 10px">인기 태그</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        <span style="font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--t3)">#카페음악</span>
        <span style="font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--t3)">#K-POP</span>
        <span style="font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--t3)">#EDM</span>
        <span style="font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--t3)">#재즈</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <a href="dashboard.html" class="tb-back">← 대시보드</a>
      <div class="tb-title">SHAREPLACE</div>
      <div class="tb-search">
        <span style="color:var(--t3);font-size:14px">🔍</span>
        <input type="text" placeholder="파일명, 아티스트, 태그 검색..." oninput="onSearch(this.value)">
      </div>
      <button class="tb-upload" onclick="location.href='creator.html'">📤 내 파일 업로드</button>
    </div>
    <div class="sort-bar">
      <div class="sort-tabs">
        <button class="sort-tab active" onclick="switchTab(this,'hot')">🔥 인기순</button>
        <button class="sort-tab" onclick="switchTab(this,'latest')">🆕 최신순</button>
        <button class="sort-tab" onclick="switchTab(this,'tl')">💰 TL순</button>
      </div>
      <span class="sort-count" id="sortCount">로딩 중...</span>
    </div>
    <div class="page-content">
      <div class="file-grid" id="fileGrid">
        <div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--t3)">로딩 중...</div>
      </div>
    </div>
  </main>
</div>

<!-- TL PLAYER BAR -->
<div id="tlPlayerBar">
  <div class="player-inner">
    <div id="tlCover">🎵</div>
    <div class="player-info">
      <div id="tlTitle">-</div>
      <div id="tlArtist">-</div>
    </div>
    <div class="player-tl">
      <div class="player-tl-top">
        <span class="player-tl-label">⚡ TL 잔량</span>
        <span id="tlRemain">0 TL</span>
      </div>
      <div class="tl-bar-bg"><div id="tlBar"></div></div>
      <div class="player-time">
        <span id="tlTimer">0:00</span>
        <span id="tlDur">0:00</span>
      </div>
    </div>
    <div class="player-controls">
      <button id="tlPlayBtn" onclick="tlToggle()">▶</button>
      <button class="btn-stop" onclick="tlStop()">■</button>
      <div class="player-rate">
        <div class="player-rate-label">초당 소모</div>
        <div class="player-rate-val">1 TL/s</div>
      </div>
    </div>
  </div>
  <div class="progress-wrap" onclick="seekProgress(event)">
    <div id="tlProgressBg"><div id="tlProgress"></div></div>
  </div>
  <div id="tlWarning">⚠️ TL 부족! <a href="#" onclick="event.preventDefault();tlCharge()" style="color:#a78bfa;font-weight:700">TL 충전하기</a></div>
  <div id="tlError"></div>
</div>

<script>
var API_BASE = 'https://api.timelink.digital';

// ── AUTH ────────────────────────────────────────────────
var _user = null, _token = null;
(function(){
  try{ _user=JSON.parse(localStorage.getItem('tl_user')||'null'); _token=localStorage.getItem('tl_token'); }catch(e){}

// ── 상태 ────────────────────────────────────────────────
var _allShares=[], _filter='all', _tab='hot', _search='';

async function loadShares(){
  document.getElementById('sortCount').textContent='로딩 중...';
  try{
    var r=await fetch(API_BASE+'/api/shares');
    var d=await r.json();
    _allShares=d.shares||[];
  }catch(e){ _allShares=[]; }
  updateCounts();
  applyFilter();
}

function isMusicCat(c){ c=(c||'').toLowerCase(); return c.includes('pop')||c.includes('ballad')||c.includes('indie')||c.includes('hip')||c.includes('jazz')||c.includes('electronic')||c.includes('classical')||c==='music'||c==='k-pop'; }

function updateCounts(){
  var s=_allShares;
  var set=function(id,n){ var el=document.getElementById(id); if(el) el.textContent=n; };
  set('cnt-all',s.length);
  set('cnt-music',s.filter(function(x){return isMusicCat(x.category);}).length);
  set('cnt-video',s.filter(function(x){return (x.category||'').toLowerCase()==='video';}).length);
  set('cnt-image',s.filter(function(x){return (x.category||'').toLowerCase()==='image';}).length);
  set('cnt-doc',  s.filter(function(x){return (x.category||'').toLowerCase()==='document';}).length);
}

function applyFilter(){
  var list=_allShares.slice();
  if(_search){ var q=_search.toLowerCase(); list=list.filter(function(s){ return (s.title||'').toLowerCase().includes(q)||(s.artist||'').toLowerCase().includes(q)||(s.category||'').toLowerCase().includes(q); }); }
  if(_tab==='hot') list.sort(function(a,b){return (b.pulse||0)-(a.pulse||0);});
  else if(_tab==='tl') list.sort(function(a,b){return (b.file_tl||0)-(a.file_tl||0);});
  else list.sort(function(a,b){return (b.created_at||0)-(a.created_at||0);});
  if(_filter!=='all') list=list.filter(function(s){
    var c=(s.category||'').toLowerCase();
    if(_filter==='music') return isMusicCat(s.category);
    if(_filter==='video') return c==='video';
    if(_filter==='image') return c==='image';
    if(_filter==='doc')   return c==='document';
    return true;
  });
  renderShares(list);
  document.getElementById('sortCount').textContent='총 '+list.length+'개 파일';
}

function onSearch(v){ _search=v.trim(); applyFilter(); }
function filterType(el,t){ document.querySelectorAll('.type-item').forEach(function(x){x.classList.remove('active');}); el.classList.add('active'); _filter=t; applyFilter(); }
function switchTab(el,t){ document.querySelectorAll('.sort-tab').forEach(function(x){x.classList.remove('active');}); el.classList.add('active'); _tab=t; applyFilter(); }

// ── 파일 타입 감지 ───────────────────────────────────────
function detectType(s){
  var ft=(s.file_type||'').toLowerCase();
  var cat=(s.category||'').toLowerCase();
  var url=(s.stream_url||s.preview_url||'').toLowerCase();
  // 이미지
  if(ft.startsWith('image/')||cat==='image'||/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/.test(url)) return 'image';
  // 비디오
  if(ft.startsWith('video/')||cat==='video'||/\.(mp4|webm|ogg|mov|avi|mkv)(\?|$)/.test(url)) return 'video';
  // 문서
  if(ft.includes('pdf')||ft.includes('document')||ft.includes('spreadsheet')||ft.includes('presentation')||
     ft.includes('text/')||cat==='document'||/\.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)(\?|$)/.test(url)) return 'doc';
  // 오디오
  if(ft.startsWith('audio/')||/\.(mp3|wav|flac|aac|ogg|m4a|opus)(\?|$)/.test(url)) return 'audio';
  return 'audio'; // 기본값
}

function typeEmoji(t){ return t==='video'?'🎬':t==='image'?'🖼️':t==='doc'?'📄':'🎵'; }
function typeLabel(t){ return t==='video'?'TL4 · 영상':t==='image'?'TL2 · 이미지':t==='doc'?'TL1 · 문서':'TL3 · 오디오'; }

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 렌더 ────────────────────────────────────────────────
function renderShares(list){
  var g=document.getElementById('fileGrid');
  if(!list.length){
    g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--t3);font-size:14px">📂 공유된 파일이 없습니다<br><br><a href="creator.html" style="color:var(--purple);text-decoration:none;font-weight:700">+ 파일 공유하기</a></div>';
    return;
  }
  var bgs=['linear-gradient(135deg,#1a1060,#0d3050)','linear-gradient(135deg,#0d3020,#102830)',
           'linear-gradient(135deg,#200a40,#0a0820)','linear-gradient(135deg,#0a1830,#20100a)',
           'linear-gradient(135deg,#1a0820,#0d0518)','linear-gradient(135deg,#0a1a30,#1a0830)'];
  g.innerHTML=list.map(function(s,i){
    var ftype=detectType(s);
    var fileUrl=(s.stream_url&&s.stream_url.trim())?s.stream_url:(s.preview_url&&s.preview_url.trim())?s.preview_url:'';
    var hasUrl=!!fileUrl;
    var hasTL=(s.file_tl||0)>0;
    var isPlaying=(_tlShareId===s.id&&_tlPlaying);

    // 재생 버튼 결정
    var btnClass='fc-play '+(isPlaying?'playing':!hasUrl?'no-file':!hasTL?'need-charge':'playable');
    var btnIcon=isPlaying?'⏸':!hasUrl?'✕':!hasTL?'⚡':'▶';
    var btnTitle=!hasUrl?'파일 없음':!hasTL?'TL 충전 필요':'재생';

    var dur=s.duration?(Math.floor(s.duration/60)+':'+String(s.duration%60).padStart(2,'0')):'--:--';

    return '<div class="file-card" id="card-'+s.id+'">' +
      '<div class="file-thumb" style="background:'+bgs[i%bgs.length]+';position:relative">' +
        (s.cover_url?'<img src="'+escH(s.cover_url)+'" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85" onerror="this.remove()">':'') +
        '<div class="thumb-overlay"></div>' +
        (!s.cover_url?'<span style="position:relative;z-index:1;font-size:32px">'+typeEmoji(ftype)+'</span>':'') +
        '<button class="'+btnClass+'" data-sid="'+s.id+'" onclick="tlPlayCard(this)" title="'+btnTitle+'" style="z-index:2">'+btnIcon+'</button>' +
      '</div>' +
      '<div class="fc-body">' +
        '<div class="fc-type">'+typeLabel(ftype)+' · '+dur+'</div>' +
        '<div class="fc-title">'+escH(s.title)+'</div>' +
        '<div class="fc-artist">'+escH(s.artist||'')+(s.album?' · '+escH(s.album):'')+'</div>' +
        '<div class="fc-meta">' +
          '<span class="fc-price">'+Number(s.file_tl||0).toLocaleString()+' TL</span>' +
          '<span class="fc-stats">🔥'+Number(s.pulse||0).toLocaleString()+'</span>' +
        '</div>' +
        '<div class="fc-tags"><span class="fc-tag">#'+escH(s.category||'Music')+'</span>' +
          (!hasUrl?'<span class="fc-tag" style="color:rgba(255,100,100,.7);border-color:rgba(255,100,100,.2)">파일없음</span>':'') +
        '</div>' +
        '<div class="fc-actions">' +
          (s.preview_url&&ftype==='audio'
            ? '<button class="fc-btn fc-btn-primary" onclick="quickPreview(\''+escH(s.preview_url)+'\',\''+escH(s.title)+'\')">▶ 미리듣기</button>'
            : '<button class="fc-btn fc-btn-ghost" disabled style="opacity:.35">미리듣기 없음</button>') +
          '<button class="fc-btn fc-btn-charge" onclick="chargeTL(\''+s.id+'\',\''+escH(s.title)+'\')">⚡ TL 충전</button>' +
        '</div>' +
        '<div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:8px;font-family:var(--fm)">'+escH(s.username||'')+' · '+new Date(s.created_at||0).toLocaleDateString('ko')+'</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── TL 충전 ─────────────────────────────────────────────
async function chargeTL(shareId,title){
  if(!_user){ alert('로그인이 필요합니다'); return; }
  var amtStr=prompt('⚡ "'+title+'" 에 충전할 TL 입력\n현재 내 TL: '+Number(_user.tl||0).toLocaleString()+' TL','100');
  if(!amtStr) return;
  var amt=parseInt(amtStr);
  if(!amt||amt<=0){ alert('올바른 숫자를 입력하세요'); return; }
  if((_user.tl||0)<amt){ alert('TL 부족!\n현재: '+Number(_user.tl||0).toLocaleString()+' TL'); return; }
  try{
    var r=await fetch(API_BASE+'/api/shares/'+shareId+'/charge',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({amount:amt,email:_user.email})
    });
    var d=await r.json();
    if(!r.ok) throw new Error(d.error||'충전 실패');
    _user.tl=(_user.tl||0)-amt;
    localStorage.setItem('tl_user',JSON.stringify(_user));
    var el=document.getElementById('sp-tl-bal'); if(el) el.textContent=Number(_user.tl).toLocaleString()+' TL';
    alert('✅ '+amt.toLocaleString()+' TL 충전!\n파일 TL: '+Number(d.file_tl||0).toLocaleString()+' TL');
    loadShares();
  }catch(err){ alert('충전 실패: '+err.message); }
}

// ── 미리듣기 (Spotify 30초, TL 차감 없음) ────────────────
var _previewAudio=null;
function quickPreview(url,title){
  if(_previewAudio){ _previewAudio.pause(); _previewAudio=null; }
  _previewAudio=new Audio(url);
  _previewAudio.play().catch(function(e){ alert('미리듣기 실패: '+e.message); });
  // 하단 바에 간단 표시
  document.getElementById('tlPlayerBar').style.display='block';
  document.getElementById('tlTitle').textContent='[미리듣기] '+title;
  document.getElementById('tlArtist').textContent='TL 소모 없음 · 30초 프리뷰';
  document.getElementById('tlRemain').textContent='FREE';
  document.getElementById('tlBar').style.width='100%';
  document.getElementById('tlPlayBtn').textContent='⏸';
  _previewAudio.onended=function(){
    document.getElementById('tlPlayBtn').textContent='▶';
    document.getElementById('tlTitle').textContent='-';
  };
}

// ── 카드 재생 버튼 ───────────────────────────────────────
function tlPlayCard(el){
  var sid=el.getAttribute('data-sid');
  var s=_allShares.find(function(x){return x.id===sid;});
  if(!s) return;

  // 현재 재생 중인 카드 클릭 → 토글
  if(_tlShareId===s.id&&_tlPlaying){ tlToggle(); return; }

  var fileUrl=(s.stream_url&&s.stream_url.trim())?s.stream_url:(s.preview_url&&s.preview_url.trim())?s.preview_url:'';

  if(!fileUrl){
    alert('⚠️ "'+s.title+'"\n\n재생 파일이 없습니다.\n크리에이터가 파일을 업로드하지 않았습니다.');
    return;
  }
  if((s.file_tl||0)<=0){
    if(confirm('"'+s.title+'"\n\nTL이 없습니다. 지금 충전하시겠습니까?')){ chargeTL(s.id,s.title); }
    return;
  }

  tlPlay(s.id, s.title, s.artist||'', s.cover_url||'', fileUrl, s.file_tl||0, s.duration||0, s);
}

// ═══════════════════════════════════════════════════════
// TL PLAYER ENGINE
// ═══════════════════════════════════════════════════════
var _tlAudio=null, _tlShareId=null, _tlMaxTL=0, _tlCurrentTL=0;
var _tlTimer=null, _tlPlaying=false, _tlElapsed=0, _tlDuration=0;
var _tlShareObj=null;

function tlPlay(shareId,title,artist,coverUrl,fileUrl,fileTL,duration,shareObj){
  tlStop(true);

  _tlShareId=shareId; _tlShareObj=shareObj;
  _tlMaxTL=fileTL; _tlCurrentTL=fileTL;
  _tlElapsed=0; _tlDuration=duration||0;

  var ftype=shareObj?detectType(shareObj):'audio';

  // 커버 업데이트
  document.getElementById('tlTitle').textContent=title;
  document.getElementById('tlArtist').textContent=artist||'';
  var cov=document.getElementById('tlCover');
  if(coverUrl&&ftype!=='image'){
    cov.innerHTML='<img src="'+coverUrl+'" style="width:100%;height:100%;object-fit:cover">';
  } else {
    cov.innerHTML=typeEmoji(ftype);
  }

  document.getElementById('tlPlayerBar').style.display='block';
  document.getElementById('tlWarning').style.display='none';
  document.getElementById('tlError').style.display='none';
  tlUpdateUI();

  // ── 이미지 ──────────────────────────────────────────
  if(ftype==='image'){
    document.getElementById('ioTitle').textContent=title;
    document.getElementById('ioImg').src=fileUrl;
    document.getElementById('imageOverlay').classList.add('show');
    tlStartTimer();
    _tlPlaying=true;
    document.getElementById('tlPlayBtn').textContent='⏸';
    document.addEventListener('keydown',_escHandler);
    renderShares(_getFilteredList()); // 버튼 상태 갱신
    return;
  }

  // ── 문서 ────────────────────────────────────────────
  if(ftype==='doc'){
    document.getElementById('doTitle').textContent='📄 '+title;
    var isPdf=/\.pdf(\?|$)/i.test(fileUrl)||( shareObj&&(shareObj.file_type||'').includes('pdf'));
    var iframeSrc=isPdf?fileUrl:'https://docs.google.com/viewer?url='+encodeURIComponent(fileUrl)+'&embedded=true';
    document.getElementById('docFrame').src=iframeSrc;
    document.getElementById('docExtLink').href=fileUrl;
    document.getElementById('docOverlay').classList.add('show');
    tlStartTimer();
    _tlPlaying=true;
    document.getElementById('tlPlayBtn').textContent='⏸';
    document.addEventListener('keydown',_escHandler);
    renderShares(_getFilteredList());
    return;
  }

  // ── 비디오 ──────────────────────────────────────────
  if(ftype==='video'){
    var vo=document.getElementById('voVideo');
    document.getElementById('voTitle').textContent=title;
    vo.src=fileUrl;
    vo.load();
    document.getElementById('videoOverlay').classList.add('show');
    vo.play().then(function(){
      tlStartTimer();
      _tlPlaying=true;
      document.getElementById('tlPlayBtn').textContent='⏸';
    }).catch(function(e){
      showPlayerError('비디오 재생 실패: '+e.message+'\n\n파일 URL: '+fileUrl);
    });
    vo.onended=function(){ tlStop(); };
    document.addEventListener('keydown',_escHandler);
    renderShares(_getFilteredList());
    return;
  }

  // ── 오디오 ──────────────────────────────────────────
  // crossOrigin 없이 시도 (CORS 문제 우회)
  _tlAudio=new Audio();
  _tlAudio.preload='auto';

  _tlAudio.onerror=function(e){
    // CORS 에러 시 crossOrigin 제거 후 재시도
    if(_tlAudio&&_tlAudio.crossOrigin){
      _tlAudio.crossOrigin=null;
      _tlAudio.load();
      _tlAudio.play().catch(function(e2){
        showPlayerError('오디오 재생 실패: '+e2.message);
      });
      return;
    }
    showPlayerError('파일 로드 실패. R2 CORS 설정을 확인하세요.\nURL: '+fileUrl.slice(0,80));
  };

  _tlAudio.oncanplay=function(){
    _tlAudio.play().then(function(){
      tlStartTimer();
      _tlPlaying=true;
      document.getElementById('tlPlayBtn').textContent='⏸';
      renderShares(_getFilteredList());
    }).catch(function(e){
      // 자동재생 차단 시 사용자에게 알림
      if(e.name==='NotAllowedError'){
        document.getElementById('tlPlayBtn').textContent='▶';
        document.getElementById('tlError').style.display='block';
        document.getElementById('tlError').textContent='▶ 버튼을 눌러 재생하세요 (브라우저 자동재생 차단)';
        // 버튼 누르면 재생되도록 준비 상태 유지
        _tlPlaying=false;
      } else {
        showPlayerError('재생 실패: '+e.message);
      }
    });
  };

  _tlAudio.onended=function(){ tlStop(); };
  _tlAudio.src=fileUrl;
  _tlAudio.load();
}

function showPlayerError(msg){
  var el=document.getElementById('tlError');
  el.style.display='block';
  el.textContent='❌ '+msg;
  console.error('[TLPlayer]',msg);
}

function _getFilteredList(){
  var list=_allShares.slice();
  if(_search){ var q=_search.toLowerCase(); list=list.filter(function(s){return (s.title||'').toLowerCase().includes(q)||(s.artist||'').toLowerCase().includes(q);}); }
  if(_tab==='hot') list.sort(function(a,b){return (b.pulse||0)-(a.pulse||0);});
  else if(_tab==='tl') list.sort(function(a,b){return (b.file_tl||0)-(a.file_tl||0);});
  else list.sort(function(a,b){return (b.created_at||0)-(a.created_at||0);});
  if(_filter!=='all') list=list.filter(function(s){
    var c=(s.category||'').toLowerCase();
    if(_filter==='music') return isMusicCat(s.category);
    if(_filter==='video') return c==='video';
    if(_filter==='image') return c==='image';
    if(_filter==='doc') return c==='document';
    return true;
  });
  return list;
}

function _escHandler(e){ if(e.key==='Escape') tlStop(); }

// ── 타이머 ──────────────────────────────────────────────
function tlStartTimer(){
  if(_tlTimer) clearInterval(_tlTimer);
  _tlTimer=setInterval(function(){
    if(!_tlPlaying) return;
    _tlCurrentTL=Math.max(0,_tlCurrentTL-1);
    _tlElapsed++;

    // 오디오 실제 재생 시간 동기화
    if(_tlAudio&&!_tlAudio.paused){
      _tlElapsed=Math.round(_tlAudio.currentTime)||_tlElapsed;
    }

    // 5초마다 서버 consume 보고
    if(_tlElapsed%5===0&&_tlShareId&&_tlShareId!=='preview'){
      fetch(API_BASE+'/api/shares/'+_tlShareId+'/consume',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({seconds:5})
      }).then(function(r){return r.json();}).then(function(d){
        // 서버 TL 값으로 동기화
        if(d.file_tl!==undefined) _tlCurrentTL=d.file_tl;
      }).catch(function(){});
    }

    tlUpdateUI();

    if(_tlCurrentTL<=0){
      tlStop();
      document.getElementById('tlWarning').style.display='block';
    }
  },1000);
}

function tlUpdateUI(){
  var fmt=function(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
  var pct=_tlMaxTL>0?Math.max(0,_tlCurrentTL/_tlMaxTL*100):0;

  document.getElementById('tlRemain').textContent=Number(_tlCurrentTL).toLocaleString()+' TL';
  var bar=document.getElementById('tlBar');
  bar.style.width=pct+'%';
  bar.style.background=pct<20?'linear-gradient(90deg,#ef4444,#f97316)':pct<50?'linear-gradient(90deg,#f59e0b,#eab308)':'linear-gradient(90deg,#7c3aed,#a855f7)';

  var docR=document.getElementById('docRemain'); if(docR) docR.textContent='⚡ '+Number(_tlCurrentTL).toLocaleString()+' TL 남음';
  document.getElementById('tlTimer').textContent=fmt(_tlElapsed);
  if(_tlDuration) document.getElementById('tlDur').textContent=fmt(_tlDuration);
  if(_tlDuration) document.getElementById('tlProgress').style.width=Math.min(100,_tlElapsed/_tlDuration*100)+'%';
}

function tlToggle(){
  if(!_tlAudio&&!_tlPlaying) return;
  if(_tlPlaying){
    _tlPlaying=false;
    if(_tlAudio) _tlAudio.pause();
    var vo=document.getElementById('voVideo'); if(!vo.paused) vo.pause();
    document.getElementById('tlPlayBtn').textContent='▶';
  } else {
    _tlPlaying=true;
    if(_tlAudio) _tlAudio.play().catch(function(){});
    var vo2=document.getElementById('voVideo'); if(vo2.src&&vo2.paused) vo2.play().catch(function(){});
    document.getElementById('tlPlayBtn').textContent='⏸';
  }
}

function tlStop(silent){
  _tlPlaying=false;
  if(_tlTimer){ clearInterval(_tlTimer); _tlTimer=null; }
  if(_tlAudio){ _tlAudio.pause(); _tlAudio.src=''; _tlAudio=null; }

  // 비디오 정리
  var vo=document.getElementById('voVideo'); vo.pause(); vo.src='';
  document.getElementById('videoOverlay').classList.remove('show');

  // 이미지 정리
  document.getElementById('imageOverlay').classList.remove('show');
  document.getElementById('ioImg').src='';

  // 문서 정리
  document.getElementById('docOverlay').classList.remove('show');
  document.getElementById('docFrame').src='';

  document.removeEventListener('keydown',_escHandler);

  if(!silent){
    document.getElementById('tlPlayerBar').style.display='none';
    document.getElementById('tlError').style.display='none';
  }
  document.getElementById('tlPlayBtn').textContent='▶';

  var prevSid=_tlShareId;
  _tlShareId=null; _tlShareObj=null;

  // 카드 버튼 상태 갱신
  if(prevSid){
    var btn=document.querySelector('[data-sid="'+prevSid+'"]');
    if(btn){
      var s=_allShares.find(function(x){return x.id===prevSid;});
      if(s){
        var fileUrl=(s.stream_url&&s.stream_url.trim())?s.stream_url:(s.preview_url&&s.preview_url.trim())?s.preview_url:'';
        var hasTL=(s.file_tl||0)>0;
        btn.className='fc-play '+(!fileUrl?'no-file':!hasTL?'need-charge':'playable');
        btn.textContent=!fileUrl?'✕':!hasTL?'⚡':'▶';
      }
    }
  }
}

function seekProgress(e){
  if(!_tlDuration) return;
  var bg=document.getElementById('tlProgressBg');
  var pct=e.offsetX/bg.offsetWidth;
  var targetSec=Math.floor(pct*_tlDuration);
  if(_tlAudio){ _tlAudio.currentTime=targetSec; }
  var vo=document.getElementById('voVideo'); if(vo.src){ vo.currentTime=targetSec; }
  _tlElapsed=targetSec;
  tlUpdateUI();
}

function tlCharge(){
  if(_tlShareObj) chargeTL(_tlShareId,document.getElementById('tlTitle').textContent);
}

// 초기 로드
loadShares();
</script>
</body>
</html>
