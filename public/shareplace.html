<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TimeLink — SHAREPLACE</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg-root:#08080F;--bg-deep:#0D0D1A;
  --bg-card:rgba(255,255,255,.05);--bg-card2:rgba(255,255,255,.07);
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.13);
  --purple:#8B5CF6;--purple-dim:#6D28D9;--mint:#00E5A0;
  --pink:#F472B6;--amber:#FBBF24;--rose:#FB7185;--blue:#60A5FA;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.35);
  --grad:linear-gradient(135deg,#8B5CF6 0%,#00E5A0 100%);
  --fn:'Noto Sans KR',sans-serif;--fm:'JetBrains Mono',monospace
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);background:var(--bg-root);color:var(--t1);min-height:100vh;;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}



.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh;position:relative;z-index:2}

/* SIDEBAR (condensed) */
.sidebar{background:var(--bg-sidebar);border-right:1px solid var(--bd);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;text-decoration:none}
.sb-logo-icon{width:30px;height:30px;background:var(--grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-logo-text{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.1em}
.sb-nav{padding:10px 0;flex:1}
.sb-section{padding:8px 16px 3px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:var(--fm)}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 16px;text-decoration:none;color:var(--t2);font-size:12px;font-weight:500;transition:all .2s ease;position:relative}
.sb-link:hover{color:var(--t1);background:rgba(255,255,255,.03)}
.sb-link.active{color:var(--t1);background:rgba(129,140,248,.08)}
.sb-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--purple);border-radius:0 2px 2px 0}
.sb-icon{font-size:14px;width:20px;text-align:center}

/* FILE TYPE FILTER */
.type-section{padding:12px 0}
.type-section .sb-section{margin-bottom:6px}
.type-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:12px;color:var(--t2);;transition:all .2s ease;border-radius:0}
.type-item:hover,.type-item.active{color:var(--t1);background:rgba(255,255,255,.03)}
.type-item.active{color:var(--purple)}
.type-count{margin-left:auto;font-family:var(--fm);font-size:10px;color:var(--t3)}

/* MAIN */
.main{overflow-y:auto}
.topbar{display:flex;align-items:center;gap:14px;padding:18px 28px;border-bottom:1px solid var(--bd);background:rgba(3,5,7,.6);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.tb-back{display:flex;align-items:center;gap:6px;color:var(--t3);font-size:13px;text-decoration:none;;transition:all .2s ease}
.tb-back:hover{color:var(--t2)}
.tb-title{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:.08em}
.tb-search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--bd2);border-radius:10px;padding:8px 16px;flex:1;min-width:200px}
.tb-search input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;font-family:var(--fn);width:100%;}
.tb-search input::placeholder{color:var(--t3)}
.tb-upload{padding:9px 18px;border-radius:9px;border:none;background:var(--grad);color:#fff;font-size:13px;font-family:var(--fn);font-weight:700;;white-space:nowrap;transition:all .2s ease}
.tb-upload:hover{box-shadow:0 0 20px rgba(99,102,241,.4);transform:translateY(-1px)}

/* SORT BAR */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:12px}
.sort-tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--bd);border-radius:8px;padding:3px}
.sort-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;;color:var(--t3);background:none;border:none;font-family:var(--fn);transition:all .2s ease}
.sort-tab.active{background:var(--purple-dim);color:#fff}
.sort-tab:hover:not(.active){color:var(--t2)}
.sort-right{display:flex;align-items:center;gap:10px}
.sort-select{background:var(--bg-card);border:1px solid var(--bd2);color:var(--t2);padding:7px 12px;border-radius:8px;font-family:var(--fn);font-size:12px;;outline:none}
.sort-count{font-size:12px;color:var(--t3);font-family:var(--fm)}

/* FILE GRID */
.page-content{padding:24px 28px}
.file-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.file-card{background:var(--bg-card);border:1px solid var(--bd);border-radius:16px;overflow:hidden;;transition:all .3s ease;position:relative}
.file-card:hover{border-color:var(--bd2);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.4)}
.file-thumb{height:150px;display:flex;align-items:center;justify-content:center;font-size:44px;position:relative;overflow:hidden}
.thumb-overlay{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(129,140,248,.12) 0%,transparent 60%)}
.fc-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:rgba(99,102,241,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;transition:opacity .2s ease;box-shadow:0 0 20px rgba(99,102,241,.5)}
.file-card:hover .fc-play{opacity:1}
.fc-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;font-family:var(--fm)}
.fcb-cert{background:rgba(52,211,153,.15);color:var(--mint);border:1px solid rgba(52,211,153,.25)}
.fcb-hot{background:rgba(251,113,133,.15);color:var(--rose);border:1px solid rgba(251,113,133,.25)}
.fcb-new{background:rgba(252,211,77,.12);color:var(--amber);border:1px solid rgba(252,211,77,.25)}
.fc-body{padding:14px}
.fc-type{font-size:10px;color:var(--t3);font-family:var(--fm);letter-spacing:.08em;margin-bottom:5px}
.fc-title{font-size:14px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc-artist{font-size:12px;color:var(--t2);margin-bottom:10px}
.fc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fc-price{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--purple)}
.fc-stats{display:flex;gap:8px;font-size:11px;color:var(--t3)}
.fc-tags{display:flex;gap:4px;flex-wrap:wrap}
.fc-tag{font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.03);border:1px solid var(--bd);color:var(--t3)}
.fc-actions{display:flex;gap:6px;margin-top:10px}
.fc-btn{flex:1;padding:7px 0;border-radius:7px;border:none;font-size:11px;font-family:var(--fn);font-weight:700;;transition:all .2s ease}
.fc-btn-primary{background:rgba(99,102,241,.15);color:var(--purple);border:1px solid rgba(99,102,241,.2)}
.fc-btn-primary:hover{background:rgba(99,102,241,.25)}
.fc-btn-ghost{background:transparent;color:var(--t3);border:1px solid var(--bd)}
.fc-btn-ghost:hover{color:var(--t2)}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:32px 0 16px}
.pg-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--bd);background:var(--bg-card);font-size:13px;color:var(--t2);;transition:all .2s ease;font-family:var(--fm)}
.pg-btn:hover,.pg-btn.active{background:var(--purple-dim);color:#fff;border-color:var(--purple-dim)}
.pg-btn.active{box-shadow:0 0 12px rgba(99,102,241,.3)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(129,140,248,.15);border-radius:3px}
@media(max-width:1200px){.file-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.file-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

const files=[

// ═══════════════════════════════════════════════
// D1 기반 SharePlace — localStorage 완전 제거
// ═══════════════════════════════════════════════
const API_BASE = 'https://timelink-backend.mununglee.workers.dev';

// AUTH GUARD
var _spUser = null;
var _spToken = null;
(function(){
  try {
    _spUser = JSON.parse(localStorage.getItem('tl_user')||'null');
    _spToken = localStorage.getItem('tl_token');
  } catch(e){}
  if(!_spUser){ location.href='login.html'; return; }
  addBalanceBar(_spUser);
})();

function addBalanceBar(u){
  var topbar = document.querySelector('.topbar');
  if(!topbar) return;
  var bal = document.createElement('div');
  bal.style.cssText='display:flex;align-items:center;gap:8px;margin-left:auto;font-size:12px;font-family:var(--fm)';
  bal.id = 'sp-bal-bar';
  bal.innerHTML =
    '<span style="color:var(--t3)">&#9201;</span>' +
    '<span style="color:var(--mint);font-weight:700" id="sp-tl-bal">' + Number(u.tl||0).toLocaleString() + ' TL</span>' +
    '<span style="width:1px;height:16px;background:var(--bd)"></span>' +
    '<span style="color:var(--purple);font-weight:700">' + Number(u.tlc||0).toFixed(0) + ' TLC</span>' +
    '<button onclick="doLogout()" style="margin-left:8px;padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:11px;cursor:pointer">&#8617; 로그아웃</button>';
  var uploadBtn = topbar.querySelector('.tb-upload');
  if(uploadBtn) topbar.insertBefore(bal, uploadBtn);
  else topbar.appendChild(bal);
}

function doLogout(){
  localStorage.removeItem('tl_token');
  localStorage.removeItem('tl_user');
  location.href='login.html';
}

// ─── D1에서 Shares 로드 및 렌더 ───
var _allShares = [];
var _currentFilter = 'all';
var _currentTab = 'latest';

async function loadShares(){
  var countEl = document.querySelector('.sort-count');
  if(countEl) countEl.textContent = '로딩 중...';
  try {
    var r = await fetch(API_BASE + '/api/shares', {mode:'cors'});
    var d = await r.json();
    _allShares = d.shares || [];
  } catch(e) {
    console.warn('[SharePlace] /api/shares 실패:', e.message);
    _allShares = [];
  }
  applyFilter();
}

function applyFilter(){
  var list = _allShares.slice();
  // 탭 정렬
  if(_currentTab === 'hot') list.sort(function(a,b){ return (b.pulse||0)-(a.pulse||0); });
  else if(_currentTab === 'tl') list.sort(function(a,b){ return (b.file_tl||0)-(a.file_tl||0); });
  else list.sort(function(a,b){ return (b.created_at||0)-(a.created_at||0); });
  // 타입 필터
  if(_currentFilter !== 'all'){
    list = list.filter(function(s){
      var cat = (s.category||'').toLowerCase();
      if(_currentFilter==='music') return cat.includes('pop')||cat.includes('ballad')||cat.includes('indie')||cat.includes('hip')||cat.includes('jazz')||cat.includes('electronic')||cat.includes('classical')||cat==='music';
      if(_currentFilter==='video') return cat==='video';
      if(_currentFilter==='image') return cat==='image';
      if(_currentFilter==='doc') return cat==='document';
      return true;
    });
  }
  renderShares(list);
  var countEl = document.querySelector('.sort-count');
  if(countEl) countEl.textContent = '총 ' + list.length + '개 파일';
}

function renderShares(list){
  var g = document.getElementById('fileGrid');
  if(!list.length){
    g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:80px 20px;color:rgba(255,255,255,.3);font-size:14px">&#128202; 공유된 파일이 없습니다<br><br><a href="creator.html" style="color:var(--purple);text-decoration:none;font-weight:700">&#43; 파일 공유하기</a></div>';
    return;
  }
  var bgs = [
    'linear-gradient(135deg,#1a1060 0%,#0d3050 100%)',
    'linear-gradient(135deg,#0d3020 0%,#102830 100%)',
    'linear-gradient(135deg,#200a40,#0a0820)',
    'linear-gradient(135deg,#0a1830,#20100a)',
    'linear-gradient(135deg,#1a0820,#0d0518)',
    'linear-gradient(135deg,#0a1a30,#1a0830)'
  ];
  g.innerHTML = list.map(function(s, i){
    var hasCover = !!s.cover_url;
    var hasSpotify = !!s.spotify_id;
    var dur = s.duration ? (Math.floor(s.duration/60)+':'+String(s.duration%60).padStart(2,'0')) : '--:--';
    var cat = s.category || 'Music';
    var thumbStyle = hasCover
      ? 'background:' + bgs[i%bgs.length] + ';position:relative'
      : 'background:' + bgs[i%bgs.length];

    return '<div class="file-card">' +
      '<div class="file-thumb" style="' + thumbStyle + ';cursor:default">' +
        (hasCover
          ? '<img src="' + escHtml(s.cover_url) + '" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85" onerror="this.remove()">'
          : '') +
        '<div class="thumb-overlay"></div>' +
        (!hasCover ? '<span style="position:relative;z-index:1;font-size:32px">&#127925;</span>' : '') +
        (hasSpotify ? '<span class="fc-badge" style="position:absolute;top:10px;left:10px;z-index:2;background:rgba(30,215,96,.2);border:1px solid rgba(30,215,96,.4);color:#1ED760;font-size:10px;padding:3px 8px;border-radius:5px;font-family:var(--fm)">&#9654; Spotify</span>' : '') +
        '<div class="fc-play" style="position:absolute;bottom:10px;right:10px;z-index:2">&#9654;</div>' +
      '</div>' +
      '<div class="fc-body">' +
        '<div class="fc-type">' + escHtml(cat) + ' &middot; ' + dur + '</div>' +
        '<div class="fc-title">' + escHtml(s.title) + '</div>' +
        '<div class="fc-artist">' + escHtml(s.artist||'') + (s.album?' &middot; '+escHtml(s.album):'') + '</div>' +
        '<div class="fc-meta">' +
          '<span class="fc-price" style="color:var(--purple)">' + Number(s.file_tl||0).toLocaleString() + ' TL</span>' +
          '<span class="fc-stats"><span>&#128293;' + Number(s.pulse||0).toLocaleString() + '</span></span>' +
        '</div>' +
        '<div class="fc-tags"><span class="fc-tag">#' + escHtml(cat) + '</span>' +
          (hasSpotify ? '<span class="fc-tag" style="color:#1ED760;border-color:rgba(30,215,96,.3)">&#9654; Spotify 인증</span>' : '') +
        '</div>' +
        '<div class="fc-actions">' +
          (s.preview_url
            ? '<button class="fc-btn fc-btn-primary" onclick="previewTrack(\'' + escHtml(s.preview_url) + '\',\'' + escHtml(s.title) + '\')">&#127925; 미리듣기</button>'
            : '<button class="fc-btn fc-btn-ghost" disabled style="opacity:.4">미리듣기 없음</button>') +
          (s.spotify_url
            ? '<a href="' + escHtml(s.spotify_url) + '" target="_blank" class="fc-btn fc-btn-primary" style="text-decoration:none">Spotify &#8599;</a>'
            : '') +
          '<button class="fc-btn fc-btn-ghost">&#128204;</button>' +
        '</div>' +
        '<div style="font-size:10px;color:rgba(255,255,255,.25);margin-top:8px;font-family:var(--fm)">' +
          escHtml(s.username||'') + ' &middot; ' + new Date(s.created_at||0).toLocaleDateString('ko') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// 미리듣기 (Spotify 30초 프리뷰)
var _previewAudio = null;
function previewTrack(url, title){
  if(_previewAudio){ _previewAudio.pause(); _previewAudio = null; }
  _previewAudio = new Audio(url);
  _previewAudio.play().catch(function(){});
  // 간단 토스트
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid rgba(30,215,96,.3);color:#1ED760;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;backdrop-filter:blur(12px)';
  el.textContent = '&#9654; ' + title + ' — 30초 미리듣기';
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 30000);
}

function filterType(el, type){
  document.querySelectorAll('.type-item').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  _currentFilter = type;
  applyFilter();
}

function switchTab(el, tab){
  document.querySelectorAll('.sort-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  _currentTab = tab || 'latest';
  applyFilter();
}

function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 초기 로드
loadShares();
-e 
</script>
