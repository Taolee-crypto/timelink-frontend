<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>결제 실패 - TimeLink</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080F;color:#fff;font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.card{background:#0D0D1A;border:1px solid rgba(248,113,133,.3);border-radius:20px;padding:40px;max-width:400px;width:100%}
.icon{font-size:56px;margin-bottom:16px}
.title{font-size:22px;font-weight:800;color:#F87185;margin-bottom:8px}
.sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;line-height:1.6}
.btn{padding:13px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#8B5CF6,#7C3AED);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <div class="title">결제 실패</div>
  <div class="sub" id="errMsg">결제가 취소되거나 실패했습니다.</div>
  <a href="shareplace.html" class="btn">돌아가기</a>
</div>
<script>
var p = new URLSearchParams(location.search);
var code = p.get('code');
var msg  = p.get('message');
if(msg) document.getElementById('errMsg').textContent = decodeURIComponent(msg);
</script>
</body>
</html>
