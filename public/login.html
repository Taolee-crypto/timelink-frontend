<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TimeLink — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-root:#08080F;--bg-deep:#0D0D1A;
  --bg-card:rgba(255,255,255,.05);--bg-card2:rgba(255,255,255,.07);
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.13);
  --purple:#8B5CF6;--purple-dim:#6D28D9;--mint:#00E5A0;
  --amber:#FBBF24;--rose:#FB7185;
  --t1:#fff;--t2:rgba(255,255,255,.65);--t3:rgba(255,255,255,.35);
  --grad:linear-gradient(135deg,#8B5CF6 0%,#00E5A0 100%);
  --fn:'Noto Sans KR',sans-serif;--fm:'JetBrains Mono',monospace
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);background:var(--bg-root);color:var(--t1);min-height:100vh;;overflow-x:hidden;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 60% at 20% 20%,rgba(139,92,246,.08) 0%,transparent 55%),
  radial-gradient(ellipse 60% 50% at 80% 80%,rgba(0,229,160,.06) 0%,transparent 55%);
  pointer-events:none;z-index:0}




/* CARD */
.card{position:relative;z-index:2;width:100%;max-width:440px;margin:24px;background:rgba(255,255,255,.04);border:1px solid var(--bd2);border-radius:24px;padding:44px 40px;backdrop-filter:blur(24px);animation:up .4s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.card-logo{display:flex;align-items:center;gap:10px;text-decoration:none;justify-content:center;margin-bottom:32px}
.logo-icon{width:38px;height:38px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:'Syncopate',sans-serif;font-size:14px;font-weight:700;letter-spacing:.15em;color:var(--t1)}

.card-title{font-size:26px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.card-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:28px;line-height:1.5}

/* DEMO HINT */
.hint-box{background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.18);border-radius:12px;padding:12px 16px;margin-bottom:24px;font-size:13px;color:var(--t2);text-align:center;line-height:1.6}
.hint-box strong{color:var(--mint);font-family:var(--fm)}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--t3);font-family:var(--fm);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid var(--bd2);border-radius:11px;color:var(--t1);font-size:14px;font-family:var(--fn);outline:none;transition:all .2s ease;}
.form-input:focus{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.05);box-shadow:0 0 0 3px rgba(139,92,246,.1)}
.form-input::placeholder{color:var(--t3)}

.forgot{text-align:right;margin:-8px 0 14px}
.forgot a{font-size:12px;color:var(--t3);text-decoration:none;transition:color .2s;}
.forgot a:hover{color:var(--mint)}

.btn-login{width:100%;padding:14px;border-radius:12px;border:none;background:var(--grad);color:#fff;font-size:15px;font-weight:700;font-family:var(--fn);cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(139,92,246,.35)}
.btn-login:disabled{opacity:.5;transform:none;box-shadow:none;cursor:not-allowed}
.btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 100%);pointer-events:none}

.divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--t3);font-size:11px;font-family:var(--fm)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}

.btn-ton{width:100%;padding:13px;border-radius:12px;border:1px solid var(--bd2);background:rgba(255,255,255,.03);color:var(--t3);font-size:13px;font-weight:600;font-family:var(--fn);cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:8px;opacity:.4}

.card-footer{text-align:center;margin-top:22px;font-size:13px;color:var(--t3)}
.card-footer a{color:var(--purple);text-decoration:none;font-weight:700;;transition:color .2s}
.card-footer a:hover{color:var(--mint)}

/* TOAST */
#toast-box{position:fixed;bottom:28px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.t{padding:11px 16px;border-radius:12px;font-size:13px;font-weight:600;backdrop-filter:blur(20px);border:1px solid var(--bd);animation:ti .25s ease;max-width:300px}
.t.s{background:rgba(0,229,160,.12);color:var(--mint);border-color:rgba(0,229,160,.3)}
.t.e{background:rgba(251,113,133,.12);color:var(--rose);border-color:rgba(251,113,133,.3)}
.t.i{background:rgba(139,92,246,.12);color:var(--purple);border-color:rgba(139,92,246,.3)}
@keyframes ti{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="toast-box"></div>

<div class="card">
  <a href="signup.html" class="card-logo">
    <div class="logo-icon">⏱</div>
    <span class="logo-text">TIMELINK</span>
  </a>

  <div class="card-title">다시 오셨군요</div>
  <div class="card-sub">계속 Pulse를 쌓아보세요 ⚡</div>

  <div class="hint-box">
    🎵 데모 체험: <strong><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="2a4e4f47456a5e43474f46434441044e434d435e4b46">[email&#160;protected]</a></strong> / <strong>demo1234</strong>
  </div>

  <div class="form-group">
    <label class="form-label">이메일</label>
    <input type="email" id="email" class="form-input" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label class="form-label">비밀번호</label>
    <input type="password" id="pw" class="form-input" placeholder="비밀번호 입력" autocomplete="current-password">
  </div>
  <div class="forgot"><a href="#">비밀번호를 잊으셨나요?</a></div>

  <button class="btn-login" id="login-btn" onclick="doLogin()">
    로그인 →
  </button>

  <div class="divider">또는</div>
  <button class="btn-ton">💎 TON Wallet 로그인 <span style="font-size:11px">(Phase 2)</span></button>

  <div class="card-footer">계정이 없으신가요? <a href="signup.html">무료 가입 →</a></div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const API = 'https://timelink-backend.mununglee.workers.dev';

document.querySelectorAll('a,button,input').forEach(el=>{
});

function toast(msg,t='i'){
  const el=document.createElement('div');el.className=`t ${t}`;el.textContent=msg;
  document.getElementById('toast-box').prepend(el);setTimeout(()=>el.remove(),3200);
}

// 이미 로그인된 경우 바로 이동
(function(){
  if(localStorage.getItem('tl_user') && localStorage.getItem('tl_token')){
    location.href='dashboard.html';
  }
})();

// 엔터 키
document.addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('login-btn');

  if(!email||!pw){toast('이메일과 비밀번호를 입력해주세요','e');return;}

  btn.disabled=true;btn.innerHTML='<div class="spin"></div>';

  // 1. 백엔드 API 시도
  let loggedIn=false;
  try{
    const r=await fetch(API+'/api/auth/login',{
      method:'POST',mode:'cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pw}),
      signal:AbortSignal.timeout(4000)
    });
    if(r.ok){
      const d=await r.json();
      if(d.token&&d.user){
        localStorage.setItem('tl_token',d.token);
        localStorage.setItem('tl_user',JSON.stringify(d.user));
        loggedIn=true;
      }
    }
  }catch(err){console.warn('[Login] API 실패, 로컬 폴백:', err.message);}

  // 2. API 실패 시: localStorage 저장된 회원 확인 또는 데모 계정
  if(!loggedIn){
    const stored=JSON.parse(localStorage.getItem('tl_signup_'+email)||'null');
    if(stored&&stored.pw===pw){
      // 직접 가입한 계정
      delete stored.pw;
      localStorage.setItem('tl_token','local_'+Date.now());
      localStorage.setItem('tl_user',JSON.stringify(stored));
      loggedIn=true;
    } else if(email==='demo@timelink.digital'&&pw==='demo1234'){
      // 데모 계정
      const demoUser={id:1,email:'demo@timelink.digital',username:'Demo User',tl:42500,tlc:123,account_type:'personal'};
      localStorage.setItem('tl_token','demo_'+Date.now());
      localStorage.setItem('tl_user',JSON.stringify(demoUser));
      loggedIn=true;
    } else if(email.includes('@')&&pw.length>=4){
      // 임시 폴백: 이메일/비밀번호가 유효하면 기본 유저로 로그인
      const fallbackUser={id:Date.now(),email,username:email.split('@')[0],tl:10000,tlc:0,account_type:'personal'};
      localStorage.setItem('tl_token','fallback_'+Date.now());
      localStorage.setItem('tl_user',JSON.stringify(fallbackUser));
      loggedIn=true;
    }
  }

  btn.disabled=false;btn.innerHTML='로그인 →';
