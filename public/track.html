<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TimeLink - 트랙 상세</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--purple:#8B5CF6;--mint:#00e5a0;--t1:#fff;--t2:rgba(255,255,255,.7);--t3:rgba(255,255,255,.35);--bd:rgba(255,255,255,.08);--fn:'Pretendard',sans-serif}
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
body{background:var(--bg);color:var(--t1);font-family:var(--fn);min-height:100vh}

.hdr{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;background:rgba(10,10,15,.95);backdrop-filter:blur(20px)}
.back{background:none;border:none;color:var(--t2);cursor:pointer;font-size:22px;padding:4px 8px;border-radius:8px}
.back:hover{color:var(--t1)}
.logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.main{display:grid;grid-template-columns:340px 1fr;gap:0;min-height:calc(100vh - 57px)}

.left-panel{border-right:1px solid var(--bd);padding:32px 24px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.cover-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;margin-bottom:20px;background:linear-gradient(135deg,#4a00e0,var(--purple));cursor:pointer}
.cover-wrap img{width:100%;height:100%;object-fit:cover}
.cover-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}
.play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);opacity:0;transition:opacity .2s}
.cover-wrap:hover .play-overlay{opacity:1}
.play-overlay-btn{width:64px;height:64px;border-radius:50%;background:rgba(139,92,246,.95);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.play-overlay-btn:hover{transform:scale(1.05)}

.track-meta{margin-bottom:20px}
.track-category{font-size:11px;color:var(--purple);font-weight:700;letter-spacing:.1em;margin-bottom:6px}
.track-title{font-size:22px;font-weight:900;line-height:1.3;margin-bottom:6px}
.track-artist{font-size:14px;color:var(--t2);margin-bottom:4px}
.track-uploader{font-size:12px;color:var(--t3)}
.track-tl{font-size:18px;font-weight:700;margin:12px 0}
.track-tl.required{color:var(--purple)}
.track-tl.my{color:var(--mint)}

.actions{display:flex;flex-direction:column;gap:8px}
.btn-row-group{display:flex;gap:8px;margin-top:8px}
.btn-play{flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--purple),#4a00e0);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.btn-play:hover{opacity:.9}
.btn-charge{flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f7971e,#ffd200);color:#000;font-size:14px;font-weight:700;cursor:pointer}
.btn-play-gray{flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:rgba(255,255,255,.4);font-size:14px;cursor:not-allowed}
.btn-icon-group{display:flex;gap:8px;margin-top:8px}
.btn-icon{flex:1;padding:10px;border-radius:12px;border:1px solid var(--bd);background:none;color:var(--t2);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-icon:hover{border-color:var(--purple);color:var(--purple)}
.btn-icon.liked{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.1)}
.btn-icon.following{border-color:var(--mint);color:var(--mint);background:rgba(0,229,160,.1)}
.btn-dl{width:100%;padding:10px;border-radius:12px;border:1px solid rgba(0,229,160,.3);background:none;color:var(--mint);font-size:13px;cursor:pointer;margin-top:8px}
.btn-dl:hover{background:rgba(0,229,160,.1)}

.stats{display:flex;gap:0;margin-top:20px;border-top:1px solid var(--bd);padding-top:16px}
.stat{flex:1;text-align:center}
.stat-val{font-size:18px;font-weight:900}
.stat-label{font-size:10px;color:var(--t3);margin-top:2px}
.stat+.stat{border-left:1px solid var(--bd)}

.right-panel{display:flex;flex-direction:column}
.right-top{padding:32px 32px 0}
.section-label{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--bd)}

.comments-wrap{flex:1;padding:0 32px;overflow-y:auto}
.comment-list{display:flex;flex-direction:column;gap:20px;margin-bottom:20px}
.comment-item{display:flex;gap:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--mint));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.comment-body{flex:1}
.comment-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.comment-text{font-size:14px;color:var(--t2);line-height:1.6}
.comment-footer{display:flex;align-items:center;gap:12px;margin-top:6px}
.comment-time{font-size:11px;color:var(--t3)}
.comment-report{background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer}
.comment-report:hover{color:rgba(255,100,100,.7)}
.empty-comment{text-align:center;padding:40px 20px;color:var(--t3);font-size:14px}

.comment-input-wrap{padding:20px 32px 24px;border-top:1px solid var(--bd);display:flex;gap:10px;align-items:flex-start}
.input-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--mint));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.comment-box{flex:1}
.comment-textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:12px;color:#fff;font-size:14px;padding:12px 16px;font-family:var(--fn);resize:none}
.comment-textarea:focus{outline:none;border-color:var(--purple)}
.comment-actions{display:flex;justify-content:flex-end;margin-top:8px;gap:8px}
.comment-submit{background:var(--purple);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:8px 20px;cursor:pointer}
.comment-submit:hover{background:#7c3aed}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:24px;width:90%;max-width:380px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer}
.pl-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-radius:10px;cursor:pointer}
.pl-item:hover{background:rgba(255,255,255,.05)}
.pl-item-name{font-size:14px;font-weight:600}
.pl-item-cnt{font-size:11px;color:var(--t3);margin-top:2px}
.pl-add-btn{color:var(--purple);font-size:18px}
.new-pl-btn{width:100%;background:none;border:1px dashed rgba(139,92,246,.4);border-radius:10px;color:var(--purple);padding:12px;cursor:pointer;font-size:13px;margin-top:8px}
.new-pl-btn:hover{background:rgba(139,92,246,.1)}

.loading{display:flex;align-items:center;justify-content:center;height:300px;color:var(--t3);font-size:14px;gap:12px}
.spinner{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){.main{grid-template-columns:1fr}.left-panel{position:static;height:auto;border-right:none;border-bottom:1px solid var(--bd)}}

.copyright-section{padding:24px 32px;border-top:1px solid var(--bd)}
.lyrics-box{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:12px;padding:20px;font-size:14px;color:var(--t2);line-height:2;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.copyright-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.copyright-item{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:10px;padding:12px 16px}
.copyright-label{font-size:10px;color:var(--t3);font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.copyright-value{font-size:14px;color:var(--t1);font-weight:600}

.charge-pkg{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:10px;padding:14px;cursor:pointer;text-align:center}
.charge-pkg:hover,.charge-pkg.active{border-color:var(--purple);background:rgba(139,92,246,.1)}

#tlPlayerBar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(13,13,20,.98);backdrop-filter:blur(20px);border-top:1px solid rgba(139,92,246,.4);padding:12px 24px}
</style>
</head>
<body>

<div class="hdr">
  <button class="back" onclick="history.back()">←</button>
  <span class="logo">TimeLink</span>
</div>

<div class="main" id="mainWrap">
  <div class="loading" id="loadingEl"><div class="spinner"></div> 불러오는 중...</div>
</div>

<!-- 충전 모달 -->
<div class="modal-overlay" id="chargeModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr">
      <span class="modal-title">⚡ TL 충전</span>
      <button class="modal-close" onclick="closeChargeModal()">✕</button>
    </div>
    <div style="margin-bottom:16px">
      <div style="font-size:13px;color:var(--t2);margin-bottom:12px">충전할 TL을 선택하세요 (1TL = 1원)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="chargePkgs">
        <div class="charge-pkg" data-amount="1000" onclick="selectChargePkg(this)"><div style="font-size:16px;font-weight:900;color:var(--purple)">1,000 TL</div><div style="font-size:12px;color:var(--t3)">₩1,000</div></div>
        <div class="charge-pkg" data-amount="3000" onclick="selectChargePkg(this)"><div style="font-size:16px;font-weight:900;color:var(--purple)">3,000 TL</div><div style="font-size:12px;color:var(--t3)">₩3,000</div></div>
        <div class="charge-pkg" data-amount="5000" onclick="selectChargePkg(this)"><div style="font-size:16px;font-weight:900;color:var(--purple)">5,000 TL</div><div style="font-size:12px;color:var(--t3)">₩5,000</div></div>
        <div class="charge-pkg active" data-amount="10000" onclick="selectChargePkg(this)"><div style="font-size:16px;font-weight:900;color:var(--purple)">10,000 TL</div><div style="font-size:12px;color:var(--t3)">₩10,000 +500 보너스</div></div>
      </div>
    </div>
    <div style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--t2)">
      이 곡에 충전: <strong id="chargeTargetTitle" style="color:var(--t1)"></strong>
    </div>
    <button id="directChargeBtn" style="width:100%;padding:13px;border-radius:12px;border:none;background:rgba(0,229,160,.15);border:1px solid rgba(0,229,160,.3);color:var(--mint);font-size:14px;font-weight:700;cursor:pointer">
      보유 TL로 직접 충전
    </button>
  </div>
</div>

<!-- 공유 모달 -->
<div class="modal-overlay" id="shareModal">
  <div class="modal" style="max-width:380px">
    <div class="modal-hdr">
      <span class="modal-title">🔗 공유하기</span>
      <button class="modal-close" onclick="closeShareModal()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <button onclick="shareKakao()" style="padding:12px;border-radius:12px;border:none;background:#FEE500;color:#000;font-weight:700;cursor:pointer">💬 카카오톡</button>
      <button onclick="shareX()" style="padding:12px;border-radius:12px;border:none;background:#000;color:#fff;font-weight:700;cursor:pointer">𝕏 X</button>
      <button onclick="shareFacebook()" style="padding:12px;border-radius:12px;border:none;background:#1877F2;color:#fff;font-weight:700;cursor:pointer">f Facebook</button>
      <button onclick="copyLink()" style="padding:12px;border-radius:12px;border:1px solid var(--bd);background:none;color:var(--t2);cursor:pointer">🔗 링크 복사</button>
    </div>
    <div id="copyMsg" style="text-align:center;color:var(--mint);font-size:12px;display:none">링크가 복사됐어요!</div>
  </div>
</div>

<!-- 플레이리스트 모달 -->
<div class="modal-overlay" id="plModal">
  <div class="modal">
    <div class="modal-hdr"><span class="modal-title">📋 플레이리스트에 추가</span><button class="modal-close" onclick="closePlModal()">✕</button></div>
    <div id="plList"></div>
    <button class="new-pl-btn" onclick="createNewPlaylist()">+ 새 플레이리스트 만들기</button>
  </div>
</div>

<!-- TL 플레이어 바 -->
<div id="tlPlayerBar">
  <div style="display:flex;align-items:center;gap:16px;max-width:900px;margin:0 auto">
    <div style="min-width:0;flex:1"><div id="playerTitle" style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">-</div><div id="playerArtist" style="font-size:11px;color:rgba(255,255,255,.4)">-</div></div>
    <div style="flex:2;min-width:120px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:rgba(255,255,255,.4)">TL 잔액</span><span id="playerTLVal" style="font-size:11px;font-weight:700;color:#00e5a0">0 TL</span></div>
      <div style="height:4px;background:rgba(255,255,255,.1);border-radius:2px"><div id="playerTLBar" style="height:100%;background:linear-gradient(90deg,#8B5CF6,#00e5a0);border-radius:2px;width:100%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:3px"><span id="playerTime" style="font-size:9px;color:rgba(255,255,255,.3)">0:00</span><span id="playerDur" style="font-size:9px;color:rgba(255,255,255,.3)">-</span></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="playerPlayBtn" onclick="togglePlay()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:22px">▶</button>
      <button onclick="stopPlay()" style="background:rgba(139,92,246,.2);border:1px solid rgba(139,92,246,.4);border-radius:8px;color:#8B5CF6;cursor:pointer;font-size:11px;padding:5px 10px">■ 정지</button>
    </div>
  </div>
</div>

<script>
const API = 'https://api.timelink.digital';
const SHARE_ID = new URLSearchParams(location.search).get('id');
let _share = null, _myLiked = false, _myFollowing = false;
let _myFileTL = 0;  // 이 곡에 충전한 TL (tl_user_files DB에서 가져옴)
let _chargeAmount = 10000;

function getTok(){ return localStorage.getItem('tl_token')||''; }
function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(s){ const m=Math.floor((s||0)/60),sec=Math.floor((s||0)%60); return m+':'+(sec<10?'0':'')+sec; }
function typeEmoji(t){ return t==='audio'?'🎵':t==='video'?'🎬':t==='image'?'🖼️':'📄'; }

async function loadTrack(){
  if(!SHARE_ID){ document.getElementById('mainWrap').innerHTML='<div class="loading">잘못된 접근</div>'; return; }
  
  try {
    const [sr, statsR, myTlR] = await Promise.all([
      fetch(API+'/api/shares/'+SHARE_ID),
      fetch(API+'/api/social/stats/'+SHARE_ID,{headers:{'Authorization':'Bearer '+getTok()}}),
      fetch(API+'/api/shares/'+SHARE_ID+'/my-tl',{headers:{'Authorization':'Bearer '+getTok()}})
    ]);
    
    const s = await sr.json();
    const stats = await statsR.json();
    const myTl = await myTlR.json();
    
    // 🔥 중요: 서버에서 tl_balance 가져오기 (tl_user_files 테이블)
    // 응답 형식: { tl_balance: 1234 } 또는 { user_tl: 1234 }
    _myFileTL = Number(myTl.tl_balance ?? myTl.user_tl ?? myTl.balance ?? 0);
    _share = s; 
    _myLiked = stats.my_like||false;
    
    const requiredTL = Number(s.file_tl || 0);
    console.log('[DEBUG] track.html - shareId:', SHARE_ID);
    console.log('[DEBUG] requiredTL:', requiredTL, 'myFileTL:', _myFileTL);
    
    document.title = (s.title||'곡') + ' - TimeLink';
    renderPage(s, stats, _myFileTL, requiredTL);
    loadComments();
    renderCopyright(s);
    if(s.user_id) checkFollowStatus(s.user_id);
  } catch(e){ 
    console.error('Load error:', e);
    document.getElementById('mainWrap').innerHTML='<div class="loading">불러오기 실패: ' + e.message + '</div>'; 
  }
}

function renderPage(s, stats, myFileTL, requiredTL){
  // requiredTL이 0이면 TL이 없는 것 → 재생 불가, 충전 필요
  const needCharge = requiredTL === 0 || myFileTL < requiredTL;
  const canPlay = !needCharge && requiredTL > 0;
  
  const ftype = s.category_type||'audio';
  const hasUrl = !!(s.stream_url||s.file_url);
  const uid = s.user_id;

  document.getElementById('mainWrap').innerHTML = `
    <div class="left-panel">
      <div class="cover-wrap" id="coverWrap">
        ${s.cover_url ? '<img src="'+escH(s.cover_url)+'" onerror="this.style.display=\'none\'">' : '<div class="cover-placeholder">'+typeEmoji(ftype)+'</div>'}
        <div class="play-overlay"><button class="play-overlay-btn" id="coverPlayBtn">▶</button></div>
      </div>

      <div class="track-meta">
        <div class="track-category">#${escH(s.category||'Music')}</div>
        <div class="track-title">${escH(s.title)}</div>
        <div class="track-artist">${escH(s.artist||'')}${s.album?' · <span style="color:var(--t3)">'+escH(s.album)+'</span>':''}</div>
        <div class="track-uploader">by ${escH(s.username||'')} · ${new Date(Number(s.created_at||0)).toLocaleDateString('ko')}</div>
        <div class="track-tl required">⚡ 필요 TL: ${requiredTL > 0 ? requiredTL.toLocaleString() + ' TL' : '⚠️ TL 설정 필요 (재생 불가)'} <span style="font-size:12px;color:var(--t3);font-weight:400">/ ${fmtTime(s.duration)}</span></div>
        <div class="track-tl my" id="myTLDisplay">💰 내 충전 TL: ${myFileTL.toLocaleString()} TL</div>
      </div>

      <div class="actions">
        <div class="btn-row-group" id="actionButtons">
          <button class="btn-charge" id="chargeBtn">⚡ TL 충전</button>
          <button class="${canPlay ? 'btn-play' : 'btn-play-gray'}" id="playBtn" ${!canPlay ? 'disabled' : ''}>▶ 재생</button>
        </div>
        <div class="btn-icon-group">
          <button class="btn-icon ${_myLiked?'liked':''}" id="likeBtn">${_myLiked?'♥':'♡'} <span id="likeCount">${stats.likes||0}</span></button>
          ${uid ? '<button class="btn-icon" id="followBtn">+ 팔로우</button>' : ''}
          <button class="btn-icon" id="plBtn">📋</button>
          <button class="btn-icon" id="shareBtn">🔗</button>
        </div>
        ${hasUrl ? '<button class="btn-dl" id="dlBtn">⬇ .tl 다운로드</button>' : ''}
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-val" id="statLikes">${stats.likes||0}</div><div class="stat-label">좋아요</div></div>
        <div class="stat"><div class="stat-val" id="statComments">${stats.comments||0}</div><div class="stat-label">댓글</div></div>
        <div class="stat"><div class="stat-val">${Number(s.pulse||0).toLocaleString()}</div><div class="stat-label">재생수</div></div>
      </div>
    </div>

    <div class="right-panel">
      <div class="copyright-section" id="copyrightSection" style="display:none">
        <div class="section-label">🎵 저작권 정보</div>
        <div class="copyright-grid" id="copyrightGrid"></div>
        <div id="lyricsWrap" style="display:none"><div class="section-label" style="margin-top:16px">📝 가사</div><div class="lyrics-box" id="lyricsBox"></div></div>
      </div>
      <div class="right-top"><div class="section-label">💬 댓글</div></div>
      <div class="comments-wrap"><div id="commentList" class="comment-list"></div></div>
      <div class="comment-input-wrap">
        <div class="input-avatar">${(getTok()?'U':'?')}</div>
        <div class="comment-box">
          <textarea class="comment-textarea" id="commentInput" placeholder="댓글을 남겨보세요..." rows="3" maxlength="300"></textarea>
          <div class="comment-actions"><button class="comment-submit" id="commentSubmit">등록</button></div>
        </div>
      </div>
    </div>
  `;

  // 이벤트 바인딩
  document.getElementById('coverPlayBtn')?.addEventListener('click', (e) => { e.stopPropagation(); handlePlayClick(); });
  document.getElementById('coverWrap')?.addEventListener('click', () => { handlePlayClick(); });
  document.getElementById('playBtn')?.addEventListener('click', () => { handlePlayClick(); });
  document.getElementById('chargeBtn')?.addEventListener('click', () => { chargeTL(); });
  document.getElementById('likeBtn')?.addEventListener('click', () => { toggleLike(); });
  document.getElementById('followBtn')?.addEventListener('click', () => { if(_share?.user_id) toggleFollow(_share.user_id); });
  document.getElementById('plBtn')?.addEventListener('click', () => { openPlModal(); });
  document.getElementById('shareBtn')?.addEventListener('click', () => { shareTrack(); });
  document.getElementById('dlBtn')?.addEventListener('click', () => { downloadTL(); });
  document.getElementById('commentSubmit')?.addEventListener('click', () => { submitComment(); });
  
  // 충전 버튼 이벤트 재바인딩
  const directBtn = document.getElementById('directChargeBtn');
  if(directBtn){
    const newBtn = directBtn.cloneNode(true);
    directBtn.parentNode.replaceChild(newBtn, directBtn);
    newBtn.addEventListener('click', () => { doDirectCharge(); });
  }
}

function handlePlayClick(){
  if(!_share){ alert('곡 정보를 불러오는 중입니다'); return; }
  const requiredTL = Number(_share.file_tl||0);
  
  if(requiredTL === 0){
    alert('⚠️ 이 곡은 TL이 설정되지 않았습니다.\n크리에이터가 TL을 설정하면 재생할 수 있습니다.');
    return;
  }
  
  if(_myFileTL >= requiredTL){
    playTrack();
  } else {
    alert(`⚠️ TL이 부족합니다!\n필요: ${requiredTL} TL\n내 충전 TL: ${_myFileTL} TL\n\nTL을 충전해주세요.`);
    chargeTL();
  }
}

async function updateMyTLFromServer(){
  try{
    const r = await fetch(API+'/api/shares/'+SHARE_ID+'/my-tl',{
      headers:{'Authorization':'Bearer '+getTok()}
    });
    const d = await r.json();
    const newTL = Number(d.tl_balance ?? d.user_tl ?? d.balance ?? 0);
    if(newTL !== _myFileTL){
      _myFileTL = newTL;
      console.log('[DEBUG] Updated _myFileTL from server:', _myFileTL);
      updateUIAfterCharge(_myFileTL);
    }
    return newTL;
  } catch(e){ return _myFileTL; }
}

function updateUIAfterCharge(newBalance){
  _myFileTL = newBalance;
  const requiredTL = Number(_share?.file_tl||0);
  const canPlayNow = requiredTL > 0 && _myFileTL >= requiredTL;
  
  const myTLDisplay = document.getElementById('myTLDisplay');
  if(myTLDisplay){
    myTLDisplay.textContent = `💰 내 충전 TL: ${_myFileTL.toLocaleString()} TL`;
  }
  
  const btnRow = document.getElementById('actionButtons');
  if(btnRow && _share){
    btnRow.innerHTML = `
      <button class="btn-charge" id="chargeBtn">⚡ TL 충전</button>
      <button class="${canPlayNow ? 'btn-play' : 'btn-play-gray'}" id="playBtn" ${!canPlayNow ? 'disabled' : ''}>▶ 재생</button>
    `;
    document.getElementById('playBtn')?.addEventListener('click', () => { handlePlayClick(); });
    document.getElementById('chargeBtn')?.addEventListener('click', () => { chargeTL(); });
  }
}

async function doDirectCharge(){
  if(!getTok()){ alert('로그인이 필요합니다'); return; }
  if(!_share){ alert('곡 정보를 불러올 수 없습니다'); return; }
  
  const requiredTL = Number(_share.file_tl||0);
  if(requiredTL === 0){
    alert('⚠️ 이 곡은 TL이 설정되지 않았습니다.\n먼저 크리에이터가 TL을 설정해야 충전할 수 있습니다.');
    closeChargeModal();
    return;
  }
  
  const btn = document.getElementById('directChargeBtn');
  const originalText = btn?.textContent;
  if(btn){ btn.textContent = '⏳ 처리 중...'; btn.disabled = true; }
  
  try{
    const r = await fetch(API+'/api/shares/'+SHARE_ID+'/charge', {
      method:'POST',
      headers:{'Authorization':'Bearer '+getTok(),'Content-Type':'application/json'},
      body:JSON.stringify({amount:_chargeAmount})
    });
    
    const d = await r.json();
    console.log('[DEBUG] Charge response:', d);
    
    if(r.ok || d.ok){
      // 서버 응답에서 새 잔액 가져오기
      let newBalance = d.user_tl ?? d.tl_balance ?? d.balance ?? (_myFileTL + _chargeAmount);
      
      _myFileTL = newBalance;
      closeChargeModal(); 
      alert(`✅ 충전 완료!\n${_chargeAmount.toLocaleString()} TL 충전됨\n현재 충전 TL: ${_myFileTL.toLocaleString()} TL`);
      updateUIAfterCharge(_myFileTL);
    } else {
      alert('❌ 충전 실패: ' + (d.error || '알 수 없는 오류'));
    }
  } catch(e){ 
    console.error('Charge error:', e);
    alert('오류: ' + e.message); 
  }
  finally{
    if(btn){ btn.textContent = originalText; btn.disabled = false; }
  }
}

function selectChargePkg(el){
  document.querySelectorAll('.charge-pkg').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  _chargeAmount = Number(el.dataset.amount);
}

function closeChargeModal(){ 
  document.getElementById('chargeModal').classList.remove('open'); 
}

function chargeTL(){ 
  const modal=document.getElementById('chargeModal'); 
  const title=document.getElementById('chargeTargetTitle'); 
  if(title) title.textContent=_share?.title||''; 
  if(modal) modal.classList.add('open'); 
}

async function toggleLike(){
  const method = _myLiked?'DELETE':'POST';
  const r = await fetch(API+'/api/social/like/'+SHARE_ID,{method,headers:{'Authorization':'Bearer '+getTok()}});
  const d = await r.json();
  if(d.ok!==false){
    _myLiked=!_myLiked;
    const btn=document.getElementById('likeBtn');
    if(btn){btn.className='btn-icon'+(_myLiked?' liked':'');btn.innerHTML=(_myLiked?'♥ ':'♡ ')+'<span id="likeCount">'+(d.likes||0)+'</span>';}
    const sl=document.getElementById('statLikes');if(sl)sl.textContent=d.likes||0;
  }
}

async function checkFollowStatus(artistId){
  if(!getTok()) return;
  const r=await fetch(API+'/api/social/follow-status/'+artistId,{headers:{'Authorization':'Bearer '+getTok()}});
  const d=await r.json();
  _myFollowing=d.following||false;
  const btn=document.getElementById('followBtn');
  if(btn){btn.className='btn-icon'+(_myFollowing?' following':'');btn.textContent=_myFollowing?'✓ 팔로잉':'+ 팔로우';}
}

async function toggleFollow(artistId){
  const method=_myFollowing?'DELETE':'POST';
  const r=await fetch(API+'/api/social/follow/'+artistId,{method,headers:{'Authorization':'Bearer '+getTok()}});
  const d=await r.json();
  if(d.ok!==false){
    _myFollowing=!_myFollowing;
    const btn=document.getElementById('followBtn');
    if(btn){btn.className='btn-icon'+(_myFollowing?' following':'');btn.textContent=_myFollowing?'✓ 팔로잉':'+ 팔로우';}
  }
}

async function loadComments(){
  const r=await fetch(API+'/api/social/comments/'+SHARE_ID);
  const d=await r.json();
  const list=document.getElementById('commentList');
  if(!list) return;
  if(!d.comments||!d.comments.length){list.innerHTML='<div class="empty-comment">🎵 첫 댓글을 남겨보세요!</div>';return;}
  list.innerHTML=d.comments.map(c=>`
    <div class="comment-item">
      <div class="avatar">${(c.username||'?')[0].toUpperCase()}</div>
      <div class="comment-body">
        <div class="comment-name">${escH(c.username)}</div>
        <div class="comment-text">${escH(c.content)}</div>
        <div class="comment-footer"><span class="comment-time">${new Date(c.created_at).toLocaleDateString('ko')}</span><button class="comment-report" onclick="reportComment(${c.id})">신고</button></div>
      </div>
    </div>
  `).join('');
}

async function submitComment(){
  const input=document.getElementById('commentInput');
  const content=input.value.trim();
  if(content.length<10){alert('10자 이상 입력해주세요');return;}
  const r=await fetch(API+'/api/social/comment/'+SHARE_ID,{
    method:'POST',headers:{'Authorization':'Bearer '+getTok(),'Content-Type':'application/json'},
    body:JSON.stringify({content})
  });
  const d=await r.json();
  if(d.ok){input.value='';loadComments();const sc=document.getElementById('statComments');if(sc)sc.textContent=Number(sc.textContent||0)+1;}
  else alert(d.error||'오류');
}

async function reportComment(id){
  await fetch(API+'/api/social/report/comment/'+id,{method:'POST',headers:{'Authorization':'Bearer '+getTok()}});
  alert('신고 접수됐어요');
}

async function openPlModal(){
  document.getElementById('plModal').classList.add('open');
  const r=await fetch(API+'/api/playlist/my',{headers:{'Authorization':'Bearer '+getTok()}});
  const d=await r.json();
  const list=document.getElementById('plList');
  if(!d.playlists||!d.playlists.length){list.innerHTML='<div style="color:var(--t3);font-size:13px;padding:10px 0">플레이리스트가 없어요</div>';return;}
  list.innerHTML=d.playlists.map(p=>`
    <div class="pl-item" onclick="addToPlaylist(${p.id})"><div><div class="pl-item-name">${escH(p.title)}</div><div class="pl-item-cnt">${JSON.parse(p.share_ids||'[]').length}곡</div></div><span class="pl-add-btn">+</span></div>
  `).join('');
}
function closePlModal(){document.getElementById('plModal').classList.remove('open');}
async function addToPlaylist(pid){
  const r=await fetch(API+'/api/playlist/'+pid+'/add',{method:'POST',headers:{'Authorization':'Bearer '+getTok(),'Content-Type':'application/json'},body:JSON.stringify({share_id:SHARE_ID})});
  const d=await r.json();

async function createNewPlaylist(){
  const title=prompt('플레이리스트 이름:');
  if(!title)return;
  const r=await fetch(API+'/api/playlist',{method:'POST',headers:{'Authorization':'Bearer '+getTok(),'Content-Type':'application/json'},body:JSON.stringify({title,is_public:false})});

  if(d.ok)await addToPlaylist(d.playlist_id);else alert(d.error||'오류');

// ==================== TL PLAYER ====================
let _tlAudio=null, _tlPlaying=false, _tlInterval=null, _tlCurrentTL=0, _tlMaxTL=0, _tlElapsed=0;

function playTrack(){
  if(!_share){ alert('곡 정보를 불러오는 중입니다'); return; }
  const requiredTL = Number(_share.file_tl||0);
  
  if(requiredTL === 0){
    alert('⚠️ 이 곡은 TL이 설정되지 않았습니다.\n크리에이터가 TL을 설정하면 재생할 수 있습니다.');
    return;
  }
  
  if(_myFileTL < requiredTL){ 
    alert(`⚠️ TL이 부족합니다!\n필요: ${requiredTL} TL / 내 충전 TL: ${_myFileTL} TL\n충전 후 다시 시도해주세요.`);
    chargeTL(); 
    return; 
  }
  if(_tlPlaying){ togglePlay(); return; }

  const fileUrl = _share.stream_url || _share.file_url;
  if(!fileUrl){ alert('재생 파일이 없습니다'); return; }

  _tlCurrentTL = _myFileTL;
  _tlMaxTL = _myFileTL;
  _tlElapsed = 0;

  document.getElementById('playerTitle').textContent = _share.title || '';
  document.getElementById('playerArtist').textContent = _share.artist || '';
  document.getElementById('playerTLVal').textContent = _tlCurrentTL.toLocaleString() + ' TL';
  document.getElementById('playerDur').textContent = fmtTime(_share.duration||0);
  document.getElementById('tlPlayerBar').style.display = 'block';
  document.getElementById('playerPlayBtn').textContent = '⏸';

  if(_tlAudio){ _tlAudio.pause(); _tlAudio = null; }
  _tlAudio = new Audio();
  _tlAudio.preload = 'auto';
  _tlAudio.onerror = function(){ alert('재생 실패. 파일을 확인해주세요'); stopPlay(); };
  _tlAudio.oncanplay = function(){
    _tlAudio.play().then(()=>{
      _tlPlaying = true;
      startTLTimer();
    }).catch(e=>{ alert('재생 실패: '+e.message); stopPlay(); });
  };
  _tlAudio.onended = function(){ stopPlay(); };
  _tlAudio.src = fileUrl;
  _tlAudio.load();
}

function startTLTimer(){
  if(_tlInterval) clearInterval(_tlInterval);
  _tlInterval = setInterval(async ()=>{
    if(!_tlPlaying) return;
    _tlElapsed++;
    _tlCurrentTL = Math.max(0, _tlCurrentTL - 1);
    document.getElementById('playerTime').textContent = fmtTime(_tlElapsed);
    document.getElementById('playerTLVal').textContent = _tlCurrentTL.toLocaleString() + ' TL';
    const pct = _tlMaxTL > 0 ? (_tlCurrentTL / _tlMaxTL * 100) : 0;
    document.getElementById('playerTLBar').style.width = pct + '%';
    
    // 5초마다 서버에 TL 소비 기록
    if(_tlElapsed % 5 === 0){
      try{
        await fetch(API+'/api/shares/'+SHARE_ID+'/consume',{
          method:'POST',
          headers:{'Authorization':'Bearer '+getTok(),'Content-Type':'application/json'},
          body:JSON.stringify({seconds:5, user_id: localStorage.getItem('tl_user') ? JSON.parse(localStorage.getItem('tl_user')).id : 0})
        });
        // 서버에서 최신 TL 정보 다시 가져오기
        await updateMyTLFromServer();
      } catch(e){}
    }
    
    if(_tlCurrentTL <= 0){ stopPlay(); alert('TL이 소진됐습니다. 충전 후 다시 재생하세요'); }
  }, 1000);
}

function togglePlay(){
  if(!_tlAudio) return;
  if(_tlPlaying){
    _tlAudio.pause();
    _tlPlaying = false;
    document.getElementById('playerPlayBtn').textContent = '▶';
    if(_tlInterval){ clearInterval(_tlInterval); _tlInterval = null; }
  } else {
    _tlAudio.play().then(()=>{
      _tlPlaying = true;
      document.getElementById('playerPlayBtn').textContent = '⏸';
      startTLTimer();
    }).catch(e=>{ alert('재생 실패: '+e.message); });
  }
}

function stopPlay(){
  if(_tlAudio){ _tlAudio.pause(); _tlAudio = null; }
  if(_tlInterval){ clearInterval(_tlInterval); _tlInterval = null; }
  _tlPlaying = false;
  document.getElementById('tlPlayerBar').style.display = 'none';
}

async function downloadTL(){
  const btn=document.getElementById('dlBtn');
  if(btn){btn.textContent='⏳...';btn.disabled=true;}
  try{
    const r=await fetch(API+'/api/download/'+SHARE_ID,{headers:{'Authorization':'Bearer '+getTok()}});
    const blob=await r.blob();
    const ftype=_share?.category_type||'audio';
    const ext=ftype==='audio'?'tl3':ftype==='video'?'tl4':ftype==='image'?'tlg':'tlf';
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(_share?.title||'track')+'.'+ext;a.click();
  }catch(e){alert('오류: '+e.message);}
  finally{if(btn){btn.textContent='⬇ .tl 다운로드';btn.disabled=false;}}
}

function renderCopyright(s){
  const items=[{label:'곡명',value:s.title},{label:'아티스트',value:s.artist},{label:'앨범',value:s.album},{label:'장르',value:s.category},{label:'작곡',value:s.composer},{label:'작사',value:s.lyricist}].filter(i=>i.value);
  if(!items.length && !s.lyrics) return;
  const section=document.getElementById('copyrightSection');
  const grid=document.getElementById('copyrightGrid');
  if(section) section.style.display='block';
  if(grid) grid.innerHTML=items.map(i=>'<div class="copyright-item"><div class="copyright-label">'+i.label+'</div><div class="copyright-value">'+escH(i.value)+'</div></div>').join('');
  if(s.lyrics){ const lw=document.getElementById('lyricsWrap'); const lb=document.getElementById('lyricsBox'); if(lw) lw.style.display='block'; if(lb) lb.textContent=s.lyrics; }
}

loadTrack();
