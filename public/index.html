<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self' https://api.timelink.digital; media-src blob: data: 'self'; style-src 'unsafe-inline';">
<title>TimeLink Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{background:#08080F;color:#fff;font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden}
.titlebar{height:38px;-webkit-app-region:drag;display:flex;align-items:center;
  padding:0 16px;background:#08080F;border-bottom:1px solid rgba(255,255,255,.06)}
.tl-logo{font-size:13px;font-weight:900;letter-spacing:.1em;
  background:linear-gradient(90deg,#8B5CF6,#00E5A0);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent}

/* 로그인 화면 */
#loginScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.login-title{font-size:22px;font-weight:900;margin-bottom:8px}
.login-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:32px;text-align:center}
.inp{width:100%;padding:12px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:#fff;font-size:14px;outline:none;margin-bottom:10px}
.inp::placeholder{color:rgba(255,255,255,.25)}
.inp:focus{border-color:#8B5CF6}
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#8B5CF6,#7C3AED);color:#fff;font-size:14px;
  font-weight:700;margin-top:6px;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(139,92,246,.4)}
.btn-primary:disabled{opacity:.4;transform:none;cursor:default}

/* 플레이어 화면 */
#playerScreen{flex:1;display:none;flex-direction:column}
.drop-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:16px;border:2px dashed rgba(139,92,246,.3);border-radius:20px;
  cursor:pointer;transition:all .3s;padding:24px;text-align:center}
.drop-zone:hover,.drop-zone.drag-over{border-color:#8B5CF6;background:rgba(139,92,246,.06)}
.drop-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.drop-title{font-size:15px;font-weight:700;margin-bottom:6px}
.drop-sub{font-size:11px;color:rgba(255,255,255,.35)}

/* 파일 정보 */
.file-info{display:none;flex-direction:column;margin:16px;gap:0}
.cover-wrap{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;
  background:linear-gradient(135deg,#1a1060,#0d3050);margin-bottom:16px;
  display:flex;align-items:center;justify-content:center}
.cover-icon{font-size:64px;opacity:.3}
.file-title{font-size:18px;font-weight:900;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-artist{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:2px}
.file-meta{font-size:10px;color:rgba(139,92,246,.6);font-family:monospace;margin-bottom:16px}

/* 진행바 */
.progress-wrap{height:4px;background:rgba(255,255,255,.1);border-radius:2px;
  margin-bottom:12px;cursor:pointer;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#8B5CF6,#00E5A0);
  border-radius:2px;width:0%;transition:width .3s linear}
.time-row{display:flex;justify-content:space-between;font-size:11px;
  color:rgba(255,255,255,.3);font-family:monospace;margin-bottom:20px}

/* 컨트롤 */
.controls{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:20px}
.ctrl-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.06);color:#fff;font-size:18px;transition:all .2s}
.ctrl-btn:hover{background:rgba(255,255,255,.12)}
.ctrl-btn.play{width:64px;height:64px;font-size:24px;
  background:linear-gradient(135deg,#8B5CF6,#7C3AED)}
.ctrl-btn.play:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(139,92,246,.4)}

/* TL 잔액 */
.tl-bar{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,255,255,.06)}
.tl-val{font-size:14px;font-weight:700;color:#00E5A0;font-family:monospace}
.tl-lbl{font-size:10px;color:rgba(255,255,255,.3)}
.open-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(139,92,246,.4);
  background:transparent;color:#8B5CF6;font-size:11px;cursor:pointer;transition:all .2s}
.open-btn:hover{background:rgba(139,92,246,.1)}

/* 상태 메시지 */
.status{font-size:12px;color:rgba(255,255,255,.4);text-align:center;
  padding:8px;min-height:32px}
.status.error{color:#F87171}
.status.ok{color:#00E5A0}
</style>
</head>
<body>

<div class="titlebar">
  <span class="tl-logo">⚡ TIMELINK</span>
</div>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div style="font-size:40px;margin-bottom:16px">⚡</div>
  <div class="login-title">TimeLink Player</div>
  <div class="login-sub">timelink.digital 계정으로 로그인하세요<br>.tl 파일을 재생하려면 TL 잔액이 필요합니다</div>
  <input class="inp" id="emailInp" type="email" placeholder="이메일" autocomplete="email">
  <input class="inp" id="pwInp" type="password" placeholder="비밀번호" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn-primary" id="loginBtn" onclick="doLogin()">로그인</button>
  <div class="status" id="loginStatus"></div>
</div>

<!-- 플레이어 화면 -->
<div id="playerScreen">
  <!-- 드롭존 -->
  <div class="drop-zone" id="dropZone"
    onclick="openFile()"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="onDrop(event)">
    <div class="drop-icon">📂</div>
    <div class="drop-title">.tl 파일을 여기에 드롭</div>
    <div class="drop-sub">또는 클릭하여 파일 선택</div>
  </div>

  <!-- 파일 정보 + 플레이어 -->
  <div class="file-info" id="fileInfo">
    <div class="cover-wrap">
      <div class="cover-icon" id="coverIcon">🎵</div>
    </div>
    <div class="file-title" id="fileTitle">—</div>
    <div class="file-artist" id="fileArtist">—</div>
    <div class="file-meta" id="fileMeta">—</div>

    <div class="progress-wrap" id="progressWrap" onclick="seekTo(event)">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="timeEl">0:00</span>
      <span id="durEl">0:00</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="seekRel(-10)">⏮</button>
      <button class="ctrl-btn play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="seekRel(10)">⏭</button>
    </div>
    <div class="status" id="playerStatus"></div>
  </div>

  <div class="tl-bar">
    <div>
      <div class="tl-lbl">⚡ TL 잔액</div>
      <div class="tl-val" id="tlVal">0 TL</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="font-size:10px;color:rgba(255,255,255,.3)" id="userEmail">—</div>
      <button class="open-btn" onclick="openFile()">📂 열기</button>
      <button class="open-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>
</div>

<audio id="audioEl" style="display:none"></audio>

<script>
const API = 'https://api.timelink.digital';
let _token = null, _user = null;
let _header = null, _shareId = null, _playing = false;
let _audio = document.getElementById('audioEl');
let _tickTimer = null, _currentBlob = null;

// ── 초기화 ──
(async function init(){
  _token = await tlAPI.storeGet('tl_token');
  const userJson = await tlAPI.storeGet('tl_user');
  if(_token && userJson){
    _user = JSON.parse(userJson);
    showPlayer();
  }

  // .tl 파일 열기 이벤트 (더블클릭)
  tlAPI.onTLFileOpen(fp => loadTLFile(fp));
})();

// ── 로그인 ──
async function doLogin(){
  const email = document.getElementById('emailInp').value.trim();
  const pw    = document.getElementById('pwInp').value;
  if(!email||!pw){ setStatus('loginStatus','이메일과 비밀번호를 입력하세요','error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='로그인 중...';
  setStatus('loginStatus','');
  try{
    const r = await fetch(API+'/api/auth/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pw})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'로그인 실패');
    _token = d.token; _user = d.user;
    await tlAPI.storeSet('tl_token', _token);
    await tlAPI.storeSet('tl_user', JSON.stringify(_user));
    showPlayer();
  }catch(e){
    setStatus('loginStatus', e.message, 'error');
    btn.disabled=false; btn.textContent='로그인';
  }
}

function doLogout(){
  _token=null;_user=null;
  tlAPI.storeSet('tl_token',null);
  tlAPI.storeSet('tl_user',null);
  stopPlayback();
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('playerScreen').style.display='none';
}

function showPlayer(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('playerScreen').style.display='flex';
  document.getElementById('playerScreen').style.flexDirection='column';
  document.getElementById('userEmail').textContent = _user?.email||'';
  updateTLDisplay();
}

// ── .tl 파일 로드 ──
async function loadTLFile(filePath){
  setStatus('playerStatus','⏳ 파일 파싱 중...');
  const parsed = await tlAPI.parseTLFile(filePath);
  if(parsed.error){ setStatus('playerStatus', parsed.error, 'error'); return; }

  _header  = parsed.header;
  _shareId = _header.shareId;

  // UI 업데이트
  document.getElementById('dropZone').style.display='none';
  const fi = document.getElementById('fileInfo');
  fi.style.display='flex'; fi.style.flexDirection='column';
  const iconMap = {'audio':'🎵','video':'🎬','image':'🖼️','application':'📄'};
  const ft = (_header.fileType||'').split('/')[0];
  document.getElementById('coverIcon').textContent = iconMap[ft]||'📄';
  document.getElementById('fileTitle').textContent  = _header.title||'제목 없음';
  document.getElementById('fileArtist').textContent = _header.artist||_header.creatorName||'—';
  document.getElementById('fileMeta').textContent   =
    'shareId: '+_shareId+' · '+fmt(parsed.fileSize)+'  · v'+_header.version;
  document.getElementById('durEl').textContent = fmtTime(_header.duration||0);

  setStatus('playerStatus','▶ 재생 버튼을 눌러 시작하세요','ok');
}

// ── 재생 ──
async function togglePlay(){
  if(_playing){ stopPlayback(); return; }
  if(!_shareId){ setStatus('playerStatus','파일을 먼저 열어주세요','error'); return; }

  setStatus('playerStatus','⏳ 복호화 중...');
  document.getElementById('playBtn').textContent='⏳';

  // TL 잔액 재확인
  await updateTLDisplay();
  const tl = Number(_user?.tl||0);
  if(tl<=0){
    setStatus('playerStatus','⚡ TL 잔액이 없습니다. timelink.digital에서 충전하세요.','error');
    document.getElementById('playBtn').textContent='▶';
    return;
  }

  // 서버에서 복호화된 데이터 받기
  const result = await tlAPI.decryptStream({ shareId:_shareId, token:_token });
  if(!result.ok || result.error){
    const msg = result.error==='TL_INSUFFICIENT'
      ? 'TL 잔액 부족 — timelink.digital에서 충전하세요'
      : result.error||'복호화 실패';
    setStatus('playerStatus', msg, 'error');
    document.getElementById('playBtn').textContent='▶';
    return;
  }

  // Base64 → Blob → 재생
  const bytes = Uint8Array.from(atob(result.data), c=>c.charCodeAt(0));
  const mime  = _header.fileType||'audio/mpeg';
  _currentBlob = new Blob([bytes],{type:mime});
  const blobUrl = URL.createObjectURL(_currentBlob);

  _audio.src = blobUrl;
  _audio.ontimeupdate = onTimeUpdate;
  _audio.onended = () => stopPlayback();
  _audio.play().then(()=>{
    _playing = true;
    document.getElementById('playBtn').textContent='⏸';
    setStatus('playerStatus','▶ 재생 중','ok');
    startTick();
  }).catch(e=>{
    setStatus('playerStatus','재생 오류: '+e.message,'error');
    document.getElementById('playBtn').textContent='▶';
  });
}

function stopPlayback(){
  _playing=false;
  _audio.pause();
  document.getElementById('playBtn').textContent='▶';
  setStatus('playerStatus','');
  stopTick();
  if(_currentBlob){ URL.revokeObjectURL(_audio.src); }
}

// ── TL 차감 (tick) ──
function startTick(){
  stopTick();
  _tickTimer = setInterval(async()=>{
    if(!_playing||!_shareId) return;
    const res = await tlAPI.tlTick({
      shareId:_shareId, token:_token,
      deduct_rate: _header?.tl_per_sec||1.0
    });
    if(res.code==='TL_EMPTY'){
      stopPlayback();
      setStatus('playerStatus','⚡ TL 소진 — 재생이 중단됩니다.','error');
    } else if(res.ok && _user){
      _user.tl = res.tl_balance;
      updateTLDisplay();
    }
  },1000);
}
function stopTick(){ if(_tickTimer){ clearInterval(_tickTimer); _tickTimer=null; } }

// ── 진행바 ──
function onTimeUpdate(){
  const dur = _audio.duration||_header?.duration||1;
  const cur = _audio.currentTime||0;
  document.getElementById('progressFill').style.width = (cur/dur*100).toFixed(1)+'%';
  document.getElementById('timeEl').textContent = fmtTime(Math.floor(cur));
}
function seekTo(e){
  const bar = document.getElementById('progressWrap');
  const pct = e.offsetX / bar.offsetWidth;
  const dur = _audio.duration||_header?.duration||0;
  _audio.currentTime = pct*dur;
}
function seekRel(s){ _audio.currentTime = Math.max(0,(_audio.currentTime||0)+s); }

// ── 파일 열기 ──
async function openFile(){
  const fp = await tlAPI.openFileDialog();
  if(fp) loadTLFile(fp);
}
function onDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const fp = e.dataTransfer.files[0]?.path;
  if(fp) loadTLFile(fp);
}

// ── TL 잔액 업데이트 ──
async function updateTLDisplay(){
  if(!_token||!_user) return;
  try{
    const r = await fetch(API+'/api/eco/wallet',{headers:{'Authorization':'Bearer '+_token}});
    if(r.ok){
      const d = await r.json();
      const tl = (d.tl_p||0)+(d.tl_a||0)+(d.tl_b||0)||d.tl||0;
      if(_user) _user.tl = tl;
      document.getElementById('tlVal').textContent = Number(tl).toLocaleString()+' TL';
    }
  }catch(e){}
}

// ── 유틸 ──
function fmtTime(s){ const m=Math.floor(s/60); return m+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function fmt(b){ if(b<1024)return b+'B'; if(b<1048576)return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function setStatus(id,msg,type){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;
  el.className='status'+(type?' '+type:'');
}
</script>
</body>
</html>
