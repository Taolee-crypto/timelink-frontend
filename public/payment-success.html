<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>결제 완료 - TimeLink</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080F;color:#fff;font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.card{background:#0D0D1A;border:1px solid rgba(0,229,160,.3);border-radius:20px;padding:40px;max-width:400px;width:100%}
.icon{font-size:56px;margin-bottom:16px}
.title{font-size:22px;font-weight:800;color:#00E5A0;margin-bottom:8px}
.sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;line-height:1.6}
.btn{padding:13px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#8B5CF6,#7C3AED);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <div class="title" id="title">결제 처리 중...</div>
  <div class="sub" id="msg">잠시만 기다려주세요</div>
  <a href="shareplace.html" class="btn" id="homeBtn" style="display:none">SharePlace로 이동</a>
</div>
<script>
var API = 'https://api.timelink.digital';
var p = new URLSearchParams(location.search);
var paymentKey = p.get('paymentKey');
var orderId    = p.get('orderId');
var amount     = p.get('amount');

function setUI(icon, title, msg, showBtn){
  document.getElementById('icon').textContent  = icon;
  document.getElementById('title').textContent = title;
  document.getElementById('msg').textContent   = msg;
  if(showBtn) document.getElementById('homeBtn').style.display = 'inline-block';
}

async function confirmPayment(){
  if(!paymentKey || !orderId || !amount){
    setUI('❌','파라미터 오류','결제 정보가 없습니다.',true);
    return;
  }

  var token = localStorage.getItem('tl_token') || '';
  if(!token){
    // 토큰 없으면 shareplace로 파라미터 전달
    location.href = 'shareplace.html?paymentKey=' + encodeURIComponent(paymentKey)
      + '&orderId=' + encodeURIComponent(orderId)
      + '&amount=' + encodeURIComponent(amount);
    return;
  }

  try {
    var r = await fetch(API + '/api/payment/toss/confirm', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        paymentKey: paymentKey,
        orderId:    orderId,
        amount:     parseInt(amount)
      })
    });
    var d = await r.json();

    if(!r.ok){
      setUI('❌','결제 처리 실패', d.error || '오류가 발생했습니다.', true);
      return;
    }

    // 성공 - localStorage 잔액 업데이트
    try {
      var user = JSON.parse(localStorage.getItem('tl_user') || '{}');
      user.tl   = d.tl_balance;
      user.tl_p = d.tl_p;
      localStorage.setItem('tl_user', JSON.stringify(user));
    } catch(e){}

    var msg = '+' + d.total_tl.toLocaleString() + ' TL 충전 완료';
    if(d.bonus_tl > 0) msg += ' (보너스 +' + d.bonus_tl.toLocaleString() + ' TL 포함)';
    setUI('🎉', '결제 완료!', msg, false);

    // 3초 후 자동 이동
    setTimeout(function(){ location.href = 'shareplace.html'; }, 3000);

  } catch(e) {
    setUI('❌','네트워크 오류', e.message, true);
  }
}

confirmPayment();
</script>
</body>
</html>
