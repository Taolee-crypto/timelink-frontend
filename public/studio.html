<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>studio - TimeLink</title>
    
    <!-- 외부 라이브러리 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- TimeLink 통합 스타일 -->
    <link rel="stylesheet" href="common.css">
    
    <!-- TimeLink 핵심 시스템 -->
    <script src="api-config.js"></script>
    <script src="common-components.js"></script>
<body>
    <div id="header-container"></div>
    
    <main class="main-content">
        <div class="container">
            <h1 class="mb-4">TL Studio</h1>
            <div class="row">
                <div class="col-lg-8">
                    <!-- 음원 업로드 폼 -->
                    <div class="card-glass mb-4">
                        <h3>음원 업로드</h3>
                        <form id="uploadForm">
                            <input type="file" id="audioFile" accept=".mp3,.wav" class="form-control mb-3">
                            <input type="text" id="title" placeholder="음원 제목" class="form-control mb-3">
                            <textarea id="description" placeholder="설명" class="form-control mb-3"></textarea>
                            <button type="submit" class="btn btn-primary">업로드</button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-4">
                    <!-- 내 음원 목록 -->
                    <div class="card-glass">
                        <h4>내 음원</h4>
                        <div id="myMusicList"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <div id="footer-container"></div>
    
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            document.getElementById('header-container').innerHTML = TimeLinkComponents.renderHeader('studio');
            document.getElementById('footer-container').innerHTML = TimeLinkComponents.renderFooter();
            
            // 내 음원 로드
            await loadMyMusic();
            
            // 업로드 폼 처리
            document.getElementById('uploadForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                await uploadMusic();
            });
        });
        
        async function loadMyMusic() {
            // API를 통해 음원 목록 로드
        }
        
        async function uploadMusic() {
            // 음원 업로드 로직
        }
    </script>
</body>
