<!DOCTYPE html>
<html>
<head>
    <title>Config.js 로드 테스트</title>
    <script>
    async function testConfigLoad() {
        const results = document.getElementById('results');
        
        // 1. config.js 로드 테스트
        results.innerHTML += '<h3>1. config.js 로드 테스트</h3>';
        
        try {
            const response = await fetch('js/config.js?v=' + Date.now());
            if (response.ok) {
                const text = await response.text();
                results.innerHTML += `<p>✅ config.js 로드 성공 (${text.length} bytes)</p>`;
                
                // BACKEND_URL 추출
                const backendUrlMatch = text.match(/BACKEND_URL\s*=\s*['"]([^'"]+)['"]/);
                if (backendUrlMatch) {
                    results.innerHTML += `<p>✅ BACKEND_URL: ${backendUrlMatch[1]}</p>`;
                    window.BACKEND_URL = backendUrlMatch[1];
                } else {
                    results.innerHTML += `<p>❌ BACKEND_URL을 찾을 수 없음</p>`;
                }
            } else {
                results.innerHTML += `<p>❌ config.js 로드 실패: ${response.status}</p>`;
            }
        } catch (e) {
            results.innerHTML += `<p>❌ config.js 로드 오류: ${e.message}</p>`;
        }
        
        // 2. TLAPI 객체 테스트
        results.innerHTML += '<h3>2. TLAPI 객체 테스트</h3>';
        
        // 잠시 대기 후 TLAPI 확인
        setTimeout(() => {
            if (typeof TLAPI !== 'undefined') {
                results.innerHTML += `<p>✅ TLAPI 객체 존재</p>`;
                results.innerHTML += `<p>TLAPI.url: ${TLAPI.url || '없음'}</p>`;
                results.innerHTML += `<p>TLAPI.version: ${TLAPI.version || '없음'}</p>`;
            } else {
                results.innerHTML += `<p>❌ TLAPI 객체 없음</p>`;
            }
            
            // 3. 직접 API 테스트
            results.innerHTML += '<h3>3. 직접 API 테스트</h3>';
            if (window.BACKEND_URL) {
                fetch(window.BACKEND_URL + '/')
                    .then(r => r.text())
                    .then(t => {
                        results.innerHTML += `<p>✅ 백엔드 응답: ${t.substring(0, 100)}</p>`;
                    })
                    .catch(e => {
                        results.innerHTML += `<p>❌ 백엔드 오류: ${e.message}</p>`;
                    });
            }
        }, 1000);
    }
    
    window.onload = testConfigLoad;
    </script>
</head>
<body>
    <h1>Config.js 로드 테스트</h1>
    <div id="results">테스트 중...</div>
    <button onclick="testConfigLoad()">다시 테스트</button>
</body>
</html>
