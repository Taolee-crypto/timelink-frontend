<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인증 - TL Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: rgba(30, 41, 59, 0.8);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .auth-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #60a5fa;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #475569;
            border-radius: 8px;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        
        .auth-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-links a {
            color: #60a5fa;
            text-decoration: none;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
        
        .back-link:hover {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2><i class="fas fa-user-circle"></i> TL Platform 인증</h2>
        
        <div id="loginForm">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> 이메일</label>
                <input type="email" id="email" placeholder="이메일 주소">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> 비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호">
            </div>
            
            <button class="auth-button" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> 로그인
            </button>
            
            <button class="auth-button" style="background: transparent; border: 2px solid #3b82f6; margin-top: 10px;" onclick="showRegister()">
                <i class="fas fa-user-plus"></i> 회원가입
            </button>
        </div>
        
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regName"><i class="fas fa-user"></i> 이름</label>
                <input type="text" id="regName" placeholder="이름">
            </div>
            
            <div class="form-group">
                <label for="regEmail"><i class="fas fa-envelope"></i> 이메일</label>
                <input type="email" id="regEmail" placeholder="이메일 주소">
            </div>
            
            <div class="form-group">
                <label for="regPassword"><i class="fas fa-lock"></i> 비밀번호</label>
                <input type="password" id="regPassword" placeholder="비밀번호">
            </div>
            
            <div class="form-group">
                <label for="regConfirm"><i class="fas fa-lock"></i> 비밀번호 확인</label>
                <input type="password" id="regConfirm" placeholder="비밀번호 확인">
            </div>
            
            <button class="auth-button" onclick="register()">
                <i class="fas fa-user-plus"></i> 회원가입
            </button>
            
            <button class="auth-button" style="background: transparent; border: 2px solid #3b82f6; margin-top: 10px;" onclick="showLogin()">
                <i class="fas fa-sign-in-alt"></i> 로그인으로 돌아가기
            </button>
        </div>
        
        <div class="auth-links">
            <a href="index.html">← 메인으로 돌아가기</a>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
    const BACKEND_URL = 'https://timelink-backend.timelink-api.workers.dev';
    
    toastr.options = {
        positionClass: 'toast-top-right',
        progressBar: true,
        closeButton: true,
        timeOut: 3000
    };
    
    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    }
    
    function showLogin() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
    }
    
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            toastr.error('이메일과 비밀번호를 입력해주세요');
            return;
        }
        
        try {
            toastr.info('로그인 중...');
            
            const response = await fetch(BACKEND_URL + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                localStorage.setItem('tl_token', data.token);
                localStorage.setItem('tl_user', JSON.stringify(data.user));
                
                toastr.success('로그인 성공!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                toastr.error(data.error || '로그인 실패');
            }
        } catch (error) {
            toastr.error('서버 연결 실패');
            console.error('로그인 오류:', error);
        }
    }
    
    async function register() {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password || !confirm) {
            toastr.error('모든 필드를 입력해주세요');
            return;
        }
        
        if (password !== confirm) {
            toastr.error('비밀번호가 일치하지 않습니다');
            return;
        }
        
        try {
            toastr.info('회원가입 중...');
            
            const response = await fetch(BACKEND_URL + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                localStorage.setItem('tl_token', data.token);
                localStorage.setItem('tl_user', JSON.stringify(data.user));
                
                toastr.success('회원가입 성공!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                toastr.error(data.error || '회원가입 실패');
            }
        } catch (error) {
            toastr.error('서버 연결 실패');
            console.error('회원가입 오류:', error);
        }
    }
    
    // 페이지 로드 시 이미 로그인된 상태인지 확인
    window.onload = function() {
        const token = localStorage.getItem('tl_token');
        if (token) {
            window.location.href = 'index.html';
        }
    };
    </script>
</body>
</html>
