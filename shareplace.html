<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAREPLACE | TIMELINK</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Auth Manager -->
    <script src="auth-manager.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F2B;
            color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        /* 헤더 */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }
        
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        
        /* 네비게이션 */
        .main-nav {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem;
        }
        
        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-link.active {
            background: rgba(138, 43, 226, 0.1);
            color: #8A2BE2;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }
        
        /* 사용자 섹션 */
        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .tl-balance {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 50px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: #0066FF;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .tl-balance:hover {
            background: rgba(0, 102, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .tl-icon {
            width: 24px;
            height: 24px;
            background: #0066FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .user-avatar {
            width: 44px;
            height: 44px;
            background: #1A2342;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .user-avatar:hover {
            border-color: #00D4AA;
            transform: scale(1.05);
        }
        
        .auth-button {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: #0066FF;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .auth-button:hover {
            background: rgba(0, 102, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .auth-button.logout {
            background: rgba(244, 67, 54, 0.1);
            border-color: rgba(244, 67, 54, 0.3);
            color: #f44336;
        }
        
        /* 메인 컨텐츠 */
        .shareplace-main {
            padding: 120px 0 60px;
            margin-top: 70px;
        }
        
        .shareplace-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.1), rgba(0, 212, 170, 0.1));
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .shareplace-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .shareplace-subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        /* 검색 및 필터 */
        .search-section {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        
        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        
        .filter-select {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            min-width: 150px;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
        }
        
        /* 카테고리 */
        .categories {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding: 0.5rem;
        }
        
        .category-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            color: white;
            border: none;
        }
        
        /* 콘텐츠 그리드 */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .content-card {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .content-card:hover {
            transform: translateY(-5px);
            border-color: #0066FF;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .content-thumbnail {
            height: 180px;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        
        .content-info {
            padding: 1.5rem;
        }
        
        .content-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 102, 255, 0.1);
            color: #0066FF;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        
        .content-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: white;
        }
        
        .content-artist {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .content-stats {
            display: flex;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        
        .content-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .action-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .action-btn:hover {
            background: #0066FF;
            border-color: #0066FF;
        }
        
        .action-btn.charge {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border: none;
        }
        
        /* 차트 섹션 */
        .chart-section {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        
        .chart-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .chart-rank {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .chart-info h4 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }
        
        .chart-info p {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        /* 상태 메시지 */
        .status-message {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            display: none;
        }
        
        .status-success {
            background: rgba(0, 212, 170, 0.1);
            color: #00D4AA;
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }
        
        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f44336;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            .header-content {
                padding: 0 1rem;
            }
            
            .nav-link span {
                display: none;
            }
            
            .shareplace-title {
                font-size: 2rem;
            }
            
            .search-section {
                flex-direction: column;
            }
            
            .search-box {
                min-width: 100%;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
            
            .categories {
                padding: 0.5rem 0;
            }
        }
    </style>
</head>
<body>

    <!-- 메인 컨텐츠 -->
    <main class="shareplace-main">
        <div class="container">
            <!-- 헤더 -->
            <div class="shareplace-header">
                <h1 class="shareplace-title">SHAREPLACE</h1>
                <p class="shareplace-subtitle">

                <select class="filter-select" id="categoryFilter">

                    <option value="new">최신순</option>
                    <option value="popular">인기순</option>
                    <option value="trending">트렌딩</option>
                </select>
                
                <a href="studio.html" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 새 콘텐츠 업로드
                </a>
            </div>
            
            <!-- 카테고리 -->
            <div class="categories">
                <button class="category-btn active" data-category="all">전체</button>
                <button class="category-btn" data-category="music">🎵 음악</button>
                <button class="category-btn" data-category="video">🎬 영상</button>
                <button class="category-btn" data-category="image">🖼️ 이미지</button>
                <button class="category-btn" data-category="document">📄 문서</button>
                <button class="category-btn" data-category="ebook">📚 전자책</button>
            </div>
            
            <!-- 차트 섹션 -->
            <div class="chart-section">
                <h2 class="section-title">
                    <i class="fas fa-chart-line"></i> 금주의 TL CHART
                </h2>
                
                <div class="chart-grid" id="topCharts">
                    <!-- 차트 항목들이 동적으로 생성됨 -->
                </div>
            </div>
            
            <!-- 최신 업로드 -->
            <div class="chart-section">
                <h2 class="section-title">
                    <i class="fas fa-clock"></i> 최신 업로드
                </h2>
                
                <div class="content-grid" id="latestContent">
                    <!-- 콘텐츠 카드들이 동적으로 생성됨 -->
                </div>
            </div>
            
            <!-- 인기 콘텐츠 -->
            <div class="chart-section">
                <h2 class="section-title">
                    <i class="fas fa-fire"></i> 인기 콘텐츠
                </h2>
                
                <div class="content-grid" id="popularContent">
                    <!-- 콘텐츠 카드들이 동적으로 생성됨 -->

            </div>
            
            <!-- 상태 메시지 -->
            <div class="status-message" id="shareplaceStatus"></div>
        </div>
    </main>
    
    <script>
        // SHAREPLACE 데이터
        const shareplaceData = {
            currentCategory: 'all',
            content: [],
            user: null
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            // 인증 확인
            checkAuth();
            
            // 데이터 로드
            loadData();
            
            // UI 초기화
            initUI();
            
            // 이벤트 리스너 설정
            setupEventListeners();
        });
        
        // 인증 확인
        function checkAuth() {
            shareplaceData.user = JSON.parse(localStorage.getItem('timelink_user'));
            if (!shareplaceData.user) {
                alert('로그인이 필요합니다.');
                window.location.href = 'login.html';
            }
        }
        
        // 데이터 로드
        function loadData() {
            // 샘플 데이터 생성
            shareplaceData.content = [
                {
                    id: 1,
                    type: 'music',
                    title: 'Midnight Dreams',
                    artist: 'Luna Sound',
                    thumbnail: '🎵',
                    plays: 15420,
                    charges: 3250,
                    duration: '3:45',
                    pricePerSec: 1.2,
                    uploaded: '2일 전'
                },
                {
                    id: 2,
                    type: 'video',
                    title: 'Quantum Tutorial',
                    artist: 'Tech Guru',
                    thumbnail: '🎬',
                    plays: 8920,
                    charges: 2100,
                    duration: '12:30',
                    pricePerSec: 0.8,
                    uploaded: '1일 전'
                },
                {
                    id: 3,
                    type: 'image',
                    title: 'Digital Art Collection',
                    artist: 'Pixel Artist',
                    thumbnail: '🖼️',
                    views: 4320,
                    charges: 890,
                    duration: '무제한',
                    pricePerSec: 0.5,
                    uploaded: '3일 전'
                },
                {
                    id: 4,
                    type: 'document',
                    title: 'Crypto Whitepaper',
                    artist: 'Blockchain Lab',
                    thumbnail: '📄',
                    views: 3210,
                    charges: 650,
                    duration: '60분',
                    pricePerSec: 1.0,
                    uploaded: '5일 전'
                },
                {
                    id: 5,
                    type: 'music',
                    title: 'Urban Beats',
                    artist: 'City Sounds',
                    thumbnail: '🎵',
                    plays: 9870,
                    charges: 2100,
                    duration: '4:20',
                    pricePerSec: 1.5,
                    uploaded: '1시간 전'
                },
                {
                    id: 6,
                    type: 'video',
                    title: 'AI Revolution',
                    artist: 'Future Tech',
                    thumbnail: '🎬',
                    plays: 12500,
                    charges: 2980,
                    duration: '15:45',
                    pricePerSec: 0.9,
                    uploaded: '6시간 전'
                }
            ];
        }
        
        // UI 초기화
        function initUI() {
            // 헤더 업데이트
            updateHeader();
            
            // 차트 표시
            renderCharts();
            
            // 콘텐츠 표시
            renderContent();
        }
        
        // 헤더 업데이트
        function updateHeader() {
            const userSection = document.getElementById('userSection');
            
            if (shareplaceData.user) {
                const initials = shareplaceData.user.name ? shareplaceData.user.name.charAt(0).toUpperCase() : 'U';
                userSection.innerHTML = `
                    <div class="tl-balance" onclick="window.location.href='profile.html#wallet'">
                        <div class="tl-icon">TL</div>
                        <span>${(shareplaceData.user.balance || 10000).toLocaleString()}</span>
                    </div>
                    <div class="user-avatar" onclick="window.location.href='profile.html'">
                        ${initials}
                    </div>
                    <a href="javascript:void(0)" class="auth-button logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> LOGOUT
                    </a>
                `;
            }
        }
        
        // 로그아웃
        function logout() {
            if (confirm('로그아웃하시겠습니까?')) {
                localStorage.removeItem('timelink_user');
                localStorage.removeItem('timelink_token');
                window.location.href = 'index.html';
            }
        }
        
        // 이벤트 리스너 설정
        function setupEventListeners() {
            // 카테고리 버튼
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    // 모든 버튼에서 active 제거
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.classList.remove('active');
                    });
                    
                    // 현재 버튼에 active 추가
                    this.classList.add('active');
                    
                    // 카테고리 변경
                    shareplaceData.currentCategory = this.getAttribute('data-category');
                    
                    // 콘텐츠 필터링
                    renderContent();
                });
            });
            
            // 검색
            document.querySelector('.search-input').addEventListener('input', function(e) {
                filterContent(e.target.value);
            });
            
            // 카테고리 필터
            document.getElementById('categoryFilter').addEventListener('change', function(e) {
                shareplaceData.currentCategory = e.target.value;
                renderContent();
            });
            
            // 정렬 필터
            document.getElementById('sortFilter').addEventListener('change', function(e) {
                sortContent(e.target.value);
            });
        }
        
        // 차트 렌더링
        function renderCharts() {
            const topCharts = document.getElementById('topCharts');
            const topContent = [...shareplaceData.content]
                .sort((a, b) => b.plays - a.plays)
                .slice(0, 4);
            
            topCharts.innerHTML = topContent.map((item, index) => `
                <div class="chart-item">
                    <div class="chart-rank">${index + 1}</div>
                    <div class="chart-info">
                        <h4>${item.title}</h4>
                        <p>${item.artist} • ${item.plays.toLocaleString()}회 재생</p>
                    </div>
                </div>
            `).join('');
        }
        
        // 콘텐츠 렌더링
        function renderContent() {
            // 필터링
            let filteredContent = [...shareplaceData.content];
            
            if (shareplaceData.currentCategory !== 'all') {
                filteredContent = filteredContent.filter(item => 
                    item.type === shareplaceData.currentCategory
                );
            }
            
            // 콘텐츠 카드 생성
            const latestContent = document.getElementById('latestContent');
            const popularContent = document.getElementById('popularContent');
            
            // 최신순 (가장 최근 6개)
            const latest = [...filteredContent]
                .sort((a, b) => new Date(b.uploaded) - new Date(a.uploaded))
                .slice(0, 6);
            
            // 인기순 (재생수 기준)
            const popular = [...filteredContent]
                .sort((a, b) => b.plays - a.plays)
                .slice(0, 6);
            
            latestContent.innerHTML = latest.map(item => createContentCard(item)).join('');
            popularContent.innerHTML = popular.map(item => createContentCard(item)).join('');
        }
        
        // 콘텐츠 카드 생성
        function createContentCard(item) {
            const typeLabels = {
                music: '🎵 음악 (TL3)',
                video: '🎬 영상 (TL4)',
                image: '🖼️ 이미지 (TLI)',
                document: '📄 문서 (TLD)',
                ebook: '📚 전자책 (TLE)'
            };
            
            return `
                <div class="content-card">
                    <div class="content-thumbnail">
                        ${item.thumbnail}
                    </div>
                    <div class="content-info">
                        <div class="content-type">${typeLabels[item.type] || item.type}</div>
                        <h3 class="content-title">${item.title}</h3>
                        <p class="content-artist">${item.artist} • ${item.uploaded}</p>
                        
                        <div class="content-stats">
                            <div class="stat">
                                <div class="stat-value">${item.plays.toLocaleString()}</div>
                                <div class="stat-label">재생</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${item.charges.toLocaleString()}</div>
                                <div class="stat-label">충전</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${item.pricePerSec}x</div>
                                <div class="stat-label">승수</div>
                            </div>
                        </div>
                        
                        <div class="content-actions">
                            <button class="action-btn charge" onclick="chargeContent(${item.id})">
                                <i class="fas fa-bolt"></i> 충전하기
                            </button>
                            <button class="action-btn" onclick="previewContent(${item.id})">
                                <i class="fas fa-play"></i> 미리보기
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 콘텐츠 필터링
        function filterContent(searchTerm) {
            if (!searchTerm) {
                renderContent();
                return;
            }
            
            const filtered = shareplaceData.content.filter(item =>
                item.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.artist.toLowerCase().includes(searchTerm.toLowerCase())
            );
            
            // UI 업데이트
            document.getElementById('latestContent').innerHTML = 
                filtered.map(item => createContentCard(item)).join('');
            document.getElementById('popularContent').innerHTML = 
                filtered.map(item => createContentCard(item)).join('');
        }
        
        // 콘텐츠 정렬
        function sortContent(sortType) {
            let sortedContent = [...shareplaceData.content];
            
            switch(sortType) {
                case 'new':
                    sortedContent.sort((a, b) => new Date(b.uploaded) - new Date(a.uploaded));
                    break;
                case 'popular':
                    sortedContent.sort((a, b) => b.plays - a.plays);
                    break;
                case 'trending':
                    // 트렌딩 알고리즘 (간단한 버전)
                    sortedContent.sort((a, b) => {
                        const aScore = a.plays / (new Date() - new Date(a.uploaded));
                        const bScore = b.plays / (new Date() - new Date(b.uploaded));
                        return bScore - aScore;
                    });
                    break;
            }
            
            // UI 업데이트
            document.getElementById('latestContent').innerHTML = 
                sortedContent.map(item => createContentCard(item)).join('');
            document.getElementById('popularContent').innerHTML = 
                sortedContent.map(item => createContentCard(item)).join('');
        }
        
        // 콘텐츠 충전
        function chargeContent(contentId) {
            const content = shareplaceData.content.find(item => item.id === contentId);
            if (!content) return;
            
            const chargeAmount = prompt(`${content.title}을(를) 몇 TL 충전하시겠습니까? (최소 100TL)`);
            if (!chargeAmount || isNaN(chargeAmount) || chargeAmount < 100) {
                alert('최소 100TL 이상 충전해주세요.');
                return;
            }
            
            // 잔액 확인
            const user = JSON.parse(localStorage.getItem('timelink_user'));
            if (user.balance < chargeAmount) {
                alert('잔액이 부족합니다. 지갑을 충전해주세요.');
                window.location.href = 'profile.html#wallet';
                return;
            }
            
            // 충전 처리
            user.balance -= parseInt(chargeAmount);
            localStorage.setItem('timelink_user', JSON.stringify(user));
            
            // UI 업데이트
            updateHeader();
            
            // 성공 메시지
            showStatus(`${content.title}에 ${chargeAmount}TL이 충전되었습니다!`, 'success');
            
            // 플레이어 열기 시뮬레이션
            setTimeout(() => {
                alert('콘텐츠 플레이어가 열립니다. 즐거운 감상 되세요!');
            }, 1000);
        }
        
        // 콘텐츠 미리보기
        function previewContent(contentId) {
            const content = shareplaceData.content.find(item => item.id === contentId);
            if (!content) return;
            
            alert(`${content.title}의 미리보기를 재생합니다.\n\n아티스트: ${content.artist}\n재생 시간: 30초 미리보기`);
        }
        
        // 상태 메시지 표시
        function showStatus(message, type) {
            const statusElement = document.getElementById('shareplaceStatus');
            if (!statusElement) return;
            
            statusElement.textContent = message;
            statusElement.className = 'status-message status-' + type;
            
            setTimeout(() => {
                statusElement.className = 'status-message';
                statusElement.textContent = '';
            }, 3000);
        }
    </script>
</body>
</html>
