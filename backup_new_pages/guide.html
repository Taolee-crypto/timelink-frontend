<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 이용방법</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', 'Noto Sans KR', sans-serif;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.95);
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #1a237e, #311b92, #4a148c, #311b92);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            line-height: 1.6;
        }
        
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        /* 네비게이션 바 */
        nav {
            background: rgba(26, 35, 126, 0.15);
            padding: 0.8rem 2rem;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            color: rgba(255, 255, 255, 0.98);
            font-size: 1.4rem;
            font-weight: 500;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .logo:hover {
            color: #bb86fc;
            transform: translateY(-1px);
        }
        
        .nav-menu {
            display: flex;
            gap: 1.2rem;
        }
        
        .nav-menu a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            letter-spacing: -0.3px;
        }
        
        .nav-menu a:hover {
            background: rgba(187, 134, 252, 0.15);
            color: #bb86fc;
            transform: translateY(-2px);
        }
        
        .nav-auth {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }
        
        .nav-auth a {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
        }
        
        .btn-login {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-login:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .btn-signup {
            color: white;
            background: linear-gradient(135deg, #7c4dff, #651fff);
            border: none;
            font-weight: 500;
        }
        
        .btn-signup:hover {
            background: linear-gradient(135deg, #651fff, #6200ea);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(101, 31, 255, 0.4);
        }
        
        /* 메인 콘텐츠 */
        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }
        
        .page-content {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .page-title {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #bb86fc, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .page-description {
            font-size: 1rem;
            font-weight: 300;
            opacity: 0.85;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 400;
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            margin-top: 2rem;
        }
        
        .back-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        /* 웨이브 효과 */
        .wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            line-height: 0;
            z-index: 0;
        }
        
        .wave-container svg {
            position: relative;
            display: block;
            width: calc(100% + 1.3px);
            height: 150px;
        }
        
        .wave-container .shape-fill {
            fill: rgba(76, 0, 130, 0.15);
        }
        
        /* 푸터 */
        footer {
            text-align: center;
            padding: 1.5rem;
            background: rgba(26, 35, 126, 0.1);
            margin-top: 4rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            font-weight: 300;
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">⏳ TIMELINK</a>
            <div class="nav-menu">
                <a href="p2p.html">🔗 P2P</a>
                <a href="studio.html">🎬 TL STUDIO</a>
                <a href="music.html">🎵 TL MUSIC PLACE</a>
                <a href="tube.html">▶️ TLTUBE</a>
                <a href="charge.html">⚡ TL CHARGE</a>
                <a href="guide.html">📘 이용방법</a>
            </div>
            <div class="nav-auth">
                <a href="login.html" class="btn-login">로그인</a>
                <a href="signup.html" class="btn-signup">회원가입</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="page-content">
                <h1 class="page-title">이용방법</h1>
                <p class="page-description">
                    이 페이지는 현재 준비 중입니다. 곧 멋진 콘텐츠로 찾아뵙겠습니다.<br>
                    가는 글씨체와 물결처럼 흐르는 보라-남색 그라데이션으로 새롭게 디자인되었습니다.
                </p>
                <a href="index.html" class="back-link">
                    ← 메인 페이지로 돌아가기
                </a>
            </div>
        </div>
    </main>

    <!-- 웨이브 효과 -->
    <div class="wave-container">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
        </svg>
    </div>

    <footer>
        <p>&copy; 2024 TIMELINK. 시간을 가치로 연결하는 새로운 경제</p>
    </footer>
</body>
</html>
