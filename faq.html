<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>TimeLink FAQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/common.css" />
  <link rel="stylesheet" href="/styles/faq.css" />
    <link rel="stylesheet" href="src/styles/common.css">
</head>

<body>
  <!-- 상단 메뉴 -->
  <div id="header"></div>

  <main class="faq-container">
    <h1>자주 묻는 질문 (FAQ)</h1>

    <div class="faq-item">
      <button class="faq-question">TimeLink는 어떤 서비스인가요?</button>
      <div class="faq-answer">
        <p>
          TimeLink는 음악·영상·텍스트 등 디지털 파일을 시간 단위로 소비하고,
          참여에 따라 보상을 받을 수 있는 플랫폼입니다.
        </p>
      </div>
    </div>

    <div class="faq-item">
      <button class="faq-question">회원가입은 무료인가요?</button>
      <div class="faq-answer">
        <p>네, 회원가입은 무료이며 이메일 인증만 필요합니다.</p>
      </div>
    </div>

    <div class="faq-item">
      <button class="faq-question">이메일 인증이 안 와요</button>
      <div class="faq-answer">
        <p>
          스팸 메일함을 확인해 주세요.  
          그래도 오지 않으면 다시 인증 요청을 해주세요.
        </p>
      </div>
    </div>
  </main>

  <script src="/src/script/common-components.js"></script>
  <script src="/scripts/faq.js"></script>
</body>
</html>
