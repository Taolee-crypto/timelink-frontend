<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK MUSIC - 음악 발견과 재생</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="./src/css/common.css">
    
    <style>
        /* 페이지별 추가 스타일 */
        :root {
            --music-green: #00D4AA;
            --music-green-light: rgba(0, 212, 170, 0.1);
            --music-gradient: linear-gradient(135deg, #00D4AA, #00B894);
        }

        /* 메인 컨텐츠 */
        main {
            margin-top: 70px;
            min-height: calc(100vh - 70px - 200px);
        }

        /* 히어로 섹션 */
        .music-hero {
            padding: 80px 0;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            position: relative;
            overflow: hidden;
        }

        .music-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(0, 212, 170, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(0, 184, 148, 0.1) 0%, transparent 50%);
        }

        .music-hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .music-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #00D4AA, #00B894);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .music-subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* 음악 플레이어 */
        .music-player-section {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            border-radius: 20px;
            padding: 3rem;
            margin: 3rem auto;
            border: 2px solid rgba(0, 212, 170, 0.2);
            max-width: 1200px;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .player-title {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .player-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 212, 170, 0.2);
            border: none;
            color: #00D4AA;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-btn:hover {
            background: rgba(0, 212, 170, 0.3);
            transform: scale(1.1);
        }

        .player-btn.play {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            background: linear-gradient(135deg, #00D4AA, #00B894);
            color: white;
        }

        .player-info {
            text-align: center;
            margin-bottom: 2rem;
        }

        .current-track {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .current-artist {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .player-progress {
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #00D4AA, #00B894);
            width: 30%;
            border-radius: 3px;
        }

        .player-time {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* 음악 그리드 */
        .music-grid-section {
            padding: 60px 0;
            background: #0F172A;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            font-size: 2.2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .filter-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .filter-btn:hover {
            background: rgba(0, 212, 170, 0.1);
            color: #00D4AA;
            border-color: rgba(0, 212, 170, 0.3);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #00D4AA, #00B894);
            color: white;
            border-color: transparent;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .music-card {
            background: linear-gradient(145deg, #1E293B, #0F172A);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .music-card:hover {
            transform: translateY(-10px);
            border-color: rgba(0, 212, 170, 0.3);
            box-shadow: 0 20px 40px rgba(0, 212, 170, 0.1);
        }

        .music-cover {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .music-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .music-card:hover .music-cover img {
            transform: scale(1.05);
        }

        .music-badge {
            position: absolute;
            top: 1rem;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 2;
        }

        .music-badge.hot {
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            color: white;
            left: 1rem;
        }

        .music-badge.new {
            background: linear-gradient(135deg, #00D4AA, #00B894);
            color: white;
            left: 1rem;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .music-card:hover .play-overlay {
            opacity: 1;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00D4AA, #00B894);
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .music-card:hover .play-btn {
            transform: translateY(0);
        }

        .music-content {
            padding: 1.5rem;
        }

        .music-info {
            margin-bottom: 1rem;
        }

        .music-title-small {
            font-size: 1.2rem;
            color: white;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .music-artist {
            color: #94a3b8;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .music-stats {
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .music-earnings {
            color: #FFD700;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .music-actions {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn-small {
            flex: 1;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 10px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .action-btn-small:hover {
            background: rgba(0, 212, 170, 0.1);
            color: white;
        }

        .action-btn-small.primary {
            background: linear-gradient(135deg, #00D4AA, #00B894);
            color: white;
        }

        .action-btn-small.primary:hover {
            background: linear-gradient(135deg, #00B894, #00A884);
        }

        /* 차트 섹션 */
        .chart-section {
            padding: 60px 0;
            background: linear-gradient(145deg, #1E293B, #0F172A);
        }

        .chart-container {
            background: linear-gradient(145deg, #0F172A, #1E293B);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid rgba(0, 212, 170, 0.1);
        }

        .chart-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .chart-item:hover {
            background: rgba(0, 212, 170, 0.05);
            transform: translateX(10px);
        }

        .chart-rank {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            margin-right: 1.5rem;
            color: #00D4AA;
        }

        .chart-rank.top {
            background: linear-gradient(135deg, #00D4AA, #00B894);
            border-radius: 10px;
            color: white;
        }

        .chart-info {
            flex: 1;
        }

        .chart-title {
            font-size: 1.1rem;
            color: white;
            margin-bottom: 0.25rem;
        }

        .chart-artist {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .chart-stats {
            text-align: right;
        }

        .chart-plays {
            font-size: 1rem;
            color: white;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .chart-earnings {
            font-size: 0.9rem;
            color: #FFD700;
            font-weight: 500;
        }

        /* 검색 섹션 */
        .search-section {
            padding: 60px 0;
            background: #0F172A;
        }

        .search-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .search-box {
            position: relative;
            margin-bottom: 3rem;
        }

        .search-input {
            width: 100%;
            padding: 1.5rem 3rem 1.5rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 170, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #00D4AA;
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #00D4AA, #00B894);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* 반응형 */
        @media (max-width: 1200px) {
            .music-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .music-title {
                font-size: 2.2rem;
            }
            
            .section-title {
                font-size: 1.8rem;
            }
            
            .music-player-section {
                padding: 2rem;
                margin: 2rem 1rem;
            }
            
            .player-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .music-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
            }
            
            .filter-buttons {
                width: 100%;
                justify-content: center;
            }
            
            .chart-item {
                padding: 0.75rem;
            }
            
            .chart-rank {
                width: 35px;
                height: 35px;
                margin-right: 1rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .music-grid {
                grid-template-columns: 1fr;
            }
            
            .music-actions {
                flex-direction: column;
            }
            
            .player-controls {
                gap: 1rem;
            }
            
            .player-btn {
                width: 50px;
                height: 50px;
            }
            
            .player-btn.play {
                width: 60px;
                height: 60px;
            }
            
            .chart-item {
                flex-direction: column;
                text-align: center;
                gap: 0.75rem;
            }
            
            .chart-rank {
                margin-right: 0;
            }
            
            .chart-stats {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더는 common-components.js에서 로드 -->

    <!-- 메인 컨텐츠 -->
    <main>
        <!-- 히어로 섹션 -->
        <section class="music-hero">
            <div class="container">
                <div class="music-hero-content">
                    <h1 class="music-title">TLMUSIC</h1>
                    <p class="music-subtitle">
                        TL로 재생 시간을 부여받은 음악을 발견하고 즐기세요.<br>
                        당신의 재생이 아티스트의 직접적인 수익이 됩니다.
                    </p>
                    
                    <div class="hero-buttons">
                        <a href="#player" class="btn btn-primary">
                            <i class="fas fa-play-circle"></i> 지금 음악 듣기
                        </a>
                        <button class="btn btn-secondary" id="exploreMusicBtn">
                            <i class="fas fa-compass"></i> 음악 탐색하기
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 음악 플레이어 -->
        <section class="music-player-section" id="player">
            <div class="player-header">
                <h2 class="player-title">
                    <i class="fas fa-headphones"></i>
                    현재 재생 중
                </h2>
                <div class="player-info-display">
                    <span style="color: #94a3b8; margin-right: 1rem;">재생 시간 소모:</span>
                    <span id="tlConsumption" style="color: #00D4AA; font-weight: bold;">0.5 TL/분</span>
                </div>
            </div>
            
            <div class="player-controls">
                <button class="player-btn" id="prevBtn">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="player-btn play" id="playBtn">
                    <i class="fas fa-play" id="playIcon"></i>
                </button>
                <button class="player-btn" id="nextBtn">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>
            
            <div class="player-info">
                <div class="current-track" id="currentTrack">Midnight City Lights</div>
                <div class="current-artist" id="currentArtist">Neon Dreams • Electronic</div>
            </div>
            
            <div class="player-progress">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="player-time">
                    <span id="currentTime">2:15</span>
                    <span id="totalTime">3:45</span>
                </div>
            </div>
            
            <div style="text-align: center; color: #94a3b8; font-size: 0.9rem; margin-top: 1.5rem;">
                <i class="fas fa-info-circle"></i>
                이 음악을 재생하는 동안 아티스트는 
                <span style="color: #00D4AA; font-weight: 500;">0.085 TL/분</span>
                의 수익을 얻습니다
            </div>
        </section>

        <!-- 음악 그리드 -->
        <section class="music-grid-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-music"></i>
                        인기 음악
                    </h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">전체</button>
                        <button class="filter-btn" data-filter="pop">팝</button>
                        <button class="filter-btn" data-filter="electronic">일렉트로닉</button>
                        <button class="filter-btn" data-filter="hiphop">힙합</button>
                        <button class="filter-btn" data-filter="rock">락</button>
                        <button class="filter-btn" data-filter="jazz">재즈</button>
                    </div>
                </div>
                
                <div class="music-grid" id="musicGrid">
                    <!-- JavaScript로 동적 생성 -->
                </div>
            </div>
        </section>

        <!-- 차트 섹션 -->
        <section class="chart-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-chart-line"></i>
                        주간 음원 차트
                    </h2>
                    <div class="time-filter">
                        <select class="btn btn-secondary" style="background: rgba(255, 255, 255, 0.05);">
                            <option>이번 주</option>
                            <option>지난 주</option>
                            <option>이번 달</option>
                        </select>
                    </div>
                </div>
                
                <div class="chart-container">
                    <div id="chartList">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 검색 섹션 -->
        <section class="search-section">
            <div class="container">
                <div class="search-container">
                    <h2 class="section-title" style="text-align: center; margin-bottom: 2rem;">
                        <i class="fas fa-search"></i>
                        음악 검색
                    </h2>
                    
                    <div class="search-box">
                        <input type="text" class="search-input" placeholder="아티스트, 음악 제목, 장르로 검색하세요...">
                        <button class="search-btn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    
                    <div class="quick-search">
                        <h3 style="color: white; margin-bottom: 1.5rem; font-size: 1.2rem;">인기 검색어</h3>
                        <div class="filter-buttons" style="justify-content: center;">
                            <button class="filter-btn">#일렉트로닉</button>
                            <button class="filter-btn">#인디</button>
                            <button class="filter-btn">#로파이</button>
                            <button class="filter-btn">#트랩</button>
                            <button class="filter-btn">#앰비언트</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 푸터는 common-components.js에서 로드 -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="./src/js/common-components.js"></script>
    <script src="./src/js/timelink-auth.js"></script>

                    id: 8,
                    title: "Morning Coffee",
                    artist: "Jazz Trio",
                    genre: "jazz",
                    plays: "4,836",
                    earnings: "411 TL",
                    duration: "5:10",
                    isHot: false,
                    isNew: true,
                    coverColor: "#DAA520"
                }
            ];

            // 차트 데이터
            const chartData = musicData.slice(0, 10).map((music, index) => ({
                ...music,
                rank: index + 1
            }));

            // 음악 그리드 렌더링
            function renderMusicGrid(filter = 'all') {
                const grid = document.getElementById('musicGrid');
                if (!grid) return;
                
                grid.innerHTML = '';
                
                const filteredMusic = filter === 'all' 
                    ? musicData 
                    : musicData.filter(music => music.genre === filter);
                
                filteredMusic.forEach(music => {
                    const card = document.createElement('div');
                    card.className = 'music-card';
                    card.dataset.id = music.id;
                    card.dataset.genre = music.genre;
                    
                    let badges = '';
                    if (music.isHot) {
                        badges += '<span class="music-badge hot">HOT</span>';
                    }
                    if (music.isNew) {
                        badges += '<span class="music-badge new">NEW</span>';
                    }
                    
                    card.innerHTML = `
                        <div class="music-cover">
                            <div style="width: 100%; height: 100%; background: linear-gradient(135deg, ${music.coverColor}, #00B894);"></div>
                            ${badges}
                            <div class="play-overlay">
                                <button class="play-btn" onclick="playMusic(${music.id})">
                                    <i class="fas fa-play"></i>
                                </button>
                            </div>
                        </div>
                        <div class="music-content">
                            <div class="music-info">
                                <h3 class="music-title-small">${music.title}</h3>
                                <div class="music-artist">
                                    <i class="fas fa-user"></i>
                                    ${music.artist}
                                </div>
                            </div>
                            <div class="music-stats">
                                <div class="stat-item">
                                    <i class="fas fa-play-circle"></i>
                                    <span>${music.plays}</span>
                                </div>
                                <div class="stat-item">
                                    <i class="fas fa-clock"></i>
                                    <span>${music.duration}</span>
                                </div>
                            </div>
                            <div class="music-earnings">
                                <i class="fas fa-coins"></i>
                                <span>${music.earnings}</span>
                            </div>
                            <div class="music-actions">
                                <button class="action-btn-small primary" onclick="playMusic(${music.id})">
                                    <i class="fas fa-play"></i> 재생
                                </button>
                                <button class="action-btn-small" onclick="addToPlaylist(${music.id})">
                                    <i class="fas fa-plus"></i> 추가
                                </button>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            }

            // 차트 렌더링
            function renderChart() {
                const chartList = document.getElementById('chartList');
                if (!chartList) return;
                
                chartList.innerHTML = '';
                
                chartData.forEach(item => {
                    const chartItem = document.createElement('div');
                    chartItem.className = 'chart-item';
                    chartItem.dataset.id = item.id;
                    
                    const rankClass = item.rank <= 3 ? 'top' : '';
                    
                    chartItem.innerHTML = `
                        <div class="chart-rank ${rankClass}">${item.rank}</div>
                        <div class="chart-info">
                            <div class="chart-title">${item.title}</div>
                            <div class="chart-artist">${item.artist}</div>
                        </div>
                        <div class="chart-stats">
                            <div class="chart-plays">${item.plays}</div>
                            <div class="chart-earnings">${item.earnings}</div>
                        </div>
                    `;
                    
                    chartItem.addEventListener('click', () => {
                        playMusic(item.id);
                    });
                    
                    chartList.appendChild(chartItem);
                });
            }

            // 플레이어 상태
            let isPlaying = false;
            let currentTime = 135; // 2:15 in seconds
            let totalTime = 225; // 3:45 in seconds
            let currentTrackIndex = 0;
            
            // 플레이어 업데이트
            function updatePlayer(music) {
                if (!music) return;
                
                document.getElementById('currentTrack').textContent = music.title;
                document.getElementById('currentArtist').textContent = `${music.artist} • ${music.genre}`;
                
                const timeParts = music.duration.split(':');
                totalTime = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
                currentTime = 0;
                
                updateProgress();
            }
            
            // 진행 상태 업데이트
            function updateProgress() {
                const progressPercentage = (currentTime / totalTime) * 100;
                const progressFill = document.getElementById('progressFill');
                if (progressFill) {
                    progressFill.style.width = `${progressPercentage}%`;
                }
                
                // 시간 표시 업데이트
                const currentMinutes = Math.floor(currentTime / 60);
                const currentSeconds = Math.floor(currentTime % 60);
                const totalMinutes = Math.floor(totalTime / 60);
                const totalSeconds = Math.floor(totalTime % 60);
                
                const currentTimeElement = document.getElementById('currentTime');
                const totalTimeElement = document.getElementById('totalTime');
                
                if (currentTimeElement) {
                    currentTimeElement.textContent = `${currentMinutes}:${currentSeconds < 10 ? '0' : ''}${currentSeconds}`;
                }
                if (totalTimeElement) {
                    totalTimeElement.textContent = `${totalMinutes}:${totalSeconds < 10 ? '0' : ''}${totalSeconds}`;
                }
            }
            
            // 음악 재생
            function playMusic(musicId) {
                const music = musicData.find(m => m.id === musicId);
                if (!music) return;
                
                updatePlayer(music);
                
                if (!isPlaying) {
                    togglePlay();
                }
                
                // 스크롤 to player
                document.getElementById('player').scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
            
            // 플레이/일시정지 토글
            function togglePlay() {
                isPlaying = !isPlaying;
                const playIcon = document.getElementById('playIcon');
                const playBtn = document.getElementById('playBtn');
                
                if (isPlaying) {
                    playIcon.className = 'fas fa-pause';
                    playBtn.style.background = 'linear-gradient(135deg, #00B894, #00A884)';
                    simulatePlayback();
                } else {
                    playIcon.className = 'fas fa-play';
                    playBtn.style.background = 'linear-gradient(135deg, #00D4AA, #00B894)';
                }
            }
            
            // 재생 시뮬레이션
            function simulatePlayback() {
                if (!isPlaying) return;
                
                if (currentTime < totalTime) {
                    currentTime++;
                    updateProgress();
                    
                    // 다음 트랙으로 자동 전환
                    if (currentTime >= totalTime) {
                        nextTrack();
                    } else {
                        setTimeout(simulatePlayback, 1000);
                    }
                }
            }
            
            // 다음 트랙
            function nextTrack() {
                const currentMusicId = parseInt(document.querySelector('.music-card[data-id]')?.dataset.id || '1');
                const currentIndex = musicData.findIndex(m => m.id === currentMusicId);
                const nextIndex = (currentIndex + 1) % musicData.length;
                
                playMusic(musicData[nextIndex].id);
            }
            
            // 이전 트랙
            function prevTrack() {
                const currentMusicId = parseInt(document.querySelector('.music-card[data-id]')?.dataset.id || '1');
                const currentIndex = musicData.findIndex(m => m.id === currentMusicId);
                const prevIndex = (currentIndex - 1 + musicData.length) % musicData.length;
                
                playMusic(musicData[prevIndex].id);
            }
            
            // 필터 버튼 이벤트
            const filterButtons = document.querySelectorAll('.filter-btn[data-filter]');
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // 모든 버튼에서 active 클래스 제거
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    // 현재 버튼에 active 클래스 추가
                    this.classList.add('active');
                    
                    // 음악 그리드 필터링
                    const filter = this.dataset.filter;
                    renderMusicGrid(filter);
                });
            });
            
            // 검색 기능
            const searchInput = document.querySelector('.search-input');
            const searchBtn = document.querySelector('.search-btn');
            
            if (searchInput && searchBtn) {
                const performSearch = () => {
                    const query = searchInput.value.toLowerCase().trim();
                    if (!query) {
                        renderMusicGrid('all');
                        return;
                    }
                    
                    const filtered = musicData.filter(music => 
                        music.title.toLowerCase().includes(query) ||
                        music.artist.toLowerCase().includes(query) ||
                        music.genre.toLowerCase().includes(query)
                    );
                    
                    const grid = document.getElementById('musicGrid');
                    if (!grid) return;
                    
                    grid.innerHTML = '';
                    
                    if (filtered.length === 0) {
                        grid.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: #94a3b8;">
                                <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                                <h3 style="color: white; margin-bottom: 0.5rem;">검색 결과가 없습니다</h3>
                                <p>다른 검색어를 입력해보세요.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    // 검색 결과 표시
                    filtered.forEach(music => {
                        // 음악 카드 생성 코드 (위의 renderMusicGrid와 동일)
                        const card = document.createElement('div');
                        card.className = 'music-card';
                        card.dataset.id = music.id;
                        
                        let badges = '';
                        if (music.isHot) {
                            badges += '<span class="music-badge hot">HOT</span>';
                        }
                        if (music.isNew) {
                            badges += '<span class="music-badge new">NEW</span>';
                        }
                        
                        card.innerHTML = `
                            <div class="music-cover">
                                <div style="width: 100%; height: 100%; background: linear-gradient(135deg, ${music.coverColor}, #00B894);"></div>
                                ${badges}
                                <div class="play-overlay">
                                    <button class="play-btn" onclick="playMusic(${music.id})">
                                        <i class="fas fa-play"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="music-content">
                                <div class="music-info">
                                    <h3 class="music-title-small">${music.title}</h3>
                                    <div class="music-artist">
                                        <i class="fas fa-user"></i>
                                        ${music.artist}
                                    </div>
                                </div>
                                <div class="music-stats">
                                    <div class="stat-item">
                                        <i class="fas fa-play-circle"></i>
                                        <span>${music.plays}</span>
                                    </div>
                                    <div class="stat-item">
                                        <i class="fas fa-clock"></i>
                                        <span>${music.duration}</span>
                                    </div>
                                </div>
                                <div class="music-earnings">
                                    <i class="fas fa-coins"></i>
                                    <span>${music.earnings}</span>
                                </div>
                                <div class="music-actions">
                                    <button class="action-btn-small primary" onclick="playMusic(${music.id})">
                                        <i class="fas fa-play"></i> 재생
                                    </button>
                                    <button class="action-btn-small" onclick="addToPlaylist(${music.id})">
                                        <i class="fas fa-plus"></i> 추가
                                    </button>
                                </div>
                            </div>
                        `;
                        
                        grid.appendChild(card);
                    });
                };
                
                searchBtn.addEventListener('click', performSearch);
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        performSearch();
                    }
                });
            }
            
            // 전역 함수
            window.playMusic = playMusic;
            window.addToPlaylist = function(musicId) {
                const music = musicData.find(m => m.id === musicId);
                if (music) {
                    alert(`${music.title}을(를) 플레이리스트에 추가했습니다.`);
                }
            };
            
            // 플레이어 컨트롤 이벤트
            const playBtn = document.getElementById('playBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const progressBar = document.getElementById('progressBar');
            
            if (playBtn) {
                playBtn.addEventListener('click', togglePlay);
            }
            
            if (prevBtn) {
                prevBtn.addEventListener('click', prevTrack);
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', nextTrack);
            }
            
            if (progressBar) {
                progressBar.addEventListener('click', function(e) {
                    const rect = this.getBoundingClientRect();
                    const clickPosition = e.clientX - rect.left;
                    const percentage = clickPosition / rect.width;
                    
                    currentTime = Math.floor(totalTime * percentage);
                    updateProgress();
                });
            }
            
            // 탐색 버튼
            const exploreBtn = document.getElementById('exploreMusicBtn');
            if (exploreBtn) {
                exploreBtn.addEventListener('click', function() {
                    document.querySelector('.music-grid-section').scrollIntoView({
                        behavior: 'smooth'
                    });
                });
            }
            
            // 초기화
            renderMusicGrid();
            renderChart();
            playMusic(1); // 첫 번째 음악 재생 시작
        });
    </script>
</body>
</html>
