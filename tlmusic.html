<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - TL Music 마켓</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="common-component.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0F2B, #1a1f37); 
            color: white; 
            min-height: 100vh;
        }
        
        /* 공통 헤더 */
        .main-header {
            background: rgba(26, 31, 55, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
        }
        
        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-section a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .logo-section i {
            color: #3b82f6;
            font-size: 1.8rem;
        }
        
        .main-nav {
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.05);
        }
        
        .nav-link.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        
        .header-right {
            flex: 0 0 auto;
        }
        
        /* 마켓 콘텐츠 */
        .market-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .market-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .market-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        
        .balance-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .balance-info h3 {
            color: #FFD166;
            margin-bottom: 0.5rem;
        }
        
        .balance-amount {
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }
        
        .buy-tl-btn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .buy-tl-btn:hover {
            opacity: 0.9;
        }
        
        /* 음원 검색 및 필터 */
        .market-controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        
        .filter-select {
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            min-width: 150px;
        }
        
        /* 음원 그리드 */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }
        
        .music-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .music-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }
        
        .music-cover {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .music-info {
            padding: 1.5rem;
        }
        
        .music-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .music-artist {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .music-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        .music-genre {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .music-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFD166;
            text-align: right;
        }
        
        .buy-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #1E90FF, #4169E1);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }
        
        .buy-btn:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #6b7280;
        }
        
        .owned-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        /* 구매한 음원 섹션 */
        .purchased-section {
            margin-top: 4rem;
            padding-top: 3rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .header-container {
                padding: 0 1rem;
            }
            
            .main-nav {
                gap: 0.5rem;
            }
            
            .nav-link span {
                display: none;
            }
            
            .market-container {
                padding: 1rem;
            }
            
            .balance-section {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .market-controls {
                flex-direction: column;
            }
            
            .search-box, .filter-select {
                min-width: 100%;
            }
            
            .music-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 공통 헤더 -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html">
                    <i class="fas fa-infinity"></i>
                    <span>TIMELINK</span>
                </a>
            </div>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>홈</span>
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-palette"></i>
                    <span>스튜디오</span>
                </a>
                <a href="tlmusic.html" class="nav-link active">
                    <i class="fas fa-music"></i>
                    <span>TL Music</span>
                </a>
                <a href="cafe-radio.html" class="nav-link">
                    <i class="fas fa-broadcast-tower"></i>
                    <span>Cafe Radio</span>
                </a>
            </nav>
            
            <div class="header-right">
                <div id="authButtons"></div>
            </div>
        </div>
    </header>

    <!-- 마켓 콘텐츠 -->
    <main class="market-container">
        <div class="market-header">
            <h1 class="market-title">TL Music 마켓</h1>
            <p>전 세계 아티스트들의 독특한 음원을 TL로 구매하세요</p>
        </div>

        <!-- TL 잔액 표시 -->
        <div class="balance-section">
            <div class="balance-info">
                <h3>내 TL 잔액</h3>
                <div class="balance-amount" id="marketBalance">0 TL</div>
                <p id="userGreeting">로그인이 필요합니다</p>
            </div>
            <button class="buy-tl-btn" onclick="showTLPurchaseModal()">
                <i class="fas fa-plus-circle"></i>
                TL 충전하기
            </button>
        </div>

        <!-- 검색 및 필터 -->
        <div class="market-controls">
            <input type="text" class="search-box" id="searchInput" placeholder="음원 제목이나 아티스트를 검색하세요..." onkeyup="searchMusic()">
            <select class="filter-select" id="genreFilter" onchange="filterMusic()">
                <option value="">모든 장르</option>
                <option value="pop">팝</option>
                <option value="rock">락</option>
                <option value="hiphop">힙합</option>
                <option value="electronic">일렉트로닉</option>
                <option value="jazz">재즈</option>
                <option value="classical">클래식</option>
            </select>
            <select class="filter-select" id="priceFilter" onchange="filterMusic()">
                <option value="">모든 가격</option>
                <option value="0-1000">1,000 TL 이하</option>
                <option value="1000-5000">1,000 - 5,000 TL</option>
                <option value="5000-10000">5,000 - 10,000 TL</option>
                <option value="10000-">10,000 TL 이상</option>
            </select>
        </div>

        <!-- 음원 목록 -->
        <h2 style="margin-bottom: 1.5rem;">인기 음원</h2>
        <div class="music-grid" id="musicList">
            <!-- JavaScript로 동적 생성 -->
        </div>

        <!-- 구매한 음원 -->
        <div class="purchased-section" id="purchasedSection">
            <h2 style="margin-bottom: 1.5rem;">내가 구매한 음원</h2>
            <div class="music-grid" id="purchasedMusic">
                <!-- JavaScript로 동적 생성 -->
            </div>
        </div>
    </main>

    <!-- TL 충전 모달 -->
    <div id="tlPurchaseModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: #1a1f37; padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="color: white; margin: 0;">TL 충전하기</h3>
                <button onclick="closePurchaseModal()" style="background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <p style="color: #94a3b8; margin-bottom: 1rem;">충전할 TL 금액을 선택하세요:</p>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem;">
                    <button class="tl-amount-btn" data-amount="1000">1,000 TL</button>
                    <button class="tl-amount-btn" data-amount="5000">5,000 TL</button>
                    <button class="tl-amount-btn" data-amount="10000">10,000 TL</button>
                    <button class="tl-amount-btn" data-amount="50000">50,000 TL</button>
                </div>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; color: #cbd5e1; margin-bottom: 0.5rem;">직접 입력</label>
                <input type="number" id="customAmount" placeholder="직접 금액 입력" style="width: 100%; padding: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white;">
            </div>
            <button onclick="purchaseTL()" style="width: 100%; padding: 1rem; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                TL 충전하기
            </button>
        </div>
    </div>

    <script>
        // 샘플 음원 데이터
        const sampleMusic = [
            { id: 1, title: "Midnight Dreams", artist: "Luna", genre: "electronic", price: 1500, duration: "3:45", cover: "🎵", owned: false },
            { id: 2, title: "Sunset Boulevard", artist: "Solar Beats", genre: "pop", price: 1200, duration: "4:20", cover: "🎶", owned: false },
            { id: 3, title: "Neon Lights", artist: "Cyber Pulse", genre: "electronic", price: 2500, duration: "5:15", cover: "🎧", owned: false },
            { id: 4, title: "Mountain High", artist: "Nature Sounds", genre: "classical", price: 1800, duration: "6:30", cover: "🏔️", owned: false },
            { id: 5, title: "Urban Jungle", artist: "City Vibes", genre: "hiphop", price: 2200, duration: "3:15", cover: "🏙️", owned: false },
            { id: 6, title: "Ocean Waves", artist: "Deep Blue", genre: "jazz", price: 1900, duration: "4:45", cover: "🌊", owned: false },
            { id: 7, title: "Desert Storm", artist: "Sandstorm", genre: "rock", price: 2800, duration: "5:50", cover: "🏜️", owned: false },
            { id: 8, title: "Cosmic Journey", artist: "Starlight", genre: "electronic", price: 3500, duration: "7:20", cover: "🌌", owned: false }
        ];

        // 페이지 로드 시
        document.addEventListener('DOMContentLoaded', function() {
            updateMarketUI();
            loadMusicList();
            loadPurchasedMusic();
            
            // TL 충전 버튼 이벤트
            document.querySelectorAll('.tl-amount-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('customAmount').value = this.dataset.amount;
                });
            });
        });

        function updateMarketUI() {
            const user = getCurrentUser();
            const balance = getTLBalance();
            
            document.getElementById('marketBalance').textContent = balance.toLocaleString() + ' TL';
            
            if (user) {
                document.getElementById('userGreeting').textContent = `${user.name}님, 환영합니다!`;
            }
        }

        function loadMusicList() {
            const container = document.getElementById('musicList');
            let html = '';
            
            sampleMusic.forEach(music => {
                const isOwned = checkIfOwned(music.id);
                
                html += `
                    <div class="music-card" data-id="${music.id}" data-genre="${music.genre}" data-price="${music.price}">
                        ${isOwned ? '<div class="owned-badge">보유중</div>' : ''}
                        <div class="music-cover">
                            ${music.cover}
                        </div>
                        <div class="music-info">
                            <h3 class="music-title">${music.title}</h3>
                            <div class="music-artist">
                                <i class="fas fa-user"></i>
                                ${music.artist}
                            </div>
                            <div class="music-meta">
                                <span>${music.duration}</span>
                                <span class="music-genre">${getGenreName(music.genre)}</span>
                            </div>
                            <div class="music-price">${music.price.toLocaleString()} TL</div>
                            <button class="buy-btn" ${isOwned ? 'disabled' : ''} onclick="buyMusic(${music.id}, '${music.title}', ${music.price})">
                                <i class="fas fa-shopping-cart"></i>
                                ${isOwned ? '보유중' : '구매하기'}
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function loadPurchasedMusic() {
            const container = document.getElementById('purchasedMusic');
            const purchased = JSON.parse(localStorage.getItem('timelink_purchased_music') || '[]');
            
            if (purchased.length === 0) {
                document.getElementById('purchasedSection').innerHTML = `
                    <h2 style="margin-bottom: 1.5rem;">내가 구매한 음원</h2>
                    <div class="empty-state">
                        <i class="fas fa-music"></i>
                        <p>아직 구매한 음원이 없습니다.</p>
                        <p>위의 음원을 구매해보세요!</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            purchased.forEach(music => {
                html += `
                    <div class="music-card">
                        <div class="owned-badge">보유중</div>
                        <div class="music-cover">
                            ${music.cover || '🎵'}
                        </div>
                        <div class="music-info">
                            <h3 class="music-title">${music.title}</h3>
                            <div class="music-artist">
                                <i class="fas fa-user"></i>
                                ${music.artist}
                            </div>
                            <div class="music-meta">
                                <span>구매일: ${music.purchaseDate}</span>
                                <span class="music-genre">${getGenreName(music.genre)}</span>
                            </div>
                            <div class="music-price">${music.price.toLocaleString()} TL</div>
                            <button class="buy-btn" onclick="playMusic('${music.id}')" style="background: linear-gradient(135deg, #10b981, #059669);">
                                <i class="fas fa-play"></i>
                                재생하기
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function getGenreName(code) {
            const genres = {
                pop: '팝', rock: '락', hiphop: '힙합',
                electronic: '일렉트로닉', jazz: '재즈', classical: '클래식'
            };
            return genres[code] || code;
        }

        function checkIfOwned(musicId) {
            const purchased = JSON.parse(localStorage.getItem('timelink_purchased_music') || '[]');
            return purchased.some(music => music.id === musicId);
        }

        // 음원 구매 함수
        function buyMusic(musicId, title, price) {
            if (!isLoggedIn()) {
                alert('로그인이 필요합니다!');
                showLoginModal();
                return;
            }

            if (buyWithTL(price, `음원: ${title}`)) {
                // 구매 처리
                const music = sampleMusic.find(m => m.id === musicId);
                const purchased = JSON.parse(localStorage.getItem('timelink_purchased_music') || '[]');
                
                purchased.push({
                    ...music,
                    purchaseDate: new Date().toLocaleDateString('ko-KR'),
                    downloadUrl: '#downloaded-' + musicId
                });
                
                localStorage.setItem('timelink_purchased_music', JSON.stringify(purchased));
                
                // UI 업데이트
                updateMarketUI();
                loadMusicList();
                loadPurchasedMusic();
                
                alert(`🎉 "${title}" 구매 완료!\n내 음원 라이브러리에서 확인하세요.`);
            }
        }

        // 음원 재생 함수
        function playMusic(musicId) {
            alert('음원 재생이 시작됩니다! (실제 구현에서는 오디오 플레이어가 실행됩니다)');
            // 실제 구현: Web Audio API나 HTML5 Audio 사용
        }

        // 검색 함수
        function searchMusic() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.music-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.music-title').textContent.toLowerCase();
                const artist = card.querySelector('.music-artist').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || artist.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // 필터 함수
        function filterMusic() {
            const genre = document.getElementById('genreFilter').value;
            const priceFilter = document.getElementById('priceFilter').value;
            const cards = document.querySelectorAll('.music-card');
            
            cards.forEach(card => {
                const cardGenre = card.dataset.genre;
                const cardPrice = parseInt(card.dataset.price);
                let show = true;
                
                // 장르 필터
                if (genre && cardGenre !== genre) {
                    show = false;
                }
                
                // 가격 필터
                if (priceFilter) {
                    const [min, max] = priceFilter.split('-').map(p => p === '' ? Infinity : parseInt(p));
                    if (cardPrice < min || (max !== Infinity && cardPrice > max)) {
                        show = false;
                    }
                }
                
                card.style.display = show ? 'block' : 'none';
            });
        }

        // TL 충전 모달
        function showTLPurchaseModal() {
            if (!isLoggedIn()) {
                alert('로그인이 필요합니다!');
                showLoginModal();
                return;
            }
            
            document.getElementById('tlPurchaseModal').style.display = 'flex';
        }

        function closePurchaseModal() {
            document.getElementById('tlPurchaseModal').style.display = 'none';
        }

        function purchaseTL() {
            const amountInput = document.getElementById('customAmount');
            let amount = parseInt(amountInput.value);
            
            if (!amount || amount <= 0) {
                alert('올바른 금액을 입력해주세요.');
                return;
            }
            
            if (amount > 1000000) {
                alert('한번에 1,000,000 TL 이상은 충전할 수 없습니다.');
                return;
            }
            
            if (confirm(`${amount.toLocaleString()} TL을 충전하시겠습니까?\n(모의 충전입니다)`)) {
                updateTLBalance(amount);
                updateMarketUI();
                closePurchaseModal();
                alert(`🎉 ${amount.toLocaleString()} TL이 충전되었습니다!`);
                amountInput.value = '';
            }
        }

        // 장르별 음원 로드 함수 (실제 API 호출 대신)
        function loadMusicByGenre(genre) {
            alert(`${getGenreName(genre)} 음원을 불러오는 중...\n(실제 구현에서는 API 호출)`);
        }
    </script>
