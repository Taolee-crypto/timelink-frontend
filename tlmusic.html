<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TLMUSIC - 음악 스트리밍 | TIMELINK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange-primary: #FF6B00;
            --orange-secondary: #FFA500;
            --dark-bg: #0F172A;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: white;
            padding-top: 70px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* 헤더 */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            background: rgba(255, 107, 0, 0.1);
            color: var(--orange-primary);
        }

        /* 히어로 */
        .hero {
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            padding: 3rem 0;
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* 필터 */
        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: rgba(255, 107, 0, 0.2);
            border-color: var(--orange-primary);
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
        }

        .search-input {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            width: 300px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--orange-primary);
        }

        /* 음악 그리드 */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .music-card {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .music-card:hover {
            transform: translateY(-5px);
            border-color: var(--orange-primary);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
        }

        .music-cover {
            position: relative;
            height: 250px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-cover i {
            font-size: 4rem;
            opacity: 0.5;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .music-card:hover .play-overlay {
            opacity: 1;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--orange-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .music-info {
            padding: 1.5rem;
        }

        .music-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .music-artist {
            color: var(--gray-text);
            margin-bottom: 1rem;
        }

        .music-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--gray-text);
        }

        .tl-price {
            color: var(--orange-primary);
            font-weight: 600;
        }

        /* 플레이어 */
        .music-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            z-index: 999;
            display: none;
        }

        .music-player.active {
            display: block;
        }

        .player-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
        }

        .player-cover {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-details {
            flex: 1;
        }

        .player-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .player-artist {
            color: var(--gray-text);
            font-size: 0.9rem;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: var(--orange-primary);
        }

        .control-btn.play {
            width: 50px;
            height: 50px;
            background: var(--orange-primary);
        }

        .player-progress {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--orange-primary);
            border-radius: 3px;
            width: 0%;
        }

        .time {
            font-size: 0.85rem;
            color: var(--gray-text);
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray-text);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .filter-section { flex-direction: column; }
            .search-input { width: 100%; }
            .music-grid { grid-template-columns: 1fr; }
            .player-content { flex-direction: column; gap: 1rem; }
            .main-nav { display: none; }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>

            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i> HOME
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-sliders-h"></i> STUDIO
                </a>
                <a href="tlmusic.html" class="nav-link active">
                    <i class="fas fa-music"></i> TLMUSIC
                </a>
                <a href="cafe-radio.html" class="nav-link">
                    <i class="fas fa-broadcast-tower"></i> CAFE RADIO
                </a>
            </nav>

            <div id="authButtons"></div>
        </div>
    </header>

    <!-- 히어로 -->
    <section class="hero">
        <div class="container">
            <h1>TLMUSIC</h1>
            <p>TL로 듣는 음악 스트리밍 서비스</p>
        </div>
    </section>

    <!-- 메인 컨텐츠 -->
    <main class="container">
        <!-- 필터 -->
        <div class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="new">최신</button>
                <button class="filter-btn" data-filter="popular">인기</button>
                <button class="filter-btn" data-filter="indie">인디</button>
            </div>

            <div class="search-box">
                <input type="text" class="search-input" placeholder="음악 검색..." id="searchInput">
                <button class="filter-btn" id="searchBtn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <!-- 음악 그리드 -->
        <div class="music-grid" id="musicGrid">
            <!-- 샘플 음악 카드 -->
            <div class="music-card" data-id="1">
                <div class="music-cover">
                    <i class="fas fa-music"></i>
                    <div class="play-overlay">
                        <div class="play-btn">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                </div>
                <div class="music-info">
                    <div class="music-title">Sunset Dreams</div>
                    <div class="music-artist">Indie Artist</div>
                    <div class="music-meta">
                        <span><i class="fas fa-clock"></i> 3:45</span>
                        <span class="tl-price">100 TL</span>
                    </div>
                </div>
            </div>

            <div class="music-card" data-id="2">
                <div class="music-cover">
                    <i class="fas fa-music"></i>
                    <div class="play-overlay">
                        <div class="play-btn">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                </div>
                <div class="music-info">
                    <div class="music-title">Midnight Jazz</div>
                    <div class="music-artist">Jazz Collective</div>
                    <div class="music-meta">
                        <span><i class="fas fa-clock"></i> 4:20</span>
                        <span class="tl-price">150 TL</span>
                    </div>
                </div>
            </div>

            <div class="music-card" data-id="3">
                <div class="music-cover">
                    <i class="fas fa-music"></i>
                    <div class="play-overlay">
                        <div class="play-btn">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                </div>
                <div class="music-info">
                    <div class="music-title">Electronic Waves</div>
                    <div class="music-artist">EDM Producer</div>
                    <div class="music-meta">
                        <span><i class="fas fa-clock"></i> 3:10</span>
                        <span class="tl-price">120 TL</span>
                    </div>
                </div>
            </div>

            <div class="music-card" data-id="4">
                <div class="music-cover">
                    <i class="fas fa-music"></i>
                    <div class="play-overlay">
                        <div class="play-btn">
                            <i class="fas fa-play"></i>
                        </div>
                    </div>
                </div>
                <div class="music-info">
                    <div class="music-title">Acoustic Soul</div>
                    <div class="music-artist">Singer Songwriter</div>
                    <div class="music-meta">
                        <span><i class="fas fa-clock"></i> 4:05</span>
                        <span class="tl-price">90 TL</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 플레이어 -->
    <div class="music-player" id="musicPlayer">
        <div class="player-content">
            <div class="player-info">
                <div class="player-cover">
                    <i class="fas fa-music"></i>
                </div>
                <div class="player-details">
                    <div class="player-title" id="playerTitle">음악을 선택하세요</div>
                    <div class="player-artist" id="playerArtist">-</div>
                </div>
            </div>

            <div class="player-controls">
                <button class="control-btn">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </button>
                <button class="control-btn">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="player-progress">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time" id="totalTime">0:00</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="./src/script/timelink-auth.js"></script>
    <script>
        // 음악 재생
        let isPlaying = false;
        let currentMusic = null;

        document.querySelectorAll('.music-card').forEach(card => {
            card.addEventListener('click', function() {
                const player = document.getElementById('musicPlayer');
                const title = this.querySelector('.music-title').textContent;
                const artist = this.querySelector('.music-artist').textContent;
                
                document.getElementById('playerTitle').textContent = title;
                document.getElementById('playerArtist').textContent = artist;
                
                player.classList.add('active');
                currentMusic = this.dataset.id;
                
                // 자동 재생
                playMusic();
            });
        });

        // 재생/일시정지
        document.getElementById('playPauseBtn').addEventListener('click', function() {
            if (isPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        });

        function playMusic() {
            isPlaying = true;
            document.querySelector('#playPauseBtn i').className = 'fas fa-pause';
            
            // TL 차감 시뮬레이션
            let progress = 0;
            const interval = setInterval(() => {
                progress += 1;
                document.getElementById('progressFill').style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    pauseMusic();
                }
            }, 100);
        }

        function pauseMusic() {
            isPlaying = false;
            document.querySelector('#playPauseBtn i').className = 'fas fa-play';
        }

        // 필터 버튼
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
