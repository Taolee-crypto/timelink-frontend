<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - TimeLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-top: 5px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .register-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .error-message {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .terms {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }
        
        .success-message {
            background: #4cd964;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>TimeLink</h1>
            <div class="tagline">음악의 미래를 연결하다</div>
        </div>
        
        <div class="register-card">
            <h2>새 계정 만들기</h2>
            
            <div id="success-message" class="success-message">
                회원가입 성공! 로그인 페이지로 이동합니다...
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" class="form-control" placeholder="홍길동" required>
                    <div id="name-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="example@timelink.com" required>
                    <div id="email-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="8자 이상 입력해주세요" required minlength="8">
                    <div id="password-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">비밀번호 확인</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="비밀번호를 다시 입력해주세요" required>
                    <div id="confirm-password-error" class="error-message"></div>
                </div>
                
                <button type="submit" class="btn-primary" id="register-btn">
                    가입하기
                </button>
            </form>
            
            <div class="login-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
            
            <div class="terms">
                가입하면 TimeLink의 <a href="#">이용약관</a>과 <a href="#">개인정보 처리방침</a>에 동의하게 됩니다.
            </div>
        </div>
    </div>

    <script type="module">
        // API 모듈 임포트
        import { TimeLinkAPI } from './api.js';
        
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registerForm');
            const registerBtn = document.getElementById('register-btn');
            const successMessage = document.getElementById('success-message');
            
            // 실시간 유효성 검사
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            
            // 이메일 형식 검사
            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }
            
            // 비밀번호 검사
            function validatePassword(password) {
                return password.length >= 8;
            }
            
            // 실시간 검사
            nameInput.addEventListener('blur', function() {
                const error = document.getElementById('name-error');
                if (!this.value.trim()) {
                    error.textContent = '이름을 입력해주세요';
                    error.style.display = 'block';
                } else {
                    error.style.display = 'none';
                }
            });
            
            emailInput.addEventListener('blur', function() {
                const error = document.getElementById('email-error');
                if (!validateEmail(this.value)) {
                    error.textContent = '올바른 이메일 형식을 입력해주세요';
                    error.style.display = 'block';
                } else {
                    error.style.display = 'none';
                }
            });
            
            passwordInput.addEventListener('blur', function() {
                const error = document.getElementById('password-error');
                if (!validatePassword(this.value)) {
                    error.textContent = '비밀번호는 8자 이상이어야 합니다';
                    error.style.display = 'block';
                } else {
                    error.style.display = 'none';
                }
            });
            
            confirmPasswordInput.addEventListener('blur', function() {
                const error = document.getElementById('confirm-password-error');
                if (this.value !== passwordInput.value) {
                    error.textContent = '비밀번호가 일치하지 않습니다';
                    error.style.display = 'block';
                } else {
                    error.style.display = 'none';
                }
            });
            
            // 폼 제출 처리
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // 유효성 검사
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                let isValid = true;
                
                if (!name) {
                    document.getElementById('name-error').textContent = '이름을 입력해주세요';
                    document.getElementById('name-error').style.display = 'block';
                    isValid = false;
                }
                
                if (!validateEmail(email)) {
                    document.getElementById('email-error').textContent = '올바른 이메일 형식을 입력해주세요';
                    document.getElementById('email-error').style.display = 'block';
                    isValid = false;
                }
                
                if (!validatePassword(password)) {
                    document.getElementById('password-error').textContent = '비밀번호는 8자 이상이어야 합니다';
                    document.getElementById('password-error').style.display = 'block';
                    isValid = false;
                }
                
                if (password !== confirmPassword) {
                    document.getElementById('confirm-password-error').textContent = '비밀번호가 일치하지 않습니다';
                    document.getElementById('confirm-password-error').style.display = 'block';
                    isValid = false;
                }
                
                if (!isValid) return;
                
                // 버튼 비활성화 및 로딩 표시
                registerBtn.disabled = true;
                registerBtn.textContent = '처리중...';
                
                try {
                    // API 호출
                    const result = await TimeLinkAPI.register({
                        name,
                        email,
                        password
                    });
                    
                    if (result.success) {
                        // 성공 메시지 표시
                        successMessage.style.display = 'block';
                        registerBtn.textContent = '가입 완료!';
                        
                        // 2초 후 로그인 페이지로 이동
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        // 에러 메시지 표시
                        alert(result.message || '회원가입에 실패했습니다');
                        registerBtn.disabled = false;
                        registerBtn.textContent = '가입하기';
                    }
                    
                } catch (error) {
                    console.error('회원가입 오류:', error);
                    alert('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                    registerBtn.disabled = false;
                    registerBtn.textContent = '가입하기';
                }
            });
            
            // 엔터 키로 폼 제출
            form.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    form.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
