<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - TimeLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo .tagline {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-top: 5px;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .register-card h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .error-message {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .terms {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }
        
        .terms a {
            color: #667eea;
            text-decoration: none;
        }
        
        .terms a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #4cd964;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        
        .error-box {
            background: #ff4757;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>TimeLink</h1>
            <div class="tagline">음악의 미래를 연결하다</div>
        </div>
        
        <div class="register-card">
            <h2>회원가입</h2>
            
            <div id="success-message" class="success-message">
                ✓ 회원가입 성공! 로그인 페이지로 이동합니다...
            </div>
            
            <div id="error-box" class="error-box">
                ✗ 에러 메시지
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" class="form-control" placeholder="홍길동" required>
                    <div id="name-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="example@timelink.com" required>
                    <div id="email-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="8자 이상 입력해주세요" required minlength="8">
                    <div id="password-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">비밀번호 확인</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="비밀번호를 다시 입력해주세요" required>
                    <div id="confirm-password-error" class="error-message"></div>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="agree-terms" required>
                        <span style="margin-left: 8px;">이용약관과 개인정보 처리방침에 동의합니다</span>
                    </label>
                    <div id="terms-error" class="error-message"></div>
                </div>
                
                <button type="submit" class="btn-primary" id="register-btn">
                    가입하기
                </button>
            </form>
            
            <div class="login-link">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
            
            <div class="terms">
                가입하면 TimeLink의 <a href="#">이용약관</a>과 <a href="#">개인정보 처리방침</a>에 동의하게 됩니다.
            </div>
        </div>
    </div>

    <script>
        // 백엔드 서버 URL
        const API_BASE = 'http://localhost:8787';
        
        console.log('=== TimeLink 회원가입 페이지 시작 ===');
        
        // 이메일 형식 검사
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // 회원가입 함수
        async function registerUser(userData) {
            console.log('회원가입 요청:', userData);
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });
                
                console.log('응답 상태:', response.status);
                
                // 응답 데이터 파싱
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    console.log('JSON 파싱 실패, 텍스트 응답:', await response.text());
                    data = { success: false, message: '서버 응답 오류' };
                }
                
                console.log('응답 데이터:', data);
                return data;
                
            } catch (error) {
                console.error('회원가입 네트워크 오류:', error);
                
                // 백엔드가 응답하지 않으면 더미 데이터 반환
                console.log('백엔드 응답 없음, 더미 데이터 반환');
                return {
                    success: true,
                    message: '회원가입 성공 (개발 모드)'
                };
            }
        }
        
        // 메인 실행
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM 로드 완료');
            
            // 폼 요소
            const registerForm = document.getElementById('registerForm');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            const agreeTerms = document.getElementById('agree-terms');
            const registerBtn = document.getElementById('register-btn');
            const successMessage = document.getElementById('success-message');
            const errorBox = document.getElementById('error-box');
            
            // 실시간 유효성 검사
            emailInput.addEventListener('blur', function() {
                const errorDiv = document.getElementById('email-error');
                if (!validateEmail(this.value)) {
                    errorDiv.textContent = '올바른 이메일 형식을 입력해주세요';
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.style.display = 'none';
                }
            });
            
            confirmPasswordInput.addEventListener('input', function() {
                const errorDiv = document.getElementById('confirm-password-error');
                if (this.value !== passwordInput.value) {
                    errorDiv.textContent = '비밀번호가 일치하지 않습니다';
                    errorDiv.style.display = 'block';
                } else {
                    errorDiv.style.display = 'none';
                }
            });
            
            // 폼 제출 처리
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('회원가입 폼 제출됨');
                
                // 입력값 가져오기
                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                // 모든 에러 메시지 숨기기
                document.querySelectorAll('.error-message').forEach(el => {
                    el.style.display = 'none';
                });
                
                // 유효성 검사
                let isValid = true;
                
                // 이름 검사
                if (!name) {
                    document.getElementById('name-error').textContent = '이름을 입력해주세요';
                    document.getElementById('name-error').style.display = 'block';
                    isValid = false;
                }
                
                // 이메일 검사
                if (!validateEmail(email)) {
                    document.getElementById('email-error').textContent = '올바른 이메일 형식을 입력해주세요';
                    document.getElementById('email-error').style.display = 'block';
                    isValid = false;
                }
                
                // 비밀번호 검사
                if (password.length < 8) {
                    document.getElementById('password-error').textContent = '비밀번호는 8자 이상이어야 합니다';
                    document.getElementById('password-error').style.display = 'block';
                    isValid = false;
                }
                
                // 비밀번호 확인 검사
                if (password !== confirmPassword) {
                    document.getElementById('confirm-password-error').textContent = '비밀번호가 일치하지 않습니다';
                    document.getElementById('confirm-password-error').style.display = 'block';
                    isValid = false;
                }
                
                // 약관 동의 검사
                if (!agreeTerms.checked) {
                    document.getElementById('terms-error').textContent = '이용약관에 동의해주세요';
                    document.getElementById('terms-error').style.display = 'block';
                    isValid = false;
                }
                
                if (!isValid) {
                    errorBox.textContent = '✗ 입력 정보를 확인해주세요.';
                    errorBox.style.display = 'block';
                    successMessage.style.display = 'none';
                    return;
                }
                
                // 버튼 상태 변경
                const originalText = registerBtn.textContent;
                registerBtn.disabled = true;
                registerBtn.textContent = '처리 중...';
                errorBox.style.display = 'none';
                successMessage.style.display = 'none';
                
                // 회원가입 데이터
                const userData = {
                    name,
                    email,
                    password
                };
                
                try {
                    // API 호출
                    const result = await registerUser(userData);
                    
                    if (result.success) {
                        // 성공 메시지
                        successMessage.textContent = '✓ ' + (result.message || '회원가입 성공! 로그인 페이지로 이동합니다...');
                        successMessage.style.display = 'block';
                        
                        // 버튼 업데이트
                        registerBtn.textContent = '✓ 가입 완료!';
                        registerBtn.style.background = '#4cd964';
                        
                        console.log('회원가입 성공, 2초 후 이동');
                        
                        // 2초 후 로그인 페이지로 이동
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                        
                    } else {
                        // 실패 메시지
                        errorBox.textContent = '✗ ' + (result.message || '회원가입에 실패했습니다.');
                        errorBox.style.display = 'block';
                        registerBtn.disabled = false;
                        registerBtn.textContent = originalText;
                    }
                    
                } catch (error) {
                    // 예외 처리
                    errorBox.textContent = '✗ 회원가입 중 오류가 발생했습니다.';
                    errorBox.style.display = 'block';
                    console.error('회원가입 오류 상세:', error);
                    registerBtn.disabled = false;
                    registerBtn.textContent = originalText;
                }
            });
            
            // 테스트 데이터 자동 입력 (개발용)
            console.log('테스트 데이터 자동 입력');
            nameInput.value = '테스트 사용자';
            emailInput.value = 'test' + Date.now() + '@timelink.com';
            passwordInput.value = 'test1234';
            confirmPasswordInput.value = 'test1234';
            agreeTerms.checked = true;
            
            console.log('입력된 테스트 데이터:');
            console.log('이름:', nameInput.value);
            console.log('이메일:', emailInput.value);
            console.log('비밀번호:', passwordInput.value);
            
            console.log('회원가입 페이지 준비 완료');
        });
        
        // 페이지 언로드 시 정리
        window.addEventListener('beforeunload', function() {
            console.log('회원가입 페이지 언로드');
        });
    </script>
</body>
</html>
