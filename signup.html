<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | TimeLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4a1e8a 0%, #1a237e 100%);
            --dark-bg: #0a0a1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-light: #ffffff;
            --text-gray: #b8b8d1;
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(74, 30, 138, 0.15) 0%, transparent 25%),
                radial-gradient(circle at 80% 70%, rgba(26, 35, 126, 0.15) 0%, transparent 25%);
        }
        
        .signup-container {
            max-width: 450px;
            width: 100%;
            margin: 0 auto;
        }
        
        .signup-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: var(--text-gray);
            font-size: 0.9rem;
        }
        
        .form-label {
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .form-label small {
            font-size: 0.8rem;
            font-weight: normal;
            color: var(--text-gray);
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            border-radius: 10px;
            padding: 12px 15px;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #7c4dff;
            color: var(--text-light);
            box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.1);
        }
        
        .input-group {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-gray);
            cursor: pointer;
            z-index: 10;
        }
        
        .password-strength {
            height: 4px;
            background: var(--glass-border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .password-rules {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-gray);
        }
        
        .password-rules ul {
            padding-left: 20px;
            margin-bottom: 0;
        }
        
        .password-rules li {
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }
        
        .password-rules li.valid {
            color: #4caf50;
        }
        
        .password-rules li.valid::before {
            content: "✓ ";
            color: #4caf50;
        }
        
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 30, 138, 0.3);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }
        
        .login-link a {
            color: #7c4dff;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .verification-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .verification-code {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        
        .verification-code input {
            flex: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .timer {
            color: #ff4081;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
        }
        
        .resend-link {
            color: #7c4dff;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .resend-link:hover {
            text-decoration: underline;
        }
        
        .resend-link.disabled {
            color: var(--text-gray);
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert-success {
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.3);
            color: #00c853;
        }
        
        .alert-error {
            background: rgba(255, 64, 129, 0.1);
            border: 1px solid rgba(255, 64, 129, 0.3);
            color: #ff4081;
        }
        
        .alert-info {
            background: rgba(33, 150, 243, 0.1);
            border: 1px solid rgba(33, 150, 243, 0.3);
            color: #2196f3;
        }
        
        .terms-agreement {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }
        
        .form-check {
            margin-bottom: 10px;
        }
        
        .form-check-input:checked {
            background-color: #7c4dff;
            border-color: #7c4dff;
        }
        
        .form-check-label {
            color: var(--text-gray);
            font-size: 0.9rem;
        }
        
        .form-check-label a {
            color: #7c4dff;
            text-decoration: none;
        }
        
        .form-check-label a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <!-- 로고 -->
            <div class="logo">
                <h1><i class="bi bi-infinity"></i> TimeLink</h1>
                <p>안전한 회원가입을 진행해주세요</p>
            </div>
            
            <!-- 알림 메시지 -->
            <div class="alert" id="messageAlert"></div>
            
            <!-- 기본 정보 입력 폼 -->
            <div id="signupForm">
                <div class="mb-3">
                    <label class="form-label">이메일 주소</label>
                    <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">비밀번호 <small>8자 이상, 영문+숫자+특수문자 포함</small></label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="비밀번호를 입력하세요" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="password-rules" id="passwordRules">
                        <ul>
                            <li id="ruleLength">8자 이상</li>
                            <li id="ruleUpper">대문자 포함</li>
                            <li id="ruleLower">소문자 포함</li>
                            <li id="ruleNumber">숫자 포함</li>
                            <li id="ruleSpecial">특수문자 포함</li>
                        </ul>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">비밀번호 확인</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="비밀번호를 다시 입력하세요" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <small id="passwordMatch" style="display: none; color: #4caf50;">✓ 비밀번호가 일치합니다</small>
                    <small id="passwordMismatch" style="display: none; color: #ff4081;">✗ 비밀번호가 일치하지 않습니다</small>
                </div>
                
                <!-- 이용약관 동의 -->
                <div class="terms-agreement">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="termsAgree">
                        <label class="form-check-label">
                            <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다 (필수)
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="marketingAgree">
                        <label class="form-check-label">
                            마케팅 정보 수신에 동의합니다 (선택)
                        </label>
                    </div>
                </div>
                
                <button class="btn btn-primary" id="signupBtn" onclick="startVerification()" disabled>
                    <i class="bi bi-envelope-check me-2"></i>회원가입 및 인증 시작
                </button>
            </div>
            
            <!-- 인증 코드 입력 폼 -->
            <div class="verification-section" id="verificationForm">
                <p class="text-center text-gray mb-3">
                    <span id="targetEmail"></span>로<br>
                    6자리 인증 코드를 발송했습니다
                </p>
                
                <div class="verification-code">
                    <input type="text" class="form-control" id="code1" maxlength="1" oninput="moveToNext(1)">
                    <input type="text" class="form-control" id="code2" maxlength="1" oninput="moveToNext(2)">
                    <input type="text" class="form-control" id="code3" maxlength="1" oninput="moveToNext(3)">
                    <input type="text" class="form-control" id="code4" maxlength="1" oninput="moveToNext(4)">
                    <input type="text" class="form-control" id="code5" maxlength="1" oninput="moveToNext(5)">
                    <input type="text" class="form-control" id="code6" maxlength="1" oninput="moveToNext(6)">
                </div>
                
                <div class="timer" id="timer">03:00</div>
                
                <button class="btn btn-primary" onclick="verifyCode()" id="verifyBtn" disabled>
                    <i class="bi bi-check-circle me-2"></i>인증 완료 및 계정 생성
                </button>
                
                <div class="text-center mt-3">
                    <a class="resend-link disabled" id="resendLink" onclick="resendCode()">
                        <i class="bi bi-arrow-clockwise me-1"></i>코드 재전송 (<span id="resendTimer">30</span>초 후 가능)
                    </a>
                    <span class="text-gray"> | </span>
                    <a class="resend-link" onclick="changeEmail()">
                        <i class="bi bi-pencil me-1"></i>이메일 변경
                    </a>
                </div>
            </div>
            
            <!-- 로그인 링크 -->
            <div class="login-link">
                이미 계정이 있으신가요? <a href="./login.html">로그인하기</a>
            </div>
        </div>
    </div>

    <script>
        // API 엔드포인트 설정 (Cloudflare Worker)
        const API_BASE_URL = 'https://your-worker.timelink.workers.dev';
        // 개발 모드 확인
        const IS_DEV_MODE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        let verificationCode = '';
        let timerInterval = null;
        let timeLeft = 180; // 3분
        let userEmail = '';
        let userPassword = '';
        let resendCooldown = 30; // 재전송 쿨다운 30초
        let resendTimerInterval = null;

        // 비밀번호 보기/숨기기 토글
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const toggleBtn = input.parentNode.querySelector('.password-toggle i');
            
            if (input.type === 'password') {
                input.type = 'text';
                toggleBtn.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                toggleBtn.className = 'bi bi-eye';
            }
        }

        // 비밀번호 강도 체크
        function checkPasswordStrength(password) {
            const rules = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };
            
            // 규칙에 맞는지 표시
            Object.keys(rules).forEach((rule, index) => {
                const ruleElement = document.getElementById(`rule${rule.charAt(0).toUpperCase() + rule.slice(1)}`);
                if (rules[rule]) {
                    ruleElement.classList.add('valid');
                } else {
                    ruleElement.classList.remove('valid');
                }
            });
            
            // 강도 계산
            let strength = 0;
            Object.values(rules).forEach(isValid => {
                if (isValid) strength++;
            });
            
            // 강도 바 업데이트
            const strengthBar = document.getElementById('strengthBar');
            const percent = (strength / 5) * 100;
            strengthBar.style.width = `${percent}%`;
            
            let color = '#ff4081'; // 매우 약함
            if (strength === 5) color = '#4caf50'; // 매우 강함
            else if (strength >= 4) color = '#8bc34a'; // 강함
            else if (strength >= 3) color = '#ffc107'; // 보통
            else if (strength >= 2) color = '#ff9800'; // 약함
            
            strengthBar.style.backgroundColor = color;
            
            return strength >= 4; // 4개 이상 규칙 충족 시 true
        }

        // 비밀번호 확인 체크
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const matchElement = document.getElementById('passwordMatch');
            const mismatchElement = document.getElementById('passwordMismatch');
            
            if (!confirmPassword) {
                matchElement.style.display = 'none';
                mismatchElement.style.display = 'none';
                return false;
            }
            
            if (password === confirmPassword) {
                matchElement.style.display = 'block';
                mismatchElement.style.display = 'none';
                return true;
            } else {
                matchElement.style.display = 'none';
                mismatchElement.style.display = 'block';
                return false;
            }
        }

        // 회원가입 버튼 활성화 체크
        function checkSignupButton() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const termsAgreed = document.getElementById('termsAgree').checked;
            const passwordStrong = checkPasswordStrength(password);
            const passwordMatch = checkPasswordMatch();
            const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            
            const signupBtn = document.getElementById('signupBtn');
            signupBtn.disabled = !(emailValid && password && passwordStrong && passwordMatch && termsAgreed);
        }

        // 인증 시작
        async function startVerification() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            // 유효성 검사
            if (!email || !emailRegex.test(email)) {
                showMessage('유효한 이메일 주소를 입력해주세요.', 'error');
                return;
            }
            
            if (!password) {
                showMessage('비밀번호를 입력해주세요.', 'error');
                return;
            }
            
            // 비밀번호 강도 확인
            if (!checkPasswordStrength(password)) {
                showMessage('비밀번호가 너무 약합니다. 규칙을 확인해주세요.', 'error');
                return;
            }
            
            if (!checkPasswordMatch()) {
                showMessage('비밀번호가 일치하지 않습니다.', 'error');
                return;
            }
            
            if (!document.getElementById('termsAgree').checked) {
                showMessage('이용약관에 동의해주세요.', 'error');
                return;
            }
            
            userEmail = email;
            userPassword = password;
            
            try {
                showMessage('인증 코드를 생성 중입니다...', 'info');
                
                // 1. Cloudflare Worker로 인증 코드 생성 요청
                const response = await fetch(`${API_BASE_URL}/auth/send-verification`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        action: 'signup'
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    verificationCode = result.code; // 서버에서 생성한 코드
                    
                    // 2. SendGrid를 통한 이메일 전송 요청
                    const emailResponse = await fetch(`${API_BASE_URL}/email/send-verification`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            to: email,
                            code: verificationCode,
                            type: 'signup'
                        })
                    });
                    
                    const emailResult = await emailResponse.json();
                    
                    if (emailResult.success) {
                        // 폼 전환
                        document.getElementById('signupForm').style.display = 'none';
                        document.getElementById('verificationForm').style.display = 'block';
                        document.getElementById('targetEmail').textContent = email;
                        
                        // 입력 필드 초기화 및 포커스
                        for (let i = 1; i <= 6; i++) {
                            document.getElementById(`code${i}`).value = '';
                        }
                        setTimeout(() => document.getElementById('code1').focus(), 100);
                        
                        // 타이머 시작
                        startTimer();
                        startResendTimer();
                        
                        showMessage('인증 코드가 이메일로 전송되었습니다.', 'success');
                    } else {
                        showMessage('이메일 전송에 실패했습니다. 다시 시도해주세요.', 'error');
                    }
                } else {
                    showMessage(result.message || '인증 코드 생성에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                console.error('인증 오류:', error);
                // 개발 모드일 때는 시뮬레이션
                if (IS_DEV_MODE) {
                    verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
                    console.log(`[개발모드] 인증 코드: ${verificationCode}`);
                    
                    document.getElementById('signupForm').style.display = 'none';
                    document.getElementById('verificationForm').style.display = 'block';
                    document.getElementById('targetEmail').textContent = email;
                    
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`code${i}`).value = '';
                    }
                    setTimeout(() => document.getElementById('code1').focus(), 100);
                    
                    startTimer();
                    startResendTimer();
                    
                    showMessage('[개발모드] 인증 코드가 생성되었습니다.', 'success');
                } else {
                    showMessage('서버 연결에 실패했습니다. 네트워크를 확인해주세요.', 'error');
                }
            }
        }

        // 타이머 시작
        function startTimer() {
            timeLeft = 180;
            updateTimerDisplay();
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showMessage('인증 시간이 만료되었습니다.', 'error');
                    document.getElementById('verifyBtn').disabled = true;
                }
            }, 1000);
        }

        // 재전송 타이머 시작
        function startResendTimer() {
            resendCooldown = 30;
            updateResendTimerDisplay();
            
            const resendLink = document.getElementById('resendLink');
            resendLink.classList.add('disabled');
            
            if (resendTimerInterval) clearInterval(resendTimerInterval);
            
            resendTimerInterval = setInterval(() => {
                resendCooldown--;
                updateResendTimerDisplay();
                
                if (resendCooldown <= 0) {
                    clearInterval(resendTimerInterval);
                    resendLink.classList.remove('disabled');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateResendTimerDisplay() {
            document.getElementById('resendTimer').textContent = resendCooldown;
        }

        // 다음 입력 필드로 이동
        function moveToNext(current) {
            const currentInput = document.getElementById(`code${current}`);
            const nextInput = document.getElementById(`code${current + 1}`);
            
            currentInput.value = currentInput.value.replace(/[^0-9]/g, '');
            
            if (currentInput.value.length === 1 && nextInput) {
                nextInput.focus();
            }
            
            checkCodeCompletion();
        }

        // 코드 완성 여부 확인
        function checkCodeCompletion() {
            let code = '';
            for (let i = 1; i <= 6; i++) {
                code += document.getElementById(`code${i}`).value;
            }
            
            if (code.length === 6) {
                document.getElementById('verifyBtn').disabled = false;
            }
        }

        // 인증 코드 확인 및 계정 생성
        async function verifyCode() {
            let enteredCode = '';
            for (let i = 1; i <= 6; i++) {
                enteredCode += document.getElementById(`code${i}`).value;
            }
            
            if (enteredCode !== verificationCode) {
                showMessage('인증 코드가 일치하지 않습니다.', 'error');
                shakeInputs();
                return;
            }
            
            try {
                showMessage('계정을 생성 중입니다...', 'info');
                
                // Cloudflare Worker로 계정 생성 요청
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: userEmail,
                        password: userPassword,
                        verificationCode: enteredCode,
                        marketingAgree: document.getElementById('marketingAgree').checked
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.', 'success');
                    
                    // 성공 시 세션 저장
                    localStorage.setItem('userEmail', userEmail);
                    localStorage.setItem('signupCompleted', 'true');
                    
                    // 2초 후 로그인 페이지로 이동
                    setTimeout(() => {
                        window.location.href = './login.html';
                    }, 2000);
                } else {
                    showMessage(result.message || '계정 생성에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                console.error('계정 생성 오류:', error);
                
                if (IS_DEV_MODE) {
                    // 개발 모드: 로컬 저장
                    localStorage.setItem('userEmail', userEmail);
                    localStorage.setItem('signupCompleted', 'true');
                    
                    showMessage('[개발모드] 회원가입 완료! 로그인 페이지로 이동합니다.', 'success');
                    
                    setTimeout(() => {
                        window.location.href = './login.html';
                    }, 2000);
                } else {
                    showMessage('서버 연결에 실패했습니다. 다시 시도해주세요.', 'error');
                }
            }
        }

        // 코드 재전송
        async function resendCode() {
            const resendLink = document.getElementById('resendLink');
            if (resendLink.classList.contains('disabled')) {
                return;
            }
            
            try {
                showMessage('새 인증 코드를 전송 중입니다...', 'info');
                
                // 새 코드 요청
                const response = await fetch(`${API_BASE_URL}/auth/resend-verification`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: userEmail
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    verificationCode = result.code;
                    
                    // 이메일 재전송
                    await fetch(`${API_BASE_URL}/email/send-verification`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            to: userEmail,
                            code: verificationCode,
                            type: 'resend'
                        })
                    });
                    
                    // 입력 필드 초기화
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`code${i}`).value = '';
                    }
                    document.getElementById('code1').focus();
                    document.getElementById('verifyBtn').disabled = true;
                    
                    // 타이머 재시작
                    clearInterval(timerInterval);
                    clearInterval(resendTimerInterval);
                    startTimer();
                    startResendTimer();
                    
                    showMessage('새 인증 코드가 전송되었습니다.', 'success');
                } else {
                    showMessage(result.message || '코드 재전송에 실패했습니다.', 'error');
                }
                
            } catch (error) {
                console.error('재전송 오류:', error);
                
                if (IS_DEV_MODE) {
                    verificationCode = Math.floor(100000 + Math.random() * 900000).toString();
                    console.log(`[개발모드] 새 인증 코드: ${verificationCode}`);
                    
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`code${i}`).value = '';
                    }
                    document.getElementById('code1').focus();
                    document.getElementById('verifyBtn').disabled = true;
                    
                    clearInterval(timerInterval);
                    clearInterval(resendTimerInterval);
                    startTimer();
                    startResendTimer();
                    
                    showMessage('[개발모드] 새 인증 코드가 생성되었습니다.', 'success');
                } else {
                    showMessage('재전송에 실패했습니다. 네트워크를 확인해주세요.', 'error');
                }
            }
        }

        // 이메일 변경
        function changeEmail() {
            document.getElementById('verificationForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('email').value = '';
            document.getElementById('email').focus();
            
            clearInterval(timerInterval);
            clearInterval(resendTimerInterval);
            
            showMessage('이메일 주소를 변경해주세요.', 'info');
        }

        // 입력 필드 흔들기 효과
        function shakeInputs() {
            for (let i = 1; i <= 6; i++) {
                const input = document.getElementById(`code${i}`);
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 500);
            }
        }

        // 메시지 표시
        function showMessage(message, type = 'info') {
            const alert = document.getElementById('messageAlert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // 이벤트 리스너 설정
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('email').focus();
            
            // 입력 이벤트 리스너
            document.getElementById('email').addEventListener('input', checkSignupButton);
            document.getElementById('password').addEventListener('input', function() {
                checkPasswordStrength(this.value);
                checkPasswordMatch();
                checkSignupButton();
            });
            document.getElementById('confirmPassword').addEventListener('input', function() {
                checkPasswordMatch();
                checkSignupButton();
            });
            document.getElementById('termsAgree').addEventListener('change', checkSignupButton);
            
            // Enter 키 이벤트
            document.getElementById('email').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !document.getElementById('signupBtn').disabled) {
                    startVerification();
                }
            });
            
            document.getElementById('code6').addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !document.getElementById('verifyBtn').disabled) {
                    verifyCode();
                }
            });
        });

        // CSS 추가
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
            .shake { animation: shake 0.5s ease; }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
