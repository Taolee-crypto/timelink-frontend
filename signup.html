<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 회원가입</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary-blue: #0066FF;
            --primary-dark: #0052CC;
            --secondary-teal: #00D4AA;
            --dark-bg: #0A0F2B;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
            --white: #FFFFFF;
            --error: #f44336;
            --success: #00D4AA;
        }

        body {
            background: var(--dark-bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .signup-box {
            background: var(--dark-card);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--white);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--gray-text);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 102, 255, 0.05);
        }

        .password-strength {
            height: 4px;
            background: var(--gray-text);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-bar.weak { width: 33%; background: #f44336; }
        .strength-bar.medium { width: 66%; background: #ff9800; }
        .strength-bar.strong { width: 100%; background: var(--success); }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: rgba(0, 212, 170, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid rgba(244, 67, 54, 0.3);
            display: block;
        }

        .links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .links a {
            color: var(--secondary-teal);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-block;
        }

        .links a:hover {
            color: var(--primary-blue);
        }

        .bonus-info {
            text-align: center;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 25px 0;
            color: #FFD700;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .signup-box {
                padding: 30px 20px;
            }
            
            .logo-text {
                font-size: 1.8rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 로고 -->
    <div class="logo">
        <div class="logo-icon">TL</div>
        <div class="logo-text">TIMELINK</div>
    </div>

    <!-- 회원가입 박스 -->
    <div class="signup-box">
        <h1><i class="fas fa-user-plus"></i> TIMELINK 회원가입</h1>
        
        <!-- 보너스 안내 -->
        <div class="bonus-info">
            <i class="fas fa-gift"></i> 회원가입 완료 시 <strong>10,000 TL</strong> 보너스 지급!
        </div>
        
        <!-- 메시지 표시 영역 -->
        <div id="message" class="message"></div>
        
        <!-- 회원가입 폼 -->
        <form id="signupForm">
            <div class="input-group">
                <label for="email"><i class="fas fa-envelope"></i> 이메일</label>
                <input type="email" id="email" placeholder="이메일 주소" required>
            </div>
            
            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> 비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호 (6자 이상)" required minlength="6">
                <div class="password-strength">
                    <div class="strength-bar" id="passwordStrength"></div>
                </div>
            </div>
            
            <div class="input-group">
                <label for="passwordConfirm"><i class="fas fa-lock"></i> 비밀번호 확인</label>
                <input type="password" id="passwordConfirm" placeholder="비밀번호 다시 입력" required>
            </div>
            
            <div class="input-group">
                <label for="nickname"><i class="fas fa-user"></i> 닉네임</label>
                <input type="text" id="nickname" placeholder="사용할 닉네임" required>
            </div>
            
            <div class="input-group">
                <label for="realName"><i class="fas fa-id-card"></i> 실명</label>
                <input type="text" id="realName" placeholder="본인 실명" required>
            </div>
            
            <button type="submit" id="submitBtn">
                <i class="fas fa-user-plus"></i> 회원가입 완료
            </button>
        </form>
        
        <!-- 링크 -->
        <div class="links">
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> 로그인</a>
            <a href="index.html"><i class="fas fa-home"></i> 홈으로</a>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // API 기본 URL
        const API_BASE_URL = 'https://timelink-backend.timelink-api.workers.dev';
        
        // 비밀번호 강도 체크
        document.getElementById('password').addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrength');
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.match(/[A-Z]/) && password.match(/[a-z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^A-Za-z0-9]/)) strength++;
            
            strengthBar.className = 'strength-bar';
            if (password.length === 0) {
                strengthBar.style.width = '0%';
            } else if (strength <= 1) {
                strengthBar.classList.add('weak');
            } else if (strength <= 2) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        });

        // 회원가입 폼 제출
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const nickname = document.getElementById('nickname').value.trim();
            const realName = document.getElementById('realName').value.trim();
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            // 입력값 검증
            if (!email || !password || !passwordConfirm || !nickname || !realName) {
                showMessage('모든 필드를 입력해주세요.', 'error');
                return;
            }
            
            if (password !== passwordConfirm) {
                showMessage('비밀번호가 일치하지 않습니다.', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('비밀번호는 6자 이상이어야 합니다.', 'error');
                return;
            }
            
            // 버튼 상태 변경
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 가입 처리 중...';
            submitBtn.disabled = true;
            
            // 메시지 초기화
            messageDiv.textContent = '';
            messageDiv.className = 'message';
            
            try {
                // 회원가입 API 호출
                const response = await fetch(API_BASE_URL + '/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        nickname: nickname,
                        realName: realName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // 성공 메시지 표시
                    showMessage('✅ 회원가입 성공! 이메일로 인증번호가 발송되었습니다.', 'success');
                    
                    // 2초 후 인증 페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'verify.html?email=' + encodeURIComponent(email);
                    }, 2000);
                    
                } else {
                    // 실패 메시지 표시
                    showMessage(data.error || '회원가입에 실패했습니다. 다시 시도해주세요.', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
                
            } catch (error) {
                // 네트워크 오류 처리
                showMessage('서버 연결에 실패했습니다. 네트워크 상태를 확인해주세요.', 'error');
                console.error('회원가입 에러:', error);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // 메시지 표시 함수
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            
            // 에러 메시지는 5초 후 사라짐
            if (type === 'error') {
                setTimeout(() => {
                    messageDiv.className = 'message';
                    messageDiv.textContent = '';
                }, 5000);
            }
        }
        
        // 페이지 로드 시 이메일 입력칸에 포커스
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
