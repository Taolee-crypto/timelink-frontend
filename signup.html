<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* 회원가입 폼 스타일 (login.html과 유사) */
        /* 네비게이션 등 기존 스타일 유지 */
        
        .signup-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
        }
        
        .signup-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .signup-title {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #bb86fc, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        
        .signup-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        
        .signup-btn:hover {
            background: linear-gradient(135deg, #00b894, #00a884);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.3);
        }
        
        /* 나머지 스타일은 login.html과 동일하게 유지 */
    </style>
</head>
<body>
    <nav>
        <!-- 네비게이션 바 (login.html과 동일) -->
    </nav>

    <div class="signup-container">
        <div class="signup-box">
            <h1 class="signup-title">회원가입</h1>
            <p style="text-align: center; opacity: 0.7; margin-bottom: 2rem;">TIMELINK에 가입하고 시간의 가치를 경험하세요</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupEmail" class="form-label">이메일</label>
                    <input type="email" id="signupEmail" class="form-input" placeholder="이메일을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="signupPassword" class="form-label">비밀번호</label>
                    <input type="password" id="signupPassword" class="form-input" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label class="remember-me">
                        <input type="checkbox" id="agreeTerms" required>
                        <span>서비스 이용약관에 동의합니다</span>
                    </label>
                </div>
                
                <button type="submit" class="signup-btn">회원가입</button>
            </form>
            
            <div class="signup-link" style="margin-top: 2rem; text-align: center;">
                <p>이미 계정이 있으신가요? <a href="login.html">로그인하기</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 TIMELINK. 시간을 가치로 연결하는 새로운 경제</p>
    </footer>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            if (password !== confirmPassword) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            
            if (!agreeTerms) {
                alert('이용약관에 동의해주세요.');
                return;
            }
            
            alert('회원가입이 완료되었습니다! (시뮬레이션)');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
