<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 회원가입</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary-blue: #0066FF;
            --primary-dark: #0052CC;
            --secondary-teal: #00D4AA;
            --dark-bg: #0A0F2B;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
            --white: #FFFFFF;
            --error: #f44336;
            --success: #00D4AA;
        }

        body {
            background: var(--dark-bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 170, 0.05) 0%, transparent 50%);
        }

        /* 헤더 (index.html과 동일) */
        .main-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            height: 70px;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        /* 회원가입 박스 */
        .signup-container {
            margin-top: 100px;
            width: 100%;
            max-width: 450px;
        }

        .signup-box {
            background: var(--dark-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--white);
        }

        .signup-subtitle {
            color: var(--gray-text);
            font-size: 1rem;
        }

        /* 입력 그룹 */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--gray-text);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 45px 14px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 102, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        input.valid {
            border-color: var(--success);
            background: rgba(0, 212, 170, 0.05);
        }

        input.error {
            border-color: var(--error);
            background: rgba(244, 67, 54, 0.05);
        }

        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-text);
        }

        .input-icon.valid {
            color: var(--success);
        }

        .input-icon.error {
            color: var(--error);
        }

        /* 비밀번호 강도 */
        .password-strength {
            height: 4px;
            background: var(--gray-text);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }

        .strength-bar.weak { 
            width: 33%; 
            background: #f44336; 
        }
        .strength-bar.medium { 
            width: 66%; 
            background: #ff9800; 
        }
        .strength-bar.strong { 
            width: 100%; 
            background: var(--success); 
        }

        .strength-text {
            font-size: 0.85rem;
            color: var(--gray-text);
            margin-top: 5px;
            text-align: right;
        }

        /* 약관 동의 */
        .terms-group {
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .terms-check {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .terms-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-blue);
        }

        .terms-label {
            color: var(--gray-text);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .terms-link {
            color: var(--secondary-teal);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-link:hover {
            text-decoration: underline;
        }

        /* 버튼 */
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 보너스 정보 */
        .bonus-info {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(0, 212, 170, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 25px 0;
            color: #FFD700;
            font-weight: 500;
            text-align: center;
            animation: pulse 2s infinite;
        }

        /* 메시지 */
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: rgba(0, 212, 170, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.1);
            color: var(--error);
            border: 1px solid rgba(244, 67, 54, 0.3);
            display: block;
        }

        /* 링크 */
        .links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .links a {
            color: var(--secondary-teal);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .links a:hover {
            color: var(--primary-blue);
        }

        /* 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .main-header {
                padding: 0.5rem 0;
            }
            
            .signup-box {
                padding: 30px 20px;
                margin: 0 15px;
            }
            
            .signup-title {
                font-size: 1.5rem;
            }
            
            .logo-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>
        </div>
    </header>

    <!-- 회원가입 컨테이너 -->
    <div class="signup-container">
        <div class="signup-box">
            <!-- 헤더 -->
            <div class="signup-header">
                <h1 class="signup-title"><i class="fas fa-user-plus"></i> 회원가입</h1>
                <p class="signup-subtitle">TIMELINK에 오신 것을 환영합니다!</p>
            </div>
            
            <!-- 보너스 안내 -->
            <div class="bonus-info">
                <i class="fas fa-gift"></i> 회원가입 완료 시 <strong>10,000 TL</strong> 보너스 지급!
            </div>
            
            <!-- 메시지 표시 영역 -->
            <div id="message" class="message"></div>
            
            <!-- 회원가입 폼 -->
            <form id="signupForm">
                <!-- 이메일 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-envelope"></i> 이메일
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="이메일 주소를 입력하세요" required>
                        <div class="input-icon" id="emailIcon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 비밀번호 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-lock"></i> 비밀번호
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="비밀번호 (6자 이상)" required minlength="6">
                        <div class="input-icon" id="passwordIcon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="passwordStrength"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                
                <!-- 비밀번호 확인 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-lock"></i> 비밀번호 확인
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" required>
                        <div class="input-icon" id="passwordConfirmIcon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 닉네임 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-user"></i> 닉네임
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="nickname" placeholder="사용할 닉네임을 입력하세요" required>
                        <div class="input-icon" id="nicknameIcon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 실명 -->
                <div class="input-group">
                    <label class="input-label">
                        <i class="fas fa-id-card"></i> 실명
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="realName" placeholder="본인의 실명을 입력하세요" required>
                        <div class="input-icon" id="realNameIcon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 약관 동의 -->
                <div class="terms-group">
                    <label class="terms-check">
                        <input type="checkbox" id="termsAgreement" required>
                        <span class="terms-label">
                            <a href="#" class="terms-link">서비스 이용약관</a>과 
                            <a href="#" class="terms-link">개인정보 처리방침</a>에 동의합니다
                        </span>
                    </label>
                    
                    <label class="terms-check">
                        <input type="checkbox" id="marketingAgreement">
                        <span class="terms-label">
                            TIMELINK의 신규 서비스 및 이벤트 안내를 이메일로 받겠습니다
                        </span>
                    </label>
                </div>
                
                <!-- 제출 버튼 -->
                <button type="submit" class="btn" id="submitBtn">
                    <i class="fas fa-user-plus"></i> 회원가입 완료
                </button>
            </form>
            
            <!-- 링크 -->
            <div class="links">
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> 이미 계정이 있으신가요?</a>
                <a href="index.html"><i class="fas fa-home"></i> 홈으로 돌아가기</a>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // API 기본 URL
        const API_BASE_URL = 'https://timelink-api.timelink-api.workers.dev';
        
        // DOM 요소
        const signupForm = document.getElementById('signupForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const passwordConfirmInput = document.getElementById('passwordConfirm');
        const nicknameInput = document.getElementById('nickname');
        const realNameInput = document.getElementById('realName');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        
        // 입력 필드 상태 관리
        let formState = {
            email: { value: '', valid: false },
            password: { value: '', valid: false },
            passwordConfirm: { value: '', valid: false },
            nickname: { value: '', valid: false },
            realName: { value: '', valid: false },
            termsAgreed: false
        };
        
        // 이메일 유효성 검사
        emailInput.addEventListener('input', function() {
            const email = this.value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const isValid = emailRegex.test(email);
            
            updateInputState('email', email, isValid);
            validateForm();
        });
        
        // 비밀번호 강도 체크
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('passwordStrength');
            const strengthText = document.getElementById('strengthText');
            
            let strength = 0;
            let feedback = '';
            
            if (password.length >= 6) strength++;
            if (password.match(/[A-Z]/) && password.match(/[a-z]/)) strength++;
            if (password.match(/\d/)) strength++;
            if (password.match(/[^A-Za-z0-9]/)) strength++;
            
            // 강도 업데이트
            strengthBar.className = 'strength-bar';
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                feedback = '';
            } else if (strength <= 1) {
                strengthBar.classList.add('weak');
                feedback = '약함';
            } else if (strength <= 2) {
                strengthBar.classList.add('medium');
                feedback = '보통';
            } else {
                strengthBar.classList.add('strong');
                feedback = '강함';
            }
            
            strengthText.textContent = feedback;
            
            const isValid = password.length >= 6;
            updateInputState('password', password, isValid);
            validateForm();
        });
        
        // 비밀번호 확인 검사
        passwordConfirmInput.addEventListener('input', function() {
            const password = passwordInput.value;
            const confirm = this.value;
            const isValid = confirm === password && confirm.length >= 6;
            
            updateInputState('passwordConfirm', confirm, isValid);
            validateForm();
        });
        
        // 닉네임 검사
        nicknameInput.addEventListener('input', function() {
            const nickname = this.value.trim();
            const isValid = nickname.length >= 2 && nickname.length <= 20;
            
            updateInputState('nickname', nickname, isValid);
            validateForm();
        });
        
        // 실명 검사
        realNameInput.addEventListener('input', function() {
            const realName = this.value.trim();
            const isValid = realName.length >= 2 && realName.length <= 10;
            
            updateInputState('realName', realName, isValid);
            validateForm();
        });
        
        // 약관 동의 체크
        document.getElementById('termsAgreement').addEventListener('change', function() {
            formState.termsAgreed = this.checked;
            validateForm();
        });
        
        // 입력 상태 업데이트 함수
        function updateInputState(field, value, isValid) {
            formState[field].value = value;
            formState[field].valid = isValid;
            
            const inputElement = document.getElementById(field);
            const iconElement = document.getElementById(field + 'Icon');
            
            if (value === '') {
                inputElement.classList.remove('valid', 'error');
                iconElement.classList.remove('valid', 'error');
            } else if (isValid) {
                inputElement.classList.remove('error');
                inputElement.classList.add('valid');
                iconElement.classList.remove('error');
                iconElement.classList.add('valid');
            } else {
                inputElement.classList.remove('valid');
                inputElement.classList.add('error');
                iconElement.classList.remove('valid');
                iconElement.classList.add('error');
            }
        }
        
        // 폼 전체 유효성 검사
        function validateForm() {
            const allValid = 
                formState.email.valid &&
                formState.password.valid &&
                formState.passwordConfirm.valid &&
                formState.nickname.valid &&
                formState.realName.valid &&
                formState.termsAgreed;
            
            submitBtn.disabled = !allValid;
            return allValid;
        }
        
        // 메시지 표시 함수
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            if (type === 'error') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        // 회원가입 폼 제출
        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                showMessage('모든 필드를 올바르게 입력해주세요.', 'error');
                return;
            }
            
            const userData = {
                email: formState.email.value,
                password: formState.password.value,
                nickname: formState.nickname.value,
                realName: formState.realName.value,
                marketingAgreement: document.getElementById('marketingAgreement').checked
            };
            
            // 버튼 상태 변경
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 가입 처리 중...';
            submitBtn.disabled = true;
            
            try {
                // API 호출 (실제 구현시 주석 해제)
                /*
                const response = await fetch(API_BASE_URL + '/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('✅ 회원가입 성공! 이메일로 인증 링크가 발송되었습니다.', 'success');
                    
                    // 3초 후 안내 페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'signup-success.html?email=' + encodeURIComponent(userData.email);
                    }, 3000);
                } else {
                    showMessage(data.message || '회원가입에 실패했습니다.', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
                */
                
                // 임시 성공 처리 (API 구현 전)
                showMessage('✅ 회원가입 성공! 가상으로 10,000 TL이 지급되었습니다.', 'success');
                
                // 가상 사용자 데이터 저장
                const mockUserData = {
                    id: 'user_' + Date.now(),
                    email: userData.email,
                    name: userData.realName,
                    nickname: userData.nickname,
                    balance: 10000,
                    isVerified: false,
                    joinedAt: new Date().toISOString()
                };
                
                // 로컬스토리지에 저장 (임시)
                localStorage.setItem('timelink_temp_user', JSON.stringify(mockUserData));
                localStorage.setItem('timelink_temp_email', userData.email);
                
                // 3초 후 이메일 인증 페이지로 이동
                setTimeout(() => {
                    window.location.href = 'verify.html?email=' + encodeURIComponent(userData.email);
                }, 3000);
                
            } catch (error) {
                console.error('회원가입 오류:', error);
                showMessage('서버 연결에 실패했습니다. 다시 시도해주세요.', 'error');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', () => {
            emailInput.focus();
            validateForm();
        });
        
        // 스핀 애니메이션
        const style = document.createElement('style');
        style.textContent = `
            .fa-spinner.fa-spin {
                animation: spin 1s linear infinite;
            }
        `;
        document.head.appendChild(style);
    </script>
