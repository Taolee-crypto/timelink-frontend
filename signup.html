<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 회원가입</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #121212; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .signup-box { background: #1E1E1E; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; }
        h1 { text-align: center; margin-bottom: 30px; color: #29C4A8; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #BBB; }
        input { width: 100%; padding: 12px; background: #2A2A2A; border: 2px solid #3A3A3A; border-radius: 8px; color: white; font-size: 16px; }
        input:focus { outline: none; border-color: #29C4A8; }
        button { width: 100%; padding: 14px; background: #29C4A8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;  }
        button:hover { background: #20a78b; }
        .message {  padding: 10px; border-radius: 8px; display: none; }
        .success { background: rgba(41, 196, 168, 0.2); color: #29C4A8; display: block; }
        .error { background: rgba(244, 67, 54, 0.2); color: #f44336; display: block; }
        .links {  text-align: center; }
        .links a { color: #29C4A8; text-decoration: none; margin: 0 10px; }
    </style>

    <link rel="stylesheet" href="src/styles/common.css">
        <!-- 인증 및 헤더 관리 -->
    <script src="auth-manager.js"></script>
    <script src="header-manager.js"></script>
</head>
<body>
<!-- 헤더 -->
<header class="main-header">
    <div class="header-content">
        <a href="index.html" class="logo">
            <div class="logo-icon">TL</div>
            <div class="logo-text">TIMELINK</div>
        </a>
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <nav class="main-nav" id="mainNav">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> HOME</a>
            <a href="studio.html" class="nav-link"><i class="fas fa-sliders-h"></i> STUDIO</a>
            <a href="shareplace.html" class="nav-link"><i class="fas fa-store"></i> SHAREPLACE</a>
            <a href="tltube.html" class="nav-link"><i class="fas fa-play-circle"></i> TLTUBE</a>
            <a href="tlmusic.html" class="nav-link"><i class="fas fa-music"></i> TLMUSIC</a>
            <a href="cafe-radio.html" class="nav-link"><i class="fas fa-broadcast-tower"></i> CAFE RADIO</a>
            <a href="ad-plaza.html" class="nav-link"><i class="fas fa-ad"></i> AD PLAZA</a>
            <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> PROFILE</a>
        </nav>
        <div class="user-section">
            <div class="tl-balance" id="walletBtn"><div class="tl-icon">TL</div><span id="headerBalanceAmount">0</span></div>
            <div class="user-avatar" id="userMenuBtn"><i class="fas fa-user"></i></div>
            <div class="user-dropdown" id="userDropdown"></div>
        </div>
    </div>
</header>
    <div class="signup-box">
        <h1>TimeLink 회원가입</h1>
        
        <div id="message" class="message"></div>
        
        <form id="signupForm">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="이메일" required>
            </div>
            
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호 (6자 이상)" required>
            </div>
            
            <div class="input-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임" required>
            </div>
            
            <div class="input-group">
                <label for="realName">실명</label>
                <input type="text" id="realName" placeholder="실명" required>
            </div>
            
            <button type="submit">회원가입</button>
        </form>
        
        <div class="links">
            <a href="login.html">로그인</a>
            <a href="index.html">홈으로</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://timelink-backend.timelink-api.workers.dev';
        
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;
            const realName = document.getElementById('realName').value;
            const messageDiv = document.getElementById('message');
            
            // 로딩 상태
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '가입 중...';
            messageDiv.textContent = '';
            messageDiv.className = 'message';
            
            try {
                // 회원가입 API 호출
                const response = await fetch(API_BASE_URL + '/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        nickname: nickname,
                        realName: realName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    messageDiv.textContent = '회원가입 성공! 이메일 인증번호가 발송되었습니다.';
                    messageDiv.className = 'message success';
                    
                    // 인증 페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'verify.html?email=' + encodeURIComponent(email);
                    }, 2000);
                    
                } else {
                    messageDiv.textContent = data.error || '회원가입에 실패했습니다.';
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                messageDiv.textContent = '서버 연결에 실패했습니다.';
                messageDiv.className = 'message error';
                console.error('회원가입 에러:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
        
        // 페이지 로드 시 포커스
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').focus();
        });
    </script>
</body>

    <script type="module" src="./src/script/common-components.js"></script>
</html>
