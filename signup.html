<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 회원가입</title>
    <link rel="stylesheet" href="src/styles/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="bi bi-clock"></i>
                    <span>TimeLink</span>
                </div>
                <p class="tagline">회원가입</p>
            </div>
            
            <div class="login-content">
                <!-- 기본 정보 -->
                <div id="step1">
                    <div class="form-group">
                        <label class="form-label">이메일</label>
                        <input type="email" id="email" class="form-input" placeholder="example@timelink.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">비밀번호</label>
                        <input type="password" id="password" class="form-input" placeholder="8자 이상">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">비밀번호 확인</label>
                        <input type="password" id="confirmPassword" class="form-input" placeholder="비밀번호 다시 입력">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">닉네임</label>
                        <input type="text" id="nickname" class="form-input" placeholder="닉네임을 입력하세요">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">실명</label>
                        <input type="text" id="realName" class="form-input" placeholder="실명을 입력하세요">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">전화번호 (선택)</label>
                        <input type="tel" id="phone" class="form-input" placeholder="010-1234-5678">
                    </div>
                    
                    <!-- 약관 동의 -->
                    <div style="margin: 25px 0;">
                        <div style="display: flex; align-items: start; gap: 10px; margin-bottom: 15px;">
                            <input type="checkbox" id="agree1" style="margin-top: 3px;">
                            <label for="agree1" style="font-size: 14px; color: #333;">
                                이용약관에 동의합니다
                            </label>
                        </div>
                        
                        <div style="display: flex; align-items: start; gap: 10px; margin-bottom: 15px;">
                            <input type="checkbox" id="agree2" style="margin-top: 3px;">
                            <label for="agree2" style="font-size: 14px; color: #333;">
                                개인정보 수집에 동의합니다
                            </label>
                        </div>
                        
                        <div style="display: flex; align-items: start; gap: 10px;">
                            <input type="checkbox" id="agree3" style="margin-top: 3px;">
                            <label for="agree3" style="font-size: 14px; color: #666;">
                                마케팅 정보 수신에 동의합니다 (선택)
                            </label>
                        </div>
                    </div>
                    
                    <button id="submitBtn" class="btn-login">
                        <i class="bi bi-check-circle"></i> 회원가입 완료
                    </button>
                </div>
                
                <!-- 링크 -->
                <div class="links" style="margin-top: 30px;">
                    <a href="login.html" class="link">로그인하기</a>
                    <a href="index.html" class="link">홈으로</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('submitBtn').onclick = function() {
            // 기본 검사
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const nickname = document.getElementById('nickname').value;
            const realName = document.getElementById('realName').value;
            
            if (!email || !password || !confirm || !nickname || !realName) {
                alert('필수 항목을 모두 입력해주세요.');
                return;
            }
            
            if (password !== confirm) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            
            if (password.length < 8) {
                alert('비밀번호는 8자 이상이어야 합니다.');
                return;
            }
            
            if (!document.getElementById('agree1').checked || 
                !document.getElementById('agree2').checked) {
                alert('필수 약관에 동의해주세요.');
                return;
            }
            
            // 회원가입 완료
            const userData = {
                email: email,
                nickname: nickname,
                realName: realName,
                phone: document.getElementById('phone').value
            };
            
            console.log('회원가입 시도:', userData);
            
            // 테스트용
            alert('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        };
        
        // 엔터키로 제출
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('submitBtn').click();
            }
        });
    </script>
</body>
</html>
