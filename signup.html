<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | TIMELINK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
        }

        body {
            background: #0F172A;
            color: white;
            min-height: 100vh;
        }

        :root {
            --orange-primary: #FF6B00;
            --orange-secondary: #FFA500;
        }

        /* 헤더 */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 메인 */
        .main-content {
            padding-top: 100px;
            min-height: calc(100vh - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 60px;
        }
        
        .signup-card {
            background: rgba(26, 35, 66, 0.8);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 107, 0, 0.3);
            margin: 0 1rem;
        }
        
        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .signup-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFFFFF, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .signup-subtitle {
            color: #94A3B8;
            margin-bottom: 20px;
        }
        
        .bonus-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FF6B00);
            color: #0A0F2B;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
        }
        
        .form-label i {
            margin-right: 8px;
            color: #00D4AA;
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #FF6B00;
            background: rgba(255, 107, 0, 0.05);
        }
        
        .checkbox-group {
            margin: 25px 0;
        }
        
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        
        .checkbox-item input {
            width: 18px;
            height: 18px;
            accent-color: #FF6B00;
            margin-top: 3px;
        }
        
        .checkbox-text .title {
            display: block;
            color: white;
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .checkbox-text .desc {
            color: #94A3B8;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF6B00, #FFA500);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.3);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #94A3B8;
            font-size: 15px;
        }
        
        .login-link a {
            color: #00D4AA;
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-success {
            background: rgba(0, 212, 170, 0.1);
            color: #00D4AA;
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }
        
        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f44336;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        @media (max-width: 768px) {
            .signup-card {
                padding: 30px 20px;
            }
            .signup-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>
            <div id="authButtons"></div>
        </div>
    </header>

    <!-- 회원가입 폼 -->
    <main class="main-content">
        <div class="signup-card">
            <div class="signup-header">
                <h1 class="signup-title">회원가입</h1>
                <p class="signup-subtitle">TIMELINK에 가입하고 모든 서비스를 이용하세요</p>
                <div class="bonus-badge">
                    <i class="fas fa-gift"></i> 가입 즉시 10,000 TL 보너스
                </div>
            </div>
            
            <div class="status-message" id="signupStatus"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="name">
                        <i class="fas fa-user"></i> 이름
                    </label>
                    <input type="text" class="form-input" id="name" 
                           placeholder="이름을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope"></i> 이메일 주소
                    </label>
                    <input type="email" class="form-input" id="email" 
                           placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="nickname">
                        <i class="fas fa-at"></i> 닉네임
                    </label>
                    <input type="text" class="form-input" id="nickname" 
                           placeholder="사용할 닉네임" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> 비밀번호
                    </label>
                    <input type="password" class="form-input" id="password" 
                           placeholder="비밀번호 (8자 이상)" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">
                        <i class="fas fa-lock"></i> 비밀번호 확인
                    </label>
                    <input type="password" class="form-input" id="confirmPassword" 
                           placeholder="비밀번호 다시 입력" required>
                </div>
                
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="termsAgreement" required>
                        <div class="checkbox-text">
                            <span class="title">이용약관 동의 (필수)</span>
                            <span class="desc">TIMELINK 서비스 이용약관에 동의합니다.</span>
                        </div>
                    </div>
                    
                    <div class="checkbox-item">
                        <input type="checkbox" id="privacyAgreement" required>
                        <div class="checkbox-text">
                            <span class="title">개인정보 처리방침 동의 (필수)</span>
                            <span class="desc">개인정보 수집 및 이용에 동의합니다.</span>
                        </div>
                    </div>
                    
                    <div class="checkbox-item">
                        <input type="checkbox" id="marketingAgreement">
                        <div class="checkbox-text">
                            <span class="title">마케팅 정보 수신 동의 (선택)</span>
                            <span class="desc">새로운 소식과 혜택 정보를 이메일로 받아보시겠습니까?</span>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn" id="signupSubmitBtn">
                    <i class="fas fa-user-plus"></i> 무료로 회원가입하기
                </button>
            </form>
            
            <div class="login-link">
                <p>이미 계정이 있으신가요? <a href="login.html">로그인 하기</a></p>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="./src/script/timelink-auth.js"></script>
</body>
</html>
