<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | TIMELINK</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Auth Manager -->
    <script src="auth-manager.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0F2B;
            color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        /* 헤더 */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            height: 70px;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }
        
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        
        /* 네비게이션 */
        .main-nav {
            display: flex;
            gap: 0.5rem;
            padding: 0 1rem;
        }
        
        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .nav-link.active {
            background: rgba(138, 43, 226, 0.1);
            color: #8A2BE2;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }
        
        /* 사용자 섹션 */
        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .auth-button {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: #0066FF;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .auth-button:hover {
            background: rgba(0, 102, 255, 0.2);
            transform: translateY(-1px);
        }
        
        .auth-button.primary {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            color: white;
            border: none;
        }
        
        /* 메인 컨텐츠 */
        .signup-main {
            padding: 120px 0 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }
        
        .signup-card {
            background: linear-gradient(145deg, #1A2342, #0F172A);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .signup-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .signup-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .signup-subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        .bonus-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FF6B00);
            color: #0A0F2B;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
        }
        
        /* 폼 스타일 */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #0066FF;
            background: rgba(0, 102, 255, 0.05);
        }
        
        .checkbox-group {
            margin: 2rem 0;
        }
        
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #0066FF;
            margin-top: 0.25rem;
        }
        
        .checkbox-label {
            flex: 1;
            cursor: pointer;
        }
        
        .checkbox-label span {
            display: block;
            color: white;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        
        .checkbox-label p {
            color: #94a3b8;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        
        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
        }
        
        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        
        .login-link a {
            color: #00D4AA;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        /* 상태 메시지 */
        .status-message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .status-success {
            background: rgba(0, 212, 170, 0.1);
            color: #00D4AA;
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }
        
        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f44336;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        
        /* 반응형 */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            .header-content {
                padding: 0 1rem;
            }
            
            .nav-link span {
                display: none;
            }
            
            .signup-card {
                padding: 2rem;
            }
            
            .signup-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">TL</div>
                <div class="logo-text">TIMELINK</div>
            </a>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home"></i> HOME
                </a>
                <a href="studio.html" class="nav-link">
                    <i class="fas fa-sliders-h"></i> STUDIO
                </a>
                <a href="shareplace.html" class="nav-link">
                    <i class="fas fa-store"></i> SHAREPLACE
                </a>
                <a href="tltube.html" class="nav-link">
                    <i class="fas fa-play-circle"></i> TLTUBE
                </a>
                <a href="tlmusic.html" class="nav-link">
                    <i class="fas fa-music"></i> TLMUSIC
                </a>
                <a href="cafe-radio.html" class="nav-link">
                    <i class="fas fa-broadcast-tower"></i> CAFE RADIO
                </a>
                <a href="ad-plaza.html" class="nav-link">
                    <i class="fas fa-ad"></i> AD PLAZA
                </a>
            </nav>
            
            <div class="user-section">
                <a href="login.html" class="auth-button">
                    <i class="fas fa-sign-in-alt"></i> LOGIN
                </a>
            </div>
        </div>
    </header>
    
    <!-- 메인 컨텐츠 -->
    <main class="signup-main">
        <div class="container">
            <div class="signup-card">
                <div class="signup-header">
                    <h1 class="signup-title">회원가입</h1>
                    <p class="signup-subtitle">TIMELINK에 가입하고 모든 서비스를 이용하세요</p>
                    <div class="bonus-badge">
                        <i class="fas fa-gift"></i> 가입 즉시 10,000 TL 보너스
                    </div>
                </div>
                
                <!-- 상태 메시지 -->
                <div class="status-message" id="signupStatus"></div>
                
                <!-- 회원가입 폼 -->
                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="name">
                            <i class="fas fa-user"></i> 이름
                        </label>
                        <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">
                            <i class="fas fa-envelope"></i> 이메일 주소
                        </label>
                        <input type="email" class="form-control" id="email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="nickname">
                            <i class="fas fa-at"></i> 닉네임
                        </label>
                        <input type="text" class="form-control" id="nickname" placeholder="사용할 닉네임" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">
                            <i class="fas fa-lock"></i> 비밀번호
                        </label>
                        <input type="password" class="form-control" id="password" placeholder="비밀번호 (8자 이상)" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">
                            <i class="fas fa-lock"></i> 비밀번호 확인
                        </label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="비밀번호 다시 입력" required>
                    </div>
                    
                    <!-- 약관 동의 -->
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="termsAgreement" required>
                            <label class="checkbox-label" for="termsAgreement">
                                <span>이용약관 동의 (필수)</span>
                                <p>TIMELINK 서비스 이용약관에 동의합니다.</p>
                            </label>
                        </div>
                        
                        <div class="checkbox-item">
                            <input type="checkbox" id="privacyAgreement" required>
                            <label class="checkbox-label" for="privacyAgreement">
                                <span>개인정보 처리방침 동의 (필수)</span>
                                <p>개인정보 수집 및 이용에 동의합니다.</p>
                            </label>
                        </div>
                    </div>
                    
                    <!-- 가입 버튼 -->
                    <button type="submit" class="btn btn-primary" id="signupSubmitBtn">
                        <i class="fas fa-user-plus"></i> 무료로 회원가입하기
                    </button>
                </form>
                
                <!-- 로그인 링크 -->
                <div class="login-link">
                    <p>이미 계정이 있으신가요? <a href="login.html">로그인 하기</a></p>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const signupStatus = document.getElementById('signupStatus');
            
            // 이미 로그인된 경우 확인
            if (localStorage.getItem('timelink_user')) {
                window.location.href = 'index.html';
                return;
            }
            
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 입력값 가져오기
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const nickname = document.getElementById('nickname').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const termsAgreed = document.getElementById('termsAgreement').checked;
                const privacyAgreed = document.getElementById('privacyAgreement').checked;
                
                // 유효성 검사
                if (!name || !email || !nickname || !password || !confirmPassword) {
                    showStatus('모든 필수 항목을 입력해주세요.', 'error');
                    return;
                }
                
                if (!termsAgreed || !privacyAgreed) {
                    showStatus('필수 약관에 동의해주세요.', 'error');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showStatus('비밀번호가 일치하지 않습니다.', 'error');
                    return;
                }
                
                if (password.length < 8) {
                    showStatus('비밀번호는 8자 이상이어야 합니다.', 'error');
                    return;
                }
                
                // 버튼 상태 변경
                const submitBtn = document.getElementById('signupSubmitBtn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 처리 중...';
                
                // 회원가입 처리 (시뮬레이션)
                setTimeout(() => {
                    const userData = {
                        name: name,
                        email: email,
                        nickname: nickname,
                        balance: 10000, // 가입 보너스 10,000 TL
                        joinedAt: new Date().toISOString(),
                        verified: false // 이메일 인증 대기 상태
                    };
                    
                    // AuthManager 사용
                    if (window.timelinkAuth) {
                        window.timelinkAuth.login(userData, 'signup_token_' + Date.now());
                    } else {
                        // 폴백: localStorage에 저장
                        localStorage.setItem('timelink_user', JSON.stringify(userData));
                        localStorage.setItem('timelink_token', 'signup_token_' + Date.now());
                    }
                    
                    showStatus('회원가입이 완료되었습니다! 10,000 TL이 지급되었습니다.', 'success');
                    
                    // 성공 후 홈페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    
                }, 1500);
            });
            
            function showStatus(message, type) {
                signupStatus.textContent = message;
                signupStatus.className = 'status-message status-' + type;
                
                // 5초 후 메시지 제거
                setTimeout(() => {
                    signupStatus.className = 'status-message';
                    signupStatus.textContent = '';
                }, 5000);
            }
        });
    </script>
</body>
</html>
