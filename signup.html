    <div class="signup-box">
        <h1>TimeLink 회원가입</h1>
        
        <div id="message" class="message"></div>
        
        <form id="signupForm">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" placeholder="이메일" required>
            </div>
            
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="비밀번호 (6자 이상)" required>
            </div>
            
            <div class="input-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" placeholder="닉네임" required>
            </div>
            
            <div class="input-group">
                <label for="realName">실명</label>
                <input type="text" id="realName" placeholder="실명" required>
            </div>
            
            <button type="submit">회원가입</button>
        </form>
        
        <div class="links">
            <a href="login.html">로그인</a>
            <a href="index.html">홈으로</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://timelink-backend.timelink-api.workers.dev';
        
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;
            const realName = document.getElementById('realName').value;
            const messageDiv = document.getElementById('message');
            
            // 로딩 상태
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '가입 중...';
            messageDiv.textContent = '';
            messageDiv.className = 'message';
            
            try {
                // 회원가입 API 호출
                const response = await fetch(API_BASE_URL + '/api/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        nickname: nickname,
                        realName: realName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    messageDiv.textContent = '회원가입 성공! 이메일 인증번호가 발송되었습니다.';
                    messageDiv.className = 'message success';
                    
                    // 인증 페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'verify.html?email=' + encodeURIComponent(email);
                    }, 2000);
                    
                } else {
                    messageDiv.textContent = data.error || '회원가입에 실패했습니다.';
                    messageDiv.className = 'message error';
                }
                
            } catch (error) {
                messageDiv.textContent = '서버 연결에 실패했습니다.';
                messageDiv.className = 'message error';
                console.error('회원가입 에러:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
        
        // 페이지 로드 시 포커스
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').focus();
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const signupStatus = document.getElementById('signupStatus');
            
            // 이미 로그인된 경우 확인
            if (localStorage.getItem('timelink_user')) {
                window.location.href = 'index.html';
                return;
            }
            
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 입력값 가져오기
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const nickname = document.getElementById('nickname').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const termsAgreed = document.getElementById('termsAgreement').checked;
                const privacyAgreed = document.getElementById('privacyAgreement').checked;
                
                // 유효성 검사
                if (!name || !email || !nickname || !password || !confirmPassword) {
                    showStatus('모든 필수 항목을 입력해주세요.', 'error');
                    return;
                }
                
                if (!termsAgreed || !privacyAgreed) {
                    showStatus('필수 약관에 동의해주세요.', 'error');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showStatus('비밀번호가 일치하지 않습니다.', 'error');
                    return;
                }
                
                if (password.length < 8) {
                    showStatus('비밀번호는 8자 이상이어야 합니다.', 'error');
                    return;
                }
                
                // 버튼 상태 변경
                const submitBtn = document.getElementById('signupSubmitBtn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 처리 중...';
                
                // 회원가입 처리 (시뮬레이션)
                setTimeout(() => {
                    const userData = {
                        name: name,
                        email: email,
                        nickname: nickname,
                        balance: 10000, // 가입 보너스 10,000 TL
                        joinedAt: new Date().toISOString(),
                        verified: false // 이메일 인증 대기 상태
                    };
                    
                    // AuthManager 사용
                    if (window.timelinkAuth) {
                        window.timelinkAuth.login(userData, 'signup_token_' + Date.now());
                    } else {
                        // 폴백: localStorage에 저장
                        localStorage.setItem('timelink_user', JSON.stringify(userData));
                        localStorage.setItem('timelink_token', 'signup_token_' + Date.now());
                    }
                    
                    showStatus('회원가입이 완료되었습니다! 10,000 TL이 지급되었습니다.', 'success');
                    
                    // 성공 후 홈페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    
                }, 1500);
            });
            
            function showStatus(message, type) {
                signupStatus.textContent = message;
                signupStatus.className = 'status-message status-' + type;
                
                // 5초 후 메시지 제거
                setTimeout(() => {
                    signupStatus.className = 'status-message';
                    signupStatus.textContent = '';
                }, 5000);
            }
        });
    </script>
</body>
</html>
