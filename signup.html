<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 회원가입</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
        }
        
        .signup-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .password-strength {
            height: 4px;
            background: #e1e5e9;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            background: #48bb78;
            transition: width 0.3s;
        }
        
        .password-strength.weak .password-strength-bar {
            width: 33%;
            background: #f56565;
        }
        
        .password-strength.medium .password-strength-bar {
            width: 66%;
            background: #ed8936;
        }
        
        .password-strength.strong .password-strength-bar {
            width: 100%;
            background: #48bb78;
        }
        
        .error-message {
            color: #f56565;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 24px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .terms input[type="checkbox"] {
            margin-top: 2px;
            transform: scale(1.2);
        }
        
        .terms label {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .terms a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .terms a:hover {
            text-decoration: underline;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 24px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .login-link {
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 16px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            text-align: center;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @media (max-width: 480px) {
            .signup-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="signup-card">
            <div class="logo">
                <h1>TimeLink</h1>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">
                    <div class="error-message" id="nameError">이름을 입력해주세요.</div>
                </div>
                
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                    <div class="error-message" id="emailError">유효한 이메일 주소를 입력해주세요.</div>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required placeholder="최소 8자 이상">
                    <div class="password-strength" id="passwordStrength">
                        <div class="password-strength-bar"></div>
                    </div>
                    <div class="error-message" id="passwordError">비밀번호는 8자 이상이어야 합니다.</div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="비밀번호를 다시 입력하세요">
                    <div class="error-message" id="confirmPasswordError">비밀번호가 일치하지 않습니다.</div>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        <a href="#" onclick="showTerms()">이용약관</a> 및 
                        <a href="#" onclick="showPrivacy()">개인정보 처리방침</a>에 동의합니다
                    </label>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">회원가입</button>
                
                <div class="login-link">
                    이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
                </div>
            </form>
            
            <div class="success-message" id="successMessage">
                🎉 회원가입이 완료되었습니다!<br>
                <small>이메일 인증 후 로그인해주세요.</small>
            </div>
        </div>
    </div>

    <script>
        // 실제 백엔드 API 엔드포인트로 수정
        const API_BASE_URL = 'https://timelink-backend.timelink-api.workers.dev';
        
        document.getElementById('signupForm').addEventListener('submit', handleSignup);
        document.getElementById('password').addEventListener('input', updatePasswordStrength);
        document.getElementById('confirmPassword').addEventListener('input', validatePasswordMatch);
        
        // 이메일 유효성 검사
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // 비밀번호 강도 업데이트
        function updatePasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');
            const bar = strengthBar.querySelector('.password-strength-bar');
            
            // 비밀번호 강도 계산
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            // UI 업데이트
            strengthBar.className = 'password-strength';
            if (password.length > 0) {
                if (strength < 2) {
                    strengthBar.classList.add('weak');
                } else if (strength < 4) {
                    strengthBar.classList.add('medium');
                } else {
                    strengthBar.classList.add('strong');
                }
            }
            
            // 에러 메시지 처리
            const passwordError = document.getElementById('passwordError');
            if (password.length > 0 && password.length < 8) {
                passwordError.style.display = 'block';
                passwordError.textContent = '비밀번호는 8자 이상이어야 합니다.';
            } else {
                passwordError.style.display = 'none';
            }
        }
        
        // 비밀번호 확인 검사
        function validatePasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorElement = document.getElementById('confirmPasswordError');
            
            if (confirmPassword.length > 0 && password !== confirmPassword) {
                errorElement.style.display = 'block';
                errorElement.textContent = '비밀번호가 일치하지 않습니다.';
                return false;
            } else {
                errorElement.style.display = 'none';
                return true;
            }
        }
        
        // 폼 유효성 검사
        function validateForm() {
            let isValid = true;
            
            // 이름 검사
            const name = document.getElementById('name').value.trim();
            const nameError = document.getElementById('nameError');
            if (!name) {
                nameError.style.display = 'block';
                isValid = false;
            } else {
                nameError.style.display = 'none';
            }
            
            // 이메일 검사
            const email = document.getElementById('email').value.trim();
            const emailError = document.getElementById('emailError');
            if (!email || !validateEmail(email)) {
                emailError.style.display = 'block';
                emailError.textContent = !email ? '이메일을 입력해주세요.' : '유효한 이메일 주소를 입력해주세요.';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }
            
            // 비밀번호 검사
            const password = document.getElementById('password').value;
            const passwordError = document.getElementById('passwordError');
            if (!password || password.length < 8) {
                passwordError.style.display = 'block';
                passwordError.textContent = !password ? '비밀번호를 입력해주세요.' : '비밀번호는 8자 이상이어야 합니다.';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }
            
            // 비밀번호 확인 검사
            const confirmPassword = document.getElementById('confirmPassword').value;
            const confirmPasswordError = document.getElementById('confirmPasswordError');
            if (!confirmPassword) {
                confirmPasswordError.style.display = 'block';
                confirmPasswordError.textContent = '비밀번호 확인을 입력해주세요.';
                isValid = false;
            } else if (password !== confirmPassword) {
                confirmPasswordError.style.display = 'block';
                confirmPasswordError.textContent = '비밀번호가 일치하지 않습니다.';
                isValid = false;
            } else {
                confirmPasswordError.style.display = 'none';
            }
            
            // 이용약관 동의 검사
            const terms = document.getElementById('terms').checked;
            if (!terms) {
                alert('이용약관에 동의해주세요.');
                isValid = false;
            }
            
            return isValid;
        }
        
        // 회원가입 처리
        async function handleSignup(event) {
            event.preventDefault();
            
            if (!validateForm()) {
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '처리 중...';
                
                const formData = {
                    name: document.getElementById('name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                };
                
                console.log('회원가입 요청 데이터:', formData);
                console.log('API URL:', `${API_BASE_URL}/api/auth/signup`);
                
                // 실제 API 호출
                const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                console.log('응답 상태:', response.status);
                
                // 응답 데이터 파싱
                let data;
                try {
                    data = await response.json();
                    console.log('응답 데이터:', data);
                } catch (parseError) {
                    console.error('JSON 파싱 오류:', parseError);
                    throw new Error('서버 응답 형식이 올바르지 않습니다.');
                }
                
                if (data.success) {
                    // 성공 메시지 표시
                    document.getElementById('signupForm').style.display = 'none';
                    document.getElementById('successMessage').style.display = 'block';
                    
                    // 3초 후 로그인 페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    // 서버에서 반환된 오류 메시지 표시
                    const errorMessage = data.message || '회원가입에 실패했습니다.';
                    
                    // 이메일 중복 오류 처리
                    if (errorMessage.includes('이미 등록된 이메일')) {
                        document.getElementById('emailError').textContent = errorMessage;
                        document.getElementById('emailError').style.display = 'block';
                    } else {
                        throw new Error(errorMessage);
                    }
                }
                
            } catch (error) {
                console.error('Signup error:', error);
                
                // 네트워크 오류나 기타 오류 처리
                if (error.message.includes('Network') || error.message.includes('Failed to fetch')) {
                    alert('네트워크 연결에 실패했습니다. 인터넷 연결을 확인해주세요.');
                } else {
                    alert(`회원가입 중 오류가 발생했습니다: ${error.message}`);
                }
                
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }
        
        // 약관 및 개인정보 처리방침 팝업 (예시)
        function showTerms() {
            event.preventDefault();
            alert('이용약관 내용이 여기에 표시됩니다.\n\n실제 서비스에서는 별도의 페이지로 구현됩니다.');
        }
        
        function showPrivacy() {
            event.preventDefault();
            alert('개인정보 처리방침 내용이 여기에 표시됩니다.\n\n실제 서비스에서는 별도의 페이지로 구현됩니다.');
        }
        
        // 엔터 키로 폼 제출
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    handleSignup(event);
                }
            });
        });
        
        // 페이지 로드 시 디버깅 정보
        console.log('TimeLink 회원가입 페이지 로드됨');
        console.log('API 기본 URL:', API_BASE_URL);
    </script>
</body>
</html>
