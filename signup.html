<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELINK - 회원가입</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-blue: #0066FF;
            --secondary-teal: #00D4AA;
            --accent-purple: #9D4EDD;
            --dark-bg: #0A0F2B;
            --dark-card: #1A2342;
            --gray-text: #94A3B8;
            --white: #FFFFFF;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--white);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 헤더 */
        .main-header {
            background: rgba(10, 15, 43, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #0066FF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav {
            display: flex;
            gap: 10px;
        }
        
        .nav-link {
            color: var(--gray-text);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .auth-buttons {
            display: flex;
            gap: 10px;
        }
        
        .auth-btn {
            padding: 8px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .auth-btn.login {
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            background: transparent;
        }
        
        .auth-btn.signup {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            color: white;
            border: none;
        }
        
        /* 회원가입 폼 */
        .main-content {
            padding-top: 100px;
            min-height: calc(100vh - 100px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .signup-card {
            background: rgba(26, 35, 66, 0.8);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(0, 102, 255, 0.3);
        }
        
        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .signup-title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFFFFF, #00D4AA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .signup-subtitle {
            color: var(--gray-text);
            margin-bottom: 20px;
        }
        
        .bonus-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FF6B00);
            color: var(--dark-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
        }
        
        .form-label i {
            margin-right: 8px;
            color: var(--secondary-teal);
        }
        
        .form-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: rgba(0, 102, 255, 0.05);
        }
        
        .checkbox-group {
            margin: 25px 0;
        }
        
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }
        
        .checkbox-item input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-blue);
            margin-top: 3px;
        }
        
        .checkbox-text .title {
            display: block;
            color: white;
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .checkbox-text .desc {
            color: var(--gray-text);
            font-size: 14px;
            line-height: 1.5;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-teal));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: var(--gray-text);
            font-size: 15px;
        }
        
        .login-link a {
            color: var(--secondary-teal);
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-success {
            background: rgba(0, 212, 170, 0.1);
            color: var(--secondary-teal);
            border: 1px solid rgba(0, 212, 170, 0.3);
            display: block;
        }
        
        .status-error {
            background: rgba(239, 68, 68, 0.1);
            color: #f44336;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }
        
        @media (max-width: 768px) {
            .nav {
                display: none;
            }
            
            .signup-card {
                padding: 30px 20px;
            }
            
            .signup-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 헤더 -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-icon">TL</div>
                    <div class="logo-text">TIMELINK</div>
                </a>
                
                <nav class="nav">
                    <a href="index.html" class="nav-link">
                        <i class="fas fa-home"></i> HOME
                    </a>
                    <a href="studio.html" class="nav-link">
                        <i class="fas fa-sliders-h"></i> STUDIO
                    </a>
                    <a href="shareplace.html" class="nav-link">
                        <i class="fas fa-store"></i> SHAREPLACE
                    </a>
                    <a href="tltube.html" class="nav-link">
                        <i class="fas fa-play-circle"></i> TLTUBE
                    </a>
                </nav>
                
                <div class="auth-buttons">
                    <a href="login.html" class="auth-btn login">
                        <i class="fas fa-sign-in-alt"></i> 로그인
                    </a>
                    <a href="signup.html" class="auth-btn signup">
                        <i class="fas fa-user-plus"></i> 회원가입
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- 회원가입 폼 -->
    <main class="main-content">
        <div class="container">
            <div class="signup-card">
                <div class="signup-header">
                    <h1 class="signup-title">회원가입</h1>
                    <p class="signup-subtitle">TIMELINK에 가입하고 모든 서비스를 이용하세요</p>
                    <div class="bonus-badge">
                        <i class="fas fa-gift"></i> 가입 즉시 10,000 TL 보너스
                    </div>
                </div>
                
                <div class="status-message" id="signupStatus"></div>
                
                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="name">
                            <i class="fas fa-user"></i> 이름
                        </label>
                        <input type="text" class="form-input" id="name" placeholder="이름을 입력하세요" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="email">
                            <i class="fas fa-envelope"></i> 이메일 주소
                        </label>
                        <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="nickname">
                            <i class="fas fa-at"></i> 닉네임
                        </label>
                        <input type="text" class="form-input" id="nickname" placeholder="사용할 닉네임" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">
                            <i class="fas fa-lock"></i> 비밀번호
                        </label>
                        <input type="password" class="form-input" id="password" placeholder="비밀번호 (8자 이상)" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">
                            <i class="fas fa-lock"></i> 비밀번호 확인
                        </label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="비밀번호 다시 입력" required>
                    </div>
                    
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="termsAgreement" required>
                            <div class="checkbox-text">
                                <span class="title">이용약관 동의 (필수)</span>
                                <span class="desc">TIMELINK 서비스 이용약관에 동의합니다.</span>
                            </div>
                        </div>
                        
                        <div class="checkbox-item">
                            <input type="checkbox" id="privacyAgreement" required>
                            <div class="checkbox-text">
                                <span class="title">개인정보 처리방침 동의 (필수)</span>
                                <span class="desc">개인정보 수집 및 이용에 동의합니다.</span>
                            </div>
                        </div>
                        
                        <div class="checkbox-item">
                            <input type="checkbox" id="marketingAgreement">
                            <div class="checkbox-text">
                                <span class="title">마케팅 정보 수신 동의 (선택)</span>
                                <span class="desc">새로운 소식과 혜택 정보를 이메일로 받아보시겠습니까?</span>
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="signupSubmitBtn">
                        <i class="fas fa-user-plus"></i> 무료로 회원가입하기
                    </button>
                </form>
                
                <div class="login-link">
                    <p>이미 계정이 있으신가요? <a href="login.html">로그인 하기</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const signupStatus = document.getElementById('signupStatus');
            
            // 이미 로그인된 경우
            if (localStorage.getItem('tl_user') || localStorage.getItem('timelink_user')) {
                window.location.href = 'index.html';
                return;
            }
            
            signupForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const nickname = document.getElementById('nickname').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const termsAgreed = document.getElementById('termsAgreement').checked;
                const privacyAgreed = document.getElementById('privacyAgreement').checked;
                
                // 유효성 검사
                if (!name || !email || !nickname || !password || !confirmPassword) {
                    showStatus('모든 필수 항목을 입력해주세요.', 'error');
                    return;
                }
                
                if (!termsAgreed || !privacyAgreed) {
                    showStatus('필수 약관에 동의해주세요.', 'error');
                    return;
                }
                
                if (password !== confirmPassword) {
                    showStatus('비밀번호가 일치하지 않습니다.', 'error');
                    return;
                }
                
                if (password.length < 8) {
                    showStatus('비밀번호는 8자 이상이어야 합니다.', 'error');
                    return;
                }
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showStatus('올바른 이메일 형식을 입력해주세요.', 'error');
                    return;
                }
                
                // 버튼 상태 변경
                const submitBtn = document.getElementById('signupSubmitBtn');
                const originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 처리 중...';
                
                // 회원가입 처리
                setTimeout(() => {
                    const userData = {
                        name: name,
                        email: email,
                        nickname: nickname,
                        balance: 10000,
                        joinedAt: new Date().toISOString(),
                        verified: true,
                        marketingAgreed: document.getElementById('marketingAgreement').checked
                    };
                    
                    // localStorage에 저장
                    localStorage.setItem('tl_user', JSON.stringify(userData));
                    localStorage.setItem('tl_token', 'signup_token_' + Date.now());
                    localStorage.setItem('tl_balance', '10000');
                    
                    showStatus('회원가입이 완료되었습니다! 10,000 TL이 지급되었습니다.', 'success');
                    
                    // 홈페이지로 이동
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                    
                }, 1500);
            });
            
            function showStatus(message, type) {
                signupStatus.textContent = message;
                signupStatus.className = 'status-message status-' + type;
                
                setTimeout(() => {
                    signupStatus.className = 'status-message';
                    signupStatus.textContent = '';
                }, 5000);
            }
            
            document.getElementById('name').focus();
        });
    </script>
</body>
</html>
