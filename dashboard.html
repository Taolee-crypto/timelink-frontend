<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 대시보드</title>
    <link rel="stylesheet" href="src/styles/common.css">
    <link rel="stylesheet" href="src/styles/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="bi bi-clock"></i>
                <span>TimeLink</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="bi bi-house"></i> 홈</a>
                <a href="dashboard.html" class="nav-item active"><i class="bi bi-speedometer2"></i> 대시보드</a>
                <a href="studio.html" class="nav-item"><i class="bi bi-music-note-beamed"></i> 스튜디오</a>
                <a href="musicplace.html" class="nav-item"><i class="bi bi-shop"></i> 마켓플레이스</a>
                <a href="tltube.html" class="nav-item"><i class="bi bi-play-circle"></i> TLTube</a>
                <a href="charge.html" class="nav-item"><i class="bi bi-wallet2"></i> 충전</a>
            </div>
            <div class="nav-user">
                <span class="user-name">사용자님</span>
                <div class="user-avatar">
                    <i class="bi bi-person-circle"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 대시보드 컨텐츠 -->
    <div class="dashboard-container">
        <!-- 사이드바 -->
        <aside class="dashboard-sidebar">
            <div class="user-profile">
                <div class="profile-avatar">
                    <i class="bi bi-person-circle"></i>
                </div>
                <h3 class="profile-name">사용자님</h3>
                <p class="profile-email">user@example.com</p>
                <div class="profile-tier">
                    <span class="tier-badge">Basic</span>
                </div>
            </div>
            
            <div class="sidebar-menu">
                <a href="#" class="menu-item active"><i class="bi bi-speedometer2"></i> 대시보드</a>
                <a href="#" class="menu-item"><i class="bi bi-music-note-list"></i> 내 음원</a>
                <a href="#" class="menu-item"><i class="bi bi-bar-chart"></i> 통계</a>
                <a href="#" class="menu-item"><i class="bi bi-wallet2"></i> 수익 관리</a>
                <a href="#" class="menu-item"><i class="bi bi-gear"></i> 설정</a>
            </div>
        </aside>

        <!-- 메인 컨텐츠 -->
        <main class="dashboard-main">
            <!-- 통계 카드들 -->
            <div class="stats-grid">
                <div class="stat-card earnings">
                    <div class="stat-icon">
                        <i class="bi bi-currency-exchange"></i>
                    </div>
                    <div class="stat-info">
                        <h4>총 수익</h4>
                        <p class="stat-value" id="total-earnings">0 TL</p>
                        <p class="stat-change">+12.5% 지난달 대비</p>
                    </div>
                </div>
                
                <div class="stat-card uploads">
                    <div class="stat-icon">
                        <i class="bi bi-cloud-upload"></i>
                    </div>
                    <div class="stat-info">
                        <h4>업로드</h4>
                        <p class="stat-value" id="total-uploads">0</p>
                        <p class="stat-change">8개의 음원</p>
                    </div>
                </div>
                
                <div class="stat-card sales">
                    <div class="stat-icon">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="stat-info">
                        <h4>판매량</h4>
                        <p class="stat-value" id="total-sales">0</p>
                        <p class="stat-change">24회 판매</p>
                    </div>
                </div>
                
                <div class="stat-card projects">
                    <div class="stat-icon">
                        <i class="bi bi-folder2-open"></i>
                    </div>
                    <div class="stat-info">
                        <h4>활성 프로젝트</h4>
                        <p class="stat-value" id="active-projects">0</p>
                        <p class="stat-change">3개 진행 중</p>
                    </div>
                </div>
            </div>

            <!-- 차트 영역 -->
            <div class="chart-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>월별 수익 추이</h3>
                        <select class="chart-period">
                            <option>최근 6개월</option>
                            <option>최근 1년</option>
                            <option>전체</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>장르별 분포</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="genreChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 최근 활동 -->
            <div class="activity-section">
                <div class="activity-card">
                    <div class="activity-header">
                        <h3>최근 활동</h3>
                        <a href="#" class="view-all">전체 보기</a>
                    </div>
                    <div class="activity-list" id="activity-list">
                        <!-- 동적 로드 -->
                    </div>
                </div>
                
                <!-- 음원 목록 -->
                <div class="tracks-card">
                    <div class="tracks-header">
                        <h3>최근 음원</h3>
                        <a href="studio.html" class="upload-btn">
                            <i class="bi bi-plus-lg"></i> 새 음원
                        </a>
                    </div>
                    <div class="tracks-list" id="tracks-list">
                        <!-- 동적 로드 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="src/scripts/dashboard.js"></script>
</body>
</html>
