<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 대시보드</title>
    <link rel="stylesheet" href="src/styles/common.css">
    <link rel="stylesheet" href="src/styles/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 로그아웃 드롭다운 스타일 추가 */
        .user-menu-container {
            position: relative;
        }
        
        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: #1E1E1E;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 0;
            min-width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
        }
        
        .user-dropdown.show {
            display: block;
        }
        
        .dropdown-item {
            display: block;
            padding: 10px 20px;
            color: #ddd;
            text-decoration: none;
            transition: background 0.3s;
        }
        
        .dropdown-item:hover {
            background: #29C4A8;
            color: white;
        }
        
        .dropdown-divider {
            border-top: 1px solid #333;
            margin: 8px 0;
        }
        
        .logout-btn {
            color: #ff6b6b !important;
        }
        
        .logout-btn:hover {
            background: #ff6b6b !important;
            color: white !important;
        }
        
        .user-toggle {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .user-toggle:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="bi bi-clock"></i>
                <span>TimeLink</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="bi bi-house"></i> 홈</a>
                <a href="dashboard.html" class="nav-item active"><i class="bi bi-speedometer2"></i> 대시보드</a>
                <a href="studio.html" class="nav-item"><i class="bi bi-music-note-beamed"></i> 스튜디오</a>
                <a href="musicplace.html" class="nav-item"><i class="bi bi-shop"></i> 마켓플레이스</a>
                <a href="tltube.html" class="nav-item"><i class="bi bi-play-circle"></i> TLTube</a>
                <a href="charge.html" class="nav-item"><i class="bi bi-wallet2"></i> 충전</a>
            </div>
            <div class="nav-user user-menu-container">
                <div class="user-toggle" id="userToggle">
                    <span class="user-name" id="navUserName">사용자님</span>
                    <div class="user-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <i class="bi bi-chevron-down"></i>
                </div>
                
                <div class="user-dropdown" id="userDropdown">
                    <a href="profile.html" class="dropdown-item">
                        <i class="bi bi-person me-2"></i>프로필
                    </a>
                    <a href="settings.html" class="dropdown-item">
                        <i class="bi bi-gear me-2"></i>설정
                    </a>
                    <a href="charge.html" class="dropdown-item">
                        <i class="bi bi-wallet2 me-2"></i>충전하기
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item logout-btn" id="logoutBtn">
                        <i class="bi bi-box-arrow-right me-2"></i>로그아웃
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 대시보드 컨텐츠 -->
    <div class="dashboard-container">
        <!-- 사이드바 -->
        <aside class="dashboard-sidebar">
            <div class="user-profile">
                <div class="profile-avatar">
                    <i class="bi bi-person-circle"></i>
                </div>
                <h3 class="profile-name" id="profileName">사용자님</h3>
                <p class="profile-email" id="profileEmail">user@example.com</p>
                <div class="profile-tier">
                    <span class="tier-badge">Basic</span>
                </div>
            </div>
            
            <div class="sidebar-menu">
                <a href="#" class="menu-item active"><i class="bi bi-speedometer2"></i> 대시보드</a>
                <a href="#" class="menu-item"><i class="bi bi-music-note-list"></i> 내 음원</a>
                <a href="#" class="menu-item"><i class="bi bi-bar-chart"></i> 통계</a>
                <a href="#" class="menu-item"><i class="bi bi-wallet2"></i> 수익 관리</a>
                <a href="#" class="menu-item"><i class="bi bi-gear"></i> 설정</a>
            </div>
        </aside>

        <!-- 메인 컨텐츠 -->
        <main class="dashboard-main">
            <!-- 통계 카드들 -->
            <div class="stats-grid">
                <div class="stat-card earnings">
                    <div class="stat-icon">
                        <i class="bi bi-currency-exchange"></i>
                    </div>
                    <div class="stat-info">
                        <h4>총 수익</h4>
                        <p class="stat-value" id="total-earnings">0 TL</p>
                        <p class="stat-change">+12.5% 지난달 대비</p>
                    </div>
                </div>
                
                <div class="stat-card uploads">
                    <div class="stat-icon">
                        <i class="bi bi-cloud-upload"></i>
                    </div>
                    <div class="stat-info">
                        <h4>업로드</h4>
                        <p class="stat-value" id="total-uploads">0</p>
                        <p class="stat-change">8개의 음원</p>
                    </div>
                </div>
                
                <div class="stat-card sales">
                    <div class="stat-icon">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="stat-info">
                        <h4>판매량</h4>
                        <p class="stat-value" id="total-sales">0</p>
                        <p class="stat-change">24회 판매</p>
                    </div>
                </div>
                
                <div class="stat-card projects">
                    <div class="stat-icon">
                        <i class="bi bi-folder2-open"></i>
                    </div>
                    <div class="stat-info">
                        <h4>활성 프로젝트</h4>
                        <p class="stat-value" id="active-projects">0</p>
                        <p class="stat-change">3개 진행 중</p>
                    </div>
                </div>
            </div>

            <!-- 차트 영역 -->
            <div class="chart-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>월별 수익 추이</h3>
                        <select class="chart-period">
                            <option>최근 6개월</option>
                            <option>최근 1년</option>
                            <option>전체</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>장르별 분포</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="genreChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 최근 활동 -->
            <div class="activity-section">
                <div class="activity-card">
                    <div class="activity-header">
                        <h3>최근 활동</h3>
                        <a href="#" class="view-all">전체 보기</a>
                    </div>
                    <div class="activity-list" id="activity-list">
                        <!-- 동적 로드 -->
                    </div>
                </div>
                
                <!-- 음원 목록 -->
                <div class="tracks-card">
                    <div class="tracks-header">
                        <h3>최근 음원</h3>
                        <a href="studio.html" class="upload-btn">
                            <i class="bi bi-plus-lg"></i> 새 음원
                        </a>
                    </div>
                    <div class="tracks-list" id="tracks-list">
                        <!-- 동적 로드 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 페이지 로드 시 사용자 정보 설정
        document.addEventListener('DOMContentLoaded', function() {
            // localStorage에서 사용자 정보 가져오기
            const userEmail = localStorage.getItem('user_email') || 'ceo@timelink.digital';
            const userNickname = localStorage.getItem('user_nickname') || 'CEO';
            
            // 사용자 정보 표시
            document.getElementById('navUserName').textContent = userNickname + '님';
            document.getElementById('profileName').textContent = userNickname + '님';
            document.getElementById('profileEmail').textContent = userEmail;
            
            // 아바타 이니셜 설정
            const avatarInitial = userNickname.charAt(0).toUpperCase();
            const avatarIcon = document.querySelector('.user-avatar i, .profile-avatar i');
            if (avatarIcon) {
                avatarIcon.parentNode.innerHTML = avatarInitial;
            }
            
            // 드롭다운 토글
            const userToggle = document.getElementById('userToggle');
            const userDropdown = document.getElementById('userDropdown');
            
            userToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                userDropdown.classList.toggle('show');
            });
            
            // 문서 클릭 시 드롭다운 닫기
            document.addEventListener('click', function() {
                userDropdown.classList.remove('show');
            });
            
            // 로그아웃 기능
            const logoutBtn = document.getElementById('logoutBtn');
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                if (confirm('로그아웃 하시겠습니까?')) {
                    // localStorage 클리어
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('user_email');
                    localStorage.removeItem('user_nickname');
                    localStorage.removeItem('user_id');
                    
                    // 로그인 페이지로 이동
                    window.location.href = 'login.html?logout=true';
                }
            });
            
            // 인증 체크 (토큰이 없으면 로그인 페이지로)
            const authToken = localStorage.getItem('auth_token');
            if (!authToken) {
                alert('로그인이 필요합니다.');
                window.location.href = 'login.html';
                return;
            }
        });
    </script>
    
    <script type="module" src="src/scripts/dashboard.js"></script>
</body>
</html>
