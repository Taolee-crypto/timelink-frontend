<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeLink - 대시보드</title>
    <link rel="stylesheet" href="src/styles/common.css">
    <link rel="stylesheet" href="src/styles/dashboard.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('페이지 로드됨 - 인증 체크 시작');
        
        // 사용자 정보 설정
        const userEmail = localStorage.getItem('user_email') || 'ceo@timelink.digital';
        const userNickname = localStorage.getItem('user_nickname') || 'CEO';
        
        // 사용자 정보 표시
        document.getElementById('navUserName').textContent = userNickname + '님';
        document.getElementById('profileName').textContent = userNickname + '님';
        document.getElementById('profileEmail').textContent = userEmail;
        
        // 아바타 설정
        const avatarInitial = userNickname.charAt(0).toUpperCase();
        document.querySelectorAll('.user-avatar').forEach(avatar => {
            avatar.textContent = avatarInitial;
        });
        
        // 드롭다운 기능
        const userToggle = document.getElementById('userToggle');
        const userDropdown = document.getElementById('userDropdown');
        
        if (userToggle && userDropdown) {
            userToggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const isVisible = userDropdown.classList.contains('show');
                document.querySelectorAll('.user-dropdown').forEach(dd => {
                    dd.classList.remove('show');
                });
                
                if (!isVisible) {
                    userDropdown.classList.add('show');
                }
            });
            
            document.addEventListener('click', function(e) {
                if (!userToggle.contains(e.target) && !userDropdown.contains(e.target)) {
                    userDropdown.classList.remove('show');
                }
            });
        }
        
        // 강력한 로그아웃 기능
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                if (confirm('정말 로그아웃 하시겠습니까?')) {
                    console.log('로그아웃 시작');
                    
                    // 1. 모든 localStorage 데이터 삭제
                    localStorage.clear();
                    
                    // 2. sessionStorage 데이터 삭제
                    sessionStorage.clear();
                    
                    // 3. 쿠키 삭제
                    document.cookie.split(";").forEach(function(c) {
                        document.cookie = c
                            .replace(/^ +/, "")
                            .replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/;domain=" + window.location.hostname);
                    });
                    
                    // 4. 인덱스 DB 삭제 (선택사항)
                    if (window.indexedDB) {
                        window.indexedDB.databases().then(dbs => {
                            dbs.forEach(db => {
                                window.indexedDB.deleteDatabase(db.name);
                            });
                        });
                    }
                    
                    // 5. 서비스 워커 캐시 삭제 (선택사항)
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistrations().then(registrations => {
                            registrations.forEach(registration => {
                                registration.unregister();
                            });
                        });
                        caches.keys().then(cacheNames => {
                            cacheNames.forEach(cacheName => {
                                caches.delete(cacheName);
                            });
                        });
                    }
                    
                    // 6. 로그인 페이지로 이동 (캐시 방지)
                    const timestamp = Date.now();
                    const redirectUrl = `login.html?logout=true&t=${timestamp}&nocache=${Math.random()}`;
                    
                    // 히스토리 클리어하고 이동
                    window.location.replace(redirectUrl);
                    
                    // 추가 안전장치: 3초 후 강제 리다이렉트
                    setTimeout(() => {
                        window.location.href = 'login.html?force_logout=true';
                    }, 3000);
                }
            });
        }
        
        // 강력한 인증 체크 함수
        function checkAuth() {
            console.log('인증 체크 실행');
            
            // 필수 인증 데이터 체크
            const authToken = localStorage.getItem('auth_token');
            const storedEmail = localStorage.getItem('user_email');
            
            console.log('토큰 있음:', !!authToken);
            console.log('이메일 있음:', !!storedEmail);
            
            // 인증이 없으면 로그인 페이지로
            if (!authToken || !storedEmail) {
                console.log('인증 없음 - 로그인 페이지로 이동');
                alert('로그인이 필요합니다.');
                window.location.href = 'login.html?error=no_auth';
                return false;
            }
            
            // 토큰 만료 시간 체크
            const tokenTime = localStorage.getItem('token_time');
            if (tokenTime) {
                const tokenAge = Date.now() - parseInt(tokenTime);
                const maxAge = 24 * 60 * 60 * 1000; // 24시간
                
                if (tokenAge > maxAge) {
                    console.log('토큰 만료 - 로그인 페이지로 이동');
                    localStorage.clear();
                    window.location.href = 'login.html?error=token_expired';
                    return false;
                }
            }
            
            // 테스트 계정 체크 (필요시)
            const testAccounts = ['ceo@timelink.digital', 'admin@timelink.digital'];
            if (testAccounts.includes(storedEmail) && !authToken.startsWith('test_')) {
                console.log('테스트 계정 토큰 오류');
                window.location.href = 'login.html?error=invalid_test_token';
                return false;
            }
            
            console.log('인증 성공');
            return true;
        }
        
        // 페이지 로드 시 인증 체크
        if (!checkAuth()) {
            console.log('인증 실패 - 페이지 접근 차단');
            return;
        }
        
        // 인증 상태 주기적 확인 (5분마다)
        setInterval(checkAuth, 5 * 60 * 1000);
        
        // 브라우저 탭 닫힐 때 로그아웃 (선택사항)
        window.addEventListener('beforeunload', function() {
            // 세션 로그아웃 설정이 있으면
            const sessionOnly = localStorage.getItem('session_only');
            if (sessionOnly === 'true') {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('token_time');
            }
        });
    });
</script>
</head>
<body>
    <!-- 네비게이션 -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="bi bi-clock"></i>
                <span>TimeLink</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-item"><i class="bi bi-house"></i> 홈</a>
                <a href="dashboard.html" class="nav-item active"><i class="bi bi-speedometer2"></i> 대시보드</a>
                <a href="studio.html" class="nav-item"><i class="bi bi-music-note-beamed"></i> 스튜디오</a>
                <a href="musicplace.html" class="nav-item"><i class="bi bi-shop"></i> 마켓플레이스</a>
                <a href="tltube.html" class="nav-item"><i class="bi bi-play-circle"></i> TLTube</a>
                <a href="charge.html" class="nav-item"><i class="bi bi-wallet2"></i> 충전</a>
            </div>
            <div class="nav-user user-menu-container">
                <div class="user-toggle" id="userToggle">
                    <span class="user-name" id="navUserName">사용자님</span>
                    <div class="user-avatar">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <i class="bi bi-chevron-down"></i>
                </div>
                
                <div class="user-dropdown" id="userDropdown">
                    <a href="profile.html" class="dropdown-item">
                        <i class="bi bi-person me-2"></i>프로필
                    </a>
                    <a href="settings.html" class="dropdown-item">
                        <i class="bi bi-gear me-2"></i>설정
                    </a>
                    <a href="charge.html" class="dropdown-item">
                        <i class="bi bi-wallet2 me-2"></i>충전하기
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item logout-btn" id="logoutBtn">
                        <i class="bi bi-box-arrow-right me-2"></i>로그아웃
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 대시보드 컨텐츠 -->
    <div class="dashboard-container">
        <!-- 사이드바 -->
        <aside class="dashboard-sidebar">
            <div class="user-profile">
                <div class="profile-avatar">
                    <i class="bi bi-person-circle"></i>
                </div>
                <h3 class="profile-name" id="profileName">사용자님</h3>
                <p class="profile-email" id="profileEmail">user@example.com</p>
                <div class="profile-tier">
                    <span class="tier-badge">Basic</span>
                </div>
            </div>
            
            <div class="sidebar-menu">
                <a href="#" class="menu-item active"><i class="bi bi-speedometer2"></i> 대시보드</a>
                <a href="#" class="menu-item"><i class="bi bi-music-note-list"></i> 내 음원</a>
                <a href="#" class="menu-item"><i class="bi bi-bar-chart"></i> 통계</a>
                <a href="#" class="menu-item"><i class="bi bi-wallet2"></i> 수익 관리</a>
                <a href="#" class="menu-item"><i class="bi bi-gear"></i> 설정</a>
            </div>
        </aside>

        <!-- 메인 컨텐츠 -->
        <main class="dashboard-main">
            <!-- 통계 카드들 -->
            <div class="stats-grid">
                <div class="stat-card earnings">
                    <div class="stat-icon">
                        <i class="bi bi-currency-exchange"></i>
                    </div>
                    <div class="stat-info">
                        <h4>총 수익</h4>
                        <p class="stat-value" id="total-earnings">0 TL</p>
                        <p class="stat-change">+12.5% 지난달 대비</p>
                    </div>
                </div>
                
                <div class="stat-card uploads">
                    <div class="stat-icon">
                        <i class="bi bi-cloud-upload"></i>
                    </div>
                    <div class="stat-info">
                        <h4>업로드</h4>
                        <p class="stat-value" id="total-uploads">0</p>
                        <p class="stat-change">8개의 음원</p>
                    </div>
                </div>
                
                <div class="stat-card sales">
                    <div class="stat-icon">
                        <i class="bi bi-cart-check"></i>
                    </div>
                    <div class="stat-info">
                        <h4>판매량</h4>
                        <p class="stat-value" id="total-sales">0</p>
                        <p class="stat-change">24회 판매</p>
                    </div>
                </div>
                
                <div class="stat-card projects">
                    <div class="stat-icon">
                        <i class="bi bi-folder2-open"></i>
                    </div>
                    <div class="stat-info">
                        <h4>활성 프로젝트</h4>
                        <p class="stat-value" id="active-projects">0</p>
                        <p class="stat-change">3개 진행 중</p>
                    </div>
                </div>
            </div>

            <!-- 차트 영역 -->
            <div class="chart-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>월별 수익 추이</h3>
                        <select class="chart-period">
                            <option>최근 6개월</option>
                            <option>최근 1년</option>
                            <option>전체</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>장르별 분포</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="genreChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 최근 활동 -->
            <div class="activity-section">
                <div class="activity-card">
                    <div class="activity-header">
                        <h3>최근 활동</h3>
                        <a href="#" class="view-all">전체 보기</a>
                    </div>
                    <div class="activity-list" id="activity-list">
                        <!-- 동적 로드 -->
                    </div>
                </div>
                
                <!-- 음원 목록 -->
                <div class="tracks-card">
                    <div class="tracks-header">
                        <h3>최근 음원</h3>
                        <a href="studio.html" class="upload-btn">
                            <i class="bi bi-plus-lg"></i> 새 음원
                        </a>
                    </div>
                    <div class="tracks-list" id="tracks-list">
                        <!-- 동적 로드 -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('대시보드 로드됨');
            
            // 사용자 정보 가져오기
            const userEmail = localStorage.getItem('user_email') || 'ceo@timelink.digital';
            const userNickname = localStorage.getItem('user_nickname') || 'CEO';
            
            // 사용자 정보 표시
            document.getElementById('navUserName').textContent = userNickname + '님';
            document.getElementById('profileName').textContent = userNickname + '님';
            document.getElementById('profileEmail').textContent = userEmail;
            
            // 아바타 이니셜 설정
            const avatarInitial = userNickname.charAt(0).toUpperCase();
            const avatarIcons = document.querySelectorAll('.user-avatar, .profile-avatar');
            avatarIcons.forEach(icon => {
                icon.innerHTML = '<span style="font-size:24px;font-weight:bold;">' + avatarInitial + '</span>';
            });
            
            // 드롭다운 기능
            const userToggle = document.getElementById('userToggle');
            const userDropdown = document.getElementById('userDropdown');
            
            if (userToggle && userDropdown) {
                userToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // 현재 상태 확인
                    const isVisible = userDropdown.style.display === 'block';
                    
                    // 모든 드롭다운 닫기
                    document.querySelectorAll('.user-dropdown').forEach(dropdown => {
                        dropdown.style.display = 'none';
                    });
                    
                    // 현재 드롭다운 토글
                    userDropdown.style.display = isVisible ? 'none' : 'block';
                });
                
                // 문서 클릭 시 드롭다운 닫기
                document.addEventListener('click', function(e) {
                    if (!userToggle.contains(e.target) && !userDropdown.contains(e.target)) {
                        userDropdown.style.display = 'none';
                    }
                });
                
                // 드롭다운 항목 클릭 시 닫기
                userDropdown.querySelectorAll('.dropdown-item').forEach(item => {
                    item.addEventListener('click', function() {
                        setTimeout(() => {
                            userDropdown.style.display = 'none';
                        }, 100);
                    });
                });
            }
            
            // 로그아웃 기능
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    if (confirm('정말 로그아웃 하시겠습니까?')) {
                        // 저장소 클리어
                        localStorage.clear();
                        sessionStorage.clear();
                        
                        // 로그인 페이지로 이동
                        window.location.href = 'login.html?logout=true&t=' + Date.now();
                    }
                });
            }
            
            // 인증 체크
            const authToken = localStorage.getItem('auth_token');
            if (!authToken) {
                alert('로그인이 필요합니다.');
                window.location.href = 'login.html';
                return;
            }
            
            // 데이터 로드 함수들 (예시)
            loadDashboardData();
        });
        
        function loadDashboardData() {
            // 여기에 대시보드 데이터 로드 로직 추가
            console.log('대시보드 데이터 로드');
            
            // 예시 데이터
            document.getElementById('total-earnings').textContent = '1,250 TL';
            document.getElementById('total-uploads').textContent = '8';
            document.getElementById('total-sales').textContent = '24';
            document.getElementById('active-projects').textContent = '3';
        }
    </script>

    <script type='module' src="src/scripts/dashboard.js"></script>
</body>
</html>
