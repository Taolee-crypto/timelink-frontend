<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 테스트</title>
    <script src="./script/common-components.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .info { background: #f0f0f0; padding: 15px; border-radius: 5px; margin: 10px 0; }
        button { margin: 5px; padding: 10px 15px; }
    </style>
</head>
<body>
    <h1>로그인 상태 테스트</h1>
    
    <div id="status" class="info">
        상태 확인 중...
    </div>
    
    <div>
        <button onclick="checkStatus()">상태 확인</button>
        <button onclick="logout()">로그아웃</button>
        <button onclick="location.href='./index.html'">홈으로</button>
    </div>
    
    <script>
        function checkStatus() {
            const user = checkAuth();
            const statusDiv = document.getElementById('status');
            
            if (user) {
                statusDiv.innerHTML = '<h3>✅ 로그인됨</h3>' +
                    '<p>이름: ' + user.username + '</p>' +
                    '<p>이메일: ' + (user.email || '없음') + '</p>' +
                    '<p>가상 사용자: ' + (user.isVirtual ? '예' : '아니오') + '</p>' +
                    '<p>잔액: ' + (user.balance || 0) + ' TL</p>';
            } else {
                statusDiv.innerHTML = '<h3>❌ 로그인되지 않음</h3>' +
                    '<p>index.html에서 "지금 시작하기" 버튼을 클릭하세요.</p>';
            }
        }
        
        // 페이지 로드 시 확인
        setTimeout(checkStatus, 500);
    </script>
</body>
</html>
